body:
  text: 禮說卷四翰林院侍講惠士竒撰地官二周之賦祿以田王者居九畡之田收經入以食兆民是以天子一圻諸侯一同公食貢大夫食邑士食田大國之卿一旅之田上大夫一卒之田衆一旅田一成成方十里其稅百夫田萬畝畝一鍾詩曰倬彼甫田歲取十千卿之祿也自此以降至皂隸食職其稅一夫田百畝與庶人等為庶人在官其無田者或有罪奪之既老歸之去國收之及外人之來與官吏承乏無田餼而徒理事者否則皆有田田百畝夫一㕓謂之戶故詩曰三百㕓易曰三百戶一軫十夫楚葉公子髙有存國之功食田六百畛功崇者祿加豐也荀子曰上賢祿天下次賢祿一國下賢祿田邑楚莊王謂共雍曰有德者受爵祿有功者受田宅二者女無一焉宅在邑故田宅謂之田邑周之衰也大夫刺幽王曰佌佌彼有屋蓛蓛方有穀豈非小人在位有宅有田歟祿田之外有功而賞曰賞田魏公叔痤為將與韓趙戰而勝禽樂祚魏王說以賞田百萬祿之然則賞田亦謂之祿也公叔痤讓功於吳起巴寧爨襄於是索吳起之後賜田二十萬寧襄各十萬王曰公叔長者又與田四十萬加之百萬之上使百四十萬此司勳所謂加田康成云既賞之又加賜以田所以厚恩一說加田官宰之田也晉語官宰食加若齊鮑國為魯施氏之宰有百室之邑故國征不及焉晉惠公賞以說衆作轅田轅爰通秦孝公用商君亦制轅田皆賞田也管子曰良田不在戰士三年而兵弱然則轅田之法以上田賞戰士而中下授民秦晉之良田盡歸戰士矣賈田者官賈之田官田者官工之田晉語工商食官管子云賈知貴賤不為官賈工治功能不為官工者與功而不與分焉然則工商不在官者不與分田周書云縣鄙商旅能來三室者與之一室之祿言能招來外商三人則與之一夫之田也白虎通云一夫一婦成一室漢田令啇者不農康成謂賈田在市賈人家所受田蓋在官之賈歟牛田牧田皆芻牧之地若青之萊夷秦之胡苑魯牧在野周牧在郊邑外曰郊郊外曰野薦草多衍六畜易蕃之地也古有掌宅之官凡仕者近宫耕者近門工賈近市齊使弗鄭為宅掌宅之官也是為國宅宅必有田故曰宅田武王伐紂表商容釋箕子使各處其宅田其田漢髙祖詔曰有功勞行田宅孝昭賜蘇武田二頃宅一區孝宣時胡組郭徴卿子孫皆以舊恩賜田宅漢猶如是則周可知矣田有稅宅無征而􅃮林猶加重者何也舜為食器而􅃮墨之諸侯以為侈漢有工官主作􅃮器南陽樊氏以富聞欲作器物先種梓漆蓋其利厚民私之故曰民多私利者其國貧且木不可獨伐不可獨舉不可獨運必資民力用妨農事是以倍其征非私􅃮林惡廢民於生穀也古者計𤱔以鍾故魏季成子食采千鍾曽子始仕三􅚚後仕三千鍾秦漢易鍾以石而祿漸薄六朝有職分田一品五頃又有公廨田以供公用至唐內官賦以石外官賦以田無地者畝給粟二斗五代廢之至宋而復大藩長史二十頃及縣尉不滿五千戶者令四頃尉二頃稍優於唐其田每月不及十貫者支茶湯錢以足之所以厚其飬廉之意雖不逮於古然所以示優厚厲清操猶得周家忠厚之遺焉晉有萊田田騶後魏有公田戰國䇿子之相燕貴重主斷燕王噲收吏璽自三百石以上皆效之子之亦見韓非子說者謂以石計祿始於此不知以石計祿本起於田李悝盡地力畝收一石半下孰倍中孰三上孰四蓋以石計田以田賦祿王登為中牟令一日而見二中大夫豫之田宅衛嗣君欲以薄疑為上卿進田萬頃吳起攻亭下令曰有能先登者仕之國大夫賜之上田宅人爭趨之攻亭一朝而拔之此戰國之賦祿皆以田也吳起相楚悼王以為封君太衆貧國弱兵之道於是封君之祿二世而收則采地之廢昉於此乎文公欲弛孟文子之宅云欲利子於外地之寬景公欲更晏平仲之宅云請徙子於豫章之圃則國宅不皆官署宅田不盡民居也商君之法斬一首者爵一級欲為官者為五十石之官斬二首者爵二級欲為官者為百石之官則以石計祿始於秦然韓非子以為善田利宅所以戰士卒也而斷頭裂腹播骨乎平原曠野者無宅容身身死田奪大臣左右無功者擇田而受擇田而食則當時賦祿及賞仍以田明矣曲禮無田祿者不設祭器有田祿者先為祭服祭統古者於禘賜爵服於嘗出田邑田邑者田宅也康成以為國地其不然乎左傳衛公孫免餘曰唯卿備百邑下有上祿亂也邑謂十室之邑百邑則田一成卿之祿也趙武以絳老為絳縣師與之田使為君復陶案縣師上士非所謂士食田者歟晉侯賞桓子狄臣千室千室者千夫之田桓子上卿千室猶百邑也古者井有定邑無常易曰改邑不改井康成注易訟卦云小國之下大夫采地方一成其定稅三百家故三百戶也孔疏謂一成九百夫宫室塗巷山澤三分去一餘有六百夫又通率其地不易再易一家而受二夫之地故定稅三百家然春秋大國之卿其田不過一旅一旅之田不過一成如其說一家受二夫之地當定稅四百五十家言一旅者舉成數也三百戶不滿一成以田賦祿而豫之以不食之地其說妄矣古之人臣苟非有功不得食邑載師所謂宅田賞田是也若夫公邑家邑小都大都皆非采地亦非祿田所謂王命尸臣官此栒邑栒故豳國提封萬井兵車百乘天子使之治其賦而主其民又賜之鸞旗黼黻雕戈而宗人掌其禁令仍督其違失者其地則載師任之不得專焉及周之衰遂為已邑溫子即狄樊皮畔王君子惡之公邑之利都家之主地不成國民不稱君而內有六卿外有六遂甸稍縣疆犬牙相錯雖有不臣之心其力亦不能為亂所謂無拳無勇職為亂階巧言之卒章得其情矣吕氏春秋晉文公令曰有能得介子推者爵上卿田百萬淮南道應訓宣王封子發執圭列田百頃左傳莊十九年惠王奪子禽祝跪與詹父田而收膳夫之秩田猶秩也秩亦田也奪田收秩所謂奪以馭其貧也宣十四年衛孔達縊而死衛人以為成勞復室其子使復其位室謂宅田祿也周書所謂一室之祿蓋祿其子襲父位杜預謂室者以女妻之鑿矣自一室之祿至千室之祿皆田也故古者名祿為田成八年經晉殺其大夫趙同趙括是時趙朔已死朔子武尚幼以其田與祁奚晉景公從韓厥之言衰盾忠勳不可無後乃立武而反其田焉然則復室其子者反其田也古者天子畿內不以封秦仲為西垂大夫隴西有秦亭秦谷而非子居犬丘周之犬丘漢之槐里懿王都之本非國也及平王東遷秦仲之孫襄公於是始國而詩有秦風則車鄰駟鐵皆襄公時作而序謂車鄰美秦仲失之天子守邑之大夫安得有內小臣傳令乎世本云鄭桓公居棫林徙拾紀年謂始居洛後居鄭父之丘是為鄭桓公則是西周畿內亦未聞有鄭國也及桓公之子武公與晉文侯夾輔平王始滅虢㑹而都於溱洧焉後世遂有新鄭之目而指漢之京兆鄭縣為舊都豈非附㑹者為之歟說文云周制天子地方千里分為百縣縣有四郡說本周書而王制則云天子縣內有九十三國其說多依孟子然皆不合周官漢書薛瓚注言周自穆王以下都於西鄭不得以封桓公也幽王既敗虢㑹又滅遷居其地國於鄭父之丘是為鄭桓公無封京兆之文其說本穆天子傳及竹書而謂桓公未聞封於京兆其識卓矣漢中南鄭猶京兆西鄭也耆舊傳云南鄭之號始於鄭桓公桓公死於犬戎其民南奔故以南為號其不然乎有西鄭故加南又何與於鄭桓公也凡民有夫則有家有家則有里夫出口泉故口以夫名家給繇役故役以家名里樹桑麻故樹以里名夫布者一口之夫家征者一夫之家里布者一家之里也征有弛舍惟賢能老疾貴者服公事者而閒民不與焉故使之出三日二日一日之力征而田與追胥轉移執事亦在竭作之列所謂唯為社田國人畢作是也後鄭謂家征者出士徒車輦失之又謂里布二十五家之布罰一家而使出二十五家之布勢必不能且不毛與不耕孰重宅不毛者罰布一里田不耕者罰粟三夫趙商嘗疑而問焉康成亦不能言其故矣宅之所處為里里者居也夏官量人所謂軍社之所里是也蓋屋在田故田不耕者出三夫之屋粟宅在里故宅不毛者出一家之里布也夫征即夫布說見前案漢律民不繇資錢二十二謂民出資錢以給繇役每家二十二錢蓋漢之家征如此則閒民反重其征必不然矣漢律見說文解字且民之無事者為閒民公族之無事者為遊倅等閒也而貴賤分故公族之無事者諸子掌之國征弗及而民之無事者入衛於宫則宫伯有徒役之事出耕於野則載師有夫家之征夫家猶徒役也國家既養而長之又重征以困之有是理乎稿人職外內朝有冗食即宫中之人民而謂之冗食者許氏說文云人在屋下無田事然則冗食即閒民也康成謂留治文書若今尚書之屬諸直上者則凡外內朝之散吏趣走給召呼之屬亦皆閒民為之矣此民無家事而服公事者鄉大夫舍而弗征則載師亦不得而征之也春秋魯作三軍各征其軍注謂征其軍之家屬孔疏云丁壯從軍者官無稅其家屬不入軍者稅之閒民出夫家之征蓋以此周書西土方千里分為百縣左傳九縣長轂九百四十縣遺守四千則每縣百乘百縣萬乘此國畿千里出車之大數也地官有縣師秋官有縣士凡縣之衆庶縣士聚之縣師作之若將有㑹同師田行役之事則縣師受法於司馬甸稍都鄙受法於縣師是為縣師之法名曰縣法而縣士則各掌其縣之禁令焉風俗通曰百里為同總名曰縣縣𤣥也首也從系倒首言當𤣥靜徭役也然則縣法者徭役之法歟鄭司農以三百里至四百里為縣康成則分為五等百里曰郊二百里曰甸三百里曰稍四百里曰縣五百里曰都司馬法二百里為州三百里為野餘同不知甸地稍地疆地皆縣地也稍人掌丘乘方士掌都家所掌者即甸地稍地疆地而稍人則以縣師之法為丘乘之政令方士亦以時修其縣法而為都家之治其都邑則又縣師造之量其地辨其物而制其域故曰縣弦也縣聲近弦施繩用法不曲如絃也縣師掌師田作衆庶造都邑故以取名周曰師楚曰尹漢曰令其職兼文武并掌兵器春秋周禮未改楚武王授師孑以伐隨衛懿公將戰而國人受甲古者兵器藏於國有事而後授兵既事復還兵所謂良兵藏於玉府及內府者必非民間所造造之者繕人稿人掌之者司甲司兵戈盾弓矢各有司存晉作州兵使州作兵魯作丘甲使丘作甲非古也西京精兵聚於雒陽武庫故漢之武庫令猶周之司兵哀帝建平中母將隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢蘇林曰用度皆出大司農未聞取之於百姓說者謂周官兵器出於鄉遂之民誤矣小司徒及鄉師頒六鄉之比法車輦登其數馬牛辨其物簡閲之而已非籍而賦之且古有命民小司徒辨貴賤所謂民之貴者亦得乘飾車駢馬焉而遂人酇長簡兵器以備追胥非以供軍旅㑹同之用也司馬法丘出牛三頭馬一匹甸出長轂一乘馬四匹牛十二頭此即春秋所謂田賦歟古者馬牛車輦皆謂之賦魯使丘甸出之重傷民力故春秋書之曰用田賦較之初稅𤱔而尤甚矣何以知之以未用田賦之時知之三軍作而三子各毁其乘如依司馬法則乘者甸之出也奚為毁之且甸出車一乘故甸讀為敶其訓為乘則是毁其乘者毁其甸也毁其乘則可毁其甸則不可毁其甸是壞井田之法先商鞅而決裂阡陌也以是知甸出車一乘之說非也自魯用田賦始也自魯用田賦列國皆然名為乘馬丘牛其實賦車籍馬與秦之頭㑹箕斂何以異焉周官牛人有公牛而牽倣同挽校人有王馬而毛物異頒旗有司常以待國事鼓有鼓人以和軍旅車有巾車而其用無常又安用乘馬丘牛重傷民力哉然則馬牛車輦旗鼓兵氣皆非民間之物縣師使其有司備之各帥其民而至及其㑹車人之卒伍則五人為伍百人為卒而一乘七十五人之說亦無所用之先偏後伍伍乘彌縫廣有一卒卒偏之兩所謂車人之卒伍也楚攻魏張儀請出兵以徑魏於是攻皮氏而以卒萬人車百乘與魏是古者車一乘卒百人武王伐殷革車三百乘法當用卒三萬人故田單曰帝王之兵所用不過三萬而天下服矣說者謂周官無偏則不然古者士有卒伍車有偏列司徒主卒司空主車冬官亡則偏法亦亡廣車之萃分為左右每廣一卒謂之正法偏者廣之偏左廣為左偏右廣為右偏偏之兩者合則四兩以翼廣分則五伍以承偏謂之偏法亦曰偏駕則知車人之卒伍未嘗無偏君行師從故覲禮有偏駕過天子之城宜櫜甲束兵故偏駕不入王門康成謂偏駕者金象木革四輅其不然乎魚麗之陳先偏魏舒毁車為卒亦偏為前拒蓋無定數因事制宜者歟鄭志趙啇問一甸之田方八里有戎馬一乘大夫采四甸一甸之稅入於王其餘三甸裁有十二匹而校人職家四間何也答曰四間八百六十四匹此乃國馬不出於民司馬法民出軍賦無與於國所謂民出軍賦者即春秋之田賦也古文田陳同音故齊陳轉為齊田甸乘亦同音故丘甸通為丘乘說者以為甸出車一乘故甸改為乘失之司馬穰苴兵法因號司馬法案戰國䇿齊閔王時司馬穰苴為政閔王殺之大臣不親則穰苴乃閔王之將以故齊南破楚西屈秦用韓魏燕趙之衆猶鞭策者蓋穰苴之力居多及穰苴死而閔王亡矣晏子春秋以為齊景公史遷因之如其然左傳曷為不載乎韓非子曰私門之官用馬府之世紲又曰民産絶則畜生少畜生少則戎馬乏戎馬乏則將馬出是將馬者國馬謂之馬府戎馬者民間之馬所謂民出軍賦者也民馬乏故以國馬給軍則其法非始於春秋行於戰國歟何休曰用田賦者若漢家斂民錢以田為率矣禮軍賦十並不過一乘愚謂以田為率乃稅畝非田賦也魯語田一井出稯禾秉芻缶米而已如以十井為乘則包咸之說見論語注吾未之前聞秦穆公送公子重耳入晉革車五百乘步卒五萬疇騎二千此一乘百人之法而兼有騎則騎起於春秋非始於戰國也民年二十三傅之疇官學習騎射故曰疇騎見韓非子春秋隱四年傳云敝邑以賦與陳蔡從服䖍云賦兵也昭六年傳大夫有賦於軍故魯之御叔大夫也而傲使人令倍其賦謂軍賦也漢孝惠之初令吏六百石以上及故吏嘗佩將軍都尉印及二千石官印者家唯給軍賦他無所與則大夫有賦於軍至漢猶然矣哀七年傳魯賦八百乘邾賦六百乘故兵車曰賦輿有稅有賦稅以足食賦以足軍論語治賦孔安國亦謂之兵賦然則用田賦者以田賦出兵司馬法本諸此服䖍引司馬法五十乘為兩百二十乘為伍二十五乘為偏杜預引司馬法車十五乘為大偏九乘為小偏則偏無定數伍兩亦然倍伍為什倍兩為五十倍卒為二百齊語五十人為小戎二百人為卒倍法也坊記孔疏云據司馬法之文車甲馬牛皆計地令民自出鄉遂之衆七十五人出革車一乘甲士三人馬四匹牛十二頭恐非力之所能皆是國家所給故巾車職毁折入齎於職幣質人云凡受馬於有司者書其齒與毛其賈馬死則旬之內更司兵云授兵從司馬之法頒之受兵亦如之是國家所給也愚謂司馬法出於田賦始自春秋之末行於戰國之時魯用田賦猶鄭作丘賦服䖍曰作丘甲者一丘之田出一馬三牛其說是也然以為古法則非子産愛民而行病民之政學者不能無疑焉大宰有芻秣之式大府以四郊之賦待之則牛馬不出於丘明矣秦孝公十二年為田開阡陌十四年初為賦賦者軍賦也軍賦始於春秋至是開阡陌而更定其法也師氏三德二曰敏德敏者何也克為敏德以已承之孔子曰克己曾子曰已任一也說文克之象肩也其義任也詩云佛時仔肩毛傳曰克鄭箋曰任釋詁曰勝蓋能勝其任謂之克然則苟非已焉能克苟非克焉得敏是故堯舜恭已禹稷由己成湯惟己伊尹若己皆敏德也於文以已承之曰巹巹者謹愼之辭詩云赤舄己巳見說文蓋言謹也周公之敏也若無己則敬失其基禮失其幹愼失其藉墮枝體黜聰明離形去智變為槁木死灰亦終入於昏昏默默而已矣學問求諸己廉恥行諸己忠恕推諸己立達取諸己安人安百姓修諸己孔子無我非無己也楊子為我非為己也已之欲非己猶身之垢非身為仁由己是謂當仁仁以成已惟敏乃成訓己為私濫於王肅浸於劉炫異乎吾所聞一曰至德至者何也中庸其至矣乎民鮮能久矣惟有敏德者能之敏德所以為仁而孝德者為仁之本也春秋昭十二年左傳云仲尼曰古也有志克己復禮仁也則古有是言而孔子引之為仁由己而由人乎哉此發明克己之義也而復禮之目未詳故顔子請問克為敏德其詳可得聞乎不能謂之賊不足謂之畫浮況謂之溺游移謂之惑中廢謂之弱後退謂之却皆不能自克者敏之蠧也惟克乃敏詩曰農夫克敏力耕數耘收穫如寇盜之至農夫之敏也君子克己亦如之詩曰良士蹶蹶言動而敏於事也此敏德所以為行本歟子曰一日克己復禮又曰有能一日用其力於仁用力者己也能用力非克己乎而皆曰一日者言由己不由人也故曰我欲仁斯仁至矣不識已焉識仁子貢之施濟求之人孔子之立達反之己故曰修己以敬以安百姓堯舜猶病五行已屬中宫土易曰安土敦乎仁故能愛未有不愛己而能愛人者也求仁者於己取之可矣史遷紀帝嚳普施利物不於其身非吾儒之學也吾儒學在己利物本諸身莊子曰至人無己無己是無仁也故莊子不知仁莊子謂枝於仁者擢德塞性蹩躄為仁天下始疑而其論仁也則云中心物愷兼愛無私以墨子之學為孔子之語其謬己甚皆自至人無己之一言始路寢制如明堂面有四門虎門者路寢之西門也西為成熟之方學貴成熟故小學在西亦名西學祭義云食三老五更於大學所以教諸侯之弟也祀先賢於西學所以教諸侯之德也西學周小學也先賢有道德王所使教國子者大學在成均則西學在虎門之左明矣古者學在門繆公學著人齊風毛傳云門屛之間曰著著人者楚語所謂位寧有官師之典著與寧通蓋師氏保氏也師氏保氏同居門左各司王朝保氏不言者省文可知或云南稱門北稱闈此臆說也蕭子良云蕭何以署書題蒼龍白虎二闕不知據何書後漢德陽殿東門雲龍西門神虎虎金獸也故在西則虎門為路寢西門又何疑乎家之學在門側之堂故國之學在虎門之左此蔡雍所謂周官有門闈之學也文耀鈎云西宫白帝其精白虎左傳昭十年欒髙與陳鮑相攻遂伐虎門晏平仲端委立於虎門之外蓋以虎門師保所居講學視朝之地故朝服立於其外歟東漢有白虎觀肅宗詔諸儒論定五經同異於此白虎門名於門立觀因以名之蓋取地官師氏虎門之義也一說虎門宫之外門失之矣師氏守王門保氏守王闈爾匹宫中之門謂之闈康成謂巷門相通者雜記夫人奔喪入自闈門升自側階然則闈門乃旁側之門也路門外之應門為正門而虎門在西師氏居其左闈門又在內似皆旁側之門畫虎象秋嚴漢制則然矣康成以路門當之豈其然乎廣韻引周禮云公卿之子入王端之左教以六藝謂之門子其後氏焉氏焉者以門為姓若吳有胥門巢晉有下門聰也以虎門為端門國子為門子則似干寶注而目為周禮誤矣師氏詔王媺而教國子以三德三行保氏諌王惡而教國子以六藝六儀國子者公卿大夫之子而王之世子亦齒焉古者師保之官掌國中失之事中者為媺王有媺則道之使成失者為惡王有惡則間之使止因以教王及王世子而國之貴遊子弟皆從王世子而學焉者也降及春秋其道息矣然其風猶存秦穆公益國十二而學於著人荆文王兼國三十而學於保申秦至穆而霸楚至文而昌二君能光大先世之業以成其媺者師保之力也楚大子商臣之惡其師潘崇實倡之猶陳公子他之惡本於其傅之不良蓋二人之性未必惡師傅惡故二人從之而惡說者謂商臣蜂目豺聲形惡也豈其性惡乎詩有墓門刺陳他也陳他無良師傅以至於不義惡加於萬民焉故曰墓門有棘斧以斯之言斧能析薪猶師能止惡也秦不法古律令為師胡亥學書趙高教之夫也不良此之謂矣夫之言傅也謂師傅也師傅不良故陳陀惡加萬民胡亥毒痡四海太元曰黃兒中蕃君子洗愆言有老臣以為師保則君子庶幾免於惡焉爾人之所好而不足者媺也人之所醜而有餘者惡也彊其所不足拂其所有餘此保氏師氏之職歟漢成中主委任外親帝師張禹國之侫臣黨於王氏變漢為新師保之官安可非其人也易兑講習臨教思二陽咸臨師保之象初以志行正為貞二以不順從為利言詔媺諫惡逆之吉順之凶潘崇之於商臣趙髙之於胡亥張禹之於漢成皆不正而順從何利之有君命順則臣有順命君命逆則臣有逆命君命逆而臣順之者一言可以喪邦臨九二爻辭曰咸臨吉無不利夫子恐人以順為利也故特明其義曰咸臨吉無不利未順命也未之言非古語也言非以順命為利也為人臣者不明乎此義則不免為宋之三旨相公而已三旨者一曰取聖旨二曰領聖旨三曰已得聖旨也此之謂順命即六三之甘臨故甘臨曰無攸利咸臨曰旡不利兑象朋友臨象師保易曰無有師保如臨父母書曰放黜師保則師保非三公也三公官不必偹師保必備其官易初元士二大夫師氏保氏正當元士大夫之位故臨二陽象之周公師保萬民則三公亦得兼焉荀子曰從命而利君謂之順從命而不利君謂之諂逆命而利君謂之忠逆命而不利君謂之篡然則咸臨之旡不利甘臨之旡攸利其義曉然矣𫝊曰從道不從君此之謂也晏子曰君正臣從謂之順君僻臣從謂之逆君失其道臣失其守逆政行而有司不敢爭覆社稷危宗廟是故上有行中之君下有順命之臣君不行中故臣未順命知臨之宜咸臨之吉歟荆威王學書於沈尹華昭釐惡之有中謝者為昭釐謂王曰國人皆以王為沈尹華之弟子也王不說因疏沈尹華甚哉人之好為師而恥為弟子也故細人一言而威王不說則師保廢於戰國矣商書曰能自得師者王謂人莫已若者亡故荆興於文衰於威一傳而懷王遂亡其國客死於秦保氏五射白矢參連剡注襄尺井儀案廣韻白矢作白勻襄尺作讓尺參連作參逺賈疏云臣與君射不與君並立襄君一尺而退則襄讀為讓古今文也新序云左把彈右攝丸定操持審參連吳越春秋云射之道從分望敵合以參連連誤為逺失其義矣莊子鏑矢復㳫注云矢去復往㳫然則復沓猶參連也列子曰善射者能令後鏃中前括發發相及矢矢相屬前矢造準而無絶落後矢之括猶銜弦視之若一焉是為參連後漢陳王寵善弩射十發十中中皆同處其法以天覆地載參連為奇又三微三小三微為經三小為緯經緯相將萬勝之方然要在機牙弩柄曰臂鈎弦曰牙牙外曰郭郭下曰懸刀合名之曰機差以米則不發然則參連弩射尤精矣詩四矢反兮箋云反復也禮射三而止每射四矢皆得其故處此之謂復莊子所謂復㳫也司諫糾萬民之德而觀察其德行道藝辨之以能司救禁萬民之邪而誅讓其邪惡過失防之以禮乃其職不列於六鄉六遂之中而隸於師氏保氏之下何哉蓋必先師氏詔王媺而後司諫糾民德民之德本於王之媺也必先保氏諫王惡而後司救禁民邪民之邪本於王之惡也糾民德者鄉三物禁民邪者鄉八刑師氏之詔詔以此一人有德以道民德不令而行保氏之諫諫以此一人無邪以間民邪不禁而止本諸身徴諸民德道禮齊風俗成焉比長奇邪閭胥觥撻族師刑罰皆所以禁民邪民有過惡州長歲糾黨正月戒司救復三讓三罰之以故民無隱慝比長教和親閭胥聚衆庶書其敬敏任恤者族師每月屬民書其孝弟睦姻有學者是為德行道藝黨正歲屬民而書之州長正月屬民而考之然後入之於鄉大夫鄉大夫三年大此則復加考而舉其賢者能者而獻其書王再拜受之登於天府內史二之則所以糾民德者較之禁民邪而尤詳焉以故民無遺善司諫復以之考鄉里之治而詔廢置蓋比閭族黨州鄉或有書之未備考之未精舉之未當者司諫巡問而觀察之以進退其鄉之吏由是窮居側陋之士無不上聞言行必達皆登於書謂之史傳至秦曠絶其道廢壞漢武始舉賢良方正天子計書先上太史媺惡之事靡不畢集後漢光武始詔南陽撰作風俗故沛三輔有耆舊節士之序魯廬江有名德先賢之讚郡國之書由此而作其後遂有三輔決録汝南月旦之評說者以為處士橫議然猶有古糾德禁邪之遺意而朝廷無詔媺諌惡之官則是不正其本而齊其末也故東漢風俗雖有氣節之名而德行道藝不及三代之純者以此魏置州郡中正區别人物第其高下定為九品其有言行修著則升進之儻或道義虧缺則降下之此古州長黨正族師閭胥之職也雖風教頽失而無典刑然時有清議尚能勸俗陳壽居喪使女奴丸藥積年沉廢郤詵篤孝以假葬違常降品一等其為懲勸也如是雖古之巡問觀察誅讓防禁何以加焉後魏太和以前精選德高一鄉者為中正當時頗得其人及宣武孝明之世寢以頽紊而冀州大中正排抑武夫不入清品武夫怨怒遂聚火焚其第殺其人天下寃痛乃詔斬其尤惡者餘大赦以安之而魏亦亡矣中正置於延康廢於開皇立法未嘗不善久而弊滋榮辱在手高下任意此非出於法之不善實由於本之未端端本之道先正朝廷則化起於身教成於國地官糾德禁邪既有比閭族黨以分其職又有司諌司救以董其成而為司氏保氏之屬旨哉旨哉祖已曰惟先格王正厥事此之謂也調人掌司萬民之難而諧和之典瑞穀圭以和難康成謂難仇讎和之者若春秋宣公及齊侯平莒及郯晉侯使瑕嘉平戎於王愚案僖公二十一年楚執宋公公㑹諸侯盟於薄釋宋公公羊謂執未有言釋之者以公與議而釋之何休謂善僖公能免宋公之厄穀梁謂外釋不志以公與之盟而目之康成謂公有功焉此典瑞所謂和難也二十七年楚人圍宋公羊謂此楚子而貶稱人以執宋公故終僖之篇貶何休謂古諸侯有難王者若方伯和平之後相犯復故罪楚前執宋公僖公與共議釋之今復犯圍宋故貶終僖之篇貶者言君子和平人當終身保也然則調人和難保之終身故先動者誅之康成謂猶今二千石以令解仇怨後復相報移徙之即何休所謂後相犯復故罪是也楚人先動其能免於王者之誅乎二十八年晉人執衛侯三十年公為之請納玉於王與晉侯皆十㲄王許之乃釋衛侯爾匹玉十謂之區注云五㲄為區然則雙玉曰珏半珏曰隻十隻曰區倍之為十㲄和難之㲄圭也㲄之言穀十數之成和難者成之故用成數僖公行禮故記者善而志之大戴禮曰父母之讎不與同生兄弟之讎不與聚國朋友之讎不與聚鄉族人之讎不與聚鄰曲禮亦云父之讎弗與共戴天兄弟之讎不反兵交逰之讎不同國諸儒異說莫能相一學者惑焉愚謂不與同生者孝子之心令勿相讎者國家之法如其法則孝子之心傷如其心則國家之法壞欲兩全則兩窮于是使不共戴天之讎避諸海外既不壞國家之法亦不傷孝子之心此調人之所以為調也千里之外逺於同國而鄉近於國鄰近於鄉族人則踈於從父昆弟矣亦可補調人之闕焉或曰父之讎避諸海外是共戴天也可乎曰調人之和難頴封人之錫類也土中有水弗掘無泉四海之外别有一天其誰曰不然若夫殺人者死傷人者刑乃秋官之所弊而謀非調人之所和而釋漢律衷刺刃者必誅以其雖未殺傷人而有殺傷之心也調人職所謂過而殺傷人者吉人良士本無殺傷之心時有過誤不幸陷離者耳漢律過失殺人不坐死過失若舉刃欲斫伐而軼中人者調人乃教民之官故以其民共聽而成之東漢之季洛陽有主諧合殺人者謂之㑹任之家遂假託調人之法因而為姧利受人十萬謝客數千由是法禁益弛京師劫質白晝群行而漢亡矣管子春三丣俗作卯十二始丣十二中丣十二小丣而始丣合男女秋三丣今文酉古文丣俗誤為卯十二始丣十二中丣十二小丣而始丣合男女冬夏兩至後九十二日謂之春秋兩至春至十日之內室無處女蓋始丣合男女者白露下收聚之初始丣之辰荀子所謂霜降逆女家語所謂霜降而婦功成嫁娶者行焉是也始􅣧合男女者清明後出耕之日始丣之辰媒氏職所謂中春之月令㑹男女是也春至即春分十日之內三􅣧之中中春之月㑹男女之時于是時也奔者不禁故曰室無處女謂女盡行詩摽有梅毛傳所謂三十之男二十之女不待備禮而行者所以蕃育人民也過此則非昏姻之時不用令者罰之荀卿子所謂氷泮殺止殺止一作殺女家語所謂氷泮而農事起昏禮殺於此衆說皆同康成獨異而管子尤合周官故愚引以為證焉􅣧為春門三􅣧為八舉木成數八丣為秋門三丣為九和金成數九古文􅣧卯同形書無善本故正之說文􅣧象開門丣象閉門晉束晳以為四時皆可昏姻引春秋為證然民間嫁娶吾聞之詩禮未聞之春秋夏小正二月綏多士女太元內婦始秋分隂外陽內萬物之既自秋至春辛壬癸甲皆嫁娶之時張融曰易泰卦六五帝乙歸妹以祉元吉舊說六五爻辰在􅣧春為陽中萬物生育嫁娶大吉此管子春三􅣧合男女之義也參同契謂二月榆落魁臨於􅣧八月麥生天罡據丣蓋麥生而嫁娶行榆落而昏禮殺合於天時者歟左傳襄二十二年十二月鄭逰眅將如晉未出竟遭逆妻者奪之則春秋民間嫁娶亦在秋冬也媒氏㑹男女即管子掌媒之合獨所謂合獨者凡國都皆有掌媒取鰥寡而和合之豫田宅而家室之三年然後事之此之謂合獨心星為二月之合宿故三􅣧為合獨之時墨子曰丈夫年二十毋敢不處家女子年十五毋敢不事人聖王之法也然則男三十女二十而無夫家皆過時不嫁娶者媒氏㑹而合之非合獨而何􅣧從日為昴丣從日為昴昴白虎宿星當從丣說文誤作昴徐鉉音萛飽切詩云維參與昴毛傳云丣留也元命苞云昴六星昴之言留言物成就繫留愚謂昴西方之宿一名旄頭昴與旄若猶與搖康成曰秦人猶搖聲相近則昴旄亦聲相近也丣象閉門昴為白虎不當從􅣧說文非許氏之舊矣俗本流傳莫能正也丣從田為留采地之名因以為氏漢人改留為劉而有􅣧金刀之說則􅣧丣之相亂也久矣虞翻云古柳丣字同王充曰日出扶桑暮入細柳故宅西曰柳谷是日夕為丣也左傳陳成子救鄭及留舒鄭箋引之作柳舒是古留柳亦通矣律書言二十八舍北至於留留者言陽氣之稽留也故曰留八月也則直讀昴為留也祝融作市其象為離離明為日日有三時三時者朝時昃時夕時不曰中而曰昃者皇侃以為日將中而未中猶在東側是中前為昃也賈公彥引書日中昃不遑暇食是中後為昃也家語日出聽政至於中昃王肅云中日中昃昳中說文以日西為昃失之矣日東為朝日西為夕日昃為中春秋肆大省公羊曰肆者何跌也何休曰跌過度昳之言跌也過猶不及故中前中後皆曰昳中日至衡陽是為隅中至昆吾是為正中皆日昃時也昃市於中朝市於東夕市於西日中盛明當王之位故曰大市而主萬民百族平旦食時為公為卿故曰朝市而主四方啇賈日昳晡時為臺為僕故曰夕市而主販夫販婦莊子曰日方中方睨側視為睨睨猶昃也方睨而中方中而睨其時有幾日中不須臾故易曰日􅨫之離何可久也說者謂日昃明將盡豈其然日中為市取諸噬嗑上明下動日昃之大市也行人之儀不朝不夕晏子云室夕管子云立朝夕古語皆以朝夕為東西矣月食必在望月望為盈日昃必在中日中為昃故易曰日中則昃月盈則食何休注公羊亦云昃日西是皆以昃為夕也可乎昃有中有下皆非日夕時古者罪人之喪以昏殣故葬以朝不以夕謂其近於昏春秋九月丁已葬定公雨不克葬戊午日下穀梁作稷乃克葬何休云下蓋晡時晡時則夕也曷為不書夕而書且晡時而葬是以罪人待其君也必不然矣書傳注云平旦至食時為朝隅中至日昳為中晡時至黃昏為夕日出而葬日中而虞禮也魯葬定公以下葬小君頃熊一作敬嬴以日中下去日中不逺兩書以譏焉朝市於西方反天道也故君子非之漢宮闕疏曰六市在西其三在東有東西而無中非古也洛陽三市取則周官金市西一名商觀南市中馬市東古者為市一日三合而河西姑臧市日四合扶風美陽俗以夜市則司市之法不行於天下矣質人掌賣儥之質劑大市以質若牛馬人民小市以劑若兵車用器及四時食物巡而考之犯禁者舉而罰之古之質劑後世之文劵也東晉及梁陳凡貨賣奴婢馬牛田宅有文劵者率錢一萬輸估四百入官賣者三百買者一百無文劵者隨物所堪亦百文收四名為散估說者謂人競商販不為田業故使均輸雖以此為辭實利在侵削猶漢笇緡錢而已質人所罰謂之罰布犯禁者罰之謂用器兵車不中度布帛精粗不中數幅廣狹不中量則淳制不一度量不同故舉其貨而罰之所以同度量而一淳制也古者以質劑結信而止訟安得有稅乎司市所征謂之廛市一名征廛廛人斂之入於泉府亦曰征布蓋征其廛不征其貨故孟子曰廛而不征後漢第五倫以京兆掾領長安市平銓衡正斗斛市無阿枉百姓悅服此古質人之職也度量為斗斛淳制為銓衡孟子謂之法故曰法而不廛謂廛人不征貨質人不征廛荀子謂之室律治市者平之室律者質律也質人之律漢曰月平所以平市價室質音相近楊注誤儥人民者掌之質人獲人民者告之朝士古無奴婢謂之臣妾亦曰人民費誓馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝復之者在軍則復於長在國則復於朝故曰委於朝告於士朝者斷獄弊訟之外朝朝士受而聽之商度其所獲而畀之是謂商賚牛馬貨賄皆然故曰大者公之小者庶民私之謂三分其所獲二入公而私其一也越逐者在國越鄉者在軍越伍軍有常刑國繫圜土易曰悔亡喪馬勿逐自復言勿逐故悔亡逐則有悔矣詩曰爰居爰處爰喪其馬于以求之于林之下謂國無政軍無律故越逐者不加刑也質人賣儥人民用長劵謂之質王褒僮約石崇奴劵古之質歟質許贖魯人有贖臣妾於諸侯者而逋逃之臣妾皆得歸其主焉有主來識認驗其質而歸之仍商度而賚告者凡失物在市三日在朝旬而無主識認乃沒入官故易有億喪貝躋于九陵之象勿逐七日得之占九陵象朝之閶闔九重言七日則旬之內也震長陽其數七勿逐與喪馬同占而不言悔者陽動而隂靜也喪馬睽初九喪貝震六二億發聲古以貝為貨古者路遺不拾人亡不追非誘非竊旬內自歸太卜官有卜賣買臣妾馬牛得之首仰足開不得首仰足肣音琴謂兆足斂然則易之繇書之誓周官之文參相合也鄉有比閭族黨州遂有鄰里酇鄙縣軍有伍兩卒旅師皆不得相踰越修閭氏掌國野廬氏掌野司暴掌市市不屬逰國不馳騁野不相翔司險守五溝五涂而呵止行者掌固復晝三巡夜三鼜以號戒之先王寄軍政於鄉遂輔之以什司之以伍伍無非其人人無非其里里無非其家故奔亡者無所匿竊盜者無所容苟非遷徙雖有逋逃莫敢越逐不獨軍中為然矣董逋逃晉法也楚作僕區乃隱匿逃臣之法說文匚藏也品衆也品在匚中踦區藏匿也僕臣僕也僕區者藏匿逃臣芋尹無宇之閽逃入王宫無宇執之有司弗與及謁諸王卒取以歸歸之禮也執之非禮也當復之朝康成曰復之言報也復之朝而有司弗與則失在有司也朝有復者宰夫掌諸臣之復御僕掌庶民之復晏子春秋所謂齊有北國騷造於君􅒉而求復者以此太公為周立九府圜法顏師古以大府玉府內府外府泉府天府凡六府當之而又以職內職金職幣三官充其數焉非也爾匹以八方之八材中原之五穀魚鹽為九府王應麟引之以當九府圜法失之逺矣所謂圜法者重不廢輕小不妨大子母相權而有九品故曰九府圜法其名見周官者夫布里布辟布絘布總布質布罰布廛布儳布是為布貨九品其九品在國曰邦布外府掌之在市曰征布泉府掌之載師有里布閭師有夫布皆邦布也出諸民入諸國故曰邦布百畝為夫五鄰為里民間之布以夫里得名說者以為罰布誤矣司市有辟布廛人有絘布總布質布罰布廛布肆長有儳布皆征布也斂諸市入諸官故曰征布辟布一名辭布辭之言資也猶漢之資錢或曰辟法也辟布猶法錢市中作布皆取法焉故曰辟布者于其地之叙叙猶監也作布之叙蓋鑄錢之監歟王莽布貨十品一曰大布次曰次布蓋法周官之絘布乃市中思次介次之布也總布未詳質布者質劑賣儥之布罰布者質人所罰犯禁者之布廛布者門關征廛之布儳布者無肆立持之布集韻云儳暫也音才鑒切徐邈讀詩云抱布抱此管子云握路握此也鄭司農曰布參印書廣二寸長二尺以為幣貿易物此立持之布歟管子謂隰朋於國有不知政於家有不知事舉齊國之幣握路家五十室而其人不知握猶持也古之儳布也肆長斂之廛人掌之而朋不與知焉一說儳布者總布之别也盤庚曰無總于貨寶貨寶曰布商賈阜貨而行之立曰儳行曰路執曰總皆商賈之事也盤庚戒在位毋若商賈然職內主錢辨財而執總總者聚而束之以書楬之漢律曰布謂之總總曰升升曰登晏子春秋十總之布十總者十升也升登音同故或為登或為升皆名為總以此名布亦以此名泉故文子曰萬物之總皆閲一孔總通作緵漢令徒隸衣七緵布緵一作稯八十縷為稯五稯為秭二秭為秅西京雜記曰五絲為躡倍躡為升倍升為緘倍緘為紀倍紀為總倍總為璲璲者古之佩秦之綬以縷為絲十絲為升則異說也凡先合單紡為一系四系為一扶五扶為一首五首為一文文采淳為一圭首多者系細少者系粗漢制如此而緘紀無聞焉五扶為首則二十系也漢之首異乎古之升矣漢律曰綺絲數謂之絩布謂之總綬組謂之首詩傳曰鬷數箋曰鬷總也疏云鬷謂麻縷每數一升而用繩紀之故鬷為數總而集之故鬷為總泉府凡民之貸者與其有司辨而授之以國服為之息國服者國軓也亦曰國準軓為法準為平古者珠玉為上幣黃金為中幣刀布為下幣中嵗黃金一斤直食八石五穀粟米者民之司命也黃金刀布者國之通貨也先王善制其通貨以御其司命軓守其數準平其流於是穀與幣相權而貨通食足焉上無穀以幣下無幣以穀造公幣而寄之民振其不瞻以幣準穀直穀而貸之穀為上幣為下斂其有餘以穀準幣直幣而庚之穀為下幣為上振時穀重而幣輕以輕權重斂時穀輕而幣重以重權輕如此則上不取息下不出息而上下交獲其贏各有什倍之息所謂以國服為之息者蓋如此有司者職幣與倉人也職幣掌振斂之式法者凶豐之法用倉人掌之此非國軓之存於有司者歟不瞻而莫之振也則穀愈重而民流有餘而莫之斂也則穀愈輕而民病蓋歲有凶穰物有輕重今歲糶賤狗彘食人食至來歲而道有餓民此皆不通國軓之法輕重之權者也較謂之服式謂之軓較出式上是為軓前故知管子國軓即泉府國服息者陽息反是為消藏繈千萬貫朽於庫積粟萬億紅腐於倉謂之消粟米財物上下通流使相灌注無有滯留謂之息流而不竭出而不窮此泉府之所以為泉歟辨而授之謂辨合見荀子即稱責之傅别蓋旅師以質劑頒斂泉府以辨合賒貸皆契劵也總名約司約掌之一說有司鄉遂之吏也周書云賦灑其幣鄉正保貸灑謂散之貸者鄉正保焉又云成年不償信誠匡助助且不償安得取息乎又云幣租輕乃作母以行其子此國軓所以輕重相權也秋官朝士凡民同貨財者令以國法行之同貨者司市以泉府同貨而斂賖國服行之以國法猶國軓平之以國準所以制四方貨殖低昂使萬物不得騰躍其權在司市而朝士慮貶國用故亦得與焉易損益二卦損六五益六二皆曰益之十朋之龜兩貝為朋一龜直十朋寶龜而貨貝變通趨時則上下交相益也俗儒不明損益焉識盈虛之數乎國軓也國服也皆謂之乘故稍人有丘乘之政管子有乘馬之策淮南子元玉百工大貝百朋注云二玉為工五貝為一朋山虞服耜注云服牝服疏云車平較也司關掌國貨之節以聨門市其法管子行之於齊以為市者天地之材具也萬人之所和而利也關者諸侯之陬隧也而外財之門户也萬人之道行也征於關者勿征於市征於市者勿征於關此司關聨門市之法也市有廛市關有征廛皆貨賄停儲邸舍之稅自外入者征於關關移之門門移之市所謂征於關者勿征於市也自內出者征於市市移之門門移之關所謂征於市者勿征於關也若自內而不由於市自外而不出於關然後舉而罰之否則征其廛而不稅其貨也康成謂參相聨以檢猾商失之矣左傳廢六關注謂關所以禁絶末遊而廢之為不仁家語置六關注謂置關以稅行者為不仁兩說皆非也國之有關久矣不自文仲始何得言置設關以限內外司出入所以防非常又焉得廢之農有租而商無稅是將使民弃本而趨末烏在其為仁也且六關之廢置與三軍之作舍等耳一書一不書則又何說吾是以知廢與置兩說皆非也廢者謂廢司關之法一作置置與廢通古醫用針針有補瀉難經言補則取氣瀉則置氣置者不取也古者不取謂之置不去亦謂之置春秋萬入去籥公羊謂去其有聲者廢其無聲者何休云廢置也置者不去也齊人語不去為廢則魯舊有關先王之法名存而實息矣魯之有名無情皆若此文仲號為賢大夫不能振而興之故孔子謂之不仁古以廢為置又以廢為發詩一發五發讀為廢莊子發藥列子廢藥一也豈獨齊人語乎齊桓公三㑹諸侯令曰市賦百取二關賦百取一此周官關市之征也虛車勿索徒負勿入以來逺人以通賓客視其名視其色以察竒邪國乃不惑司關之職唐天下關二十六蕃客往來閲其裝重入一關者餘關不譏猶有古司關之遺意焉莊子廢一於堂廢一於室釋文曰廢置也是先秦之文皆以廢為置矣禮說卷四
