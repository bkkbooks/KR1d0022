body:
  text: 禮説卷三翰林院侍講惠士竒撰地官一大司徒掌建邦之土地之圗周知九州之地域案域古作或說文云或邦也從口從戈以守一一地也又從土後人所加今用之獨商書微子篇作或古文也曰殷其弗或亂正四方或亂正四方者猶詩正域彼四方肇域彼四海云爾毛傳云域有也鄭箋云長有邦域孔傳亦云或有也言能守之是以有之則或即域甚明孔疏云或者或無或有不定之辭誤矣立政物有間之呂刑旁告文侯儀和儀作義旁作方物作勿猶域作或蓋古文也王充曰物有間之者非常之變无妄之氣間而至也康成謂文侯名仇仇儀皆訓匹故名仇字儀不其然乎正域者廣輪之數五地之名十二壤之物以定民宅以制畿疆以建王國以作地貢以均齊天下之政而佐王安擾邦國其職在大司徒殷之亂也大司徒之職廢矣弗或亂正四方者言不能有四方而安擾之也惟命不于常九州非一姓殷不能有而周有焉於呼有天下者奈何弗敬大戴禮多古文分符篇曰大道之邦或俗本邦誤為邠御覽引之作邦域從俗也哀公問何謂成身孔子對曰不過乎物呂覧先已篇曰君曰勿身勿身督聽是古物皆作勿矣洪範無偏無頗遵王之儀古文儀作義讀為儀與頗協説文云義者已之威儀也大司徒設社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野案墨子云聖王建國營都必擇國之正壇置以為宗廟必擇木之修茂者立以為菆位菆位者社稷也戰國䇿恒思有神叢蓋本之茂者神所慿故古之社稷恒依樹木松柏栗各以其野之所宜宜松者以松名宜栢者以柏名宜栗者以栗名宰我對哀公本此田主者田社也薛瓚曰民間或十家五家共為田社謂之私社然田主設於地官則非私社矣許叔重云周禮二十五家為社各樹其土之所宜木古文栗作徐廵説木至西方戰栗盖古有是語宰我所謂使民戰栗者本此今文論語哀公問主于宰我而公羊有練主用栗之文故張禹及包周等皆以為廟主何休用以解公羊云松猶容想其容貌主人正柏猶迫親而不逺主地正栗猶戰栗謹敬貌主天正杜預亦以註左傳劉炫規其過古文論語及孔鄭皆謂用其木以為社主孔頴逹抑劉扶杜且云社主周禮謂之田主無單稱主者故杜氏用包周之說然則田主者社之木主也鄭注云社稷后土及田正之神盖謂后土社神田正稷神又云田主田神后土田正之所依詩人謂之田祖蓋立主以依神故樹田神之主而后土田正慿焉是為田祖非后土田正之外别有田神也孔穎逹亦云田祖之名兼神農后稷而田主不得兼神農何則設其社稷而樹之田主則田主惟社稷不得兼神農矣賈公彦未逹其義乃云田主為神農以神農為主后土田正二神憑依之同壇共位其説支離疑誤後學所宜木有兩説如前説值木如後説主木兩説皆通相兼乃偹案宋史志社以石為主長五尺方二尺剡其上培其半先是州縣社主不以石禮部以為社稷不屋而壇當受霜露風雨以逹天地之氣故用石主取其堅乆請令州縣社主用石尺寸廣長半大社之制從之崔靈恩曰地産最實故社主用石鄭注及孔疏亦云然故宋人據以為説唐武后時東都置太社禮官議周家田主用所宜木今社主石其義云何張齊賢等議田主用木民間之社非太社也孔頴達謂社為木主古論不行於世古論謂古文論語康成亦作疑辭當並存以偹攷淮南齊俗訓云有虞氏社用土夏后氏社用松殷人社用石周人社用栗然則石主始於殷周改用栗歟韓非子曰夫社木而塗之鼠因自託也燻之則木焚灌之則塗阤故患社鼠是古樹木為社主而加塗焉所謂社用土者以此小宗伯大師立軍社肆師師田祭社宗社宗者社主與遷主皆載於齊車者也秦漢以後載主未聞春秋鄭入陳陳侯擁社擁社者抱主以示服若後世五尺之石主埋其半於地既不便於載亦不可抱而持然則社主春秋以前皆用木秦漢以後或用石歟祭法孔疏引許叔重五經異義以為論語夏后氏以松殷人以柏周人以栗謂社主也田主之木各以其野之所宜豈非宜松者為松主宜柏者為柏主宜栗者為栗主乎唐神龍初韋叔夏等案後魏天平四年太社石主遷於社宫是社主用石矣舊主長一尺六寸方一尺七寸禮官議在禮無文韓詩外傳云天子大社方五丈盖以五為土數故壇方五丈其主請准五數長五尺方二尺則社主長短自唐改定宋因之也又禮記外傳曰社主用石北齊天子親征有載帝社祏主於車之禮前此及後未聞漢髙祖初起兵禱豐枌榆社社在枌榆鄉枌榆者白榆也社與鄉皆以樹名焉山陽槖縣茅鄉社有大槐則民社皆樹榆槐矣慕容皝遷於龍城植松為社主蔡邕所謂尊而表之使人望見則加畏敬也故兩説相兼乃備凡地東西為緯南北為經緯謂之廣經謂之輪山謂積德川為積刑下者為死髙者為生牝為谿谷牡為丘陵數生於五十以之成故分之為十合之為五天下有五方方有五土土有五地因是有五方之民五方之水五土之民五土之色五地之民五地之物大司徒五地之民山林毛而方川澤黑而津丘陵專而長墳衍晳而瘠原隰豐肉而庳大戴禮五土之民堅土肥壚土大沙土細息土美耗土醜淮南子五方之民東方兑形小頭隆鼻大口鳶肩企行竅通於目筋氣屬焉蒼色主肝長大早知而不夀南方修形兑上大口決眦竅通於耳血脈屬焉赤色主心早壯而夭西方靣末僂修頸卭行竅通於鼻皮革屬焉白色主肺勇敢不仁北方翕形短頸大肩下凥竅通於陰骨幹屬焉黑色主腎其人惷愚而壽中央大靣短頥美鬚惡肥竅通於口膚肉屬焉黄色主胃慧而好治五地之物異其宜山林動宜毛植宜皁川澤動宜鱗植宜膏丘陵動宜羽植宜覈墳衍動宜介植宜莢原隰動宜臝植宜叢五土之色異其宜黄白宜禾黑墳宜黍麥蒼赤宜菽洿泉宜稻五方之水異其宜汾濛濁宜麻濟通和宜麥河中濁宜菽雒輕利宜禾渭多力宜黍漢重安宜竹江肥仁宜稻有五方之水因有五水之人輕水所多秃與癭人重水所多尰與躄人甘水所多好與美人辛水所多疽與痤人苦水所多尫與傴人蓋五行化為五土五土演為五水水土合而五地之物生焉五行之蟲乃五地之動物也東方木厥隂所至為毛化故動宜毛其化為榮其象為析其類群分故其民毛而方南方火少隂所至為羽化故動宜羽其化為茂其形為圜其氣炎上故其民專而長西方金陽明所至為介化故動宜介其化為斂其色為白其氣為消故其民晳而瘠北方水太陽所至為鱗化故動宜鱗其化為𤣥其色為黑其氣潤下故其民黑而津中央主大隂所至為倮化其動宜倮其化為盈其合在肉其充在肌故其民豐肉而庳五地之植物穀為先説者不及愚竊惑焉山海經曰都廣之野爰有膏菽膏稻膏黍膏稷言味好皆滑如膏也然則川澤之地植物宜膏如都廣之野矣膏夏之木生於巫山之上其理宻白如膏非川澤之所宜也詩既方既皁皁者寳之成麥全曰通作覈菽戴甲而生為莢禾長秱大本長相居熟相扶族聚為叢盖根於中者為動物命曰神機根於外者為植物命曰氣立出入廢則神機化滅升降息則氣立孤危是以升降出入無器不有天産本乎地地產本乎天而器者生化之宇也器散則生化息矣大司徒辨五地之物生物生者升降出入之器非通乎天地之化者孰能知之或問曰五地即五方歟曰非也山林不盡在東川澤不盡在北也一方而五行之氣具焉海濵之地民食魚鹽魚熱中鹽勝血民皆黑色疎理此其徵也舉一反三五地皆然矣大荒有毛民之國其人靣體皆生毛非所謂毛而方者歟曰否五地非大荒然則其民毛何也曰輕水之人多秃山林之民多毛山水之氣使之然也西方金屬肺其榮毛而東方為毛化何也曰鳥獸之毛革於夏毨於秋氄於冬而化於春故書曰孳尾毛在後為尾孳猶化也内經之説合於堯典周官五物者五行也五行者隂陽也因此五物者民之常而施十有二教焉教有十二不越隂陽二禮而已因此五物而辨九等十二土十二壤以定民宅隂陽之所相也以教稼穡隂陽之所播也以建王國隂陽之所和也由是人民以阜鳥獸以蕃草木以毓百物阜安劉宋元嘉十九年使徃交州測景夏至景出表南三寸二分計交州去陽城萬里而景差一尺一寸八分是八百四十七里有竒而景差一寸也梁大同中金陵測景夏至長一尺一寸七分强後魏永平元年當梁天監七年洛陽測景長一尺五寸八分計金陵去洛千里而景差四寸是二百五十里而景差一寸也由金陵至洛如自堂塗上堂階故路近而差多由陽城至交如從山頂下山足故路逺而差少千里一寸非其實矣唐開元十二年滑州白馬縣測景夏至尺有五寸七分南至汴州浚儀百九十八里有竒景長尺有五寸微强又南至許州扶溝六十七里有竒景長尺有四寸四分又南至豫州上蔡武津百六十里有竒景長尺有三寸六分半大率五百二十六里二百七十步景差二寸有餘葢因北極出地高下不同故晷景隨之而變先儒以為王畿千里景差一寸直以率推非得之表候也劉焯云今交愛之州表北無景計無萬里南過戴日一行亦云距陽城而南使直路如弦至於日下蓋不盈五千里然則所謂南戴日下萬五千里者亦先儒之臆度云爾或云日行黄道毎嵗有差地中當隨而轉移故周在洛邑漢在潁川陽城唐在汴州浚儀此説非也厯之歲差古法謂黄道西移新法謂恒星東轉黄道萬古不變毎歲有差者恒星東轉使然愚謂北極出地高下不同晷景隨之而變一行之説近之矣極者天心也以心不可見故不名為心而名為極極又不可見故指極星以表之極星每歲有差者非東轉使之然乎地在天中天心即地心又何疑然則大司徒建國所謂地中者蓋指中原之地惟此四方道里均與呂覽有始篇云極星與天俱遊而天樞不移當樞之下葢天地之中也恒星自有行度詳見新法厯書吕覽謂極為天中是矣而謂極星與天遊則非也孝經援神契曰八方之廣周洛為中於是遂築新邑營定九鼎以為王之東都古者諸侯受封必有采地百里諸侯以三十里為采七十里諸侯以二十里為采五十里諸侯以十里為采其後子孫雖有辠而絀使子孫賢者守其地世世以祠其始封之君是為采此韓詩外傳之説必有所據而未得其全然謂諸侯之國有封有采則先王之法也王制周官可合而為一矣諸公之地封疆方五百里諸侯之地封疆方四百里諸伯之地封疆方三百里諸子之地封疆方二百里諸男之地封疆方百里大司徒建之以土圭土其地而制其域所謂封也王制天子之田方千里公侯田方百里伯七十里子男五十里孟子亦言分田制禄君十其卿國以田為禄亦以田為差所謂采也其封五百里與四百里者其采百里其封三百里者其采七十里其封二百里與百里者其采五十里采則全入於其君而封為天子之土故天子得而食之大者食其半次食參之一又次食四之一葢於其采之外而半之叄之四之以入貢畱其餘以供軍國之需天子使其大夫監之為三監監於方伯之國使佐方伯領諸侯諸侯有畔則討之以其所留之半及參之二四之三足以給其用而受法於司馬有畿疆以正之儀位以等之賢功以作之監牧以維之軍禁以糾之貢職以任之簡稽以用之守則以安之小大以和之而諸侯不敢畔其有功於民者則加地進律焉故曰錫之山川土田附庸蓋土田其采則附庸其封山川在其封内者自有天子虞衡之政令諸侯莫敢專者以此封或有時絶采則世相傳及周之衰强侯擅制盡取其封以為采又兼并附庸小國以廣其封而天子不得食其土矣由是軍國之用闕方伯之職廢强凌弱衆㬥寡諸侯放恣從横而莫之能制也春秋莊元年齊師遷紀郱鄑郚三年紀季以酅入於齊四年紀侯大去其國遷謂滅之郱鄑郚者紀之封酅者紀之采遷封而留采故紀滅而酅存所以知酅存者荘十二年紀叔姬歸於酅則酅存矣古者滅國不滅采信矣然則紀季蓋紀子孫之賢者歟王制言采周官言封兩者離之則虧合之則備俗儒據孟子以駮周官陋矣顓臾魯附庸而在邦域之中則邦域非封而何齊之四履為四封東至海西至河南至穆陵北至無棣則其封之大可知也大國之封不過五百里而明堂位言魯地方七百里者康成謂包附庸而大言之孟子亦謂周公封魯太公封齊地非不足也而儉於百里葢天子之田千里故諸侯不過百里謂其采非謂其封春秋昭九年周甘人與晉閻嘉爭閻田王使詹桓伯辭於晉曰我自夏以后稷魏駘芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也吾何邇封之有則天子之封外薄四海矣而僅守邦畿千里之田不亦陋乎説者謂周爵五等地四等四等者公一等侯伯二等子男三等附庸四等非也附庸有采無封附於五等封内故曰附庸若紀季以酅入于齊則附于齊之封内為齊之附庸矣周爵五等地亦如之五等者諸公之地諸侯之地諸伯之地諸子之地諸男之地也史記漢諸侯年表曰伯禽康叔封於魯衛地各四百里裒有徳也太公於齊兼五侯地尊勤勞也晏子春秋亦云昔吾先君太公受之營丘為地五百里祀五帝司徒奉牛牲羞其肆愚案小胥職云全為肆肆全也周語禘郊之事則有全烝烝升也謂全體而升於俎即所謂羞其肆也郊特牲腥肆爓腍腥肆者謂薦腥薦全楚茨二章或剝或亨或肆剝者鬄解亨者煮孰肆者全體先鄭訓肆為陳後鄭破肆為剔皆非也小子職注云肆體薦全烝得之矣士喪禮四鬄去蹄注云鬄解也四解之殊肩髀而巳乃以此之肆當彼之鬄似不相當康成讀肆為鬄或别有據也喪服傳云夫妻判合小胥職曰卿大夫判縣判者左右之合故合之為肆分之為半四解牲體合而薦之亦可謂之肆歟少牢饋食羊豕皆升右胖少儀則以牛羊豕左肩臂臑致膳於君子而右以祭故謂之胖胖猶判也半也則是祭皆不得用全惟天子禘郊有之是謂薦血腥五官奉之秋官犬人職凡祭祀共犬牲用牷物牷之言全也古文牷作全穆天子傳官人陳牲全五具又云蠲齊牲全故五官奉牲皆用全也王公立飫則有房烝親戚燕饗則有殽烝殽者體解節折房為半體詩曰籩豆大房毛傳曰房半體之俎然則折為殽半為房全為肆士喪禮四鬄注云今文鬄為剔是儀禮有古今文未聞剔作肆内饔職賈疏引之作四肆葢因鄭注改經文實無所據也肆古文作㣈易有彖爻象此彖者全體析之成爻彖卽㣇小司徒掌九比之數以辨貴賤老幼廢疾凡征役之施舍乃頒比法於六鄉及三年則大比鄉大夫以嵗時登其夫家之衆寡辨其可任者而征之其舍者則貴者賢者能者服公事者老者疾者以歲時入其書鄭司農謂九比者九夫為井五家為比故以比為名今八月案比是也舎者復除貴者若今宗室及闗内矦皆復除公事者若今吏有復除老者若今八十九十復羨卒疾者若今癃不可事復之愚案後漢書注云案比驗比之猶今貌閲矣時則訓三月官郷注云三月料民户口故官郷漢元初四年詔曰月令仲秋飬衰老方今案比之時雖有麋粥穅秕相半長吏怠事莫有躬親而文帝元年三月詔亦云當受粥者或以陳粟豈養老之意然則案比兼以三月歟問遺賢良亦以八月賜羊一頭酒三斛順時氣助養育長吏存問顯兹異行郷大夫所謂賢者能者也夏官羅氏於仲春獻鳩以養國老漢賜髙年鳩杖則於仲秋葢獻鳩之禮不行乆矣然嵗時存省布帛酒肉之賜亦不獨仲秋為然也古有命民是為貴者尚書大傳曰古之帝王必有命民能敬長矜孤取舍好讓者命於其君得乘飾車軿馬衣文錦未有命者不得乘不得衣乗衣者有罰漢賜民爵猶古之命民其七大夫以上皆令食邑非七大夫以下皆復其身及户勿事是民爵皆得復不必宗室及闗内矦文帝禮高年九十者一子不事八十者二算不事武帝詔民年九十復子若孫令得身帥妻妾遂其供養此所謂復羨卒也漢法長不滿六尺二寸以下為罷癃古者凡瘖聾跛躃童昏僬僥以及偏枯握遞不耐自生者上皆收而養之晉胥臣乃云官師所不材以實裔土其不然乎漢之郷嗇夫猶六郷之族師閭胥六遂之鄙師酇長其職主知人善惡及其貧富為役先後與賦多少平其差品朱邑第五倫嘗為之倫平猺賦理怨結得人歡心而邑卒葬其郷祭祀不絶盖官彌卑者於民彌親大而州里役要小而馬牛車輦辨其物登其數計丁定征按年從役非親民之吏不能知知之亦不能悉由是而施政教行徴令必不能得其平是以先王尤重親民之吏而嗇夫命半通俸百石職厮禄薄儒者恥居是官居是官者亦不加選擇兩漢之治不及三代之隆者以此孝文四年復諸劉有屬籍家無所與後漢劉瑜上書言豐沛枝裔被䝉復除不給卒伍是兩漢宗室皆復也凡孝順貞義讓財救患及學士為民法式者皆扁表其户蠲除家徭則賢能者復至漢猶然矣唐沈既濟謂天下無生而貴者則雖儲貳之尊與士伍同故漢王良以大司徒司直免歸蘭陵後光武巡幸始復其子孫邑中徭役宰相之子不得蠲户課近代以来九品之家皆不征其高䕃子弟重承恩奬皆端居役物坐食百姓其何以堪之葢不問賢能及老疾惟貴者一例復除則又未免失之濫也漢法高爵者復然西北兩邉守圄禦寇雖有長爵不輕得復而其時亦未聞有均人大均之禮徃徃輕重不均民爵至五大夫以上乃復一人耳民有車騎馬一匹者復卒三人雖曰重武備然不曰輕民爵乎及武帝置武功爵兵革數動民多買復徴發之士益鮮矣賈捐之謂孝文皇帝偃武行文丁男三年而一事雖古全盛之世亦有一歲三曰之公旬未聞三年一事也豈其然豈其然郷師輂輦注云故書輦為連愚謂地名蓮勺蓮讀為輦猶地名不羮羮讀為郎以此知古音不忘故俗語不失其方釋名云羮汪也汁汪郎也然則羮音郎得古音矣盖古連輦通車從夫䨇引為輦車從辵歩挽為連一象形一㑹意也破連為輦變古從今失之易蹇六四徃蹇来連虞翻曰連輦也管子立政篇畜連乘車海王篇服連軺輂則古輦皆作連可知矣司馬法云夏后氏謂輦車曰余車殷曰胡奴車周曰輜輦輦一斧一斤一鑿一梩一鋤周加二版二築梩者鍬鍤築者杵頭鐵㳫也以築壘壁故武城有血流漂杵之語孟子以為誣賈誼過秦伏尸百萬流血漂櫓而益壤篇又云炎帝無道黄帝伐之涿鹿之野血流漂杆秦至無道㬥於帝辛血之漂櫓也信矣乃謂黄帝之師亦然不亦誣乎壘壁起於黄帝築杵自古有之非至周而始備也方言臿趙魏之間謂之鍬東齊謂之梩朝鮮洌水之間謂之􅝁注云􅝁者鍬聲之轉音湯料反梩音駭江東呼鍬刄為鐅普蔑反鍫一作喿梩或作杞鍫一作􅝁臿一作疀尒疋謂之疀注云皆古鍫插字説文謂梩與㭒同俗作耜從木以里㠯為聲一曰徙土輂齊人語也景純讀若駭或未聞於古案說文從走亦以里為聲讀若孩孩與駭音相近亦必有據矣天子六鄉諸侯三鄉春秋宋為王者之後獨立四鄉二師掌之二師者右師左師猶天子之三公華元曰我為右師君臣之訓師所司也則其官表率百僚師保萬民與王之三公内與王論道中參六官之事外與六鄉之敎者何以異焉六鄉有六卿四鄉有四正三公領六鄉之卿二鄉則公一人二師令四鄉之正二鄉則師一人分掌其方各司其訓則知周禮不獨在魯也宋非大國而㐮公用之以霸諸侯雖不能終猶强於魯衛葢以周官之法存焉爾晉六正則三軍見㐮二十五年傳宋四正則二軍可知也其三公之義則董仲舒言之詳矣其略曰天之大經三起而成四轉而終天有四時時三月王有四選聖人君子善人正人為四選選三臣寒暑與和三而成物日月與星三而成光天地與人三而成徳是故以職曰三吏以年曰三老以爵曰三公三公者太師太傅太保又有三孤以為之貳焉書大傳曰郊社不修山川不祀風雨不時霜雪不降責於天公臣多弑主嬖多殺宗五品不訓責於人公城郭不繕溝池不修水為民害責於地公其説見論衡而康成注大傳則云一公兼二卿舉下以為稱太宰司徒同職則稱司徒公宗伯司馬同職則稱司馬公司寇司空同職則稱司空公是合周禮與大傳而為之説也書之君奭叙曰召公為保周公為師康成以師氏保氏當之似不見古文周官然鄭志趙商問則引周官為證又非不見古文者而云攝政三年作周官六年制周禮周公左召公右兼師保初時巳然則古文周官一篇康成固見之矣公孤官不必備惟其人葢有則兼之無則闕焉此周禮所以無公孤之職也三公兼領六卿而顧命孔傳謂三公領三卿豈其然乎文王世子注以師氏為大司成則非三公也且云師氏司徒之屬安有三公而屬司徒者哉鄉大夫以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之司農謂征之者給公上事也康成謂國晚賦税而早免之以其復多役少野早賦税而晚免之以其復少役多愚謂六十而免不為早六十五猶征則巳老易孟氏韓詩説年二十行役三十受兵六十還兵祭義五十不為甸徒王制五十不從力政六十不與服戎許叔重則云五經説皆不同亦無明文可據漢承百王而制二十三而役五十六而免得其中矣六十五而周復征之非用民意康成駮之以為征之者使為胥徒給公家之事如今之正衛耳王制所謂力政者挽引築作服戎者從軍為士卒也胥徒事暇二者皆勞於胥徒故早舍之愚謂漢因周制五十六而免則五十有五猶未免也故曰皆征之其制與周官合則五十誤為六十又何疑周官殘闕能保其必無誤乎六十曰耆邦饗耆老外饔割亨酒正共酒既養之而又征之叔重之説未可非也康成遷就而曲為之解豈其然荀子曰五尺豎子管子曰童五尺内則成童十五以上則六尺非童豎矣論語注云六尺謂年十五失之且以身之長短定年之大小則晏嬰長不滿六尺謂之幼少可乎秦法舉長周以中人為率八尺為長六尺為短七尺為中内經謂丈夫年三十八而長極中人七尺亦其極也故國中自七尺野自六尺以上不滿六尺者不為夫杞之城也絳老與焉清之戰也汪僮死焉末世之法也是以周官徒役上不及老下不及僮鹽鐵論云古者十五入大學與小役二十冠而成人與戎事五十以上血脈溢剛曰艾壮詩曰方叔元老克壮其猷故商師若荼周師若烏今陛下哀憐百姓寛力役之政二十三始賦五十六而免所以輔耆壮而息老艾也然則五十六而免在始元元鳯之間矣孟康曰古者二十而傅音附二十三而後役之如淳曰律年二十三傅之疇官盖從其父疇學之高不滿六尺二寸以下為罷癃漢儀注云民年二十三為正一歲為衛士一歲為材官騎士習射御騎馳戰陳五十六衰老免為民就田里而周官六十五猶征其不然必也鹽鐵論文學曰今五十以上至六十與子孫服輓輸並給徭役非養老之意則似五十六而免者免為士卒而巳有司仍役之王莽亦云漢氏輕租三十税一常有更賦罷癃咸出葢以此楚襄王使昭常守東地悉五尺至六十三十餘萬是老弱未傅者皆從軍矣則六尺非童豎益明説苑齊伐莒魯下令丁男悉發五尺童子皆至曹大家曰古者十五受兵六十還之注云國中六十免役野六十有五晚於國中五年國中七尺從役野六尺早於國中五年七尺謂二十六尺謂十五十五受兵據野外六十還兵據國中此本康成之説仍存以備考康成引漢法民年二十五巳上至六十出口賦錢人百二十以為算則征之者謂出口賦錢也故曰今之算錢民或謂之賦古者有容禮有容臺容其儀臺其地也帝癸三年毁容臺説者以為夏桀之時容臺振振之言震葢人而無禮天必棄之故曰振而和容主賔客之官晉羊舌大夫之為和容也温良而好禮博聞而時出則可謂無曠其官者矣漢天下郡國有容史即春秋之和容魯徐生善為容後有張氏亦善焉郡國容史皆詣魯學之子孫相傳以為家法然皆不能通經徒習其儀而巳世居禮官不替其業亦有所長非苟焉者及其蔽也槃辟雅拜詭衆立異裦衣大袑舒緩養名齊魯之間遂成風俗然灑掃應對進退之禮少而習焉長而安焉儀容辭令其節似小而大行人以之同邦國親諸侯擯相之儀不朝不夕孟僖子所病未能者不可以不學也季孫之喪哀公徃弔曾子子貢入廏脩容閽人辟之卿大夫皆辟位公降一等而揖之葢有徳者必有容見其容知其徳也故曰盡飾之道斯其行者逺矣公西赤善於威儀篤雅有節孔子以為難且曰貌以擯禮禮以擯辭二三子欲學禮者其於赤也故君子容色天下儀象而望之不假言而知為人君者詩曰顔如渥丹其君也哉鄉老及鄉大夫羣吏獻賢能之書於王退而以五物詢衆庶一曰和志其志和也二曰和容其容和也三曰主皮志和容和能中質也四曰和頌其聲和也五曰興舞其節和也惟敬乃和荘子曰禮樂之士敬容此之謂也春秋之官有和容漢郡吏有容史皆古之遺雖失其本而猶存其末學者誠能講之詳習之孰則雖闇室無惰容推而至於造次顛沛亦不改其常度焉是以史稱侯霸矜嚴有威容而伏湛倉卒必於文徳東京初建草昧經綸先區區奏行鄉射之禮論者或以為迂濶不知禮樂乃政化之首而五物斯須不可離葢修徳力行而文之以藝則三物備於心然後五物備於身動容周旋無不中禮所謂徳盛而禮恭也馬融以為射有五善不亦淺乎射者儀之於此中之於彼發而不中反求之身此主皮所以列於和容之後也文武具備動静中儀舉錯廢置曲得其宜以此出而長入而治也反求之已而其道全矣古者諸矦朝天子以其教士畢行天子以嵗二月為壇於東郊抗大侯設鵠畫物乃升諸侯及諸侯之教士教士執弓挾矢揖譲而升履物以射其心端其容正時以效之時有慶以地不時有譲以地所謂敎士者諸侯之嵗貢士也教士以射射有容體五物備焉諸矦三嵗而貢士舊説大國三人次國二人小國一人非也以其教士畢行則小國豈止一人乎官人篇曰平仁而有慮者使治國家而長百姓慈恵而有理者使長鄉邑而治父子直愍而忠正者使涖百官而察善言慎直而察鄉者使長民之獄訟出納辭令臨事而絜正者使守内藏而治出入慎察而絜亷者使分財臨貨主賞賜好謀而知務者使治壤地而長百工接給而廣中者使治諸侯而待賔客猛毅而度斷者使治軍事為邉境因方而用九用有徴所謂出使長入使治者如此而大政篇則謂上選吏也必使民與焉故民譽之上察而舉之民苦之上察而去之王者取吏必使民唱然後和之故夫民者吏之程也察吏於民必取其愛焉十人愛之者則十人之吏也百人愛之者則百人之吏也千人愛之者則千人之吏也萬人愛之者則萬人之吏也萬人之吏卿相之器十人之吏以長鄰比千人百人為豪為英所謂使民興賢使民興能者如此祭法幽宗祭星雩宗祭水旱康成皆破宗為禜云祭星與水旱之壇而説文引禮亦云雩禜祭水旱則是漢儒皆讀為禜非創自康成而黨正春秋祭禜則謂雩禜葢亦為壇位如社稷也晉志摯虞奏肆師職曰用牲於社宗黨正職曰春秋祭禜亦如之肆師之宗與社並列則班與社同黨正之禜文不繫社則神與社異愚謂黨正祭禜與州長祭社同時水旱農祥春祈秋報其禮亦與祭社等周頌絲衣繹賔尸髙子曰靈星之尸也漢志髙祖詔御史令天下立靈星祠張晏曰龍星左角曰天田則農祥也辰日祀以牛號曰零星風俗通曰辰之神為零星故以辰日祀於東南淮南子曰零星之尸儼然𤣥黙而吉祥受福古者祭皆有尸零與靈通幽禜葢零星歟一説禜猶營也賈逵以為營攢用幣孔疏謂其祭非有常處臨時營其地立攢表用幣告之以祈福祥王充曰春二月秋八月雩靈星之祀是也今春雩廢詩曰去其螟螣及其蟊賊無害我田稺田祖有神秉畀炎火此族師春秋祭脯之辭也酺者布也歩也布徳曰酺祭神曰歩歩者神名詩所謂田祖有神者即此葢四蟲當盛陽之月感隂邪之氣而生如木之蠧器之蠱處㝠昧之中秉賊害之性説者以為災猶政起因以為名庻氏除蠱剪氏除蠧用大祝六祈禬禜攻說之法以牲祭而辭責之祭詳於禮辭見於詩又以葌山之草薰之葢焚其草以灰洒之曰熏所以殄其類詩所謂秉畀炎火也月令仲夏行春令百螣時起蟲生於巽風死於離火夏行春令則火不炎故生百螣族師春秋祈報以敉四蟲百螣之烖因與族人飲酒而屬民讀法焉王居明堂禮謂之國醵説文醵者㑹㱃酒㱃古飲字酺者王徳布也或云出錢為醵出食為酺趙武靈王滅中山酺五日葢起於周而戰國因之古者民無故不羣飲酒誥曰羣飲汝勿佚謂收捕而殺之其嚴若此漢輕其辠罰金而巳沿及唐宋國家毎逢嘉慶賜民大酺即古祭酺之遺意然古者合錢飲酒本祭田神且以属民而糾其過惡勸之道萟後世舉一廢百而庶氏翦氏之法不行四蟲百螣交相為害九穀不登三物不敎所謂德行道藝為一書孝弟睦婣有學者為一書敬敏任恤為一書其風𣺌不可追矣管子治齊因地官比閭族黨州鄉之法變為什伍游宗里尉州長鄉師士師之名仍師其遺意而加詳焉地官之教也徳行道藝賢能為一書孝弟睦婣有學者為一書敬敏任恤和親為一書過惡為一書有辠竒邪為一書善相勸惡相糾慶賞相共刑罰相及而管子之法凡孝弟忠信賢良雋材則其下以次復於上長家復於什伍什伍復於游宗游宗復於里尉里尉復於州長州長以計於鄉師鄉師以著於士師計者比也是為比法著者書也是為書伐凡有過惡則其下以次及於上家屬及於長家長家及於什伍之長什伍之長及於游宗游宗及於里尉里尉及於州長州長及於鄉師鄉師及於士師及者坐也下有辠坐其上也故曰有不孝不弟而不以告謂之下比其辠五然則族師所謂相及者比長及閭胥閭胥及族師族師以上罰皆相及可知矣三月一復六月一計十二月一著凡上賢不過等使能不兼官罰有辠不獨及賞有功不專與即族師所謂賞相共罰相及之意而五家為比十家為聨五人為伍十人為聨即管子所謂什伍之長也用其法而變通之一則以王一則以霸商鞅相秦令民為什伍而相収司連坐一家有辠九家舉發若不糾舉連坐九家説者以為本族師之政而益之以㬥故趙商問曰康誥門内尚寛族師鄰比相坐書禮不同葢疑之也愚謂管子法周官事類相近焉且民有過惡州長糾之黨正戒之閭胥撻而罰之比長圜土内之未巳也又讀法以教之州長一年四黨正七族師十有四閭胥讀無時射於序而觀之德飲於序而訓之禮師田行役誅不用命者而示之法如是而民猶有過惡不亦鮮乎若夫族師什伍其民非若後世之孶孶求姧懇懇用刑以為事也人與人相保家與家相受少相居長相游祭祀相福死䘮相恤禍患相憂居處相樂行作相和哭泣相哀則驕躁滛㬥衺惡之風於是乎革孝友睦婣任恤之化於是乎興大司徒以三物教萬民鄉大夫以五物詢衆庶禮明樂備仁漸義摩其道實始於此成於此而謂㬥秦收司連坐之法亦於是乎出謬矣舞師帗舞羽舞皇舞羽謂翟手所執皇謂冠頭所戴一言執一言戴互文東京賦所謂冠蕐秉翟列舞八佾者薛綜云冠華以鐵作之上濶下狹餙以翟雉尾舞人頭戴愚謂皇書或為䍿鳥冠也即建華冠状如婦人縷鹿飾以五采羽若有虞氏之皇故名曰皇先鄭所謂蒙羽舞者即此説文皇作䍿以羽翿自翳其首以祀星辰帗作翇執全羽以祀社稷則皇非翇明矣後鄭謂羽形如帗皇亦如之是三者皆同也豈其然賈公彦乃謂自古未見蒙羽於首者記曰知天文者冠鷸非蒙羽於首乎宗廟冕而舞旱暵皇而舞鷸知天將雨故舞旱暵則冠之以禱焉鷸讀為述亦作述或作鶐禮圗謂之術氏冠古術述通上林賦蒙鶡蘇鶡似雉鳥尾為蘇蒙其尾為㡌先鄭蒙羽之説本此道應訓曰去其瞀而載之木瞀即鍪兜鍪也木即鶩鳥冠也賈疏抑先鄭而扶後鄭誤矣唐作光聖樂舞者鳥冠畫衣葢古之遺法祭義術省注云術當作述士喪禮不述命注云古文述皆作術是古術述通也蔡邕獨斷以為建華即鷸冠鄭子臧好之而術士冠乃趙武靈王之服今者不用其説未聞術士即術氏或分為二失之漢虎賁中郎將服弁戴鶡尾説文羽舞為雩雩一作䍿猶也干寳曰赤草染羽以為䍿康成亦云染羽象鳳凰南齊志建武二年何佟之奏牧人云凡陽祀用騂牲陰祀用黝牲鄭云陽祀祭天南郊及宗廟陰祀祭地北郊及社稷祭法云燔柴於泰壇祭天也瘞埋於泰折祭地也用騂牲鄭云地陰祀用黝牲與天俱用犢故連言之耳前軍長史劉繪議語云犂牛之子騂且角雖欲勿用山川其舍諸未詳山川合為隂祀否若在隂祀則與黝乖矣佟之又云周禮以天地為大祀四望為次祀五嶽四鎭四瀆山川為小祀山林川澤自四望以上牲色各依其方者以其祀大宜從本也山川以下牲色不見者以其祀小從所尚也則禮論二説合為一矣從之愚謂犂牛之子非犢而何體醇騂而角繭栗此天牲也以天牲而用之山川則近於非禮故有勿用之疑然天下未有歆於上帝而吐於山川者故曰山川其舍諸此聖人立言之妙也説者據此以為山川用騂牲誤矣何休云别天牲主以角故知騂且角為天牲淮南説山訓云屯犂牛既􅀈以㹋􅀈無角㹋無尾決鼻而羈生子而犧説者以為仲弓父賤而行惡然犂說文作耕也牛為耕牛司馬犂字子牛古以牛輓犂信矣􅀈屯㹋醜牛之貌以為犂牛皆然可乎且謂其子而訾其父君子弗為也古髠字仲弓可使南面故舉天牲以況之春秋書仍叔之子左傳曰弱也注云稱仍叔之子乃幼弱之辭然則犂牛之子為犢信矣牛人共祭祀之享牛求牛先鄭云享牛前祭一日之牛求牛禱祈求福之牛後鄭謂享獻也獻神之牛求終也終事繹祭之牛愚謂天神曰祀地示曰祭人鬼曰享享牛者享先王之牛也凡祭祀前三日擇牲君召牛納而視之擇其毛而卜之是謂求牛求猶擇也卜吉而後養之是為享牛享牛與帝牛皆在滌三月求牛者惟具是視具者庀也謂簡擇先庀牲後繫牲凡牲必有副唐禮省牲而犢鳴則免之而用副求牛者乃其副也曲禮天子以犧牛諸侯以肥牛大夫以索牛康成云犧純毛肥養於滌索求而得之孔疏謂下不得僭上上得兼下奉牲以告博碩肥腯是天子兼有肥牛稷牛惟具如有災故臨時得别求之是天子兼有索牛然則求牛即索牛歟説苑引禮記曰上牲損則用下牲下牲損則祭不備物有下有上一求一享或索或肥同名為犧左傳萊人賂齊以索馬牛皆百匹則索牛亦不獨用之於祭也或云享牛者祀神之牛求牛者降神之牛一以祭一以燎惟郊用之鑿矣大宗伯祀天實柴故書作賔柴實之言積也賓之言升也先儒謂實者實牲體則賓柴又何説乎凡祭祀牛人共牛牲之互案互三物一名或曰紡車或曰楅衡或曰縣肉格説文互作䇘從竹象形互乃省文人手推握可以收繩此紡車也一名廣雅曰謂之互其説本於此讀若狂或云一輪車互状如椵謂之􅰿互設於牛角以防觸觝此楅衡也詩云或肆或將毛傳云肆者陳於互將者齊其肉西京賦所謂置互擺牲此縣肉格也三物一名或圎以轉或止不行或象犬牙一從一横大宗伯疈辜故書疈作罷先鄭讀為披後鄭破為疈音義不殊語有輕重耳古文擺作罷猶倦作劵禮説卷三
