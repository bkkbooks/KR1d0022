body:
  text: 禮説卷十翰林院侍講惠士竒撰夏官一大司馬以九伐之法正邦國曰眚曰伐曰壇曰削曰侵曰正曰殘曰杜曰減康成謂眚猶眚瘦王霸記曰四面削其地如其説則眚與削何以别乎春秋莊公二十有二年肆大眚穀梁子曰肆失也眚災也災紀也范氏注云災謂罪惡紀治理也有罪當治之然則眚之者治其罪也無虐煢獨不侮鰥寡馮虐犯寡者謂虐而侮之道術篇曰兄愛弟謂之友反友為虐兄曰寡兄弟稱弱弟春秋衛侯殺其弟叔武可謂之馮虐犯寡不可謂之賊殺其親賊殺其親者其罪焚易離九四倒子為突有焚如之象春秋子弒父臣弒君名之不正久矣故曰名其為賊敵乃可服賊殺其親者正之正其賊之名也而康成以衛侯殺叔武當之則人君有絶宗之道公子不得戚君衛侯君也叔武臣也君殺其臣名非不正也而其臣無罪天子使其吏治之可矣又焉用正之經書晉人執衛侯歸之于京師眚之也非正之也眚公羊作省省與眚通宣王命程伯休父為大司馬而作常武之詩曰率彼淮浦省此徐土眚之言省也省其土非削其地也則眚之非削之亦明矣暴內陵外則壇之康成讀壇為墠王霸記曰置之空墠之地然則壇之者幽之也荀子曰官人失要則死公侯失禮則幽幽謂囚之左傳哀公八年邾子無道吳子使大宰子餘討之囚諸樓臺栫之以棘使諸大夫奉大子革以為政此古幽之之法蓋置之空墠之地制其出入不得自由亦不離其國內康成以為出其君出非幽也失之易履九二稱幽人虞翻謂履變訟初為兌訟二在坎獄故稱幽人周書囚蔡叔于郭鄰幽之也叔卒仍立其子仲於蔡則郭鄰乃空墠之地名明在蔡之境內矣賊殺其親放弒其君一曰正一曰殘互文正之者鳴鐘鼓以聲其罪殘之者或焚或轘春秋邾人戕繒子于繒穀梁子曰戕猶殘也捝殺也注云挩謂捶打方言謂之㨆音廪又洛感反關西人呼打為㨆晉魏河內之北謂㨆曰殘蓋殘賊而殺之為挩殺詮言訓羿死於桃棓注云棓大杖桃木為之以擊殺羿則似古有是刑而邾人行之故春秋書之曰戕小爾匹亦曰戕殘也蓋邾人假其名以行其虐也殘乃九伐之正法豈挩殺之謂哉董仲舒劉向以為戕者支解之謂解四支斷骨節蓋近乎殘矣殘之言轘也弒君者轘古之法也説者謂起於秦誤矣犯令陵政則杜之注云杜者杜塞使不得與鄰國交通古杜之之法諸侯不出境大夫不出門管子曰城陽大夫嬖寵被絺紘鵝鶩含餘秫伯叔父母逺近兄弟皆寒而不得衣飢而不得食欲盡忠於國能乎以令召城陽大夫滅其位杜其門而不出此古者有罪杜門之法也商鞅相秦太子犯法以為君嗣不可施刑刑其傅公子虔故趙良曰公子虔杜門不出已八年矣大夫如是則諸侯可知戰國中山稱王齊閉關不通其使以隘之隘之者猶杜之也春秋宋人遷宿公羊子讀遷為還還與環通一音胡慣切曰遷者何不通也以地還之也何氏曰還繞也繞取其地使不得通四方蓋杜之也然則宿孰滅之曰宋滅之假杜之之法行取之之計而掩滅之之名焉爾楚欲吞宋要宋田夾塞兩川使水不得東流晉伐齊敗之亦欲使齊之境內盡東其畝此楚土宋而晉土齊古土杜通毛詩自土沮漆齊詩自杜沮漆公羊土齊猶杜齊也注云以齊為土地失之土之言杜也即九伐杜之之法也晉文公反鄭之埤東衛之畝者亦以此魏錮諸侯吉凶之問塞慶弔之禮廢王公徒有國土之名禁防壅隔同於囹圄此非古杜之之法歟無罪而杜之因以雕翦本支委權異族其亡也不亦宜乎外內亂鳥獸行則滅之滅之者滅其君不滅其國春秋滅國利其土地而已非誅其君也公羊子曰滅者上下同力亡國之善辭滅者善則滅之者之惡益顯矣滅者誅君之辭誅君之子不立更擇其先世子孫賢者立之然則不曰誅而曰滅何也君死曰滅春秋吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅杜預曰國雖存君死曰滅是也公羊謂邾婁之君顔淫九公子于宫中近乎外內亂鳥獸行焉天子為之誅顔而立其弟叔術則滅之之事也誅顔之天子死叔術乃致國于顔之子夏父當此之時邾婁人常被兵于周曰何故死吾天子則誅君之子不立信矣鄭語彭姓豕韋則商滅之其後仍為商伯蓋湯滅豕韋不滅其國故子孫得更興為伯也左傳襄公四年曰滅斟灌哀公元年又曰殺斟灌王肅云古者滅殺同名然則滅之者殺之而已仲春振旅師帥執提注云提馬上鼓有曲木提持立馬髦上者故謂之提案髦一作髦集韻云車翣也以禦風塵古有旄車然則提鼓立于車上矣一曰馬髦馬長毛大周正樂曰馬上鼓曰提有木可提執施於朝則登聞鼓敢諫之鼓是也施於府寺曰朝鼓在村墅曰枹鼓枹一作桴擊鼓物也在邊徼曰警鼓然則達窮之路鼓即後世之登聞亦有木可提持者歟旅帥執鼙司馬法千人之師執鼙鼙或作鞞騎鼓也其形似鞀而􅋻薄則又以鼙為馬上鼓矣古無單騎凡軍中之鼓皆曰騎鼓可也周宅酆鎬近戎人與諸侯約為高葆禱於王路置鼓其上逺近相聞即戎冦至傳鼓相告此古之警鼓歟中夏教茇舍辨號名之用號名者徽幟也縣鄙以名家以號百官以事在國以表朝位在軍又象其制而為之被之以備死事焉蓋象喪禮之銘旌也其説見墨子旗幟篇守城之法有旗有幟以形名為旗形名者木為蒼旗火為赤旗石為白旗水為黑旗食為菌旗死士為倉英之旗竟士為雩旗多卒為雙􅊵之旗五尺男子為童旗女子為梯末之旗弩為狗旗戟為旗劒盾為羽旗車為壟旗騎為鳥旗是為形名之旗號名之用茇舍羣吏撰車徒讀書契而辨之者也凡所求索旗名不在書者皆以形名名之故曰號名之用亭尉各為幟竿長二丈五帛長丈五廣半幅有大冦鼓三舉一幟鼓四舉二幟鼓五舉三幟鼓六舉四幟鼓七舉五幟鼓八舉六幟大司馬中冬大閲三鼓作旗以此吏卒男女皆葕異衣章衣章者小徽幟也城上吏卒置之背卒於頭上城下吏卒置之肩左軍於左肩中軍置胸前蓋被之以備死事者也大旗署戶邑及財物建旗其署令皆明白知之曰某子旗若髙子之鼓國子之鼓所以題别衆臣在朝表位在軍象事某某之名某某之號其用蓋如此故曰人執旌旗以號相命此之謂也後世詭道行軍伏旗鼓謬號令自以為出入若神然非所謂明白知之之義矣尉繚子曰卒有五章前一五行置章於首次二五行置章於項次三五行置章於胸次四五行置章於腹次五五行置章於腰自腰至首五色為章九旗之屬職在司常帥之旗書曰某門某子卒之章書曰某甲某士秦刻石之罘其東觀辭曰作立大義昭設備器咸有章旗職臣遵分各知所行事無嫌疑然則章旗所以定職守決嫌疑也徽幟之長短無文孔頴達以事喪禮證之蓋長三尺帥以門名注云軍將皆命卿古者軍將蓋為營治於國門魯有東門襄仲宋有桐門右師皆上卿為軍將者舜典曰闢四門鄭注云卿士之職使為己出政教於天下言四門者卿士之私朝在國門後世東門襄仲桐門右師取法於古也宋有澤門晳吳有胥門巢晉有下門聰秦有橫門君趙有廣門官春秋戰國皆然遂謂唐虞亦然豈其然乎宋襄戰於泓而門官殱焉門官者軍之帥也宋向戌稱盧門合左師而華氏亦居盧門二族皆卿而為軍帥謂之門官者以此其後遂為將軍晉六卿號六將軍古者軍營在門故死事之老孤養以門關之委積蓋就其地而養之所以勵士而勸功也鄋瞞伐宋司徒皇父禦之耐班為御以敗狄於長邱皇父之二子死焉宋以門賞耐班使食其征征者門關之委積耐班食之因謂之耐門死者未見恤而生者獨旌焉豈先王之法乎韓非謂死士之孤飢餓乞於道而優笑酒徒之屬乘車衣絲則知遺人之職廢於戰國矣鄉以州名注云南鄉甀東鄉為人是也案世本有宋大夫東鄉為似東鄉氏而為名人衍文晉國高士全隱於南鄉因以為氏則南鄉甀者亦氏南鄉而名甀也賈疏謂甀與為人皆當時鄉名失之居門者以門氏居鄉者以鄉氏則南鄉東鄉皆氏何疑左傳孔疏云大司馬職中秋教治兵辨旗物之用司常職國之大閲贊司馬頒旗物大閲治兵皆教戰而旌旗之物所建不同者康成謂凡頒旗物以出軍之旗則如秋以尊卑之常則如冬大閲備軍禮而旌旗不如出軍之時空避實然則大閲所建尊卑之常治兵所建出軍之禮三年治兵與秋教治兵其名既同建當不異故服虔引司馬職文明此旌旗所建用秋辨旗物之法也案治兵王載大常巾車職大麾以田大白以即戎先儒以為王田春夏則大麾秋冬則大常旌旗所用雖如治兵之時然王若親軍則建大白王制旒云旌旗無旒者謂之大麾一名緌王制天子殺則下大綏諸侯殺則下小綏注云綏當作緌有虞氏之旌旗也巾車注云大麾色黑夏后氏所建蓋夏后氏之旗去其旒旐為有虞氏之緌即巾車之大麾王制三田皆用之合於巾車大麾以田之説不在九旗中惟田抗之以表獲故詩傳云天子發抗大綏諸侯發抗小綏抗則舉之下則弊之皆以田言明非田不建大麾也中冬大閲中秋治兵固建太常矣及其田也仍建大麾以表獲焉先儒謂春夏用之秋冬則否誤矣司常之屬旌旗之細也名為徽幟亦謂之章詩曰織文鳥章有九旗又有九章九章著明五教不亂九旗曰常曰旗曰旜曰物曰旗曰旟曰旐曰旞曰旌九章曰日章曰月章合之為日月之常曰龍章曰虎章即交龍之旗熊虎之旗曰鳥章曰蛇章即鳥隼之旟龜蛇之旐晝行舉日夜行舉月行水舉龍行林舉虎行陂舉鳥行澤舉蛇曰鵲章曰狼章曰韟章行陸舉鵲行山舉狼載食而駕舉韟韟者建臯也虎皮一名臯比武王克紂包干戈以虎皮故曰韟櫜臯韟古文通康成作櫜服虔作臯管子作韟曲禮前有士師則載虎皮即此章是為九章九旗之屬也五教曰耳目曰身曰足曰手曰心坐作進退疾徐疏數所以教其身車馳徒走車驟徒趨所以教其足鼓三闋車三發徒三刺所以教其手誓於陳前斬牲以徇所以教其心春辨鼓鐸夏辨號名秋辨旗物所以教其耳目司常所謂象其事象其名象其號者蓋謂形色之旗也徽幟既然旌旗獨不然乎曰軍吏曰百官所謂官府各象其事曰師都曰州里曰縣鄙曰鄉遂曰郊野所謂州里各象其名曰孤卿曰大夫士所謂家各象其號一旜也或曰孤卿或曰師都一物也或曰大夫士或曰鄉遂謂師都之孤卿鄉遂之大夫士一舉其名一舉其號也一旗也或曰軍吏或曰師都一旟也或曰百官或曰州里謂師都之軍吏州里之百官一舉其名一舉其事也一旐也或曰郊野或曰縣鄙縣鄙在六遂遂人掌邦之野故曰郊野舉其名則知其事與號也分之為事為名為號而合之以形色之同秋冬所以教其耳目者又如此康成謂冬大閲為空秋治兵為實而變易其旌旗旌旗所以號令也數變易焉五教亂矣又安能一氣専定進無所疑退無所匱乎幟象銘旌被之於背是為徽説文謂以綘徽帛著於背春秋傳揚徽者公徒孔穎達謂為公者揚徽猶為劉氏者左袒是也徽一作揮東京賦戎士介而揚揮薛綜云揮為肩上絳幟如燕尾然則幟垂於肩被於背吳語所謂肥胡吳都賦所謂祀姑肥胡祀姑形聲相似韋昭讀為肥胡左思讀為祀姑注云幡名麾旗之屬康成謂九旗之屬亦然今城門僕射所被及亭長著絳衣皆其舊象方言亭父謂之亭公其卒謂之弩父或謂之褚褚當讀為帾帶古反帾與徽皆幡名見廣雅所謂亭長絳衣徽之象也郭景純讀為赭言其衣赤義亦通仍讀從帾為允漢時走卒皆赤幘絳褠謂之褚者以此秦攻齊齊威王使章子將而應之與秦軍交和而舍章子乃變其徽章以雜秦軍由是秦軍大敗而淮隂擊趙亦隂選輕騎入趙壁拔趙幟立漢幟以亂其軍或持之或立之或被之或揚之皆同物也廣雅亭父更褚卒也中冬教大閲遂以狩田以旌為左右和之門羣吏各帥其車徒以敘和出案戰國䇿韓齊魏共攻燕燕請救於楚楚使景陽將而攻魏雍丘以救燕三國之兵皆罷魏軍其西齊軍其東楚軍不得還景陽乃開西和門通使於魏晝以軍騎暮以燭齊師怪之以為楚與燕魏合謀遂引兵去楚師乃還是軍門有東西和也韓非子曰李悝警其兩和曰敵人且至如是再三而敵不至兩和懈怠不信秦襲之幾奪其軍一日悝與秦人戰謂左和曰速上右和巳上矣又馳而至右和曰左和已上矣左右和皆爭上是軍壘有左右和也和者壁壘之名因於其壘立旌門是為左右和之門師克在和故曰和唐禮仲冬講武四出為和門建旗為之如其方色是軍之四面皆有和門矣東京賦敘和樹表注云軍之正門為和失之大役與慮事屬其植受其要鄭司農謂植者春秋傳華元為植巡功屬謂聚會之要者簿書按春秋昭三十二年諸侯城成周屬役賦丈書以授帥及會城而栽宋仲幾不受功栽者植也謂楨幹書者要也謂役要不受功者不受要也公羊謂不蓑城何休曰若今以草衣城或讀蓑為衰初危反謂功之等衰次第非也魏揚州刺史劉馥高為城壘多積木石編作草苫數千萬枚為備及吳圍合肥天連雨城欲崩於是以苫蓑覆之是為蓑城即何氏所謂以草衣城之法蓋古皆土城故覆之以防傾頽漢魏皆然春秋胡獨不然乎戰國董閼于之為晉陽也宫垣皆以萩蒿楛楚其牆之楛高至丈餘然則古者不獨覆城垣兼覆宫垣矣蓋水昏正而栽賞羣幹聚羣材百物皆具焉所謂屬其植也司農以為部曲將吏失之管子謂水官之吏常按行堤有大雨各葆其所可治者趣治堤防可衣者衣之則蓑城與衣堤皆古法也四時篇曰西方曰辰其時曰秋賞彼羣幹聚彼羣材百物乃收祭以首時薦以仲月而大司馬中夏苗田獻禽以享礿中冬狩田獻禽以享蒸康成謂冬夏田主于祭宗廟者隂陽始起象神之在內是祭以仲月非首時也王制天子諸侯之田一為乾豆亦見公羊何休云一者第一之殺也自左膘射之達於右髃中心死疾鮮潔故乾而豆之薦於宗廟不知所謂薦者因田而薦歟抑因祭而田歟孔氏賈氏皆以為周禮四仲祭者獻禽也然則因田而薦非因祭而田直曰獻禽可矣又曰享礿享蒸何也孟夏礿而中夏又礿孟冬蒸而中冬又蒸不亦黷乎南師解曰祭以首時者謂大夫士也天子諸侯祭天及禘祫以孟月祭宗廟以仲月而左傳則有始殺而嘗閉蟄而蒸之文始殺在仲秋則閉蟄亦當在仲冬矣杜預分為上下限十月半蟲始蟄為上限十一月初蟄蟲閉為下限皆可蒸周官祭以四仲蓋在下限是因祭以首時而曲為之説也昭元年左傳十二月晉既蒸蓋周建子為春故蒸祭在十二月於夏為孟冬於周為季冬桓八年經春正月巳卯蒸於周為孟春於夏為仲冬如杜預説在可蒸之下限不為過而書者穀梁以為蒸冬事而春興之志不時也然則不行夏時祠礿嘗蒸皆失其正故春秋書而非之周官搜苗獮狩獨用夏時祭以四仲得其正矣桓四年春正月狩與八年春正月蒸皆在仲冬之月合於周官説者以為春狩與春蒸皆非禮故書月莊四年冬狩於郜昭八年秋搜於紅為得時故不月公榖皆曰秋曰搜何休亦云狩例時書月者譏不時也范寧亦云祭祀得禮者時失禮者月然則春秋亦行夏時歟不然莊四年冬狩夏之八月乃仲秋之獮昭八年秋搜夏之五月乃仲夏之苗秋而狩夏而搜烏在其為得時乎春秋祭不書祠礿而書嘗蒸田不書苗獮而書搜狩則凡書於䇿者皆非時田時祭可知也大閲在中冬經書秋八月桓六年左氏以為簡車馬穀梁以為觀婦人而昭十八年七月鄭人大搜治兵於廟則搜閲皆非時田明矣何休曰比年搜三年大閲五年大搜漢禮猶然昭二十有二年春大搜于昌間穀梁子曰秋而曰搜此春也其曰搜何也以搜事也如其説四時皆可搜而桓八年夏五月丁丑蒸則亦四時皆可蒸歟吾故曰時田時祭不書於䇿董仲舒曰祠者以正月食韭礿者以四月食麥嘗者以七月嘗黍稷蒸者以十月進初稻是薦也非祭也又曰春上豆實夏上尊實秋上杌實冬上敦實豆實韭也春始生尊實牟也夏初受杌實黍也秋先成敦實稻也冬畢熟始生曰祠初受曰礿先成曰嘗畢熟曰蒸一年之中天賜四至至則上之此宗廟所以歲四祭也蓋合祭薦為一而以首時其義如此劉向曰苗者毛取之搜者搜索之狩者守留之夏不田何也曰天地隂陽盛長之時猛獸不攫鷙鳥不搏蝮蠆不螫鳥獸蟲蛇且知應天而況人乎哉其謂之田何去禽獸害稼穡者故以田言之何休謂田以共承宗廟夏不田而於苑囿中取之劉向不信周官獨主公羊夏不田之説周書曰夏數得天百王所同商湯革命建丑為正易民之視亦越我周改正異械以垂三統至於敬授民時巡狩祭享猶自夏焉此周官用夏時之明證也何休曰春薦尚韭卵夏薦尚麥魚秋薦尚黍肫冬薦尚稻鴈無牲而祭謂之薦天子四祭四薦諸侯三祭三薦大夫士再祭再薦漢叔孫生曰古者有春嘗果方今櫻桃熟可獻上許之諸果獻由此興此無牲之薦也然彘嘗麥犬嘗麻則薦有牲矣王制注云有田者既祭又薦士薦用特豚大夫羔所謂羔豚而祭百官皆足詩曰獻羔祭韭説者謂祭特牲薦以豚祭少牢薦以羔薦貶於祭不用成牲無牲者無成牲也康成謂鬼亦在祧薦而不祭祭有尸薦無尸譙周謂月朔加薦象生時朔食謂之月祭祧廟則否詩時邁其邦巡守也曰薄言震之莫不震疊箋云兵所征伐甫動以威則莫不懼而服者疏云王巡守以軍從故也大司馬職曰及師大合軍以行禁令以救無罪伐有罪又曰若大師則掌其禁令涖釁主及軍器上云師下云大師二者不同大師言征伐之事則所云師者乃巡守非征伐也故注云師謂王巡守及會同司馬起師合軍以從不言大者未有敵不尚武是巡守之禮以軍從矣大合軍猶大合樂大合樂者遍作六代之樂明大合軍者亦六軍皆行也而雜問志云天子巡守禮無六軍之文以禮無正文耳天子海內之主安不忘危且云救無罪伐有罪安得無六軍也或云詩言戢干戈櫜弓矢則震疊不以兵矣且定三革隱五刃偃武行文帥諸侯而朝天子齊桓之所以立伯功也況天子之巡守曷為威之以兵然後懼而服乎説者謂小宗伯立軍社大司馬涖釁主皆曰大師是命將出師曰師天子親征則加大焉大合軍者天子治兵之禮然康成謂巡守若會同亦非無説也大行人時會以發四方之禁殷同以施天下之政時會者諸侯有不順服王將討之乃為壇以合諸侯而發禁焉殷同者十二歲王不巡守六服盡來朝故曰殷同亦曰殷國言其盛也王亦為壇合諸侯而命其政政與禁謂九法九伐所以平邦國正邦國而大合軍以行其禁令者也詩曰周王于邁六師及之于邁猶時邁則巡守有六軍見於此矣昭王南征抎于漢中穆王東征渴於沙衍周德之衰也宣王東搜軍行嚴肅大路所厯黎元不知故詩曰之子于征有聞無聲龐龐乎奕奕乎豈非一時之盛哉東搜者王之東巡守也選車徒大合衆則巡守有六軍又何疑春秋天王狩于河陽穀梁狩作守讀為狩蓋王巡守會諸侯而田獵因以修戎事故一名搜書曰其克詰爾戎兵以陟禹之迹方行天下至於海表罔有不服以覲文王之耿光以揚武王之大烈方行天下非巡狩而何覲光揚烈曷嘗不詰戎兵也兵所以昭文德信矣是故向戍弭兵而春秋益亂蕭俯消兵而河朔遂亡大會同則大司馬帥士庶子而掌其政令大祭祀饗食羞牲魚孔穎達謂司馬掌會同薦羞之事春秋襄二十七年諸侯之大夫會盟於宋宋人享趙孟司馬置折俎禮也體解節折謂之羞羞牲魚蓋饗兼燕矣仲尼使舉是禮也以為多文辭古者於旅也語文辭者饗燕之辭魏侯觴於苑臺魯君舉觴而言孔子射於矍相之圃公罔之裘揚觶而語皆是也服虔以為仲尼舉而用之後世謂之孔氏聘辭聘行享禮其説必有據矣夏官司勳凡有功者祭于大蒸謂功臣配享案唐貞觀禮祫享功臣配于廟廷禘則否是時令文祫禘並得配享貞觀十六年集禮官議大常卿韋挺等議曰周禮六功之官惟配大蒸而已先儒皆以大蒸為祫祭髙堂隆庾蔚之等皆遵鄭學未有以為時享者又漢魏祫祀皆在十月晉朝禮官欲用孟秋殷祭左僕射孔安國啓彈坐免者不一梁初誤禘功臣左丞何佟之駮議武帝從之降洎周齊俱依此禮今禮禘無功臣誠謂禮不可易乃詔改令從禮至開元改修禮復令禘祫並配焉案司勳大蒸月令所謂大飲蒸也孟夏飲酎孟冬大飲蒸皆祭宗廟之禮左傳襄二十二年所謂見於嘗酎與執燔焉是也執燔助祭非宗廟而何康成謂飲酎與羣臣飲于朝大飲蒸與羣臣飲于學鑿矣孟冬百物大備其禮尤盛故祫祭于太廟曰大飲蒸是時大享先王功臣皆從與享而天子亦得與其助祭之羣臣飲酒于廟之寢歟盤庚孔傳曰大享蒸嘗也孔疏云時祭蒸嘗為大秋冬之祭尚及功臣則禘祫可知近代惟禘祫配食時祭不及失之矣冬祭曰大蒸乃時祫爾非謂三年一祫也配享列於庭魏高堂隆議曰燕禮大夫以上皆升堂士位於庭功臣配食而在庭此貶損非寵異也周書曰勇則害上不登於明堂見周書大匡篇左傳引之曰周志今之周書古之周志也言有勇而無義不登堂配食此配食在堂之明證也北面於庭朝立之位燕則升堂脫屨位不在庭君禮大夫三獻大祝三進爵於配食者可也古有立朝有坐朝治朝則君臣皆立燕朝則君臣皆坐坐則脫屨升堂大夫以上皆然士則立於下故曰朝不坐燕不與孔叢子謂天子諸侯之臣生則有列於朝死則有位於廟其序一也左傳以王命討不庭杜預云下之事上皆成禮於庭中然則有位於廟其位在庭矣朝有著位廟亦如之詩著三章先言著次言庭末言堂則著不在堂也其配饗神座齊永明十年何諲之議曰功臣配饗題列坐位具書官爵諡名前朝遺事無主設板大小厚薄與尚書召板相同然則板即主也晉安昌荀氏祠制謂之祭板長尺一寸博四寸五分厚五寸八分大書某之神座盛以帛囊而檢封焉唐禮祫禘功臣神座各設版於座首其版文各具題官爵姓名自漢及唐未聞配食在堂之禮楚詞云三公穆穆登降堂諸侯畢極立九卿音羌與堂協但言登降而巳非謂位在堂也覲禮侯氏奠圭奠幣在中庭皆升堂致命降階再拜稽首亦升堂成拜則朝位亦不盡在庭蓋天子以賓客禮之故致命成拜皆在堂歟春朝與秋覲不同秋覲天子當依而立爾匹牖户之間謂之扆與依通扆當牖東户西則扆位在堂矣春朝天子當寧而立爾匹門屏之間謂之寧蓋門旁有孰門外有屏天子立於其間以待諸侯之至故曰寧諸公東面諸侯西面東西對立則君臣之位皆不在堂所謂不下堂而見諸侯者惟覲禮為然也或曰寧位在門堂寧與著通諸侯內屏著在門內天子外屏著在門外爾匹兩階間謂之䦳中庭之左右謂之位位者羣臣東西之列位雜問志曰春祭蒼帝大皥食焉句芒祭之於庭則知在庭之位非始於漢矣曲禮下卿位疏云卿位路門內門東北面位論語過位色勃如也注謂入門右北面君揖之位包氏以為君之空位誤矣入門尚未升堂則位非君位也燕朝在路寢大夫得升堂馬質禁原蠶注云原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁原蠶者為傷馬也宋雍熙中嘗欲禁之值史館樂史以為國賦再熟之稻鄉貢八蠶之綿蠶之有原其來久矣編民之內貧窶者多春蠶所成止充賦調之用晚蠶薄利方及卒歲之資今若禁之竊恐病民未見其利上覽之遂寢其禁司業孔維以為晚蠶之繭出絲甚少再采之葉來歲不茂豈徒傷馬桑亦殘焉淮南子曰禁原蠶為殘桑也今坰野之地官馬多死苟無明據豈敢妄陳案本草注以僵蠶塗馬齒則不能食草物類相感如此仲春祭馬祖季春享先蠶皆天駟房星也為馬祈福謂之馬祖為蠶祈福謂之先蠶請依周禮禁原蠶為允上雖不用而嘉之以其言付史館而有司檢討先蠶故事以為先蠶者始蠶之人與先農先牧先炊一也開元享禮瘞炊於壇之壬地又郊祀録載先蠶祀文有肇興蠶織之語而為壇北郊不設燔燎則先蠶非天駟房星矣中山經宣山有桑其枝四衢葉大尺餘名曰帝女之桑詩所謂猗彼女桑也海外北經有歐絲之野在大踵東一女子跪據樹歐絲即荀子所謂身女好而頭馬首者是為蠶神與馬同形故與馬同氣實為龍精而晉志祭先蠶以少牢其神曰菀窊婦人寓氏公主隋志祭先蠶以太牢其神曰西陵氏則肇興蠶織者也校人秋祭馬社注云始乘馬者世本作曰相土作乘馬似非易服牛乘馬蓋取之隨神化宜民始於黃帝然則作乘馬者軒轅氏矣路史謂軒轅氏古帝皇非黃帝也其言不雅馴禡之言馬也禡禮祀軒轅以此北齊以馬蠶同祖故先蠶亦祀軒轅失之校人夏祭先牧注云始養馬者其人未聞吕氏春秋曰乘雅作駕寒哀作御寒哀者韓哀侯也古寒韓通世本云韓哀侯作御説者謂古雖有御至是加精巧焉詩曰自古在昔先民有作菀窊寓氏乘雅寒哀似皆起於近世非古昔先民安可謂之作乎軒轅娶於西陵氏之子謂之嫘祖氏淳化鳥獸蟲蛾故後周以先蠶為西陵氏然則先蠶猶先牧始養蠶者而馬蠶之祖則龍精也量人掌建國及造都邑之法營軍之壘舍量其市朝州塗軍社之所里司農謂州塗者還市朝而為道還與環通康成謂一州之衆二千五百人為師先鄭以州為道失之後鄭以州為師亦未為得也塗謂之術術謂之遂月令審端徑術學記術有序皆是蓋田首曰遂而五縣為遂亦以遂名邑中道曰術而十里為術亦以術名度地篇曰州者謂之術不滿術者謂之里故百家為里里十為術術十為州州十為都然則州塗者州術也州之內有塗塗之內有里面朝後市左祖右社而壘舍成焉營軍之壘象建國之都皆以其法别而制斷之量人所以造都邑者如此則其所以營軍壘者亦如此掌固掌修城郭溝池樹渠之固其法亦見度地篇其言曰聖人之處國者必於不傾之地而擇地形之肥饒者鄉山左右經水若澤內為落渠之寫因大川而注焉天下有萬諸侯天子中而處因天之固得地之利內為之城外為之郭郭之外為之土閬閬謂隍地高則溝之下則堤之命曰金城樹以荆棘上相穡著者所以為固也掌固職所謂城郭溝池樹渠之固者蓋如此康成亦云樹謂枳棘之屬有刺者則知先秦兩漢皆然矣一説量人所量者里數也司馬法曰中壘六千尺積尺得四里以中壘四面乘之一面得地三百步壘內有地三頃餘百八十步正門大將居之其數則量人之所量也蓋營壘以里計所謂軍社之所里者即此孫臏曰燒其積聚虛其市里然則軍市軍社之所在皆曰里也壘謂軍壁崔瑗中壘校尉針曰堂堂黃帝設為壘壁春秋秦伯使術來聘公羊術作遂古術遂通故學記術有序注云術當作遂或改術為州妄之甚矣王制鄭注云屬連卒州猶聚也疏云屬者繫屬連者連接卒者卒伍州者聚居齊語亦云羣萃州處然則里術州都市朝州塗皆聚也司爟故書爟為燋燋與爝通音哉約反杜子春讀為爟爟為私火康成謂爟讀如豫若觀火之觀今燕俗名湯熱為觀則爟火為熱火歟然則司爟夏主熱司烜秋主明熱以爨取其新明以照取其潔而明者不皆熱也故司爟専取火司烜兼取水乃知火之寒者非獨蕭丘之焰矣吕氏春秋湯得伊尹祓之於廟爝以爟火齊桓得管仲亦然髙誘謂火所以祓除不祥周禮司爟掌行火之政令爟讀如權置火於桔皋燭以照之如其説則爟火者權火也張晏曰權火烽火也狀若井挈臯矣欲令光明逺照如淳曰權舉也説文亦云舉火曰爟而以爟火為烽火則似不然祭祀舉爟與冦至舉烽不應同類漢祀五畤於雍五十里一烽火與冦至舉烽何以别乎且伊尹管仲所以皆爝以爟火者亦謂得賢臣良弼以告上帝鬼神即所謂祭祀通權火也然則通權火者祭爟之禮凡祭祀則舉焉名曰祭爟秦漢因之是為通權火甘泉賦所謂樵蒸焜上配藜四施東燭西耀北爌南煬蓋即實柴槱燎所以報陽歟一説祭爟者祭火星也古之火正掌祭火星行火政季春昏心星出東方而咮七星鳥首正在南方則用火季秋星入則止以順天時救民疾帝嚳有祝融堯時有閼伯民賴其德死則以為火祖配食火星周之司爟實掌其祭以報其功康成謂禮如祭爨是燔柴於爨也必不然矣所謂四時變國火者管子曰春爨以羽獸之火夏爨以毛獸之火秋爨以介蟲之火冬爨以鱗獸之火中央爨以倮蟲之火羽獸南方朱鳥火煙赤毛獸西方白虎火煙白介蟲北方元武火煙黑鱗獸東方蒼龍火煙青倮蟲中央黃龍火煙黃然則春取榆桞之火於南方夏取棗杏之火於西方秋取柞楢之火於北方冬取槐檀之火於東方中央取桑柘之火於坤方舊説以為春青冬黑又以為榆桞不青槐檀不黑皆非也南宫朱鳥軒轅為權主火權火之名蓋出於此桞為鳥喙衡散為榆蕪荑在地赤心者善則榆桞為南方之火信矣蕪荑榆也春秋説曰槐木者靈星之精也非東方之木乎賈誼曰桞者南方之木桑者中央之木棘者西方之木棘者棗也秦漢有别火之官主改火之事春青冬黑乃其常也又焉用别荀爽曰火生於木木盛於火其德為孝至夏乃王其精在天溫暖之氣養生百木是其孝也至冬則廢其形在地酷烈之氣焚燒山林是其不孝也故夏官掌火冬禁焚萊後世因之而莫知其由盛冬去火目為龍忌蓋龍星木位火生於寅壯於午死於戌夫文戌火為滅故為之禁焚萊者罰并州舊俗遂莫敢煙爨每冬中輒一月寒食好事者因附會介子推焉時則訓曰仲春始出仲秋始內季春大出季秋大內萬物皆然而司爟亦以此施火令春秋桓七年春二月焚咸丘火田也周之二月夏之季冬禁火之時而以火田此春秋所以書而非之也搜火弊苗車弊獮羅弊狩徒弊王制昆蟲未蟄不以火田爾匹火田為狩皆失周官之義矣羅氏職蠟則作羅襦康成謂今俗放火張羅其遺教説者遂云冬以火田非周官之義也司險設國之五溝五塗而樹之林以為阻固康成謂五溝者遂溝洫澮川五塗者徑畛塗道路此井田之法匠人掌之遂溝洫澮専達於川而山間有川川上有塗造溝因地勢梢溝因水勢曲為磬以行之深為淵以積之大為防以障之此博舉天下之水詳其利害而國必依山川因之設險以守其國則知司險所設之五溝不獨井田為然也而匠人溝洫之法亦從此出焉度地篇曰水之出於山流於海曰經水水别為他水曰枝水山之溝一有水一無水者曰谷水水之出於溝流入大水及海者曰川水出地而不流者曰淵水此五水者因其利而往之因而厄之乃迂其道而逺之以勢行之是為司險所設之五溝其設之之法先具備水之器籠臿板築土車兩輂藏於里中常以朔日出具閲之取完堅補弊久去苦惡而以冬少事之時令其徒以次積薪水旁其積之也以事之已其作之也以事未起大為堤小為防地不生草者必為之囊夾水四道禾稼不傷歲埤增之樹以荆棘以固其地雜之以柏楊以備決水民得其饒是謂流膏令其地之民守之往往而為界司險職所謂樹之林以為阻固皆有守禁者其大略如此後世井田既廢而講水利者或引以溉田或疏以通漕然五水不分五溝不設戎馬橫行如入無人之境而司險藩塞阻路之意蕩然無復存焉矣司險掌九州之圖以周知其山林川澤之阻而達其道路其説亦見地圖篇曰凡兵主者必先審知地圖檈轅之險濫車之水名山通谷經川陵陸丘阜之所在苴草林木蒲葦之所茂道里之逺近城郭之大小名邑廢邑困殖之地困謂不耕之地殖謂壤田必盡知之地形之出入相錯者盡藏之然後可以行軍襲邑舉錯知先後不失利此地圖之常也苟非地圖焉知厄塞不知守國何以行軍蕭何入關先收秦圖書者以此荀子謂古者城郭不辨溝池不拑拑古掘字史記作掘固塞不樹如其説則司險之職廢矣豈其然乎難經以經水比人身十二經枝水比人身十五絡聖人圖設溝渠通利水道以備不然其説得之矣楚莊王欲伐陳使人視之使者曰陳不可伐也其城郭高溝壑深王曰陳可伐也陳小國而城郭高溝壑深則民力罷矣興兵伐之遂取陳然則設險以守國而守國不徒以險也夏秋二官皆有環人夏官環人掌致師而環四方之故秋官環人掌送逆賔客行則達之舍則環之故皆以環名官環與還通春秋莊十年宋人遷宿公羊曰遷之者何不通也以地還之也何休曰還繞也繞取其地使不得通四方此夏官環人所謂環四方之故者也量人量市朝之州塗司農謂還市朝而為道則還讀為環矣齊語環山于有牢韋昭曰環繞也馬融讀環為繯即絹字謂繯山之宰牧槖野之飛征古本齊語亦作繯賈逵曰繯還也劉昌宗讀為患户串反亦必有説矣王射三容諸侯二容卿大夫士一容按爾匹容謂之防注云如今牀頭小曲屏風唱射者所以自防隱也荀子曰居則設張容負依而坐户牖之間謂之依言張設于户牖間則斧扆亦名容與唱獲者之容皆象屏風故事異而名同也古者貴賤不嫌同名信矣容一名乏車僕大射共三乏大射燕射司弓矢共并夾射鳥氏主取矢矢在侯髙則以并夾取之注云并夾針箭具矢籋也説文籋箝也箝與鉗同一作針皆從金以甘咸得聲并夾反為籋猶不來反為貍後世反切之學出之此周靈王時諸侯莫朝萇𢎞乃設射不來不來者貍首也貍首之詩與祭侯之辭皆言諸侯來朝之禮其詩曰曽孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽其辭曰惟若寧侯母或若女不寧侯不屬于王所故抗而射女強飲強食詒女曾孫諸侯百福古者來朝諸侯稱侯氏見覲禮不來者不寧侯故抗而射之然則萇𢎞行古禮説者謂依物怪以致諸侯妄之甚矣司士詔王治以德詔爵以功詔祿以能詔事管子曰君之所審者三一曰德不當其位二曰功不當其祿三曰能不當其官此三本者治亂之原也故德義未明于朝者不可加以尊位功力未見于國者不可授與重祿臨事不信于民者不可使任大官故德厚而位卑者謂之過德薄而位尊者謂之失寧過于君子毋失于小人過于君子其為怨淺失于小人其為禍深是故國有德義未明于朝而處尊位者則良臣不進有功力未見于國而享重祿者則勞臣不勸有臨事不信于民而任大官者則材臣不用如此則明塞于上而治壅于下若夫君子之怨小人之禍詩之小雅備矣君子之怨也所以救小人之禍也及小人之禍既成則君子鴻飛冥冥又何怨焉通典謂前漢尚書四曹後漢六曹隋為六部唐以六部為天地四時之官法周之六官然參詳古今徵考職任則唐之吏部周之司士也王制司馬辨論官材實司士之職似司士一名司馬猶秋官縣士掌野左傳謂之野司寇歟詩正義曰士察也謂之士者言其能察理衆事王日視朝特揖孤卿旅揖大夫旁三揖羣士還揖左右門宿衛之士鄭司農曰卿大夫士皆君之所揖春秋傳所謂三揖在下也王制七十不俟朝王揖之則退不待朝畢其餘揖之乃就位羣士不待王揖發在其位王揖之皆逡遁而復位云案燕禮言爾大射儀言揖逺則爾近則揖爾猶近也謂揖而近之説文竦手為拜音拱從兩手下之為拜故揖與拜通特揖者竒拜竒猶特也特揖為竒拜則旅揖為再拜歟三孤六卿則竒拜二十七大夫則再拜八十一元士則三拜所謂禮以少為貴者蓋如此晉靈公不君趙盾將入諫靈公望見之訴而再拜盾乃孤卿禮當特揖靈公見之而驚失其常度故為之再拜説者謂敬以拒之是不然無道之君彈人為樂焉能敬大臣乎何休曰禮天子為三公下階卿前席大夫興席士式几此坐朝之禮燕饗行之王饗諸侯乘車送逆燕禮賓入及庭公降一等而揖焉則有下階之禮凡大朝覲大饗射及封國命諸侯皆設席大朝覲者諸侯因會同而行朝覲之禮也若夫路門視朝君臣皆立未聞設席亦不下階孔子見哀公公問儒行蓋燕朝也路門內之朝大僕掌之故曰更僕更僕者久立將倦大僕二人相代而更於是為孔子布席于堂而與之坐焉此古禮也及秦而亡漢禮皇帝見三公御坐為起在輿為下雖有是禮亦不常行吕氏春秋桓公朝揖管仲而進之所謂特揖也入及庭而未就位之時魏文侯燕飲任痤入文侯下階而迎之以為上客蓋燕必有君所謂君為臣下階者惟此時為然冠義見於母母拜之謂舉手禮之即君揖臣之禮自古未聞婦人揖凡婦人皆肅拜也婦人肅拜猶男子揖説者以為母不應拜子誤矣古者不獨君揖臣亦有臣揖君楚令尹子佩請飲莊王北面疏揖疏者徒跣也子事父臣事君皆跣而升堂禮於堂上無揖疏揖者堂下正立拱手歟朝儀士旁三揖喪禮士旁三拜三揖者三舉手三拜者三屈膝旁猶面也一云旁猶不正也面者每面揖之三不正者邪嚮揖之三旁拜為汜拜則旁揖為汜揖矣古旁與方通士上下中三等故三揖也士微矣喪則拜而朝則揖先王所以勸士者至矣哉其有致仕在家者入朝君必先揖之而后及卿大夫士古君臣相接以禮其禮之隆又若此內宰掌北宫宫正掌西宫諸子掌東宫皆典禁兵豫機密親近之臣也何以知之以燕禮知之宫正即司宫諸子即庶子燕禮西階之燭司宫執之則知宫正掌西宫也阼階之燭庶子執之則知諸子掌東宫也內宰職正歲憲禁令于王之北宫而糾其守則內宰掌北宫明矣西宫者王宫北宫者后宫東宫者太子宫或曰庶子賤者燕禮士旅酌畢乃獻庶子射禮士旅酌畢而復射則不獻庶子復射畢而後獻之如獻士之禮獻在士後則庶子賤者歟非也庶子內臣也燕禮獻羣臣畢然後獻內臣故士旅於西階既辨乃獻庶子於阼階既獻庶子遂獻左右正與內小臣亦在阼階皆內臣也則庶子為內臣之長矣古者訓民之官謂之外庶子故康誥曰外庶子訓人掌其戒令與其教治春合學秋合射考藝進退皆訓人之事有外則有中諸子者中庶子也荆軻入秦因寵臣中庶子蒙嘉而得見秦王則庶子非親近之臣乎國有大事諸子帥國子而致之太子惟所用之若有兵甲之事則授車甲而合卒伍古者太子宫亦如王宫有禁兵歟曰然漢制太子食湯沐十縣設周衛交戟古法也然則太子將兵歟曰否所謂兵甲之事者謂太子有監國撫軍之事在軍則國子守遷主在國則國子守王宫也以為是宿衛之親軍故司馬之征弗及授車甲合卒伍治以軍法則有司存或守太廟或守貴宫貴室或守下宫下室皆諸子致之內宰宫正宫伯分掌之而太子弗與焉西晉裴頠以太子非賈后所生宜防其變表請增東宫宿衛萬人然而四率精兵終不能免愍懷之禍也楚有東宫之甲商臣遂興宫甲圍成王適足以濟其蜂目豺聲之忍而已故古者太子之宫不藏兵革秦因周制有中庶子官漢王商史丹傳喜等皆嘗為之主諸吏之適子及支庶版籍魏因之在吳及晉尤重其選顧談溫嶠皆居是官甚見補益然皆不典兵也夏官諸子存遊倅修德學道天官宫正聨什伍糾德行教道藝晉之霸也亦如之故郤縠為元帥惇悅詩書士會將中軍講求典禮及秦以力征并吞諸侯而其風息矣古者庶子掌公族非徒國也家亦有焉衛公孫鞅事魏相公叔痤為痤之中庶子中一作御是家臣也雖家國不同同掌公族晉有公族大夫即夏官之諸子歟甲衛士謂之介夫故有正夫有遊夫遊謂之倅車有遊闕夫有遊倅春秋傳孟孫卒將辟臧孫使正夫助之正夫者小司徒起徒役母過家一人是為正夫以其餘為羡羡猶遊也管子曰一器成往夫具二器成驚夫具三器成遊夫具遊夫即國之貴遊後漢大將軍竇武援立靈帝盧子幹獻書于武曰比世祚不競仍外求嗣四方未寧盜賊伺隙將有楚人脅比尹氏立朝之變宜依古禮置諸子之官徵王侯愛子宗室賢才外崇訓道之義內息貪利之心簡其良能隨用爵之強幹弱枝之道也愚謂貴遊不徒宗室公卿之子王之庶子亦與焉如是則孽不奪嫡庶不亂宗伯父伯兄仲叔季弟幼子童孫皆為宿衛奔奏禦侮之臣安得有楚人脅比尹氏立朝之變乎其後冀州刺史王芬南陽許攸沛國周旌等連結豪傑謀廢靈帝立合肥侯則子幹之言中矣禮説卷十
