body:
  text: 禮說卷一翰林院侍講惠士竒撰天官上詩曰商邑翼翼四方之極言商之建國翼翼然乃四方之中正也惟王建極以立國設六官分六職以為民極極者度也中也天生民而豫之度布指知寸布手知尺舒肘知尋聖人因之而制其數權輕重量大小以立度明本末建終始以立中是為極亦曰典天道地道人道為三極上天下地中有四時為六典詩曰立我蒸民莫匪爾極是民立於極也書曰惟天監下民典厥義是民生於典也不協於極者皇亦受之則不能者勸不迪率典者天乃棄之則為惡者懲皇建謂之極天叙謂之典錫汝極所以遵王道守爾典所以承天休因此三極立為六典典常也法也天有常性人有常順好惡生變變習生常民乃有古政維今法維古六典皆古也治典立而萬民服教典立而萬民淑禮典立而萬民睦政典立而萬民畜刑典立而萬民肅事典立而萬民足室家以盈婦子以寧禮俗以成風化以淳天下和平是謂民極非中不立有典有則子孫服習民乃不忒異類咸格鳥獸仁德詩曰維清緝熙文王之典儀式刑文王之典日靖四方然則大宰所建者文王之典也式典者用之常惇典者行之篤敬典者秉之䖍弗式弗惇弗敬而六典息矣大宰以八則治都鄙六曰禮俗以馭其民康成以舊所行者昏姻喪紀為禮俗愚案士昏禮有辭辭曰某有先人之禮覲禮侯氏前朝有戒戒曰伯父帥乃初事先人之禮者家之先典帥乃初事者國之故事蓋行禮順先典循故事所謂禮俗也百里不同風千里不同俗俗不同而一之以禮則無不同鶡冠子曰田不因地不能成榖化不因民不能成俗又曰勿損勿益幼少隨足以從師俗言天命者性師教者習因習而俗成焉荀子曰聖人明知之士君子安行之官人以為守百姓以成俗淮南子曰行齊於俗可隨也事周於能易為也矜僞以惑世伉行以違衆聖人不以為民俗晏子曰汨常移質習俗移性不可不慎也又曰嬰之家俗有三及病將死謂其妻曰吾恐死而俗變謹視爾家毋變爾俗乃鑿楹納書以為楹語此晏子之家俗也當時稱為賢大夫管子曰藏於官則為法施於國則成俗有一體之治者去奇說禁雕俗也朝有經臣國有經俗民有經産明君在上俗無異禮變更自為易國之成俗者命之曰不牧之民由此觀之有一家之俗有一國之俗有天下之俗一家之俗大夫主之一國之俗諸侯主之天下之俗天子主之而皆以一人為轉移故天下國家逺近大小雖殊莫不有祖宗家法顚覆典型紛更約束子孫不法祖宗而俗敗矣書曰商俗靡靡利口惟賢餘風未殄商之俗成湯作之於前聖君哲相成之於後猶若不足而兢兢以巫風淫風亂風家必喪國必亡為訓及受之身一人敗之而有餘蓋作之難成之難敗之甚易若此有周代商既厯三紀世變風移而靡靡之俗尚未盡革也敗之甚易變之甚難又若此故曰敗常亂俗三細不宥言罪雖小亂俗者必誅所謂禮俗以馭其民也可不慎哉疏材所以配九榖閒民所以輔三農黃帝內經五穀為養五果為助五菜為充魯語列山氏之子曰柱能殖百穀百𬞞曲禮稻曰嘉𬞞注云菰𬞞之屬詮言訓菰飯犓牛豳風叔苴傳云苴麻子則菰麻皆疏材家語含以疏米注云疏粳米是穀亦名疏也越絶書甲貨曰粢為上物乙貨曰黍為中物丙貨曰赤豆為下物丁貨曰稻粟為上種戊貨曰麥為中種已貨曰大豆為下種庚貨曰穬辛貨曰果皆比疏食楊泉物理論曰黍稷曰粱粳曰稻豆曰菽三者各二十𬞞果助穀各二十曰百穀書艱食一作根食馬融曰根生之食蓋謂百穀也揚雄太元曰止於童木求其疏穀則疏亦名穀矣古無奴婢有臣妾易遁九三畜臣妾吉旅六二得童僕貞左氏謂之皂𨽻輿臺公羊謂之厮役扈飬凡為菹為糝為薪皆臣妾聚斂以獻皇祖介眉夀食農夫周書大聚曰春發枯槁夏發葉榮葉榮淮南作果蓏秋發實䔫冬發薪蒸皆臣妾之職也而後世以為利者乃與用事童僕趨時任桀黠奴以逐利而千樹棗千樹栗千樹橘千畦薑韭至比千戶侯陽華之藝雲夢之芹具區之菁菜之美者名曰土英則疏材之利倍於九穀矣魏風園有桃言疏材不足以富國也管子以瓜瓠葷菜百果不備為國之貧豈其然乎小司徒上地家七人可任也者家三人則一家四人為閒中地家六人可任也者二家五人則二家七人為閒下地家五人可任也者家二人則一家三人為閒閒猶餘也羡也夫曰餘卒曰羡民曰閒書曰厥民析厥民因子弟居室父兄在田謂之析父兄赴功子弟畢作謂之因詩云侯亞侯旅侯疆侯以亞仲叔旅子弟皆閒民也疆謂勸相以能左右之長者規少者隨尊者令卑者聽所謂民無常職轉移執事也國無閒民則國擾家無閒民則家索野無閒民則野荒九職以三農冠其首以閒民殿其終誠重之也商鞅相秦民有二男以上不分異者倍其賦蓋無閒民自此始無閒民而有游民亦自此始先王重農兼重工商農攻粟工攻器賈攻貨三者國之三官周之東也百工喪職蓋九職不行久矣子朝之亂也百工皆叛杜注謂百官非也盟平宫伐東圉久之乃平鄭之遷也與商人俱秦師襲鄭犒而退之韓起買環賈成必告弗敢專也周之工鄭之商其以國升降乎八材者醫無閭之珣玗琪會稽之竹箭梁山之犀象華山之金石霍山之珠玉崑崙之璆琳琅玕幽都之筋角斥山之文皮是為八材穀梁子曰古者公田為居井竈蔥韭盡取焉范氏云損其廬舍家作一園以種五菜外樹楸桑以備養生送死所謂園圃育草木者蓋如此而山澤之材則與民共之者也潤溼不穀樹之莞蒲礫石不穀樹之葛藟而山有林麓澤有魚鹽恐民之有爭心也於是設虞衡列其禁平其守如是而已春秋莊公二十有八年築微三十有一年築郎築薛築秦成公十有八年築鹿囿說者以為築者規固而有之又置官司以守之不與民同利然則山林藪澤虞之正也築之非正也故謹而志之戒專利也澤處者漁山處者木谷處者牧載師逺郊有牧田而閩𨽻養鳥貉𨽻養獸能通鳥獸之言阜蕃教擾之自伯益佐舜調馴鳥獸而周宣王時有梁鴦者佐牧正之官善於其職虎狼鵰鶚無不柔馴異類雜居不相摶噬孶尾成群蓋順其性取之時用之節鳥不獝獸不狘君子讀鴛鴦之詩而知養蕃之有道焉典絲受良功典枲受苦功絲曰良枲曰苦而典婦功則兼絲枲而辨其良苦以授嬪婦使化治之民間繞屋桑麻春蠶秋績春無游女秋無懶婦及周之衰婦無公事休其蠶織南方之原不績其麻其端自上及下蓋哲婦傾城而嬪婦之職廢矣司空居四民冡宰分九職四民有士而九職獨無何也古者士出於農詩云蒸我髦士士農之分也其始於管仲之治齊乎酒誥牽車牛是農而賈也春秋作丘甲是農而工也酒誥在九職未分之前春秋在九職不行之後此九者皆養民之本而以正其德以利其用以厚其生蓋此水火金木土穀六者惟修而善政盡在是矣故任之為九職叙之為九功魯國之法贖人臣妾於諸侯者皆取金于府並見呂覽家語故知古之臣妾即今之奴婢園圃廬舍也嬪婦室家也閒民子弟也臣妾奴婢也虞衡藪牧器用之資與其皮毛筋角則商通之而工度之者也職有九民惟三三官理九職舉呂覽上農篇云凡民自七尺以上屬諸三官謂農工賈左傳哀十七年衛莊公使三匠久司徒期等遂因三匠以作亂昭二十二年王室之亂亦因百工故王孫賈日苟衛國有難工商未嘗不為患杜注以百工為百官誤矣三官棄九職廢三官亦曰三老服䖍云三老者工老商老農老周書曰大工賦事大商行賄大農假貸六韜曰大農大工大商謂之三寶農一其鄉則穀足工一其鄉則器足商一其鄉則貨足無亂其鄉無亂其俗庚貨曰穬謂穬麥也陶隱居本草以為是今馬食者潘嶽汧督誄所謂焚穬火薰之是也晉士會稱楚莊之霸也曰商農工賈不敗其業楚子囊美晉悼之賢亦曰商工不遷業庶人力於農則九職尤重三官也董安于治晉陽尹鐸繼之當時以晉陽為保鄣及知伯將伐趙趙襄子往晉陽而城郭不治襄子懼張孟談曰吾聞良吏之治務修其教不治城郭君其出令令民有奇人者使治城郭之繕奇餘也謂閒民出令甫五日而城郭已治矣然則閒民曷可少哉魯三家分其國之民而各有其一季氏盡征之叔孫氏臣其子弟孟氏則若子若弟取其半焉子弟謂閒民臣謂共官力役若今之丁載師所謂民無職事者出夫家之征也康成以為傭誤矣荀子曰農精於田而不可以為田師賈精於市而不可以為賈師工精於器而不可以為工師有人也不能此三技而可使治三官曰精於道者也汜勝之書以稻米黍麻秫小麥大麥小豆大豆為九穀禮有死於宫中者三月不舉祭馬融云哀傷臣僕缺一時之祭然則士以下為臣妾服緦歟管子君臣篇有中民有小民順中民以行順小民以務則國豐審天時物地生以輯民力禁淫務勸農功以職其無事則小民治人有中曰參中民三農也小民無事為閒三農者上農中農下農也揆度篇曰上農挾五中農挾四下農挾三小司徒上地中地下地分為三者以此若夫絺綌徵於山農草貢徵於澤農齒角羽翮徵於山澤之農以當邦賦皆虞衡所作之材也亦名為農而以山澤别之故曰虞不離津澤農不去疇土各守其職而萬民諧漢永平初禁民二業居巢侯劉般上言官禁二業田者不漁今濵江湖郡民多漁採以資口實冬春閒月不妨農事且漁獵之利為田除害有助穀食非二業也帝從之遂弛其禁然則九職雖分蓋通功易事者歟文王以七屬官人周公以九兩繫民繫猶屬也大戴禮七屬曰國則任貴官則任長學則任師先則任賢族則任宗家則任主鄉則任貞蓋牧以地得民故國則任貴牧者一州之貴也長以貴得民故官則任長長者六官之長也若夫無地而為君無官而為長則有師儒在朝則美政在下則美俗近者樂之逺者趨之四海之內若一家通逹之屬莫不從服此非得民之神者歟以賢得民者師以道得民者儒父兄在焉子弟從之故曰地從城城從民民從賢得城則得地得民則得城得賢則得民焉庶姓别於上則有族族人不戚君則有宗翼九宗逆晉侯遂四族殲齊戍皆宗以族得民者也族繁則渙族盛則强是故立大宗以糾合之檢彈之使一族愛而親敬而尊由是老窮不遺桀黠者不敢為非故人人各宗其宗而天下治所謂族則任宗宗以族得民者蓋如此降及春秋族不任宗宗不收族故晉有桓莊之逼宋有戴桓之亂鄭有駟良之爭而宗法壞矣大夫不稱君謂之主臣無有作福謂之利利者和也故義和為利利者養也故祭告利成所謂家則任主主以利得民者家施不及國大夫不收公利俾都家各養其民而和之以義也不然牛馬維婁委已者也而柔焉委猶飼也鄭之罕宋之樂民歸之矣居人臣之位而違道結民心害於而家何利之有若夫三代之興邦家有社稷兩漢之盛牧守有子孫則吏治不可不講也不煩之吏有似於迂日計不足月計有餘所謂鄉則任貞吏以治得民者蓋如此此文王官人以七屬任之之法周公又分七屬為九兩者談說不稱師為倍獨學而無友為孤而川衡林衡山虞澤虞皆國之藪民共之而吏掌之者故有師以賢得民自有友以任得民有吏以治得民自有藪以富得民則九兩包於七屬也任為六行賔興於鄉里富為五福敷錫於庶民降及秦漢任變為俠富成於姦故匹夫有百里之譽千里之交橫行於天下而上無禁利下有貪民鹽井丹穴皆擅而據之坊民弗嚴末流必潰先王知之故道義有切磋之友統以師儒川澤有虞衡之官束於吏治則任不流為俠富不犯於姦矣朱游少通輕俠及從師受經卒為名臣龔少卿召翁卿之為吏也所居民富郡有畜積此其驗也先王立政必先得民得民之道不出七屬有天下國家者宜留意焉以九兩繫邦國之民繫猶綴也綴與贅通詩曰具贅卒荒傳云贅屬也箋云繫屬孟子屬其耆老書傳云贅其耆老是贅猶屬也屬猶繫也故知大戴七屬即天官九兩詩曰為下國綴旒綴旒者所以繫邦國也周自平王東遷威德不加於四海由是九兩廢而邦國之民不復繫於京師矣宫之中門曰雉門門之側東西有堂謂之辟門之外左右有樓謂之觀總名為闕秦漢闕外有桴思今之樓古之觀也觀謂之闕罦罳謂之屏正嵗五官縣象魏於其上象魏者治象教象政象刑象事象所謂天垂象聖人象之者也六典既建五象斯彰以揚大烈以覲耿光無怠無荒不愆不忘萬民仰觀挾日乃藏因縣之於闕遂以象魏名其闕焉於卦為觀下體坤為民上體巽為命互體艮為闕命縣於闕萬民觀焉兩觀之名蓋取之此中正以觀天下者也禮典不縣者天有常象地有常形人有常禮一設而不更是為三常三常立而五象出焉然則禮在五象中别無禮象故也秦漢兩觀不設五象不縣徒立巨闕以應天宿失其義矣禮運仲尼與於蠟賓出逰於觀之上喟然而歎蠟賓者臘祭先祖祭必有賓群臣助祭亦曰賓廟在中門外之左祭畢出廟門至中門即縣象魏之處周禮在魯大道不行舊章雖存人亡政息故孔子過之而歎歟左傳莊二十一年鄭伯享王於闕西辟杜注云闕象魏也愚謂西辟者門側之堂言西則有東可知明堂位注云屏謂之樹今桴思也刻雲氣蠱獸如今闕上為之匠人注云城隅謂角桴思也孔疏云桴思小樓也城隅闕上皆有之屏上亦為屋以覆屏牆愚案桴思一作罘罳說者以為即招魂之網戶不知其名本起於樓釋名曰樓謂牖戶之間有射孔樓樓然也牖戶之孔狀若網羅之目故曰罘罳望之樓樓然其名起於此漢闕畫雲獸梁天監七年鐫石為闕奇禽異羽畢備非古也禮曰挾日傳曰浹辰周之正月魏闕挾日而斂五象成之九年楚人浹辰而克三都正義云浹周匝也從甲至癸為十日從子至亥為十二辰浹辰者子亥之辰一匝挾日者甲癸之日一周古挾浹通詩曰使不挾四方毛傳云挾逹也謂方皇周浹於天下故曰達於卦為蠱為巽蠱彖先甲後甲巽五先庚後庚易林乾主甲震主庚虞翻云乾成於甲蠱變成乾震成於庚巽變成震隂陽天地之始終也挾謂之雜雜謂之匝三王之道如矩之三雜規之三雜終而復始循環無端呂氏春秋曰圜周復雜淮南子曰數雜之夀雜猶挾也後人掇拾淮南托為文子改雜為算失其義矣朝廷出令曰令甲趙武靈王出胡服令趙燕曰臣敬循衣服以待令甲漢有金布令甲之篇亦以此康成云從甲至甲為挾日蔡雍云郊天陽用日耕藉隂用辰祀大神享先王及納亨大宰贊王牲事注云納亨納牲將告殺愚案漢禮天郊夕牲晝漏未盡十八刻初納夜漏未盡八刻初納明堂社稷亦如之晝漏未盡十四刻夜漏未盡七刻皆再言納者一納牲一納亨也正月始耕祠先農其禮簡不再言納然則納牲與納亨異矣漢祠夜半行禮故祭前晝漏未盡納牲夜漏未盡納亨禮運祭元酒薦血毛為法太古腥其俎孰其殽為法中古退而合亨體其犬豕牛羊為今世之食禮器納牲詔於庭血毛詔於室羮定詔於堂是古之三詔即漢之再納祭義君牽牲穆答君卿大夫序從此之謂納牲而納亨者謂合亨之後羮定之初薦孰未食之前盛之於俎先以告神於堂也祭禮血腥之屬盡敬心耳要以孰為正大夫士之祭也自薦孰始故特牲少牢皆曰饋食漢親耕及貙劉祭先農先虞以特牲如饋食但薦孰而不薦腥故有納亨而無納牲不再言納者以此穆答君猶嗣舉奠皆天子諸侯之禮大夫之子不舉奠辟諸侯舉奠者尸未入祝酌奠奠於鉶南天子奠斚諸侯奠角上嗣舉之故曰舉奠君之上嗣為穆迎牲入廟與君對共牽牲尊君之適也說者以穆為子姓失之矣牽牲在祭初舉奠在祭末天子諸侯皆將傳重故惟上嗣得與焉五官奉牲羞其肆肆者六牲之體是為納亨諸子正之司士割之王親匕之太僕贊之御僕登之南齊太常丞蔡仲熊議郊堂之禮引東京禮儀志云天郊夕牲之夜夜漏未盡八刻進孰明堂夕牲之夜夜漏未盡七刻進孰進孰者納亨也則晝漏未盡納牲明矣先是納牲卿大夫序從而已及入廟繫牲於碑卿大夫袒而刲毛取血入以告神於室此所謂贊王牲事者一當朝踐之節一當饋食之時獨言納亨者舉其正也周官干寶注已亡劉昭注漢志間引其語如秋官夜士云若今都候之屬天官少宰云若御史中丞案左右都候主劍㦸士徼循宫以況夜士可也而少宰全不類中丞特以其在殿中密舉非法有似小宰掌王宫之糾禁遂以中丞當之決非康成之語其為干注無疑今皆雜於鄭注賈公彥之無識也詩信南山正義引太宰納亨注云納牲將告殺謂鄉祭之晨劉昭亦以為干注曽子問正義引太宰納亨注云納亨謂祭之時唐人正義非出一手兩處不同則劉昭所謂干注者抑或然乎至若以司門為如今校尉太僕為若漢侍中皆干注也而舞師䍿舞云䍿赤草染羽為之用假色者欲其有時而去以為鄭注今本鄭注無之而干注英蕩及弧旌枉矢吾取焉云枉矢象妖星非其義也枉謂枉直蓋枉矢於弧然八矢配六弓枉矢居其首康成云取名變星飛行有光若今飛矛矣則干說亦未為得也孔頴達曰鄭司農解九數之名書本多誤云今有重差句股者重差即差分也去旁要而替以句股為漢之九章馬融干寶等更云今有夕桀各為二篇未知所出然則干注本馬融今皆雜於鄭注矣六叙正羣吏曰正其位作其事受其㑹三者臣之所以事君曰進其治制其食聽其情三者君之所以體臣注云情爭訟之辭非也邇臣守和安得有爭又焉用訟且不心競而力爭晉之公室所以卑也曽謂先王之世而羣吏有爭訟者乎愚案詩東山之序曰君子之於人序其情而閔其勞所以說也故東山之卒章極序其情樂而戲之采薇遣戍出車勞還枤杜勤歸一則曰憂心孔疚再則曰我心傷悲君子能盡人之情故人忘其死而四牡勞使臣之來也乃曰是用作歌將母來諗諗告也君勞使臣述叙其情故作此詩之歌以養父母之志來告於君蓋有告者必有聽者有告而無聽于是祈父刺宣王不敢斥王而呼祈父曰祈父亶不聰當是時小宰之六叙廢而在朝無復有聽其情者矣曰亶不聰者責其不能聽也先王之於羣吏既進其治以書其勳復制其食以厚其養又聽其情以悅其心所謂體羣臣者可謂至矣情見乎詩大史序之王者不作而詩亡詩亡而王迹息者以此大戴禮公曰今日少閒我請言情於子子愀焉變色遷席而辭曰君不可言情於臣臣請言情於君公曰吾度其上下咸通之子曰可為家不可為國上失政政出自家門臣故曰君無言情於臣君無假人器君無假人名此非孔子之言而託之者也古之盛世君臣上下皆得言情何嫌何疑而云不可且魯之有名無情也久矣及哀公而愈甚公患三桓之侈三桓亦患公之妄也故君臣多間而上下之情不通誠能度其上下而咸通之則君與民合為一心臣與君孚為一德又何患乎三桓乃不通其情而更益其妄於呼此公之所以終孫於邾也韓詩外傳言人主之疾十有二發而隔居其一焉下情不上通謂之隔管子亦言國有四亡其二曰塞曰侵塞者下情不上通侵者下情上而道止誠能以叙聽其情則通而不隔行而不塞誰得而寢之小宰八成有傅别書契質劑要會之名傅别故書作傅辨杜子春讀為傅别案荀子性惡篇辨合符驗愚謂辨猶别也合猶傅也傅别猶辨合也蓋辨而别之為兩合而傅之為一如符節然案質劑左氏謂之質要荀子謂之質律詩謂之質成言可奉為法律而事由之要結而成也不徒賣買用之旅師平頒興積斂之民而散之民亦憑質劑以為信焉六鄉役民以上劑六遂役民以下劑劑者州里之役要而司空之辟也要者合要故左氏謂之質要辟者法律故荀子謂之質律又旬計曰日成月計曰月要嵗計曰歲會皆名為質王制所謂司㑹以歲之成質於天子冡宰齊戒受質是也又獄之要辭亦名為劑大司寇以兩劑禁民獄是也故詩謂之質成然則傅别質劑要會三者皆書契之别名也易林云符左契右相與合齒所謂辨合符驗者即此應間云萬方億醜并質共劑章懷注云質劑猶今分支契也兩書一札同而别之簿書最目獄訟要辭皆名曰契合齒分支列子云宋人有逰於道得人遣契者歸而藏之密數其齒曰吾富可待也注云刻處似齒釋名曰莂别也大書中央破别之也契刻也刻識其數也管子貸粟米者有别劵五穀以平賈取之定其劵契之齒九家易曰契刻也大壯進而成夬金決竹木為書契象契一作挈漢有租挈及廷尉挈令韋昭曰在板挈也宰夫八職其四要凡目數注云要若嵗計凡若月計目若日計愚謂三者皆數也數分為目目最為凡凡合為要皆謂之數管子曰君發其明府之法瑞以稽之立三階之上南面而受要八職首曰要即此荀子曰官人失要則死州里役要邦國比要皆名為要車之進退其要在轄戶之開闔其要在樞設轄而車行立樞而戶轉周官之要在六官六官之要在天官舉一法明一指以兼覆之並照之而觀其成者也是故冡宰治之司會考之天子齊戒受之亦曰質是為質要春官御史掌贊書凡數注云自公卿以下胥徒凡數及其見在空缺者愚謂凡即官成之凡數即官常之數凡者大共名也數者大别名也推而共之為凡推而别之為數其義難知其數易知失其義守其數謂之有司讀其書不知其說謂之誦數之儒蓋凡則其總而數則其緒焉爾目者都目漢有司徒都目司徒總領綱紀故有都目一引其紀萬目皆起一引其綱萬目皆張都即數之凡目乃數之目也有要而後有凡有凡而後有目有目而後有數尊者治約卑者治詳有形埓者人皆見之有篇籍者世共傳之所謂數也釋數而任智者窮弃數而用才者凶數出於道道出於天王者體天而數立百官守數而道存衍而廣焉三百三千反而歸於一協於極隨牛𢎞嘗問劉炫曰周官士多而府史少今令史百倍於前而益不治何也炫曰古人委任責成嵗終課殿最案不重校文不繁悉府史之掌要目而已今之文簿常慮覆治煆煉甚密萬里追證百年舊案故諺曰老吏抱案死古今若此之相懸也而唐張九齡亦云吏部條章動盈千萬刀筆之吏辨析毫釐胥徒之猾緣隙而起然則要凡目數古得之簡今失之繁地官質人凡治質劑者國中十旬郊二旬野三旬都三月邦國朞期內聽期外不聽所以絶民之爭訟且息文書也故邦國雖遙以朞為斷安得有百年不決之案乎府掌契史掌書徒掌令皆有專主獨胥掌叙若無所專契以治藏書以贊治令以徵召皆有職事獨叙以治叙若無所職何也康成讀胥為諝有才智之稱賈公彥則謂易有歸妹以須天文有須女屈原之姊名女須胥與須通康成亦以注易矣愚案說文胥作匹或曰胥字其象為足其義則記也從爻從則為為疏皆疏通之義古文詩大雅作大匹樂官有大胥蓋以此詩云以雅以南文王世子云胥鼓南然則雅與胥通也故爾雅一作爾匹天之道地之理人之紀無不疏通故曰胥胥者雅也正也訓也訓其文正其名以合於雅乃得其叙事得其叙之謂訓而大行人諭書名聽聲音則屬瞽史諭言語協辭命則屬象胥吾儒詁訓之學皆從此出焉樂正授數司成論說非是則不能通也是故先王之世在官有學古之吏在朝有道古之儒攸叙者倫時叙者罰惟叙者功萬事萬物各有秩叙而不亂及周之衰淫文破典則有孔子雅言以正之其道得以復明而詁訓之師授受不絶猶古之象胥也秦掃而更之滅書簡之文棄先王之語由是青黃變色馬鹿易形事物盡失其叙而天下亂矣契有質要契之叙也書有凡數書之叙也令有甲乙令之叙也胥得兼之故若無所職無所專而有才智之稱日月以叙時載辭以叙信五物以叙事百物以叙財十輝以叙降兩旌以叙和三市以叙地九嬪以叙御凡事皆有叙而官吏之六叙以正羣吏者胥實治之而閭胥掌觥市胥執度大胥正舞位小胥正樂縣象胥傳言協禮雖有才智不亂舊章荀子曰法則度量刑辟圖籍不知其義謹守其數父子相傳不敢損益王公持之百吏守之以取祿秩焉所謂叙也是故其人雖亡法存故府維胥叙之各得其所羣雅之材一百有五道備後王事從先古典論曰劉表諸子好酒造三爵大曰伯雅中曰仲雅小曰季雅案雅一作㿿方言曰㿿杯也秦晉之郊謂之㿿郭注云所謂伯㿿者也伯㿿即伯雅則大胥小胥即大雅小雅明矣詩曰籩豆有且侯氏宴胥太元曰不宴不雅禮樂廢也然則宴胥猶宴雅歟宰夫八職曰治要曰治凡曰治目曰治數曰治藏曰贊治曰治叙曰徵令獨令曰徵餘皆曰治及贊而已康成謂徵令趨走給召呼非也徵令者小司徒行之司書逆而考之皆國之政教而以召呼當之誤矣宰夫掌禁令及百官府之徵令而叙羣吏之治故以治叙委之胥徵令委之徒徵令者傳王之令也韓非曰當世之行事都丞之下徵令者奉君令詔卿相不辟尊貴不就卑賤然則戰國徵令以都丞猶周之徒也案晉有都令史八人與左右丞總知都臺事梁置五人謂之五都令史總領衆局方軌二丞故曰都丞其名起於戰國即漢之令史能通蒼頡史籀篇者補之其職主書後世改用士流始重其選在周則府史胥徒而巳都丞雖卑令史雖賤而以之徵令則令之行也猶雷風之鼓萬物也是故出之王為命內史書之大僕與小臣出入之藏之官為令御史贊書之宰夫與其徒掌而徵之徵猶召也若後世尚書召板徵猶神也莊子曰明者為使神者徵之言無往而不應也是故節為徵信命為徵令徵令猶申令也申令振鐸夏有遒人遒人徇于路徒從小宰狥於朝鄉師職云凡四時之徵令有常者以木鐸徇於市朝大喪宫正授廬舍辨其親疏貴賤之居荀子曰吉事尚尊喪事尚親故欲辨貴賤先辨親疏既序親疏又分貴賤同一居廬或宫或袒或隱或顯貴非人君則袒之親非適子則隱之尚親而兼尚尊也書云髙宗諒隂諒讀為梁隂一作暗范宣曰所以知諒暗為凶廬禮葬為柱楣楣則梁也葛洪曰橫一木長梁於東墉下著地以草被之既葬則翦去草以短柱柱起長梁謂之柱楣楣一名梁既葬泥之障以避風康成讀暗若鶉䳺之䳺烏南反暗謂廬也廬有梁謂之楣卒哭之後翦屏拄楣故曰諒暗愚謂古之暗今之庵也釋名云草屋曰蒲又謂之庵庵掩也所以自覆掩也誅茅為屋謂之翦屏非庵而何庵讀為隂猶南讀為任古今異音廣雅庵與廬皆舍也倚廬不塗既葬塗廬塗近乎堊釋名云堊亞也次也先泥之次乃飾以白灰康成謂堊室者屋下壘墼為之蓋柱楣倚壁為一偏壘墼成屋為兩下然則既葬塗之既練壘之加堊既祥又加黝總謂之廬故尚書大傳曰髙宗有親喪居廬三年此之謂也唐禮小祥毁廬為堊室堊猶廬也焉用毁哉然則大夫居廬士居堊室何也曰非親且貴者不廬廬嚴者也不言不笑謂之嚴百官備百物具不言而事行非親且貴者乎言而後事行及身自執事者皆不廬故曰大夫居廬士居堊室言士疏且賤必身自執事而後行者故不廬也說者謂朝廷之士居廬服斬都邑之士居堊制周失之矣孔安國以髙宗三年不言故曲為之說曰諒信也隂默也古訓兼音義以信默訓諒隂似失其音何晏集解弃鄭取孔杜預遵之遂謂人君既葬不居廬以此注春秋左傳豈非春秋之罪人乎白虎通曰婦人不居廬天子七日諸侯五日卿大夫三日而成服居中門外東壁為廬司服職云凡喪為天王斬衰親疏貴賤一也周之東遷威德不加於四海於是有諸侯之大夫為天子繐衰既葬而除之禮婦為舅齊衰而子柳使其妻繐衰當時皆以為非禮矣諸侯之大夫亦以之服至尊而謂之禮則愚未敢信釋名云繐惠也齊人謂涼為惠言服之輕細涼惠也以輕涼之服服至尊蓋自衰周始縣子曰綌衰繐裳非古也宮伯之士庶子宫正之衆寡內宰之人民一也凡在版者行其秩叙作其徒役月終則均秩嵗終則均叙猶漢之衛卒唐之府兵也漢之衛卒每一嵗而更師古音工衡反更猶今之上番衛司馬掌之每當交代天子行幸曲臺臨饗而罷焉唐之府兵宿衛者皆番上兵部以逺近給番自五百里為五番至二千里為十二番皆月上然則月中均秩者猶府兵之月上嵗終均叙者猶衛卒之嵗更蓋番上更休皆有秩叙各得其均地官鄉有均人主徒役謂之公旬旬猶均也三年大比則大均故春官有大均之禮以恤衆論語為力不同科馬融曰為力者力役之事有上中下三科謂嵗有豐凶地有逺近時有久暫周衰政失力役不均故孔子傷之公旬之有均也力役之有科也鄉師作秩叙作以此宫伯行秩叙行以此歟古者兵出於民容民畜衆謂之師故曰夫家衆寡又曰人民虎賁掌虎士司右掌勇力之士皆人民也入則衛於宫出則耕於野三時不害而兵亦足其秀者糾其德行教之道藝皆彬彬乎有儒者之風其桀者去其淫怠斥其竒邪而無勇悍不馴之氣宫正為之版籍其名內宰為之圖畫其象邦有大事作而令之是為王之爪牙及宣王之末六鄉之士不滿六軍乃取王之爪牙以充之由是調發轉移不以其地畨役更代不以其時至不能養其父母而祈父之刺興矣祈父主封圻宫伯主宫殿父猶伯也王之爪牙謂士庶子之守城郭者靡所止居靡所底止言秩叙之不均也然則祈父蓋夏官之掌固與古者卒謂之士庶子猶餘子也呂覽齊晉相與戰平阿餘子得㦸亡矛說苑佛肸以中牟叛城北餘子袪衣入鼎戰國䇿燕趙久相攻餘子之力盡於溝壘古之鬬士皆曰餘子周書曰成年餘子務藝儉年餘子務穯大荒餘子倅運蓋即九職之閒民宫正所教宫伯所作之士庶子說者以為公卿大夫之子豈其然乎秦爵有公士越軍有教士楚師有都君子說者謂公士乃有爵之步卒教士乃教練之精兵近乎周之士庶子都君子乃都邑之士君所子養而有復除近乎周之國子故國子則授之車甲司馬弗征而士庶子則猶有徒役之事焉或衛王宫或守城郭或屬都家王宫有糾禁城郭有守政都家有戒令蓋皆以秩叙行之者也有卿大夫之庶子有民之庶子卿大夫之庶子為國子逰倅之所存民之庶子為國粥餘閒之所養而衛王宫守城郭屬都家謂之士庶子軍行則從嵗終則饗有功則勞死則弔焉蓋所謂國粥歟而朝大夫都則之庶子在府史之下則胥之職也而以卿大夫之子為之則胥非賤吏可知矣趙左師觸龍願以其少子補黑衣之缺以衛王宫則知戰國時衛王宫者皆卿大夫之庶子即夏官諸子職所謂國有大事則帥國子而致於太子文王世子篇所謂公若有出疆之政庶子以公族之無事者守於公宫公族之無事者國之貴遊子弟也王之庶子眂列國之大夫王充曰吏衣黑衣宫闕赤單然則漢之衛卒皆服絳禪衣矣周尚赤蓋亦服赤歟莊子秋水篇有夀陵餘子司馬彪云餘子未應丁夫蓋謂閒民也管子問篇曰餘子仕而有田者今入幾何人餘子之勝甲兵有行伍者幾何人然則閒民者非餘子之未仕而無田亦無行伍者乎呂覽報更篇曰張儀魏氏餘子也平阿夀陵魏氏皆地名則餘子為閒民信矣古曰餘子漢曰分子洪氏𨽻釋載北海相碑梟梟不鳴分子還飬耿勳碑修治狹道分子效力義井碑隂稱分子者六十人蓋家之餘子壯則出分故曰分子古之閒民也晉夏仲御别傳自稱會稽北海閒民明閒民即漢之分子矣膳人職王卒食以樂徹於造大祝職注云故書造作竈然則古文造竈通矣吳越春秋勒馬銜枚出火于造暗行而進案造吳語作竈所謂係馬舌出火竈龜䇿傳灼鑽之處亦以造名注造音竈本此玉藻天子皮辨以食日中而餕諸侯朝服以食夕深衣注云餕者食朝之餘天子言日中諸侯言日夕互相挾故王卒食則徹於竈以便燅溫而供日中及夕之餕也賈疏謂徹於造者不重進失之矣以樂徹者荀子曰天子曼而饋雍而徹淮南子曰鼛鼓而食奏雍而徹鼛鼓者王大食之所奏也古者人君食皆用當月之調以取時律之聲使不失五常之性調暢四體令得四氣之和故天子食飲必順四時有食舉樂所以順天地養神明說者謂徹饌奏雍津潤已竭其不然乎雍和也奚其竭白虎通曰平旦食少陽之始也晝食太陽之始也餔食少隂之始也暮食太隂之始也是為四飯樂者德音功成乃作以之侑食者明天子至尊非功不食非德不飽王日一舉者康成云朝食也謂王日四飯惟朝一舉日中及夕皆餕其餘齊日三舉者旦也晝也餔也司農云齊必變食變者改常饌更而新之潔清其氣而已賈疏謂三舉者三太牢亦失之五穀者民所仰君所飬故五穀盡升則五味盡御于王不盡升則不盡御一穀不升謂之饉二穀不升謂之旱三穀不升謂之凶四穀不升謂之餽五穀不升謂之饑凶饑存乎國人君徹鼎食大荒不舉者凶饑也一穀不升徹鶉鷃二穀不升徹鳧雁三穀不升徹雉兔四穀不升損囿獸五穀不升不備三牲玉藻朔日太牢朔日猶齊日也視朔朝廟必齊賈疏謂朔日當兩太牢膳夫職文不具則又何據而云然也大喪謂后世子之喪春秋晉荀躒如周葬穆后既葬而宴宴必奏樂故曰宴樂叔向以為非禮則晉悼公既葬平公與諸侯宴於溫魯小君穆姜既葬襄公與晉侯宴於河上其為非禮益顯矣愚謂言大喪則兼包小喪王為三公六卿錫衰諸侯緦衰大夫士疑衰皆小喪也子卯尚稷食菜羮王服衰而殺牲盛饌有是理乎則小喪亦不舉可知也大司樂諸侯薨令去樂大臣死令弛縣廛人職凡珍異之有滯者斂而入於膳府注云珍異四時食物久則瘦臞臞一作臞音稍腐敗故買之入膳夫之府所以紓民事而官不失實愚謂膳夫掌肉修之頒賜廛人斂而入於膳府者所以供王之頒賜也大宰掌九式必有分頒內饔選百羞不忘好賜皆所以恤下推恩故饗飲之禮觴不下遍君不嘗羞殽不下浹上不舉樂由余曰乾米不腐則左右親芭苴時有筐篚時至則羣臣附官無蔚藏腌陳時發則戴其上故禮國有饑人人主不飱所謂珍異之有滯者皆腌陳之物以時斂而發之則官無蔚藏而澤亦得下流焉是以祭必有餕尸餕神餘臣餕君餘賤餕貴餘下餕上餘上有大澤惠必及下輝胞翟閽至賤之吏皆得食其餘則境內之民必無凍餒者矣世稱中山以羊羮亡國非也饗士大夫而羊羮不及其司馬貴者且猶不及况其賤者乎則境內必多凍餒之民可知也民多凍餒國焉得不亡晏子之魯朝食有豚晏子曰去其二肩去藏也及晝進膳則豚肩不具侍者曰亡之矣我能得其人晏子曰止吾聞藏餘不分則民盜豚肩雖小漫藏之招也故積多不能分謂之吝吝列四惡古者聘賔歸甕餼朌肉及瘦車言以分人無不辨也曽謂晏子未聞禮乎鄉師以歲時巡國及野而賙萬物之囏厄凡有天災民病司救又持節巡行而以王命施惠晉之復霸也上無滯積下無困人闔廬治吳天有菑癘親巡孤寡共其乏困說者以為小惠然皆本於周官牛膏膷犬膏臊雞膏腥羊膏羶鄭說則然晏子春秋曰食魚無反惡其鱢也說文引周禮膳膏鱢凡鮏鱢從魚者皆言魚則許氏以膏鱢為魚膏矣又勝臊以肉者為犬豕犬膏臭勝豕膏臭臊鄭司農如之杜子春反之皆言犬豕獨康成謂雞膏勝以為雞屬木秋木休廢犢麛物成而充得氣尤盛故用休廢之脂膏為膳其說不知出何書也又腥從星音穌佞切與勝從生音桑經切者不同腥謂星見食豕令肉中生小息肉康成亦云肉有如米者似星今驗之良然則腥乃豕肉之不可食者膳膏腥當作勝俗通作腥流傳已久不可復正矣呂覽云三羣之蟲水居者腥肉玃者臊草食者羶滅腥去臊除羶必以其勝繁露亦云凡物乘泰而生厭勝而死飲食臭味亦有所勝有所不勝不可不察薺以冬美甘勝寒芬以夏成苦勝暑得天地之美而四時和蓋其法掌於食醫者歟月令五臭無臊故春臭羶內經五臭無羶故春臭臊則臊類於羶也繁露夏祭先亨商祭先臊則又勝臊同類矣月令冬臭朽內經冬臭腐說文朽作腐也腐之言無也氣若有若無為或從木獨秋臭腥故秋膏腥月令內經與周官皆合蔡雍注月令以為十二辰之禽五時所食者家人所畜丑牛未羊戍犬酉雞亥豕而已春木勝土故春食未羊夏火勝金故夏食酉雞季夏土勝水當食豕而食牛者四行之甡無足以配土德故季夏食牛秋金勝木而虎屬寅冬水勝火而馬屬午虎非可食而禮不以馬為牲犬豕無角其類也故以其類為食焉麥為木菽為金麻為火黍為水各配其牲雖有此說而米鹽精粹不合於易卦之禽及洪範傳五事之畜近似卜筮之術故豫略之愚案十二辰之禽先儒無說大司馬喪祭奉詔馬牲則馬亦牲也而云禮不以為牲豈膳夫六牲獨無馬歟淮南子禾春生秋死豆夏生冬死麥秋生夏死則又以菽為火麥為金康成謂黍為火麻為金菽為水稷為土麥為木木雞火羊土牛金犬水豕孔氏以為隂陽取象多塗故午為馬酉為雞不可一定也賈氏亦引易說太山失金雞西嶽亡玉羊則羊屬火又屬金矣古有乘馬有食馬穆天子傳獻食馬三百是也食無馬牲自秦漢始易林曰三年生狗以戍為母又曰黃獹生狗白戍為母是金犬生於戌土推之十二禽皆然許叔重曰古文亥為豕與豕同則十二辰之禽起於古矣甸師祭祀共蕭茅鄭大夫云蕭或為莤讀作縮束茅立之祭前沃酒其上酒滲下去若神飲之故謂之縮縮滲也案縮說文作莤云禮祭束茅加於祼圭而灌鬯酒是為莤象神歆之也其說與鄭大夫同而引左傳爾貢包茅不入王祭不供無以莤酒為證然則縮酒縮酌皆當作莤以酉從草義見乎文假借作縮音是而義非矣夫茅牡藗而秀􅺁其根荺綯為索漚為菅束為屯表為蕝覆地曰藉封土曰蒩苫屋曰茨束矢曰握蓋鼎曰冪或折以卜或以招或以為旌或以為屏花赤者藑毛刺者菁三脊者靈及其用之於祭也其名二曰苴曰莤其義三曰藉曰湑曰灌藉也者祭以之承也湑也者酒以之清也灌也者神以之歆也包于匭藏于館實于篚苴不兼莤莤得兼苴士以上祭皆用苴非天子不名莤王祭不供聲罪討之正其名也杜子春破莤為蕭失之矣艾蕭何物而居其上乎或曰莤讀為蕭猶簫讀為蕭則合蕭茅為一物矣豈其然愚謂其音同其物異地員篇曰蕭下於薜薛下於萑萑下於茅鱉人掌取互物以時簎魚鱉龜蜃凡貍物鄭司農謂簎者以杈刺泥中摶取之愚案說文簎刺也說本司農魯語作矠矠魚鱉以為夏稿莊子作擉冬則擉鱉於江列子作籍牢籍庖厨之物韋昭謂矠􅝷也殷敬順釋文謂籍本作簎以木竹圍繞而刺之簎讀為棚棚木欄也愚案說林訓者扣舟謂積柴水中魚聞扣舟聲藏柴下擁而取之周頌所謂潛爾匹所謂槮簎非非槮乃西京賦所謂叉蔟之所攙捔簇與簎音義同楚角蒼獨二切東京賦云玳瑁不蔟謂貍物也秋官有硩蔟氏蔟謂叉取之司農讀為爵蔟之蔟蔟謂巢鳥之巢猶魚之穴故取之之名同挺叉來往似無柵欄列子牢籍亦非貍物殷說誤矣司農云互物謂有甲䓣胡胡猶互也見釋名䓣猶曼也互物之甲歙張開闔其狀曼曼然故曰䓣胡修螷圜蠇其類皆然月令其蟲介髙誘注曰介甲也象冬閉固皮漫胡也䓣曼漫音同義亦通互一作沍左傳固隂沍寒沍一作涸讀為互言閉之固也戰國䇿蚌方出曬鷸啄其肉蚌合而箝其喙鷸曰今日不兩明日不兩即有死蚌兩開也開為兩閉為䓣康成謂貍物鱴刀含漿之屬釋魚云鮤鱴刀蚌含漿案鱴刀鮆魚也一名刀魚飲而不食九江有之貍藏之物其出以時蓋謂魚之貍者多此類不獨龜蜃為然含漿乃蛤耳非與魚同類其為貍物則一也賈疏失之一說簎與㧻通曹大家東征賦椓蠡陳思王遷都賦椓蠡䖿皆謂取互物也椓一作涿秋官有壺涿氏其官掌除水蟲與鱉人皆下士一除之一取之凡邦之簎事二官兼掌之者歟康成謂涿擊之也故書涿為獨司農讀為濁音與涿近書亦或為濁愚謂濁與擉音同古文通簎蔟㧻擉文雖異而音義皆同也地名涿鹿一名濁鹿索隱曰古今字異戰國䇿不兩或誤為不雨春秋後語以其音不諧遂更之曰今日不雨明日不雨必見蚌脯其可笑如此癘疾者四時之鬱氣也川鬱為汚樹鬱為蠧草鬱為蕢氣鬱為癘木鬱發於春火與土鬱發於夏金鬱發於秋水鬱發於冬是謂癘疾春氣在頭故病痟首其病有端三陽受寒伏留不去頭痛員員入連在腦腦逆而酸說文酸痟頭痛所謂痟首疾也寒凉者脹溫熱者瘡故夏病癢疥風行脉窬肌膚憤䐜散於分肉肉有不仁所謂癢疥疾也金肺受邪形弱氣爍一觸秋金遂成風瘧身之衛氣日夜循行邪客風府與衛交爭故有瘧寒疾也陽氣不藏故冬病咳五行傳謂咳者口舌痾木沴金非也四時皆有之月令夏多咳心與脾咳也周官冬有嗽腎咳也隂下陽上諸陽上浮氣逆而喘無所歸休故有嗽上氣疾也形不足者溫以氣精不足者補以味或收使斂或散使宣緩急燥潤或耎或堅贊其運氣資其化原而五穀得天地之和其味尤美而完焉故食嵗穀以安其氣全其真食間穀以去其邪保其精而病有久新方有大小藥有厚薄惡石氣徑必伐天和芳草氣美其毒滋多不輕服也佐以所宜以平為期毋增其氣氣增而偏偏則受傷夭絶天年所謂以五味五榖五藥飬其病者如此時氣為客藏氣為主胃氣為宗精氣為滎悍氣為衛邪氣為淫主客平則氣和滎衛通則氣順歸於其宗邪淫自正反是乃病感邪則甚氣有所積有所聚積氣為隂隂伏而沉不離其經聚氣為陽上下無常莫知其鄉麗於形流於血氣血離居形氣相失肺氣絶尺澤竭心氣絶神門閉必結反肝氣絶大衝歇腎氣絶大溪泄胃氣絶衝陽滅故動氣而知其藏也所謂以五氣視其死生者如此五聲者氣之籥五色者氣之華也角聲為呼徵聲為笑宫聲為歌商聲為哭羽聲為呻心為噫肝為語腎為缺為嚏胃為噦肺為咳聲微者氣奪聲不發者氣濕語言不擇者氣亂聲嘶者弦絶聲喝一介反者病深故聞而知之者醫之聖也所謂以五聲視其死生者如此色之見也有淺有深病輕者見淺有枯有澤內敗者色枯黃赤為熱白為寒青黑為痛黃如枳實青如草兹赤如衃血白如枯骨黑如炲此五色之見死也黃如蟹腹青如翠羽赤如雞冠白如豕膏黑如鳥羽此五色之見生也所謂以五色視其生死者如此蒼主肝竅於目赤主心竅於耳白主肺竅於鼻黑主腎竅於隂黃主胃竅於口見淮南子一說腎竅耳心竅舌舌非竅也故以耳屬心焉是謂九竅蓋精神之戶牖外為表而內為裏開閉張歙各有經紀則所謂變者可知也人身有三部部有三候上部胸至頭中部膈至臍下部臍至足三部各有天地人三三而九神藏五形藏四合為九藏故曰平八索建九紀八索者八體首也腹也足也股也目也口也耳也手也九紀者九藏頭角也耳目也口齒也肺也心也胸也肝也脾胃也腎也精其術者以九竅之變九藏之動與五氣五聲五色兩而參之魏文侯問扁鵲曰子兄弟三人孰最善為醫扁鵲曰長兄最善中兄次之扁鵲為下魏文侯曰可得聞乎扁鵲曰長兄於病視神未有形而除之故名不出於家中兄治病其在毫毛故名不出於閭若扁鵲者鑱血脉投毒藥副肌膚而名出聞於諸侯侯讀為胡與家閭同音魏文侯曰善說者謂上醫視神中醫視氣下醫視色非也凡物有氣而後有神有神而後有色神者氣色之精集於珠玉為光明兩而參之不言神而神在其中矣抑又聞之四時之沴氣關乎政令而以德化為轉移故曰政令者氣之章德化者氣之祥災眚者傷之始變易者復之紀醫術也其通於天道者乎管子酸主脾鹹主肺辛主腎苦主肝甘主心五藏具而後生肉脾生膈肺生骨腎生腦肝生革心生肉五肉已具而後發為九竅脾發為鼻肝發為目腎發為耳肺發為口心發為舌所謂神藏五者肝藏魂心藏神脾藏意肺藏魄腎藏志也一說五藏有七神謂脾藏意與智腎藏志與精并三藏為七府有六而三焦一府主持諸氣有名無形不屬五藏三陽在頭故受寒則頭痛呂氏春秋曰鬱處頭則為腫為風瘍醫療瘍以五氣飬之注云五氣當作五穀非也史記軒轅治五氣說本內經岐伯曰天食人以五氣地食人以五味五氣入鼻藏於心肺五味入口藏於腸胃味有所藏以飬五氣氣和而生津液相成神乃自生五色修明音聲能彰此五氣之和使然也五氣不和結為五鬱不發不泄其氣外溢肉潰皮拆面目浮腫肌腠瘡瘍五色不明五聲不彰此五氣之沴使然也故療瘍者抑其運氣贊所不勝折其鬱氣先取化源同天氣者以寒清化同地氣者以溫熱化無犯司氣無犯間氣氣之上下為司左右為間司氣以紀嵗間氣以紀時先時而至為有餘命曰氣淫後時不至為不及命曰氣迫氣之勝也微者隨之甚者制之氣之復也和者平之㬥者奪之安其主客適其寒溫佐以所利資以所生是為得氣無失病機謹候氣宜不可過之以平為期此非以五氣飬之之法歟春氣在左秋氣在右夏氣在前冬氣在後長夏氣在中至髙之地冬氣常在至下之地春氣常在必謹察之是故五氣不明五治不分失時反候邪僻內生工不能禁也氣有六而云五者少陽與少隂同法厥隂少隂少陽太隂陽明太陽為六氣瘍醫祝藥康成云祝當為注讀如注病之注釋名云注病一人死一人復得氣相灌注也古文假借多取音同函人甲屬匠人水屬注皆云屬讀為注音同古文通左傳韎韋之跗注賈服皆云注屬也是左傳之注即函人之屬故荀子注纊注一作絰注與屬同義離騷奔屬屬與注同音學者不明六書乃謂康成好破字不亦異乎氣相灌注謂之祝藥不獨瘍醫為然墨子非攻中篇曰今有醫於此和合其祝藥之於天下之有病者而藥之萬人食此若醫四五人得利焉猶謂之非行藥也故孝子不以食其親忠臣不以食其君然則祝藥猶行藥也王半山以為祝由誤矣刪本墨子無祝字宋人以意刪出之祝藥劀殺瘍醫之術太元從之次七曰拂其惡從其淑雄黃食肉測曰拂惡從淑救凶也達之次七曰逹于砭割前亡後賴測曰達于砭割終以不廢也此言瘍醫之術甚精劀殺猶砭割注藥以食其肉惡去而善生前雖亡後實賴之以此救凶終以不廢內經癰瘍宜砭石古者以石為針謂之砭劀以砭殺以藥是為劑釋名曰州注也郡國所注仰也古州與祝同音故皆讀為注史記索隱注云注音丁救反御覽引釋名注病作疰祝由說文作祝音相近也禮說卷一
