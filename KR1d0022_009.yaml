body:
  text: 禮説巻九翰林院侍講惠士竒撰春官四小祝及葬設道齎之奠杜子春曰道中祭也漢儀每街路輙祭賈公彦云禮道中無祭法非也荀子曰郊止乎天子社至於諸侯道及士大夫道行神士大夫亦得祭焉説文道上祭謂之禓一曰道神禓或作場國語壇場之所孔注云場祭道神是古道中有祭矣天漢二年止禁巫祠道中者文頴曰漢家於道中祠排禍咎移之於行人百姓師古曰非也祕祝移過文帝久已除之愚謂小祝有道齎之奠則其禮非起於漢也喪事甸師代王受眚災小祝設奠大祝讀禱豈非排禍於人移過於下乎乃知古者相沿之禮俗雖先王亦不能盡除文帝除之武帝禁之其識卓矣康成㠯道祭為遣奠豈其然乎哀帝時董賢母病長安厨給祠具道中過者皆飲食如淳曰禱於道中故行人皆得飲食然則武帝雖禁之而其後仍不絶也一説諸侯適天子道而出注云祖道禮有出祖天子之出也亦如之其葬也亦如之喪禮躐行行神之位在廟門外西方行者七祀之一祭行兼及霤門户竈故曰分禱五祀王七祀而五者康成謂司命大厲平生出入不以告説者云祈請道神謂之祖有事於道者君子行役則列之於中路喪者將遷則設之於階庭見後魏志甸祝禂牲禂馬為牲祭求充為馬祭求健康成讀禂為侏音朱大也莫知其説賈公彦謂俗讀則然而漢時人傍侏為侏大義取肥意學者惑焉案揚雄國三老箴曰負乘覆餗姦寇侏張侏張猶張大也左傳張我三軍史記陳涉自立為王號為張楚張而大之故曰侏張文選李善注云侏張即輈張輈與侏古字通得之而㠯侏張為驚懼之貌失之周書譸張為幻猶詩所謂哆侈成箕哆大貌侈者因物而益大之名禮有侈袂半而益一侏者侈也故訓為大侜侏譸輈皆通無為有虚為盈約為泰謂之譸張譸張者其情難知故為幻哆侈者其形不測故成箕其情其形皆張而大之之義初無有驚懼之説在其間也則又何説而訓為驚懼哉晉書苻堅報慕容垂曰侏張幽顯布毒存亡宋書葢吳表曰玁狁侏張侵暴中國魏書趙修傳曰擅威弄勢侏張不已島夷傳曰桓元侏張則侏張非驚懼也太元曰修侏侏比于朱儒侏侏長大貌言雖長大與朱儒等又曰陽去其隂隂去其陽物咸倜倡倜與侏同從周從朱等耳周與朱古音同倜倡言大而盛也則侏訓為大明矣祭祀則司巫共匰主及道布杜子春云道布新布三尺或曰布者㠯為席康成謂道布者為神所設巾中霤禮曰以功布為道布屬于几案封禪書有諸布索隐引尒疋祭星曰布非也大祝六號一曰神號二曰鬼號三曰示號布者鬼號也秦漢之布即周官之酺淮南子曰禹勞天下而死為社后稷作稼穡而死為稷羿除天下之害而死為宗布此鬼神之所㠯立立者為之立號或立為社或立為稷或立為布布猶酺也步也族師祭酺校人祭步所謂布也巫掌其禮酺步布音相近而通然則道布即宗布歟祭必有主故因匰主而連及之蝝螟之酺人鬼之步皆除天下之害者也蓋起於周而秦漢因焉幂人布巾疏畫皆黼莊子所謂盛㠯篋衍巾㠯文繡篋衍笥也即盛主之匰覆之㠯巾亦曰道布幂人共之非司巫之職也士喪禮商祝執功布注云執之㠯接神為有所拂仿拂仿者去凶邪之氣説林訓曹氏之裂布注云楚人名命為曹俗祭司命㠯始織布繫著其旁謂之曹布風俗通云俗取新斷織夏至㠯繋户亦此類葢布者鬼號故或執之㠯接神或繫之㠯迎神功布道布宗布曹布名異而實同也祭祀蒩舘司巫共之康成引士虞禮苴實于篚刌之而饌於坫上洗之而設於几東説者㠯為籍祭之物而祭之用蒩非徒籍祭而已志六穀之名謂之幟即肆師之表齍盛也䕶羣神之位謂之旌即左傳之羣屏攝也皆㠯蒩為之一共之鄉師一共之甸師而師巫共館所謂包匭菁茅故館一作包然則茅之為物薄而其用也重矣春秋楚子入鄭鄭伯肉袒左執茅旌右執鸞刀皆宗廟之器蓋㠯宗廟將不血食歸首於楚㠯為不如是不足㠯感動仁人孝子之心也何休曰茅旌宗廟所用迎道神指䕶祭者斷曰籍不斷曰旌用茅者取其心理順一自本而暢於末所㠯通精誠副至意其説近是鄭衆亦云屏攝攝束茅㠯為屏蔽獨韋昭㠯屏為屏風攝為要扇説本康成翣㠯木衣布其形如襵漢之扇也葬則置於牆遂謂宗廟亦然或未聞于古一説蒩館葢糈籍也糈與蒩同籍之㠯館是為蒩館淮南子曰巫用糈籍中山經曰糈用五種之精離騷注糈精米是也云㠯享神似非古者卜或用茅或用糈故靈氛占㠯茅巫咸要㠯糈詩曰握粟出卜管子曰守龜不兆握粟而筮者屢中然則精米古用㠯卜矣莊子所謂鼓筴播精也播精一作播糈音所見文選注鼓筴揲蓍播糈卜卦鼔之播之皆卜之之法其法用六六觚為一握故曰握粟日者列傳云卜有不審不見奪糈此卜㠯糈之明文合觀衆説非徒享神也祭祀必卜故巫共之算經曰粟從六甲出故六粟為一圭卜用六者㠯此楚辭啓匱探筴注云𤼵匣引籌今之匣古之館也一説糈與䝪通説文齎財卜問為䝪古㠯米為財故其文或從貝或從米皆㠯疋得聲讀若所握粟猶齎財也凡祭祀司巫守瘞注謂祭地祗埋牲玉守之者祭未畢畢則去之鄭志張逸問五嶽血祭山川埋沉不審五嶽當埋否答曰五嶽始於血何嫌不埋則血祭皆埋矣尒疋祭山曰庪縣不言埋張逸亦引㠯問答曰尒疋之文雜不可據㠯難周官也校人玉人注皆云祈沈㠯馬孔頴逹引之作庪沈釋文亦讀祈為庪九委反集韻作枝云祭山名蓋祈誤為枝耳邢昺云庪謂埋藏即大宋伯貍沈之禮孔頴達謂庪非埋郭景純亦云或庪或縣迄無定論康成所謂雜者㠯此詩鳧鷖箋云潨水外之髙有瘞埋之象疏因謂祭川既沈而復埋之誤矣昭公二十四年冬十月癸酉王子朝用成周之寳珪於河甲戌津人得之河上沉而自出言神不歆其祭也安得有沉而復埋之説乎瘞者禮云瘞繪李巡謂埋玉則玉帛及牲皆瘞可知孫炎曰既祭埋之康成謂守瘞者祭未畢故孔賈皆謂瘞在祭初不在祭末也南山經瘞用一璋西山經瘞用百瑜北山經瘞用一珪東山經瘞用一璧則瘞即庪審矣中山經曰縣㠯吉玉又曰嬰㠯吉玉則嬰縣皆祭名祭曰縣埋曰庪庪與瘞古文通説文有瘞無庪徐鉉増之贅矣古有瘞玉有祭玉祭玉三璋天子巡守宗祀執㠯先焉既祭藏之不埋廣韻庪又作庪􅍥集韻通作祈凡喪事司巫掌巫降之禮康成謂巫下神之禮今世或死既斂就巫下禓其遺禮蓋人無賢愚皆有魂魄魂魄分去則病盡去則死故分去則術家有録人之法盡去則典禮有招魂之義元命苞曰心者火之精上為張星腎者水之精上為虚危脾者土之精上為北斗故軫星逐鬼張星拘魂東井還魂六微㫖大論曰天符為執法歲位為行令太一天符為貴人中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死此之謂禓禓之言疆也疆死能為神也司巫與神通故掌下神之禮楚人名巫為靈子言靈降其身也離騷九歌皆歌其事九歌湘君云隱思君兮陫側陫側者喪大記甸人取所徹廟之西北厞薪士虞禮設于西北隅厞用席厞與陫同謂西北隅厞隱之處故曰陫側不知神之所在故改設於此庶幾歆饗所謂隱思君兮陫側也西北隅謂之笮笮者側也説者㠯側為不安失之甚矣禓讀為傷俶眞訓曰傷死者其鬼嬈音遶注云善行病􅑂人楚語曰余左執鬼中右執殤宫注云執謂把其録籍制服其身知其居處若今世云能使殤也使殤猶下殤所謂巫降之禮蓋如此或曰巫降者巫咸國在女丑北右手操青蛇左手操赤蛇在登葆山羣巫所從上下也其説誕矣漢司直師丹薦邑子丞相史能使巫下神為國求福則知當時禮俗皆然而杜業㠯為背經術惑左道蓋借此㠯毁師丹非公論也司巫共匰主説文匚府良切受物之器從匚單聲宗廟㠯盛主廣雅匥匰笥也蓋廟有石室室中有祏有匰祏為石函則匰為木笥矣春秋僖十四年𫝊典司宗祏昭十八年傳徙祏於周廟哀十六年傳反祏於貳車曰徙曰反可舉而移則祏非石室也蓋祏謂之函㠯其函主故亦謂之主孔疏有兩説㠯為石室者慮有火災於廟之北壁内為之㠯藏主有事出之既祭納焉而又㠯石室不可舉而移也故變文為石函蓋依杜注而曲為之説則所謂北壁内者其説不攻而自破矣説文云祏宗廟主也周禮有郊宗石室一曰大夫㠯石為主案郊宗石室周禮無文後魏清河王懌議云饋食設主著于逸禮唐人正義據一家之説不旁及異聞康成見少牢饋食不言主遂謂大夫不禘祫故無主孔悝反祏者孔氏所出公之主耳孔頴達謂孔氏姞姓惟南燕孔悝仕衛已久未詳其所出蓋僭為之各㠯意説如此何休注公羊引士虞記曰桑主不文吉主皆刻而諡之蓋為禘祫時别昭穆也案士虞記亦無桑主吉主之文皆出於逸禮宋元豐二年祕閣校禮何洵直言虞禮桑主不文請罷題虞主太常言嘉祐治平虞主亦不題諡焚書之後學者不見全經先儒人人異説又如此坊記子云祭祀之有尸也宗廟之有主也大夫士皆有廟特牲少牢皆有尸有廟有尸而獨無主愚所未達户竈門行祭皆有主出祖釋軷猶㠯菩芻棘柏為神主焉而士大夫之廟反無主束帛依神結茅為菆是何禮也宋元豐三年禮文所言古者宗廟為石室㠯藏主謂之宗祏夫婦一體同几共牢一室之中有左主右主正廟之主各藏四壁遷廟之主藏於太祖廟之北壁其埳去地六尺一寸案漢儀皇后配食於左坐應劭曰坐於左而並食者若禮㠯其妃配右父左母内主西壁麋信注穀梁亦云然衛宏漢舊儀曰已葬收主為木函藏廟太室西壁坎中去地六尺一寸祭則立主於坎下然則主函漢㠯木不㠯石也唐諸臣廟室各為石室一於西墉距地四尺容二主三品㠯上有神主五品㠯上有几筵愚謂盛主之函與藏主之坎同名為祏本於孔疏無主之廟祔㠯几筵依鄭説耳決疑要注曰毁廟主藏廟外户之外西牖之中有石函名曰宗祏函中有笥㠯盛主蓋坎中有祏祏中有匰祏石而匰木其説得之矣公羊曰虞主用桑中山經曰桑封者桑主也方下鋭上中穿而加金男巫望祀旁招㠯茅古者禳皆用茅也齊景公為路寢之臺而鴞鳴其上公惡之臺成而不踊踊上也登也齊人語公羊踊於棓而闚客柏常騫齊之巫也請禳而去之且曰築新室置白茅公如其説築室置茅焉柏常騫夜用事明日使人視之鴞當陛布翌伏地而死矣硩蔟氏掌覆夭鳥之巢㠯方書歲月日辰及二十有八星之號縣其巢上則去之未聞築室置茅且去之而已亦未聞殺之也古有巫毉毉屬天官㠯治疾病巫屬春官㠯事鬼神後世毉存而巫廢其術猶傳於人間方士竊之㠯役使百鬼柏常騫蓋得其術者也既禳鴞而殺之遂欺景公云能益夀而又恐其無徵也是時鈎星在四心之間地當動柏常騫占而知之遂㠯得夀地且動為徵苟非晏子知其術洞其情㠯折之則必為漢之文成五利矣古巫知天道故曰史巫亦曰神士觀天文而知地動得其術者惟東漢張衡其術不傳而遂絶後之方士學不如張平子術不及柏常騫敢為大言㠯欺人主皆庸愚誕妄之尤者歟漢志維星散句星信則地動極後有四星曰句星斗杓後有三星曰維星散者不相從也晉志西河中九星如鈎狀曰鈎星直則地動高誘曰勾星客星也勾星守房心則地動天官書辰星亦然女巫掌歲時袚除釁浴夏小正五月蓄蘭為沐浴也康成謂三月上已如水上賈疏謂三月三日水上戒浴曽㸃暮春浴沂㠯此厯法三月建辰巳卯退除可㠯除災韓詩溱與洧方洹洹兮薛君注云鄭之俗三月上已溱洧之上招魂續魄袚除不祥月令季春始乘舟蔡邕章句謂陽氣和暖禊於名川也漢書八月袚灞上劉楨魯都賦素秋二七人胥袚除又㠯七月十四日矣九歌禮魂會鼓傳芭春蘭秋菊姱女容與者即女巫袚除之禮不獨春三月也素問謂蘭除陳氣菊亦宜然蓋除舊迎新袚除疾病云爾所㠯必之水上者去宿垢灰為大絜古者顓頊浴沉淵舜浴從淵澡身而已燕人惑易浴㠯蘭湯浴之陋也北朝竇泰母娠及期而不産巫曰渡河湔裙産子必易如其言果生泰此古女巫之術歟廟祧黝堊守祧掌之其廟修除職在有司穀梁子曰禮天子諸侯黝堊大夫倉士黈徐邈曰黝黑柱也堊白壁也尒疋地黝而牆堊青邱之山其隂多䨼黝屬也東萊用蛤謂之叉灰堊屬也不獨飾牆與地兼㠯飾楹魯莊丹楹春秋書而非之則廟飾不㠯丹也朱門洞啓當陽之色鬼神尚幽故宜黝堊或曰修除謂埽糞非也士喪禮記所謂朔月執帚垂末内鬛舉席埽室童子為之其事近䙝故埽除糞洒𨽻僕之事似非修除修除者除陳而新之詩曰新廟奕奕奚斯所作箋云修舊曰新奚斯作者教䕶屬功課章程也是為修除公子奚斯大夫也為修除之有司則守祧奄人不得主其事可知矣文十三年世室屋壊久不修也極稱之志不敬也然則修除大禮宗伯主之奄人隂類也故為主黝堊而已或言祧或言廟猶或言宫或言室壞廟之道易檐改塗塗者黝堊易者修除也何休曰易其西北角示昭穆相繼代有所改更何休所謂西北角者即喪大記所謂廟之西北厞薪禮取其廟室笮㠯為死者炊沐案山海經堊非一色黄白青黒故范氏注穀梁黝堊皆黒也韓非子曰殷人四壁堊墀太史正歲年㠯序事康成云中數曰歲朔數曰年朔謂合朔中謂中氣氣盈朔虚而閏生焉内經曰五日謂之候三候謂之氣六氣謂之時四時謂之歲五運相襲周而復始時立氣布如環無端所謂中數曰歲也又曰應天之氣動而不息故五歲而右遷應地之氣静而守位故六期而環會天㠯六為節地㠯五為制周天氣者六期為一備終地紀者五歲為一周五六相合七百二十氣為一紀凡三十歲千四百四十氣凡六十歲而為一周不及太過斯皆見矣氣盈為太過朔虚為不及天行六氣地播五行㠯作民事㠯厚民生事由之序功由之成此太史之職也朔數曰年者或曰四時具為年或曰五穀熟為年春秋編年五穀大熟則書大有年而四時或不具蓋闕文歟白虎通曰三年一閏五年再閏隂不足陽有餘也故讖曰閏者陽之餘二帝曰載三王曰年三載遏宻謂二帝也諒隂三年謂三王也歲者㠯紀氣物帝王共之太元曰歲寧恙而年病十九年七閏滿為寧虚為恙置閏㠯償焉春秋文公六年閏月不告朔公羊子曰天無是月也閏月矣何㠯謂之天無是月非常月也穀梁子曰閏月者附月之餘日積分而成月天子不㠯告朔而喪事不數也左氏獨㠯為非禮且云不告閏朔棄時政也春官太史頒告朔於邦國謂頒十二朔之政於諸侯閏月謂之後月附於前月則後月奉前月之政而行之故閏月之政天子不頒諸侯不告如左氏説則似别有閏月之政天子頒之諸侯不告而後可謂之棄時政也明堂月令曷為止有十二月而無閏月乎且十二月王居堂閏月獨居門非常月也故居門門非堂則閏非正餘分閏位獨紫色䵷聲則謂天無是月也其誰曰不可喪不數閏千古遵行閏不告月諸儒異議愚竊惑焉劉歆㠯為文公元年閏當在十一月後則六年無閏無閏而置閏故曰天無是月左傳元年閏三月故六年有閏失於前遂誤於後是附會左氏而曲為之説也然則春秋何㠯書曰為朝廟書正月謂之朝正餘月謂之朝廟周語謂之月祀周官謂之朝享是禮也告朔乃行何休曰朝者因視朔政爾無政而朝故加猶㠯譏之不言朔者閏月無告朔禮也穀梁子曰天子頒朔於諸侯諸侯受乎禰廟或曰祖廟春秋兩書閏月一為朝廟書一為葬齊景公書魯閏朝廟猶可也齊喪數閏喪禮亡矣故穀梁子曰不正其閏也宣十年夏四月丙辰日食在晦故不言朔則已巳齊侯元卒閏月自明故不書閏此説非是凡日食必在朔不書朔者皆官失之春秋固有在閏月而不書閏者襄二十八年十二月甲寅天王崩乙未楚子昭卒乙未與甲寅相去四十二日蓋閏月也東晉寧康二年博士謝攸孔粲等議㠯為乙未閏月之日不書閏而書十二月明閏非正宜附正之文杜預獨謂乙未日誤者㠯為前年十一月乙亥朔辰在申再失閏頓置兩閏㠯補之前年有兩閏則後年不應復閏故云日誤蓋預之妄如此一年兩閏可乎張齊賢謂閏月王居門是天子雖閏亦告朔康成亦謂閏月聽朔於明堂門還居路寝門終月凡聴朔必㠯特牲告其帝及神配㠯文武非也居門不視朔告帝不於門一説天子頒朔諸侯告朔告朔諸侯之禮也穀梁子曰天子朝日諸侯朝朔玉藻亦云朝日於東聴朔於南此天子每月視朔必先朝日古之禮也後世朝日㠯春分而視朔之禮廢矣時則訓孟春朝於青陽左个仲春朝於青陽太廟季春朝於青陽右个十二月皆然各就其時之堂而朝日焉蓋先朝日後朝廟也五經異義曰閏月不㠯朝者諸侯歲遣大臣之京師受十二月之正還藏於太廟月旦朝馬有司告曰今月當行某正至閏月藂殘餘分之月故不朝經書猶朝是也王大出師太史抱天時與太師同車鄭司農謂太史主抱式㠯知天時處吉凶式即拭也漢書天文郎桉式抱猶桉也顔師古曰式所㠯占時日天文即今之用拭者也龜䇿傳運式定日月分衡度視吉凶徐廣曰式音勑太元曰戴神墨履靈式小司馬云拭之形上圓象天下方法地用之則轉天綱加地之辰故曰旋拭猶運式也蓺文志有羨門式法二十卷其法出於律厯之數而小數家因此㠯為吉凶而行於世焉劉勰曰星筮有占式占者覘也星辰飛伏伺候乃見故曰占式者則也隂陽盈虚五行消息變雖不常稽之有則故曰式筮人九筮三曰筮式筮亦用之不獨占天文也星用占筮用式故曰星筮有占式太祝六辭二命與誄誄乃凶禮命兼吉凶春秋莊元年王使榮叔來錫桓公命杜氏云追命桓公褒稱其徳然則上錫之曰命下讀之曰誄其誄辭則昭七年衛襄公卒王使成簡公弔且追命之曰叔父陟格在我先王之左右㠯佐事上帝余敢忘髙圉亞圉此追命之文杜氏㠯為如今之哀䇿孔疏謂裦徳叙哀載之於䇿將葬賜其家㠯告柩即小史所謂讀誄是也然賜諡讀誄其事相因累其行而為辭因之㠯定諡若不賜諡焉用讀誄乎春秋時但有追命之文未聞賜諡之禮蓋諸侯之無王久矣曲禮曰言諡曰類類猶象也請諡于王象聘問之禮一曰請諡必㠯其實類者類於平生之行言猶告也天子之諡成於天故天子將葬則作諡太師帥瞽而廞諸侯之諡成於天子故諸侯將葬則言諡嗣子遣官而告下不告喪故上不賜諡桓公之錫命也莊公告之可知然既葬而諡已成然後王追錫命非禮也薨而不告則失在魯葬而追命則失在王交譏之許慎云追錫死者非禮也白虎通云臨葬而諡之何因衆㑹欲顯揚之也何休謂生有善行死加善諡桓行惡復追錫之尤悖天道故不言天王然春秋生而錫命曰加之服死而錫命不曰予之諡則諸侯之無王久矣太史賜諡曰小喪小史賜諡曰卿大夫之喪則小喪指諸侯可知也一説大夫將葬而請諡諸侯既葬而言諡曲禮類見與言諡皆既葬乃行存㠯備考魯昭公薨季孫意如欲為惡諡㠯示子孫則君之諡其臣定之矣與楚何㠯異乎説文讄禱也累功徳㠯求福論語云讄曰禱爾于上下神祇又誄諡也諡行之迹也諡㠯誄成故誄訓為諡則似誄必有諡矣然魯莊公誄縣賁父哀公誄尼父未聞有諡康成謂哀公諡仲尼為尼父蓋㠯字為諡賁父尼父皆是也春秋有命而無諡或史氏失其傳歟王充曰諡臣子所誄列也蓋起於春秋則太史不賜諡乆矣白虎通云諸侯薨天子遣大夫㑹其葬而諡之然春秋文元年天王使叔服來㑹葬三𫝊皆無賜諡之文穀梁子曰諡所㠯成徳也於卒事乎加之言事卒於葬故葬乃舉諡亦不言命於天子何休㠯為諸侯薨天子諡之又㠯為祖祭乃諡王者當遣使者與諸侯共㑹之皆疑辭也則天王不賜諡可知矣隱八年無駭卒羽父請諡與族無駭者公子展之孫故公命為展氏請者諡與族而命者惟族而巳未聞更賜之諡也蓋其祖既㠯展為諡其孫因㠯展為族雖賜族不賜諡然一命而二者實兼焉康成之説信矣桓二年宋督殺其君與夷及其大夫孔父穀梁子曰孔氏父字諡也康成之説本此范氏因為之説曰孔父有死難之勲故其君㠯字為諡愚聞君之所不名臣者四諸父諸兄不名先王之臣不名盛徳之士不名孔父先君之臣也孔子盛徳之士也故皆字之而不名古有字諡蓋㠯此春秋惠公仲子僖公成風二君之母也其尊同其禮同一曰仲稱字一曰成稱諡則又不同何也曰皆諡也仲子㠯字諡或云㠯字為諡字當作氏非也羽父請諡與族曷為而改諡為氏乎是失請之之義也少牢饋食皇祖伯某注云伯某且字也大夫或因字為諡春秋傳展氏是也疏云公子展㠯展為諡在春秋前其孫無駭取㠯為族故公命為展氏檀弓魯哀誄孔丘注云誄其行㠯為諡疏云尼則諡也父且字保章氏㠯十有二歲之相觀天下之妖祥康成㠯為歲者太歲也案太歲有兩説一曰咸池一曰歲隂斗杓為小歲左行十二辰咸池為大歲右行四仲終而復始大歲迎者辱背者强左者衰右者昌小歲亦如之東南則生西北則殺大時者咸池小時者月建天元建寅始起右徙一歲而移十二歲而大周天歲星為陽右行大歲為隂左行歲隂所居不可背而可鄉前三後五歲隂前後百事可舉蟄蟲首穴而處鵲巢向而為户歲隂在四仲則歲星行三宿歲隂在四鉤則歲星行二宿四仲謂邜酉子午四面之中四鉤謂丑鉤辰申鉤已寅鉤亥未鉤戌在四角二八十六三四十二徧於二十八宿十二歲而小周天咸池主五穀平秩西成故曰大歲或云咸池即隂陽家所推㠯忌乘航者誤矣咸池日也日出𤾉谷浴於咸池日右斗左揚子太元曰巡乘六甲與斗相逢厯㠯紀歲百穀時雍是為大歲天道十二歲而一終右行四仲者堯典命羲和獨舉四仲各統一時故曰大時仲讀為中書傳曰春張昏中種穀夏火昏中種黍秋虚昏中種麥多昴昏中收歛天子南面而視四方星之中知人緩急㠯授民時則歲功成矣天神之貴者青龍其雌在地太元曰倉靈之雌不同宿而失離則歲之功乖此之謂也大歲或言日或言星日為大歲星為太隂一左一右一隂一陽右與左應隂為陽妃㠯成歲功故曰十有二歲之相相之為言合也合至和也蟄蟲鵲巢皆嚮天一者至和在焉爾六合之間四海之内經之㠯星辰要之㠯大歲六歲一穰六歲一康十二歲㠯為常順之有徳逆之有殃可㠯觀天下之妖祥矣日星同宿謂之合辰歲超一次龍度天門四仲四鉤皆天門也説者謂天門在戌豈其然乎五運行大論曰奎壁角軫天地之門户也西北為天門東南為地户其説本於此郎顗亦云涉厯天門災成戊已注云戌亥之間為天門也詩汜厯樞曰邜酉為革政午亥為革命神在天門出入候聴言神在戌亥為乾方而邜為春門酉為秋門歲星超辰不獨在戌也保章氏觀十有二歲之相察十有二風之和康成謂十二辰皆有風吹律㠯知和否其道亡矣生氣通天論曰夫自古通天者生之本本於隂陽其氣九州九竅五藏十二節皆通乎天氣然則天有十二節之氣故生十二辰之風其理本諸身建諸天地而不悖焉由是先王造為十二律㠯應十二風天地之風氣正則十二律定後世言律者不知風焉知律哉天地之和者尸子所謂太平祥風也其風春為𤼵生夏為長嬴秋為收成冬為安寧四時和為通正此之謂景風亦曰永風反是為乖别管子曰東方曰星其氣曰風風生木與骨其徳喜嬴𤼵出節時柔風乃至百姓夀百蟲蕃此謂星徳星者掌𤼵𤼵為風保章氏掌天星故兼風星主土在地為土在天為星星好雨在地為雨在天為雲分九州之封域辨五雲之祲象其職皆在保章氏育隧出凱風中谷出條風東方曰折來風曰俊北方曰來風曰西北方曰石夷來風曰韋正月有俊風俊者舜也舜風者南風舜作五弦之琴㠯歌之故曰俊風惟號之山其風若劦惟一作雞劦一作䬅三力為同先耕五日瞽奏協風劦猶協也天地之和於是乎協保章氏之所察也或讀劦為戾戾者乖别是為韋風戾相韋背保章氏之所命也非劦之謂失其義矣管如箎六孔十二月之音㠯候十二月之氣氣至則風動風動則吹灰古之制管㠯候氣者所㠯候風也然氣應有早晚灰飛有多少説者謂吹灰不出為衰全出為猛半出為和豈其然風出乎土故候風必於土古有候風地動儀蓋保章之術也虞幕能聴協風㠯成樂物生非所謂察天地之和者乎音官省風省㠯此五行傳曰思心之不容是謂不聖厥咎霿厥罰恒風貌言視聴㠯心為主金木水火㠯土為中雨𤾉寒燠㠯風為本凡思心傷者病土氣土氣病故其罰常風候風而知地動者亦㠯此漢官靈臺待詔有候風十二人又星官有風隅占四隅之風四隅者四鉤并四中為十二風隅角也故一名風角六氣之位土位之下風氣承之故風勝則地動隂陽大論言之詳矣知其説者豈獨張平子乎賈逵服虔皆謂風屬東方説本管子康成據五行傳風為土氣土乃木妃故箕好風東方之木合於中央之土大言之為隂陽小言之為夫婦兩説未嘗相背也孔頴達駮之誤矣且内經亦以風屬東方也隂陽大論又云風承土兩説豈相背乎巽為風為木管子之説本乎易也内史職凡命諸侯及孤卿大夫則䇿命之王制禄則賛為之㠯方出之是命爵㠯䇿出禄㠯方䇿曰簡方曰版案聘記百名㠯上書於䇿不及百名書於方古之名今之字鄭注尚書云一簡之文三十字似不盡然劉向㠯中古文校三家書酒誥脱簡一召誥脱簡二率簡二十五字者脱亦二十五字簡二十二字者脱亦二十二字則一簡不滿三十字矣服虔曰古文篆書一簡八字蓋簡有長短故字有多少歟鄭序論語則云易詩書禮樂春秋䇿皆尺二寸孝經半之論語八寸是䇿有長短也竹牒曰簡編之曰䇿不編曰方齊桓定令削方墨筆薦之於廟而云不及百名則一方不止三十字矣漢制度䇿長二尺短者半之㠯命諸侯王即周内史命諸侯之䇿也三公㠯辠免亦賜䇿而用尺一木兩行選舉亦如之皆版長尺一而手書賜方國一札十行細書成文則似百名以上矣士喪禮書賵於方若九行若七行若五行其數竒未聞其義也古之方猶漢之牘牘者吏所持亦曰簿魏晉謂之手版漢遺單于書㠯尺一牘則與䇿同似非手持之版槧版長三尺笏二尺六寸牘形如笏然笏有正方圓殺貴賤等差而牘無等差不殺其角可執可書則一也周勃下廷尉恐不知置辭獄吏乃書牘背示之昌邑王賀廢居故宫宣帝使山陽大守張敞察其狀賀簪筆持牘趨謁是牘可書兼可執矣漢稱三尺法孟康曰㠯三尺竹簡書法律也鹽鐵論則云二尺四寸之律後漢曹裦制禮寫㠯二尺四寸簡周磐亦云編二尺四寸簡寫堯典一篇則是漢時竹簡皆長二尺四寸言三尺者舉成數也内史讀四方之事書注云若今尚書入省事疏云漢法奏事讀之案張蒼為秦御史主柱下方書蓋柱下有藏書之室御史居其下主四方文書故張儀説趙王曰敝邑秦王敢獻書於大王御史然則四方之事書御史贊焉内史讀焉或曰事書即書名書㠯象事故曰事書古書必同文故外史達之瞽史諭之内史讀之達者同其文諭者㑹其意讀者正其音保氏教國子者亦㠯此流傳既久人用其私莫能辨正古今異文是非異意南北異音由是六書亂小學亡而俗師失其讀矣班斿與劉向校祕書每奏事斿㠯選受詔進讀羣書内史讀書亦如之蓋古之讀書有師承也左史倚相能讀三墳五典八索九邱不有師承其書雖存焉能讀乎孔頴達曰鄭注論語序㠯鉤命決云春秋二尺四寸書之孝經一尺二寸書之故知六經之䇿皆長二尺四寸蔡邕言二尺者漢之所用䇿書與六經異也大宰㠯八柄詔王馭羣臣内史掌八柄之灋㠯詔王治曰爵曰禄曰予曰置曰生曰奪曰廢曰殺是為内史所掌之八柄而大宰詔王之馭羣臣也則曰爵㠯馭其貴禄㠯馭其富予㠯馭其幸置㠯馭其行生㠯馭其福奪㠯馭其貧廢㠯馭其辠誅㠯馭其過不曰殺而曰誅誅猶讓也謂有過則譴責之不言殺者馭之有道焉用殺哉其曰馭何也若朽索之馭六馬也危之也張衡曰周姬之末不能厥政政用多僻始於宫鄰卒於金虎蓋言不制之臣比周相進與君為鄰貪求之徳堅若金惡若虎也象在易之頤頤之上九一陽統四隂四隂並進故六四爻辭曰虎視眈眈其欲逐逐有宫隣金虎之戒焉而其占无咎者盖上九有㠯養之又有㠯馭之其下雖眈眈逐逐而仍无咎也故上九爻辭曰由頤厲吉厲者危之也言危則吉否則凶小宰㠯六叙正羣吏曰㠯叙制其食眈眈逐逐得其叙矣上九有㠯制其食馭其幸是㠯上施光大有慶音羌下皆順㠯從上焉不然逐逐變為宫隣眈眈成為金虎衰周之象也何慶之有或曰聖人養賢未聞馭賢馭羣臣豈養賢之謂哉人不皆賢有直有枉子曰舉直錯諸枉能使枉者直錯之言置也所謂置㠯馭其行也言舉一直而置之羣枉之上則羣枉皆直盖由上制而馭之得其宜故在位之臣莫不興行而所養皆得其人也不明周禮焉知周易王弼謂頤爻之貴六四為盛非也隂賤陽貴而頤之爻義静吉動凶故曰頤征凶居貞吉初九靈龜貴也動而朶頤亦不足貴矣六四隂爻何足貴乎頤爻之貴上九為盛矣六三處震之極故曰道大悖上九居艮之終故曰大有慶也丘古音區與頤協六二顛頤拂經于丘顛㠯從貴謂上非謂初四隂為類二最在下越而從貴故象曰失類廣雅顛末也本在初末在上説者㠯顛為初失之甚矣管子六秉有殺生貴賤貧富而無予置非也予謂賜予置謂錯置予失其道如漏巵無當雖江河不能滿也置失其方如曲木無繩非斧斤所能直也六秉雖存又何㠯馭羣臣王之喪車五乘曰木車漢儀謂之臝蘭車始遭喪所乘曰素車卒哭所乘曰薻車一作􅠘車􅠘即蒲菆倉色既練所乘曰駹車髤黍色大祥所乘曰漆車雀頭色禫所乘而木車有櫜有服櫜弢戈㦸服衣刀劒素車有服無櫜餘皆無服康成謂始遭喪君道尚微備姦臣也卒哭則君道益著在車可去戈㦸如其説則既練㠯後君道乃全并去短兵矣而士喪乘堊車曷為亦有犬服建之笭間以兵器自衛乎且有貳車攝服又何所備而防衛之謹嚴若是也蓋兵者不祥之器古之用兵㠯喪禮處之喪車設兵非備不虞持險奉凶㠯表哀戚貴賤無等上下皆同及其葬也乘車載干笮設依撻翭矢志矢皆具焉亦豈有所備而然歟王之出入虎賁旅賁執戈盾夾車先後而趨凡祭祀㑹同亦如之不獨遭喪為然矣書所謂㠯虎賁百人逆子釗者盖㠯天子之禮迎入翼室居憂而為天下宗主故曰一有元良萬國㠯貞推心置腹光武中興乃云恐有姦臣設兵㠯備何示天下㠯不廣也且為君之道自世子時而已著矣既登大寳猶謂君道尚微不亦悖乎士之喪車亦有五乘斬衰堊車與王始喪同齊衰素車與王卒哭同大功薻車與王既練同小功駹車與王大祥同絲麻漆車與王既禫同士乘棧車其制如漆車魏氏故事國有大喪羣臣凶服㠯布為劒衣及晉定新禮㠯在喪無佩欲去之摯虞謂周禮虎賁氏㠯兵守王宫國冇喪故則衰葛執戈楯守門葬則從車而哭又成王崩太保命諸大夫㠯干戈内外警設明喪故之際重宿衛之防愚謂宿衛不因喪而設亦不因喪而弛故旅賁氏夾王車或服而趨或介而趨喪則衰葛不介也則戈楯豈因喪而設乎駹車然􅍜髤飾説文云幦䰍布也駹車犬幦幦即􅍜覆軾曰􅍜一作幭髤即䰍木汁可㠯䰍物然誤為犬磨滅之餘孤乘夏篆故書篆作縁縁讀為彖古縁篆同音夏小正元校者黒若縁色則縁色黑也故鄭司農曰夏赤色縁縁色謂㠯赤黑色飾轂蓋雀頭色歟或曰夏篆篆謂轂約説文作夏䡅謂車約䡅也一曰下棺車曰䡅䡅讀為輴則篆縁䡅輴音義同矣詩曰約軧錯衡毛詩云軧長轂之軧朱而約之故司農㠯夏為赤色孔疏云㠯皮纒轂上加朱漆考工記所謂陳篆也康成謂㠯五采畫轂約者夏染五色故云然及箋詩而不破毛傳義得兩通棧車一曰卧車棧與轏通左傳逢丑父寢於轏中是也一曰役車詩曰有棧之車毛傳㠯棧為役車鄭箋亦云役車輦者㠯載任器謂之輜重故曰輜輦而卧車亦名輜軿蓋衣車也前後有蔽陽貨載蔥靈即此中立二木兩傍開蔥内容人卧亦可載物則棧與役二車形制畧同矣而士乘之為棧車庶人乘之為役車則又何㠯别士庶也尚書大傳曰未命為士車不得有飛軨不得朱軒注云軒輿也士㠯朱飾之飛軨如今蔥車也然則役車無飛軨不得開蔥矣棧車無革輓而有漆飾故其輿飾㠯朱是為雀飾亦曰朱軒黒多赤少非純朱也庶人木車單馬其輿無飾士庶别者㠯此其形制仍同也蔥靈即窗櫺古今字説文櫺窗間也徐幹齊都賦曰窻櫺參差古之卧車取名焉詩曰我任我輦任者任車即牛人職所謂牽徬轅外輓牛㠯載公任器者也載任器故曰任車寗戚欲干齊桓公窮無㠯自達於是為商旅將任車㠯至齊暮宿郭門外飯牛車下桓公郊迎客夜開門辟任車詩所云我任者謂此車一名牛車即庶人之役車康成謂負任者髙誘云任猶將也皆失之服虔曰車有藩曰軒然則役車有藩不㠯朱飾説文云軒曲旃也謂軒車有藩蔽也車僕職苹車之萃輕車之萃杜子春云苹當為軿蒼頡篇曰軿車衣車也續漢書曰輕車古之戰車同朱輪輿不巾不蓋菑矛㦸幢麾菑謂建之有蔽者為苹無蔽者為輕九旗之物物當作勿一作􅻥謂之旗勿説文云勿州里所建旗象其柄有三游雜帛幅半異所以趣民故遽稱勿勿猶匆匆也説文云多遽悤悤周之司常即秦之職志志者徽識九旗之屬康成謂物名者所畫異物則異名然孤卿不畫大夫士雜帛則許氏悤悤之説抑或非無據也古文物作勿猶域作或都宗人掌都宗祀之禮凡都祭祀致福於國家宗人掌家祭祀之禮亦然而祭僕職凡祭祀王之所不與則賜之禽都家亦如之康成謂都家王子弟立其祖王之廟孔頴達則云周制王子有功徳出封者得廟祀所出之王故魯與鄭皆有周廟襄十二年傳曰魯為諸姬之喪臨於周廟昭十八年傳鄭人救火使祝史徙主祏於周廟魯祖文王鄭祖厲王是為所出之王各立廟於其國故為之周廟吕氏春秋謂魯惠公使宰讓請郊廟之禮於天子則似魯有周廟始於惠公惠公者孝公之子隱公之父惠公立四十六年而隱公即位當平王之四十九年似周之郊廟平王命之司馬遷謂成王命魯得郊祭文王魯有天子禮樂者豈其然也夫禮諸侯不敢祖天子大夫不敢祖諸侯公廟之設於私家由三桓始魯㠯周公之故立文王廟三家見而僭焉故於其家亦立桓公廟然則周廟之設於列國猶公廟之設於私家其為非禮顯然矣孔頴達謂天子之子㠯上徳為諸侯者得祀所自出之祖王子母弟無大功徳不得出封食采畿内則又何説而亦得於采地立祖王之廟哉蓋其禮起於東遷之後濫觴於春秋通行於戰國齊靖郭君封於薛其子孟嘗君代立願請先王之祭器立宗廟於薛薛者齊之都家也薛有齊廟孟嘗君請之猶魯有周廟惠公請之平王命之都家立祖王之廟誰請之而誰命之歟我未之前聞宗人所掌之祭祀曰宗祀非先王之廟也康成謂都有山川及因國無主九皇六十四民之祀其説近之王制天子諸侯祭因國之在其地而無主後者謂伏羲㠯前九皇六十四民民一作氏皆上古無名號之君絶世無後周有都宗人家宗人主其祀焉祭法所謂泰厲公厲族厲即此謂之厲者前代有功之人而無主後立祀㠯報其功且使無歸之鬼不為厲也管子曰昔堯之五吏五官無所食請立五厲之祭祭堯之五吏五吏者五官之神重食於木犂食於火土該食於金修與熙食於水皆有所食無所食而有功者謂之厲泰厲者有功於天下天子立之公厲者有功於一國諸侯立之族厲者有功於一家大夫立之先王報功之祀典至詳且悉若此俗儒疑焉㠯為古無厲祀其不然乎鯀障鴻水而殛死禹能修鯀之功故夏后氏郊鯀至杞為夏後而更郊禹由是鯀無所食而為厲晉侯夢黄能入寢而祀夏郊焉鯀於天下有治水之大功而食泰厲之祀其誰曰非宜也若夫漢祀秦中秦中者秦二世近乎古之泰厲秦祀杜主杜主者周右將軍近乎古之公厲皆無功烈于民而祀典亦及焉失之矣春秋鄭公孫黑肱有疾召室老宗人立段而使黜官薄祭祭㠯特羊殷㠯少牢足㠯共祀所謂宗人者家宗人也少牢饋食大夫之禮未聞祀所自出之公則都家安得有祖王之廟乎且宗廟享烝則獻禽尊之也都家祭祀則賜禽卑之也司農謂都家自祭其祖得之齊遣祝佗父祭于高唐高唐齊都有齊别廟楚有宗祧之事於武城明武城亦有楚之别廟也猶漢立廟於郡國吾故曰濫觴於春秋漢制癘殃祀天地日月星辰四時隂陽之神㠯師曠配之王肅曰厲殃漢之淫祀耳師曠自是樂祖無事於厲殃學者遂疑祭法之厲起於漢非也西王母居玉山虎齒善嘯蓬髪戴勝是司天之厲及五殘盖自古有之矣韋昭云人皇九人所謂九皇雒書云九男相像其身九章或云即九頭紀孔廟碑所謂前開九頭㠯叶言教者也九皇氏没六十四氏興六十四氏没而三皇興漢舊儀曰凡聖王之法祭天地日月星辰山川萬神皆古之人能紀尺地五行之氣奉其功㠯成人者故其祭祀皆㠯人事之禮食之又祭三皇五帝九皇六十四氏凡八十有一姓皆古帝皇在漢皆餼則厲非淫祀即祭法之泰厲也鄭司農㠯為即小宗伯之四類抑或然乎又舊儀曰臘者報諸鬼神古聖賢有功于民者皆享之甘氏星經曰太白上公妻曰女媊居南斗食厲天下祭之曰明星食厲者食於厲也故配享明星禮説卷九
