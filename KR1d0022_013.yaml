body:
  text: 禮説卷十三翰林院侍講惠士竒撰秋官二雍氏春為阱擭穿地為漸以捕禽注云擭柞鄂也堅地阱淺則設柞鄂於其中淮南子曰走獸擠腳蓋設柞鄂以擠其腳而獲之一名係蹄戰國策云人有置係蹄者而得虎虎怒決蹯而去蹯虎掌延叔堅曰係蹄獸絆也是為柞鄂魯語云鳥獸成設穽鄂注云鄂柞格所以誤獸也一名𦌔以繯獸足逸周書曰不卵不𦌔以成鳥獸然則山不為苑澤不為沈春阱獲而秋杜塞之亦所以助生阜而畜功用歟翨氏注云置其所食之物於絹中鳥下來則掎其腳絹當作繯俗省為絹其音同也不徒係獸兼可羅鳥太元曰揮其罦絶其羂西京賦所謂罝羅羂結者即此莊子曰蹄者所以在注云羂也一名兔弶巨亮反係其腳故曰蹄齊語渠弭於有渚繯山於有牢即雍氏所謂澤之沈山之苑牢立柵以遮獸渚立􅋣以捕魚繯齊語通為環小匡誤為綱馬融廣成頌所謂繯槖四野之飛征也軍行依山澤為險阻兼取川禽原獸以佐軍糧管子所謂南伐西伐北伐之主者以此雍氏之所禁也而管子行之周官之法至齊桓而一變矣墬形訓曰東方曰大渚曰少海注云少海澤名則渠弭為澤明矣賈注云渠弭禆海也其説本此根生之物為草草麗乎土故掌土化者其官為草人浮生之物為萍萍麗乎水故掌水禁者其官為萍氏萍氏禁川遊兼幾酒而謹酒韓非子曰道譬之若水溺者多飲之即死渴者適飲之則生適者節也君子有酒節之而已易曰飲酒濡首不知節也鄉飲設禁射飲設豐賓飲告旨主飲謝崇賓主百拜終日彌恭其為節也陔矣書曰毋彞酒彝酒者常酒也常酒者天子失天下匹夫失其身翢翢銜羽飲河顧其後也鳯凰雄鳴節節雌鳴足足取為名思其義也可以人而不如鳥乎水性柔人多溺詩曰旨酒思柔則酒能溺人亦如水矣制柔以剛故書曰剛制于酒然而剛制不如溫克也周公作酒誥言沉湎之為害而殺羣飲之民則似剛近乎虐然以酒禁委掌水之官謂浮而不沉者莫如萍不湎於酒猶不沉於水則仍取溫克之義焉不然殺羣飲何異刑棄灰輕罪而行重罰非所謂殷罰有倫也豈周公行之為仁商鞅行之為暴哉莊子外篇曰周周銜羽以濟司馬彪注曰周周河上鳥也頭重尾輕是以銜他鳥羽而飛過河言人可求益于物以補其所短也韓非子曰鳥有翢翢者重首而屈尾將欲飲于河則必顚乃銜其羽而飲之人之有所不足者不可不索其羽也説文無尾為從尾出聲俗省作屈銜羽飲河其言有味若銜羽濟河有何味乎銜其羽似非他鳥也司烜氏掌以鑒取水於月鑒者鑑諸一名方諸淮南子許慎注曰方石也諸珠也古諸珠通劉子曰陽燧在掌而太陽火方諸運握而少隂水類感之也萬畢術曰方諸取水注云形若杯合以五石葛洪有岷山丹法鼓冶黃銅以作方諸承取月中之水古之鑒也豈其然乎案唐乾封元年果毅李敬貞議封禪用明水實尊淮南子云方諸見月則津而為水高誘注云方諸隂燧大蛤也摩拭令熱以向月則水生以銅盤受之下數石考工記云金錫半謂之鑑燧之齊注云取水火于日月之器準此注則水火之器皆以金錫為之今有陽燧形如圓鏡以取明火應時得隂鑑形如方鏡以取明水未有得者比年祠祭用井水代之蓋金錫相半自是造鑑之法非隂鑑之制依古取明水合用方諸嘗於八九月中取蛤一尺二寸者依法試之自人定至夜半得水四五斗王充曰月中之獸蟾蜍其類在地螺與蚄也月毁于天螺蚄舀缺方諸鄉月水自下來同類明矣高堂隆謂陽符取火隂符取水名曰水火之鏡干寶謂五月丙午日中鑄陽燧十一月壬子夜半鑄隂燧而隂燧無得水之理其説皆非蛤一名魁大元曰大魁頥水酋酋之包言水之聚也符子曰鏡以曜明故鑒人蚌以含珠故內照方諸一名蚌鏡古謂之鑒以此司烜之烜一作㷄一作􅛚㷄為楚語􅛚乃齊言㷄讀為貨􅛚讀若毁韓詩王室如􅛚毛詩作燬左形右聲説文並存説者又謂齊人曰燬吳人曰􅛚方俗之訛也然則㷄􅛚燬烜皆通矣夏官司爟秋官司烜爟為熱火所以爇也其形在地烜為明火所以照也其精在天在地為木乃火之形在天為日乃火之精形用其熱精用其明故熱火取諸木明火取諸日焉或明或暗火性善藏見則有耀伏則無光故司烜氏修火禁以心星之見伏為出內之紀綱也方諸取水或以井水代之説本管子春飲於靑后之井夏飲於赤后之井秋飲於白后之井冬飲於黑后之井中央飲於黃后之井易曰井道不可不革也言久則濁穢宜易其故乃知古者不徒改火且改井矣井卦九三井泄泄者泄其惡也故不食壽陽有歡樂井言三伏赫曦望見此井則為之喜故井水泄惡行人惻焉不用則惡用汲則清明王變而更之則天下皆受其福矣管子曰鑽燧改火杼井易水所以去兹毒也水有兹火有毒人或遭之年命促惟潔且新乃受福是故教民樵室鑽燧墐竈泄井所以壽民後世不然人多夭折未必不由此王裦頌卑辱奧泄注云奧幽也泄汙也汙穢則除去之故曰泄司烜氏邦若屋誅則為明竁焉康成云屋讀為剭剭誅謂不於市而以適甸師氏明竁若今楬頭明書其罪法也司烜掌之則罪人夜葬歟漢書長安令尹賞為虎穴收捕輕薄惡少年內穴中皆死出瘞寺門桓東楬著其姓名康成所謂楬頭即此師古曰楬杙也椓杙於瘞處而書死者名也楬從木音竭屋誅蓋刑於喪國之社荀子曰罪人之喪不行晝行以昏殣古之法也然則罪人夜葬漢法亦然矣既葬而楬著罪名立於其地焉蓋與尹賞之事合非若子産誅公孫黑以木加尸也且楬者表識之名蠟氏有死於道路者埋而置楬楬之言桀也立於地不加於尸賈疏失之一説穿穴曰竁喪國之社屋之屋之者掩其上而柴其下使不得達上邦若屋誅司烜氏穿穴以通明故曰明竁蓋事畢則仍掩之火秉明故職在司烜氏班固述哀紀曰底剭鼎臣服虔曰周禮有屋誅誅大臣於屋下不露也古者復穴開上取明謂之霤明竁之義取諸此廣雅云楬杙也虞書曰鞭作官刑朴作教刑孔疏云周禮條狼氏誓大夫曰敢不關鞭五百左傳有鞭徒人費圉人犖子玊鞭七人衛侯鞭師曹三百後來亦皆施用及隋造律始廢之淮南子人間訓有伏郎尹而笞之三百蓋起於戰國近乎古之官刑左傳又有齊莊公鞭侍人賈舉魯孟孺子鞭成有司之使則是賤者非士大夫獨條狼氏有誓大夫鞭五百之文與曲禮刑不上大夫之言相反于是學者疑周官非聖人之書不知官刑與教刑虞書並舉官有慢事築以訊之教或不率朴以威之象以典刑自昔然矣周公之為師保也使伯禽與成王處成王有過則撻伯禽以耻之楚文王田於雲夢三月不反保申諫曰先王卜以臣為保吉王罪當笞臣承先王之命不敢廢寧得罪於王不敢負先王王曰敬諾乃席王王伏保申束細箭五十跪而加之王背如此者再曰小人痛之君子耻之耻之不變痛之何益此教刑也古者雖天子必朝師故國之至尊猶不廢笞後世之言禮者乃謂刑不上大夫豈其然乎春秋大夫無遂事出境可以安社稷利國家者則專之可劉向謂國有危而不專救者不忠國無危而擅生事者不臣蓋以為擅生事者將有跋扈不臣之心故條狼氏誓之以為戒若夫過誤之失常人所容懈慢為愆輒相提拽乃至尚書解衣就格人君自起撞郎則吾未聞之於古孔疏謂鞭刑及隋而廢非也隋文每杖人於廷一日數四高熲等切諌乃令殿內去杖後怒楚州行參軍李君才命杖之而殿內無杖遂以馬鞭笞殺之則隋亦未嘗廢也唐開元二十四年夷州刺史楊濬犯贓決杖裴耀卿諌以為決杖施於徒隸不可加於高官贖死雖優受笞為辱恐百姓見之忘其免死之恩且有傷心之痛而張説亦諌決杖貴臣且謂張嘉貞曰宰相者時來即為豈能長據若貴臣可杖恐吾輩行當及之是時祕書監薑皎廣州都督裴胄先犯罪嘉貞奏請杖之故説云然漢律有矯詔害矯詔不害害者死條狼氏所謂敢不關者矯詔害者也不死而鞭律輕於漢矣如其不害漢律雖不害猶免官則專之可也而又何關焉武帝使吕步舒持斧鉞治淮南獄以春秋誼顓斷於外不請不請者不關也康成謂大夫自受命以出則其餘事莫不復請然則命之顓斷而後可以不關歟穀梁子以為大夫不廢君命不專君命有君命而留之為廢無君命而遂之為專若是者刑兹無赦是故冡宰八法以官刑糾治司寇五刑以官刑糾職條狼氏之誓也所以糾之也曰轘曰殺曰鞭曰墨是為官刑官刑糾官職修抑又聞古之大夫有坐干國之紀者不謂之干國之紀則曰行事不請是掩其干紀之實假以不關之名此而不刑國無紀也國無紀必亡條狼氏誓僕右曰殺誓馭曰車轘轘一作軫於文皆從車蓋古之斬刑或云車裂龜䇿傳頭懸車軫四馬曵行鶡冠子曰害百姓者軫以徇説者謂齊車裂蘇秦秦車裂衛鞅其法起於戰國非也春秋桓十八年齊襄轘高渠彌於首止宣十一年楚莊轘夏徴舒於栗門皆弒君之賊也齊楚討而轘之以徇焉先王之法也襄二十二年楚殺令尹子南而轘觀起觀起者子南之私子南得罪觀起車裂則凡不臣者皆轘之不獨弒君之賊矣説者謂以左傳證周官康成之失然則東晉不可以證西晉南宋不可以證北宋乎如謂左氏不可信則先秦無可信之書矣孔叢子曰齊王行車裂之刑羣臣爭之不聽子高見齊王曰聞君行車裂之刑無道之刑也學者皆以為然愚獨以為不然轘者不忠之刑焚者不孝之刑臣不臣二忠為患轘者患也子不子倒子為子古子字古突字焚者也易曰突如其來如突猶逆也子而逆出不容於內也故有焚如死如棄如之象掌戮亦云殺其親者焚之夫焚與轘皆刑之酷者也而加之逆節之子二心之臣即刑當其罪子高不問其刑之當否而輒加以無道之名則是弒君者不轘殺親者不焚而後為有道之刑也不亦異乎臣弒君子弒父非一朝一夕其所以包藏禍心實由於辨之不早而反掖之寇必起於親近之臣馭則尤親近者故誓之以車轘即其事以警其心焉徇者使之明聽其辭故奮鐸誓者使之潛消其慝故執鞭易離之突猶太元遇之衝故其測曰衝衝兒遇不肖子也修閭氏比宿柝而守閭互互謂行馬柝以行夜閭其門也管子曰閭閈無闔外內交通男女無别晏子曰急門閭之政而淫民惡之緩門閭之政而淫民説古者有虞氏始置木為閭而謂之互者説文云􅰿互令不得行木如蒺藜上下相距形若犬牙左右相制所以禁止行人郤克臧孫許同時聘於齊二大夫相與踦閭而語一在外一在內移日然後去墨子自楚還過宋天雨庇其閭中守閭者勿內也則閭互之法有節者內之無節者譏之春秋及戰國皆然矣齊有里尉猶周官之里宰閭胥也審閭閈愼管鍵管藏于里尉凡出入不時衣服不中圈屬羣徒不順于常者閭有司見之復無時所謂閭有司者即周官之修閭氏歟宿互者宿守閭互而擊柝以衛焉月令中冬命奄尹申宮令審門閭蔡雍破閭為闈謂宮中之門曰闈奄尹主之閭里門非奄尹所主愚謂宮中有永巷巷門謂之閭韓非子曰昔者桓公宮中二市婦閭二百婦人守之故曰婦閭戰國䇿有守閭嫗不必破為闈也􅰿一作椵封人注云楅衡如椵狀賈疏云衡者橫木於鼻今之駝猶然漢時有置於犬之上謂之椵椵一作枷廣成頌曰枷天狗緤墳羊三秦記曰麗山西有白鹿原原上有狗枷堡秦襄公時有大狗來下有賊則吠之一堡無患於是有狗枷之名則犬之有枷不始於漢矣備所以衛也牆垣所以衛其家爪牙所以衛其體淮南齊俗訓有穿窬拊揵抽箕踰備之姦高誘注云備後垣是牆垣者家之衛也秋官冥氏設􅋃張為阱擭以攻猛獸而獻其皮革齒須備司農注云備謂搔是爪牙者體之衛也故備一訓垣一訓爪人無爪牙之衛乃削革為甲鎔金為兵以為衛故甲兵亦名備左傳齊烏枝鳴曰用少莫若齊致死齊致死莫若去備老子曰入軍不備甲兵見韓非子備俗本作避非言不恃備以救害也桓魋以家備往白公以戰備獻一説備讀若采蒲莧切音如辨象獸指爪説文采從田為番獸足也象其掌采訛為備聲之訛也踰備當作踰阫普回反音若裴莊子曰正晝為盜日中冗阫阫一作培顏闔鑿培而遁注亦云培後牆則備當讀為阫或曰不然居不為垣牆人莫能毁傷行不從周衛人莫能暴害故曰備者國之重也兵者國之爪也垣與爪俱以備名本乎古矣柞氏注云柞除木之名先鄭讀柞為屋笮之笮何休曰親過高祖毁其廟禮取其廟室笮以為死者炊沐笮者廟之西北厞也西北隅幽隱之處謂之厞亦曰笮徹取其木以為薪而炊沐焉舊説厞屋簷非也爾雅栭謂之楶廣雅楶謂之笮笮言迫迮厞言陫側則厞為屋笮明矣賈疏目為俗失之廣成頌云焚萊柞木注云柞音士雅反邪斫木也依鄭義當音側白反章懷讀為槎本説文案爾雅屋上薄謂之筄注云屋笮蓋柱上為薄柱頭為櫨所謂楶也徹取其木即取之此説文笮在瓦下棼上棼者復屋棟是為復笮廣雅曰棼閣也即今之樓太史慈討賊賊緣樓行詈手持樓棼慈射之貫手著棼謂著樓簷下棟故舊説以厞為屋簷一説屋笮者屋漏也釋名曰禮既祭改設饌於西北隅西北隅曰屋漏親死撤其薪以爨竈煮沐供諸喪用若值雨則漏遂以名之然則屋笮者當室之白也孫炎謂日光漏入抑或然乎康成曰漏隱也厞隱之處則直訓漏為厞矣一説柞屋棧也亦謂之簀柞一作笮在各反見急就篇剃氏殺草謂始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之月令燒剃注引剃氏職夷作剃皇氏云夷音剃先剃其草草乾燒之含實曰繩皇氏音孕古作􅤟管子曰壬子水行御羽卵者不段毛胎者不􅢥􅤟婦不銷棄草木根本美蓋水氣行草木先受之而後及羽卵毛胎􅤟婦焉任身含實其理本同月令國多女災禾稼不熟水傷含任氣相感也􅤟一作􅦋太元云好􅦋惡粥又曰􅦋其膏女子之勞一作鱦家語王肅注云鱦魚之懷任然則女含胎魚遺子草結實皆從黽象其腹也耿黽怒鳴故象其腹萌之者斫其新夷之者芟其陳注云以鉤鎌迫地芟之若今取茭矣茭乾草也謂取乾草有陳根也秋敗其實冬剗其根從春至冬一年之事六鄉之易六遂之萊必休之乃可復種者以此釋地云一歲曰災二歲曰新田三歲曰畬災者災也謂災殺其草木也郭璞曰今江東呼初耕地反草為災新田者新成柔田畬和也田舒緩也然則災者柞氏攻木剃氏殺草皆以水火變之則草木化為糞壤二歲乃柔三歲乃和此田所以有再易三易歟詩曰楚楚者茨言抽其棘自昔何為我藝黍稷言耕者必先伐除茨棘而後種黍稷焉其法在農官則柞氏剃氏之職也故曰載芟載柞其耕澤澤除草曰芟除木曰柞載始也言耕之事始于此説文曰凡字朋者羽蟲之長烏者日中之禽舄者知太歲之所在燕者請子之候作巢避戊巳古文鳳象形鳳飛羣鳥從以萬數故以為朋字魯郊以丹雞祝曰以斯鶾音赤羽去魯侯之咎所貴者象形以望其來所惡者覆巢以使之去此硩蔟之官所由設也春秋鳥鳴亳社而伯姬卒其為夭也信矣鷁與鸜鵒非夭也退飛而宋襄喪師來巢而魯昭失國則又何説與漢永平中神雀集於宮廷而賈逵稱為瑞元和中異鳥翔於殿屋而何敞目為災既而逵對無徵敞言竟驗然則非常者乃為夭乎硩蔟氏覆而墮之如不去則庭氏射之自臧文仲祀爰居而其官廢矣漢祠黃帝用一梟破鏡梟食毋破鏡食父五月五日作梟羹賜百官即硩蔟之遺意若夫鸛鷒鶝鶔一名􅦀羿應弦銜鏑矢不著地逄蒙縮手養由不睨雖有庭氏救日太隂之弓亦無所用之故曰力不勝夭夭不勝德似鳳者孽介雀者滅庶氏除蠱以攻説禬之嘉草攻之翦氏除蠧以攻禜攻之莽草熏之大祝六祈有禬禜攻説之名黨正族師有祭禜祭酺之禮蠧猶蠱也嘉草一名莽草一名芒草見山海經朝歌之山有草焉名曰莽草可以毒魚葌山有木狀如棠而赤葉名曰芒草可以毒魚莽轉為芒語有輕重耳淮南萬畢術曰莽草浮魚爾匹葞春草注云一名芒草或云葞即白薇非芒草也吳氏本草曰莽草一名春草有毒五月採治風蓋蟲生於風潛於隂魚隂類也治風之草能毒魚者亦能殺蟲歟左傳公聚朽蠧而穀飛為蠱蓋蠱皿蟲蠧木蟲生于隂中異名同類物不堅為鹽鹽與蠱通凡害物之蟲皆是也食心食葉食根食節皆似蠱而害良苖族師祭酺酺者蝝螟之神能為災害故族師祭之庶氏以攻説禬之翦氏以攻禜攻之以禳其災又以嘉草攻之焚莽草而以其灰灑之以絶其害荆楚之俗取菊為灰以除麥蠧汜勝之術取麥種雜乾艾藏之以馬蠶矢漬穀種則無蟲謂蟲生於濕熱燥之則蟲不生而收常倍崔實四民月令曰臘月祀炙逄逄麥芽也齊民要術誤為蓮樹瓜田四角去蚶胡濫切瓜蟲也其法本於庶氏翦氏後世失其傳矣一説嘉草蘘荷也葛洪方曰人得蠱欲知姓名取蘘荷葉著病人卧席下立呼蠱主名一説芒草杬也爾匹杬魚毒杬一作芫見急就篇顔師古云芫華一名魚毒漁者煮之以投水中魚死浮出故名本草經云芫華一名去水味辛殺蟲淳于意診脈曰蟯瘕以芫華一撮飲之即出蟯可數升病已然則能毒魚者亦能殺蟲也莽草蓋其類歟段氏雜爼言西域有禳蟲法作木天壇法以禳之後漢公沙穆為𢎞農令時有螟蟲食稼穆乃設壇以禱於是暴雨既霽而螟蟲自銷此段氏所謂西域禳蟲法古之遺術也則庶氏攻説翦氏攻禜亦必有道矣壺涿氏除水蟲赤犮氏除貍蟲水蟲潛於藪澤貍蟲隱於牆壁注云水蟲狐蜮貍蟲蟅肌蛷疏云水蜮即水中短狐而蟅肌蛷則闕焉廣雅負蠜蟅也蛷蛷也本草蟅名土鱉博物志曰蛷螋溺人景隨所著生瘡盧氏曰塗以雞腸草段氏曰治以莎衣結説林訓曹氏之裂布蛷者貴之高誘注曹布燒以傅蝫蛷瘡則愈蝫蛷即肌蛷也陸甸埤雅蟅逄申日過街造化權輿曰短狐射氣蛷螋遺溺稽聖賦所謂蛷旋於影蜮射於光氣感使然莫或知之矣甸謂蛷螋者言搜求而去之則臆説也案蛷螋段氏雜爼作蠼螋蠼音瞿古瞿求音同蠼蛷蝫肌聲相近文異音同實一物廣雅以蟅為負蠜乃鼠婦也本草蟅無甲有鱗狀似鼠婦春秋莊十八年秋有蜮二十九年秋有蜚劉歆曰蜚負蠜郭璞曰負盤也或引山海經有獸如牛其名曰蜚行水則竭行草則死見則天下大疫其説近乎怪矣學者好怪以為然愚謂蜮水蟲也蜚貍蟲也壺涿氏赤犮氏之所除而去之者也春秋失其官故蜮蜚書於䇿君子曰災也水蟲之災自外生貍蟲之災自內萌自外生者顯而有神自內萌者隱而無形故常藏於隙屋於文壁孔為隙從阜象牆二小夾日莊之末年叔牙慶父貍蟲之應也處宮之中在君之側若不去之必將亡國是故自外生者驅之以土鼓自內萌者毒之以蜃灰害雖微而將大物無小而不除周公所以垂為訓歟召南雀穿屋鼠穿墉而獄訟成焉雀所處者瓦之間隙屋之翳蔚也而社鼷不灌屋鼠不熏穿墉以為藏身之固非所謂切近災乎周鼎著鼠令馬履之為其不陽也不陽之謂貍故貍之為怪也好居隅隙之間赤犮氏目察區陬掌除物怪涼州張重華末年有螽斯蟲集安昌門外緣壁逆行重華兄祚小字螽斯都尉常據諫曰螽斯逆行災之大者願出之重華曰螽斯子孫繁昌何為災也先是祚蒸重華母馬氏及重華死馬氏遂廢重華子曜靈而立祚祚尋殺曜靈專為姦虐涼州人咸賦牆茨焉此貍蟲之應與春秋有蜚同故特書之以為災也重華末年猶莊公末年重華兄祚猶莊公兄慶父祚蒸馬氏猶慶父通哀薑其事皆相類螽斯與負蠜亦相類牡橭姑榆也橭一作姑釋木無姑其實夷似即釋草之莁荑本草莁荑一名無姑一名䕋似即釋草之蔱蘠郭注以莁荑為白蕢仍謂無姑即蕪荑則與莁荑何以别乎急就篇注云莁荑無姑之實也無姑一名橭榆其莢圓厚然則實者為無姑不實者為牡姑猶牡蘜之不花者也易枯楊康成讀枯為姑蓋枯即橭之省俗讀為枯稿之枯失之矣鄭注銜枚兩見一見大司馬職曰枚如箸銜之有繣結項中一見銜枚氏曰橫銜之繣結於項賈疏云繣兩頭繫也以組為之兩頭交於項下結之顏師古注漢書引鄭注結作潔曰繣潔於項云繣者結礙也潔繞也為結紐而繞項也潔音頡則又訓繣為結潔為繞矣同時所見之本不同若此銜枚氏掌司囂囂則亂亂則師田失律囂則歡歡則祭祀不敬􅑧呼歎嗚歌哭皆是也故為之禁苟非師田祭祀則弗禁也或曰哭非其地謂之野哭孔子惡野哭者為其變衆故有哭於國中之道者亦謂之野銜枚氏為之禁而孔子亦惡焉如其説則士大夫去國者鄉國而哭奔喪者齊衰望鄉而哭禮也皆國中之道也奚為而禁之孔子曰所知吾哭諸野故哭所識則於野張帷禮也所謂野哭也又奚為而惡之雜記國禁哭則止郊特牲喪者不哭不特不敢哭於道并不敢哭於家故殯宫朝夕奠皆不哭蓋國之大祭祀民皆敬之敬則吉圭淸靜州里除不蠲刑者任人凶服亦皆禁焉非徒哭也非是則弗禁也然則何哉孔子惡野哭者曰非此之謂也郕人子蒲卒哭者呼滅子臯曰若是野哉哭不以禮是為野舊説滅蓋子蒲名王肅謂人少名滅者又哭名其父不近人情疑以孤窮自謂將亡滅也其説似是而非伯牛有惡疾夫子所痛曰蔑之命矣夫見漢書蔑猶滅也蓋痛之甚也如是則何野之有且古人以惡名何不可以滅名哭不必其子焉知非其父夫禮臣既死君不忍呼其名子既死父不忍呼其名哭者蓋其父也而呼子名君子以為野矣哭有禮亦有節哀矣而難繼情在而無文皆野也孔子之所惡也然則古不禁哭亦不禁歌歟寧戚將任車歌於車下買臣擔束薪歌於道中苟非師田祭祀則歌哭皆弗禁也狐援諫齊湣王而不用援一作咺出而哭國三日王問吏曰哭國之法若何吏曰斫王曰行之明哭國者斫無道之刑蓋起於戰國歟墨子號令篇曰無敢歌哭於軍中有則其罪射言惟軍中則然古無哭國之法也故其禁在銜枚氏尸子曰齊有田果者命狗曰富命子曰樂將祭而狗入室呼之曰富出以為不祥其子死哭人曰樂乎而不似悲也是俗哭子皆呼名矣喪大記曰婦下堂不哭男子出寢門外見人不哭注云自堂及房婦人所有事自堂及門男子所有事非其事而哭猶野哭也則野哭非謂哭於野也奔喪哭避市朝魯哀薑大歸將行哭而過市市人皆哭則哭亦有不避市者國中不禁可知伊耆氏共王之齒杖先鄭云謂年七十當以王命受杖者今時亦命之為王杖然則七十賜杖名曰王杖周之禮也王充謝短篇曰七十賜王杖何起著鳩於杖末不著爵何杖苟以鳩為善不賜鳩而賜鳩杖而不爵何説風俗通曰俗説髙祖與項羽戰於京索遁於薄中羽追求之時鳩止鳴其上追者以為必無人遂得脫及即位異此鳩故作鳩杖以賜老者而三齊略記所言漢祖事與此同且云漢世元日放鳩蓋為此其説非也王子年記少皥結薰茅為旌以桂枝為表刻玊為鳩置於表端則鳩杖起於少皥亦非也伊耆氏共王杖則鳩杖起於伊耆矣鷹化為鳩不仁之鳥感春之生氣變而之仁故羅氏獻鳩以養國老因著其形於杖以扶之助生氣也或曰鳩者不噎之鳥欲老人之不噎豈非古造而漢因歟大祭祀共杖咸康成讀咸為函案咸古緘字天官書間可緘劒索隱曰緘音函函容也函字本有咸音故從咸則知先儒讀咸為函得其音矣秦置酒饗羣臣先召諸子賜食罷而出胡亥下陛視羣臣陳履杖善者殘敗之而去蓋燕饗在堂履杖不上堂陳於陛下僻隱之處故胡亥下陛得壞之八十杖於朝者履杖上堂猶劒履上殿異數也康成謂老臣雖杖於朝事鬼神尚敬去之故大祭祀共咸有司以此函藏之既事乃授之杖有函曲禮席間函丈丈或為杖王肅謂古人講説用杖指畫然則函杖猶杖函也蓋函藏於席間杖之言丈也王杖長九尺言丈者舉成數也王杖御覽玊部引之作玊杖失之廣雅曰篋謂之緘秋見曰覲覲之言請也漢律春曰朝秋曰請言請罪也覲禮三享畢侯氏乃右肉袒于廟門之東入門右北靣立告聽事注云凡禮事左袒吉凶皆然右肉袒者刑宜施於右也易曰折其右肱秋覲以比邦國之功言校比其功以行黜陟告聽事者告王以比功之事言無功當黜宜退受刑右肉袒非請罪而何漢有請室應劭曰請罪之室大臣有罪造請室而請罪焉自上言之曰比功自下言之曰請罪詩曰道阻且右言左順而右逆也軍禮不功將帥結草自縳袒右肩而入射禮司馬與司射交於階前相左喪禮商祝與夏祝交於階下則反之康成謂吉事交相左凶事交相右者以此蓋左為陽為吉右為隂為凶也春陽中萬物生故朝以圖事秋隂中萬物成故覲以比功夏萬物見其象顯故宗以陳謨冬萬物藏其象幽故遇以協慮覲乘墨車蓋將請罪所以自貶損朝則建旗乘路焉上公九斿九乘侯伯七斿七乘子男五斿五乘詩蓼蕭采菽皆諸侯朝天子之詩曰鞗革沖沖和鸞雍雍其旗淠淠鸞聲嘒嘒則朝乘路車如其命數也康成見覲乘墨車遂疑朝亦然故蓼蕭箋云此説天子之車飾者諸侯燕見天子天子必乘車迎于門是以云然失之矣而采菽箋則云諸侯來朝王使人迎之因觀其衣服車乘之威儀所以為敬且省禍福也此仍以為諸侯之車服孔疏乃謂王乘駟馬迎諸侯則鸞旗驂駟皆非諸侯之物豈其然乎元鳥龍旗十乘箋云二王後八州之大伯所謂九命之外若有加益則是君之特賜非禮法之常而侯氏乘大夫之車亦惟覲為然矣詩曰歲事來辟勿豫禍適此覲禮請罪之辭歲事者歲功成於秋也小行人春入貢秋獻功康成謂若今計文書斷於九月其舊法盧植乃云計斷九月者泰以十月為正誤矣左傳昭十有三年叔向曰諸侯歲聘間朝再朝而會再會而盟杜氏云三年一朝六年一會十二年一盟凡八聘四朝再會王一巡守盟於方嶽之下孔氏曰大宗伯云時見曰會殷見曰同鄭氏以為時見無常期非也時見者謂再朝而會殷見者謂再會而盟尚書周官曰六年五服一朝又六年王乃時巡大行人亦云十有二歲王巡守殷國所謂侯服歲一見者乃遣使貢物非親朝也然周官云六年一朝而左傳云六年再朝二説亦未符合特以時會為再朝之會殷同為再會之盟可與鄭注並存以備一説昭三年傳子太叔曰文襄之霸也諸侯三歲而聘五歲而朝有事而會不協而盟説者以為叔向言王制而遊吉言霸主之法然會盟無常期合於周官矣諸侯來朝行享於廟入大門下車所立之位上公立當車軹侯伯立當前侯前侯俗本誤為前疾自宋至今讀者不悟子男立當車衡案侯俗作疾論語邢昺疏鄉黨引周禮作前侯云侯伯立當前侯胡下又小雅蓼蕭章孔疏引大行人亦作前侯蓋説文疾作疾古文矦作相似易亂故前侯訛為前疾賈疏不詳莫能辨正俗本流傳誤人久矣又案許叔重説文引周禮作前軓云軓車軾前也音範詩小戎隂靷毛傳云隂掩軓也孔疏謂以板木橫側車前隂映此軓故謂之隂考工記軓前十尺謂軾前曲中下垂柱地如人之頸故謂之侯侯猶胡也故鄭注訓為胡以其在軌前故曰前侯然則隂也侯也胡也皆前軓之名掩軓曰隂曲中曰侯下垂曰胡總名為軓當依説文定作軓則前衡後軹而軓在其間讀者一見而心目了然矣水經注中都縣胡甲山山有胡甲嶺劉歆遂初賦所謂越侯甲而長驅者也蔡雍曰侯甲亦邑名古矦與胡通侯甲通為胡甲故前侯注為前胡然車之制莫詳於詩禮前軓見考工而侯胡無聞焉實事求是仍從説文為正古音侯讀為胡漢書贊抑抑仲舒再相諸侯身修國治致仕縣車易林范子妙材戮辱傷膚後相秦國封為應侯此侯讀為胡之明證也吕氏春秋郈成子為魯聘于晉過衛右宰榖臣止而觴之顧反過而弗辭其僕曰嚮者右宰榖臣之觴吾子也甚歡今侯泄過而弗辭再為泄侯猶胡也則古矦讀為胡益明左傳童謡曰公在乾侯徴褰與襦襦與侯協詩曰羔裘如濡洵直且侯濡與侯協小雅及曲禮疏皆引大行人一作前侯一作前疾則知詩禮正義非出一人之手矣東京賦漢帝之德侯其褘而褘美也言漢之德胡其美也封禪書君乎君乎侯不邁哉邁往也言君胡不往也魏書髙車傳斛律部帥倍侯利勇健處女謡曰求良夫當如倍侯侯與夫協乃知四夷尚有古音大司馬九畿大行人六服畿限也以平邦國故曰畿服事也以親邦國故曰服周語分之為九合之為五方千里曰甸服亦曰邦畿是為邦內甸服則知邦外亦有甸服矣邦外侯服謂邦畿外方五百里之侯服也侯服外曰甸曰男曰采曰衛各方五百里康誥所謂侯甸男邦采衛者皆賔服也是為侯衛賔服大行人掌大賔之禮自侯及衛各以逺近來賓故曰賓服衛服外曰蠻曰夷各方五百里皆要服也是為蠻夷要服要服外曰鎮曰蕃各方五百里皆荒服也是為戎翟荒服詩曰因是百蠻其追其貊奄受北國箋云韓外接蠻服因使時節百蠻貢獻之往來賜之蠻服追貊之國而總領之然則九州之外皆百蠻之地也書曰外薄四海咸建五長亦選其賢者以為之主其來貢也則請於州牧故曰因時謂之時者亦謂時叛時服荒忽無常易之比也有建萬國親諸侯之象然九五顯比而後夫在上前禽在初一舍之一失之絶域殊俗先王之所不能親也故不列於賔服焉爵之伯猶服之男故鄭伯也而當男服詩無衣七章晉次國也為甸侯鄒莒塢鄶路逼陽小國也皆為采衛則似以國之大小為服逺近之差齊元舅衛孟侯魯宗國皆大邦也蓋皆侯服歟吳伯也而春秋書子凡在要服雖大子也鄭與曹皆伯爵而曹伯甸鄭伯男則又以封之先後為敘矣故曰彌近彌大彌逺彌小海上有十里之諸侯以大使小以重使輕以衆使寡王者治天下若一家也大司徒之建邦國制其域而定其貢諸公貢其地之半侯伯貢參之一子男貢四之一大國貢重小國貢輕齊魯衛侯也皆食諸公之地故公侯之貢重於伯而大司徒侯伯貢同是以春秋盟主遂使伯從公侯之貢子産曰天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也如其説則貢之輕重非徒以列之尊卑兼視其服之逺近然曹以甸而重鄭以男而輕爵列同而貢之輕重頓異則未免於偏當時主盟者必以為不可平邱之會子産爭承至日中而未決者蓋以此禹貢冀州帝都故無貢周官亦然而邦畿之賦總銍秸粟米五者自百里至五百里近則賦粗而多遠則賦精而少要以五百里為斷故賈誼曰古者天子之地方千里中之而為都輸將繇使其遠者不過五百里而至諸侯之地方百里中之而為都輸將繇使遠者不過五十里而至輸者不苦其繇繇者不傷其費故遠人安此之謂也六服之貢惟祀惟嬪惟服皆為包為匭為篚約而易舉輕而易致惟器惟財惟貨或多而難舉重而難致則從水運禹貢曰浮曰沿曰逹曰逾曰至曰入曰亂曰會皆水運之道所運者皆八州貢篚而粟米無聞焉説文水轉榖曰漕春秋秦晉泛舟其漕運之法乎自雍及絳路經千里而從渭入河從河入汾舳艫相銜坦無險阻而不以為勞且歲飢偶一行之如乞糴於齊歸粟於蔡急病而救災也若夫數千里飛芻挽粟率三十鍾而致一石則起於秦而漢因之漕轉山東粟以給中都而更底柱之險敗亡無算所謂得一錢之賦而喪數十錢其煩費若此隋唐亦如之艱難之狀百倍於春秋矣雍州厥田上上沃野廣衍而力耕農通灌溉其食自足本無藉於他州故邦國九貢無粟米而九賦斂財賄則粟米居多自郊至都亦如禹貢以五百里為斷可知也古者以米為財喪大記曰納財朝一溢米莫一溢米故知財賄為粟米天子受四海之圖籍膺萬國之貢珍撫諸夏而綏百蠻贊羣后而調元氣九法在大司馬九儀在大行人九穀六畜之數要在職方氏由是懷方而遠物至合方而好善同形方而大小相比訓方而上下志通左傳鄭伯男也國語男作南古文男南通漢元鼎四年封周後孽子嘉為周子南君蓋封以子男之爵男借作南也初元五年進爵為侯綏和元年又進爵為公與殷後孔吉皆為公地各百里則其初不滿百里非子男之爵歟薛瓚顔師古注皆非也酈道元謂衛將軍文子為子南彌牟其後有子南徑徑朝於魏後惠成王如衛命子南為侯秦并六國衛最後滅疑嘉是衛後故氏子南而稱君其説亦非也世本靈公生昭子郢郢生文子木郢字子南木字彌牟子以父字為氏猶魯仲遂之子為仲嬰齊故曰子南彌牟其後遂為子南氏若仲遂之後以仲為氏矣公羊説孫以王父字為氏失之竹書命子南為侯者蓋靈公本欲立子南子南立則名正言順為衛後者莫宜於子南氏故惠成王命子南為侯此紀年之意也若以氏為爵吾所未聞且漢捨周後而立衛後司乎又稱君而氏子南是為公子郢立後則又何説耶男訓為任讀亦如之方言戴鵀一名戴南南猶鵀也則男南音義皆同矣子南即子男復何疑內王制注謂周公復唐虞舊域分五服為九其要服之方七千里疏云要服去王畿三千五百里四靣相距七千里是為九州之內康成以九州之內為采九州之外為流采者取其美物以當榖稅流者夷狄流移或貢或否禹貢荒服之外三百里蠻二百里流即周鎮蕃之地世一見之國然則要服曰蠻荒服亦曰蠻詩所謂百蠻指荒服也世一見者四塞世告至當鎮蕃之服在四方為蔽塞故曰四塞是為九州之外明蠻夷要服在九州之內矣王會篇比服次之要服次之荒服次之方千里之內為比服方千里之外為要服三千里之內為荒服是皆朝於內者比之言親先王所以親諸侯易之比卦取名於此注云比服名因於夏夏之比服周之賔服也管子千里之外二千里之內諸侯三年而朝習命二千里之外三千里之內諸侯五年而會至習命三千里之外諸侯世一見要服三千里四面相距六千里九命作伯故曰立為六千里之侯則大人從小行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼圭璋曰先朝聘以之璧琮曰加享禮以之琥璜曰將大饗以之周書諸侯奉圭當其朝而皆布乘黃覲禮侯氏奠圭及其享而亦陳匹卓康王之詰布乘黃朱謂陳四黃馬而朱鬛覲禮匹馬卓上九馬隨之卓猶的也以素的一馬為上此朝覲也皆先以圭致命然後陳馬於庭而享禮行焉諸侯之賵亦如之雜記曰上介賵執圭將命陳乘黃大路于中庭此非所謂圭以馬歟蓋弔之賵猶聘之享故其禮亦如之聘享或以皮或以馬聘禮曰庭實皮則攝之聘記曰庭實隨入左先皮馬相間可也則聘亦以皮馬矣惟聘用瑑圭璋短一寸為異耳璋以皮者亦以璋先之故曰圭璋特謂皮馬不上堂老子曰拱璧先駟馬拱璧者圭璋也此圭璋曰先也璧以帛琮以錦謂帛錦之上以璧琮加之士昏禮注云古文錦皆作帛蓋古錦帛通故不曰錦而皆曰帛璧琮九寸諸侯以享天子而諸侯自相享則以瑑璧琮享諸侯束帛加璧享夫人束帛帛讀為錦加琮此享禮之璧琮曰加也琥以繡璜以黼者謂天子饗諸侯諸侯自相享酬以繡黼而將以琥璜終南諸侯受顯服曰黻衣繡裳采菽天子命諸侯曰元衮及黼此王賜繡黼之文其錫之也王拜送爵以琥璜將之故曰琥璜爵詩曰承筐是將此大饗之琥璜曰將也春秋傳虢公晉侯朝王王饗醴命之宥皆賜玉五玨馬三匹宥者宥幣玉似琥璜不以繡黼而以馬錫馬見於易乘馬見於詩又不以乘而以三是何禮也王命諸侯之禮亡其數不可得聞矣孔頴逹曰聘禮禮賔之幣束帛乘馬致饗以酬幣致食以侑幣鄭云禮束帛乘馬亦不是過也則諸侯禮賔不以玉魯賄荀偃束錦加璧非禮也聘禮禮玉束帛以禮聘君未聞賄其臣雖有重賄亦不以璧宋以妾為夫人饋左師束錦與馬先之以玉則春秋六幣之亂久矣韓起聘鄭私覲子産以玉與馬是大夫而行諸侯之禮也楚公子棄疾私見鄭伯齊公孫青私見衛侯皆以馬而不以玉君子以為禮禮惟朝聘享俯乃有圭璋非是而以玉貨之而已春秋尚錦衛貨叔鮒魯貨子猶皆以錦鄭注二王之後享用圭璋經傳無文似出臆説古之聘也當其來聘則使卿辭玉於賔及其將歸則又使卿還玉於館蓋圭璋大器故始則辭終則還之而受璧琮説者以為輕財而重禮孔頴達謂六幣皆財也雖圭璋亦受之而不還豈其然乎圭璋璧琮琥璜作之為六器吉禮以事神合之為六幣賔禮以和好聯之為六玉凶禮以斂尸會同設方明六玉獨無琮康成謂上下之神非天地之至貴者而斂尸六玉又云取象方明蓋取上下四方之象也璜琮禮地方明即六宗天神也故不以琮覲禮三享皆束帛加璧而不言琮者省文穆王見許男于洧上祭父以天子命辭曰去兹羔用玉帛見許男不敢辭還取束帛加璧毛公舉幣玉康成謂子男於諸侯下其瑞享用琥璜下其瑞者瑑之可也曷為改用琥璜乎六物以和諸侯故太元曰秉圭戴璧臚湊羣辟明非羣辟不以圭璧也呂氏春秋乃云晉使荀息以屈産之乘為庭實而加以垂棘之璧是璧不以帛而以馬矣則六幣非亂於春秋歟杜預謂古之獻物必有以先魯賄荀偃以璧馬為鼎之先馬不上堂安得先之左傳先吳之鼎先吳猶故吳也吾聞圭先馬未聞馬先鼎失之甚矣吳越春秋太伯起城周三里二百步外郭三十餘里在西北隅名曰故吳人民皆耕田其中禮説卷十三
