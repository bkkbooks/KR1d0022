body:
  text: 禮說卷十二翰林院侍講惠士竒撰秋官一大司冦禁民訟入束矢禁民獄入鈞金管子曰小罪入以金鈞薄罪入以半鈞訟獄者三禁之而不直則入一束矢以罰之亦見齊語蓋束矢以示罰鈞金以贖􅓧禁之而不聽乃入束失鈞金說者謂訟獄者皆然誤矣矢取其直不直者入束矢金能見情無情者入鈞金若不入矢則是自服不直不入金則是自服無情乃所以禁民訟禁民獄也折獄不以剛舊說謂金取堅剛失之淮南子曰有輕罪者贖以金分訟而不勝者出一束箭注云金分者隨罪輕重有分兩箭十二為束案鄉射禮大夫之矢則兼束之以茅上握握謂中央又大射儀賓諸公卿大夫之矢皆異束之兼束者四矢異束亦然鄉射專指大夫言故云兼大射兼指諸公卿大夫言故云異束於握上謂可握而持然則束矢者四矢也舊說謂十二矢者蓋本漢書弓一張矢四發服䖍曰發十二矢韋昭曰射禮三而止每射四矢故以十二為一發然則一弓四十八矢其說又與毛鄭不同師古以一發為一放則四發為四矢然案魏百官名曰三公拜賜鶉尾鶻尾髇箭十二枚則服韋之說非無據也魯頌毛傳曰五十矢為束蓋本荀子論兵一弩負矢五十個之說康成謂一弓百矢蓋本書春秋傳彤弓一彤矢百之文此二說者一用之軍旅一以賜諸侯皆不言束也而謂秋官聽訟入矢亦如之其不然乎舜典金作贖刑注云金黃金呂刑其罰百鍰注云黃鐵孔頴逹謂黃金黃鐵皆今之銅也古贖罪以銅漢始改用黃金但少其數令與銅相敵康成駁異義言贖死罪千鍰鍰六兩大半兩為四百一十六斤一十兩大半兩銅與金贖死罪三斤為價相依附是古贖罪皆以銅也禮器內金亦謂所貢之銅注云金照物疏云金能照物露見其情此周禮禁民獄者所以入鈞金歟易噬嗑外卦為離離為火五行之位火承金坤之六五上升乾位得中而明故曰得黃金黃言中金言明也素問云金發而清明廣雅以清明為金神折獄以明得其情矣得情勿喜故有貞厲之戒焉禹貢金三品銅三色也魯頌大賂南金言南指荆揚王肅以三品為金銀銅孔穎達以為爾匹黃金之美者謂之鏐白金謂之銀則貢金銀者當以鏐銀為名也禹貢有鏐鐵錫鉛銀而無銅故知金為銅春秋僖十八年鄭伯朝楚楚子賜之金既而悔之與之盟曰無以鑄兵故以鑄三鐘此即荆揚所貢之金也古以銅為兵楚金利故吳越之劔南人貴而寶之弗使出境然則三品為銅信矣三色者青白赤也康成云今東萊稱或以大半兩為鈞與三十斤相去縣絶則鈞金猶金分蓋亦隨罪輕重之名矣晉律贖死金二斤失贖罪囚罰金四兩漢律贖死金二斤八兩皆黃金也小司冦掌外朝之政以致萬民而詢焉詢有三其三曰詢立君春秋王子朝與敬王爭立求助於晉晉欲助之而莫知適立也乃使士景伯涖問於周士伯立於乾祭而問介衆由是遂絶子朝之使而戴敬王君子曰禮夫禮立君必詢萬民也堯年老而子不肖舜有元德而在側微帝聞之而嶽牧不舉於是帝朝萬民而詢之廷民之所舉一如帝之所聞而當乎帝心於是史臣書之曰師錫帝介衆曰師以為舜有天下也衆錫之曷為不曰天錫之而曰衆錫之天遠而衆邇也不孚於衆而合乎天妄矣且古者立君問諸民不問諸神楚共王有寵子五人未知誰立乃大有事於羣望而祈焉密埋璧於庭而使五人入拜且曰當璧而拜者神所立也既而或跨之或加之或壓之皆可以為當璧則神之所命誰知之者適足以啓其覬覦之心而前有蒲宫後有奧主臣强於君末大於本亂幾亡國故古者立君問諸民不問諸神然則太卜曷為而卜立君卜立君者先王先蔽志而後命龜謀及卿士謀及庶人乃參之以卜筮未有不謀乎卿士不謀乎庶人而專信卜筮之說者也是故衆歸之者王衆去之者亡湯武革命堯舜巽命澤滅火曰革柔順剛曰巽剛為君柔為民言君中正而民順之矣太康尸位黎民二也成湯代虐兆民懷也帝癸喪邦衆弗協也武王克紂衆一心也故曰衆歸之者王衆去之者亡小司冦聽民之所刺宥以施上服下服之刑司刺求民情斷民中而施上服下服之罪注云上服劓墨也下服宮刖也凡行刑必先規識所刑之處乃後刑之疏云規識在體若衣服在身故曰服蓋漢法如此康誥曰嗚呼封有叙時乃大明服惟民其敕懋和又曰要囚服念五六日至於旬時丕蔽要囚明堂位曰百官廢職服大刑而天下大服說文當罪人曰從㚔從􅭋􅭋服罪也荀子曰書云義刑義殺勿庸以即豫惟曰未有順事言先教也故先王既陳之以道上先服之管子曰上不行則民不從彼民不服法死制則國必亂矣是以有道之君行法修制先民服也然則陳之以道先民服之及其要囚又加服念所謂上服也罰雖有倫猶曰未遜刑一人而天下服殺一人而萬民和所謂下服也書曰恫瘝乃身程典曰余體民如毛在躬拔之痛無不省蓋疾痛本諸身求諸民故曰一國之刑具在於身則下服必先上服也教之以三物糾之以五刑求之以五聽然猶必三刺三宥三赦而後加刑則民之陷於刑者亦寡矣成康之際天下安寧刑錯四十餘年不用者以此康成以漢法解周官似失之呂刑上刑適輕下服下刑適重上服輕重以權惟明克允苟非服念焉能用權五刑故有五服傳曰罪多而刑五喪多而服五上附下附列也然則服讀為附考工記牝服服讀為負呂刑上服下服服讀為附蓋服本有附音並非改字不識字而自謂通經妄矣附之上下如喪之輕重矣或從重而輕或從輕而重或恩輕而義重或名重而情輕上附下附皆有等比服問所謂列猶呂刑所謂權我所謂服者大明服也後漢太尉劉愷奏議引呂刑曰上刑挾輕下刑挾重而上服下服禮記服作附蓋服與罪定而施刑附謂罪疑而議減王制曰附從輕小司冦八辟亦曰麗邦法附刑罰附者律之比例挾猶舉也上刑挾輕下附者舉輕以明重下刑挾重上附者舉重以明輕所謂上下比罪必察小大之比以成之者也下附謂小比上附謂大比大小猶輕重已行故事曰比荀子曰有法者以法行無法者以類舉謂之附莊子曰以刑為體謂之服士師五禁一曰宮禁二曰官禁三曰國禁四曰野禁五曰軍禁康成謂古之禁書亡矣今宮門有符籍官府有無故擅入城門有離載下帷野有田律軍有囂歡夜行之禁其粗可言者今漢律亦亡其粗莫能言矣離載者載奇兵也韓非子曰非傳非遽載竒兵革罪死不赦離之言奇載而下帷是為姦非若兩人同車法所不禁也賈疏失之士師野禁即大司冦之野刑所謂上功糾力者謂民農則重本重本則少私義少私義則公法立力乃專一是故丈夫不織而衣婦人不耕而食男女貿功以長生敬時愛日非老不休非疾不息非死不舍故謂之糾力呂覽上農篇野禁有五古之禁書猶存其略焉庶人不冠辨娶妻嫁女不酒醴聚衆農不上聞不敢私籍於庸地未辟易不操麻不出糞齒年未長不敢為園囿量力不足不敢渠地而耕農不敢越畔賈不敢為異事山不敢伐材下木澤人不敢灰僇羅網罝罦不敢出於門罛罟不敢入於淵為害於時也苟非同姓男不出御女不外嫁以安農也灰僇者月令仲夏母燒灰燒灰者僇庸謂傭賃者而云不敢私籍則古有在官之傭故遂師得移用之以救其時事歟男女嫁娶不出鄉里則民無百里之戚不敢越鄉而交大司徒所謂聯兄弟以安民蓋如此孔子曰入其境田疇易草萊辟溝洫治此在上者恭敬以信故其民盡力也入其邑墻屋完固樹木甚茂此在上者忠信以寬故其民不偷也是為野禁亦曰野刑不禁以法而禁以身不刑其體而刑其心故其時野無曠土國無罷民康成以田律當之誤矣士師五戒四曰糾用諸國中五曰憲用諸都鄙康成謂糾憲未有聞焉案小司冦正歲觀刑象乃宣布於四方憲刑禁則憲者國之刑書小宰以宮刑憲禁于王宮內宰憲禁于北宮蓋皆宮中之刑而表縣之以為法小宰掌宮之糾禁宮正亦掌焉宮正糾德行內宰糾其守則糾亦用諸宮中州里糾過惡黨正糾戒之鄰長相戒相受鄉遂縣之士亦各糾其民則皆用諸國中者也大司冦糾力糾守糾孝糾職糾恭遍及萬民矣戰國策安陵君成侯者奉襄王之命以守安陵也手受大府之憲憲之上篇曰子弒父臣弒君有常刑不赦國雖大赦降臣亡子不得與焉安陵說苑作鄙陵漢縣屬潁川郡戰國屬魏為安陵小國也韓魏滅而獨存所謂大府之憲即士師之憲用諸都鄙者而稱憲之上篇則憲即古之章也管子正月之朔布憲於國百吏習憲於君前受憲於太史太史既布憲入籍於大府憲未布莫敢就舍就舍謂之留令罪死不赦憲既布有不行憲者謂之不從令罪死不赦考憲而有不合於大府之籍者侈曰專制不足曰虧令罪死不赦是為首憲春官太史之所藏頒之官府都鄙者即此布憲執旌節以宣布於四方達于四海蓋正月布之正歲縣之周正月夏正歲墨子曰先王之書出國家布百姓者憲也晏子曰君子有道懸之閭士師五禁書而縣于門閭者以此士師八成七曰邦傰傰一作朋注云故書朋作傰鄭司農讀為朋友之朋案漢書王尊傳有南山盜傰宗蘇林曰傰音朋蓋本鄭司農之讀而失焉者也晉灼音倍得之說文省作倗讀若陪晉音本此顏師古亦以晉音為是則傰非朋審矣古有朋無黨同道為朋阿黨為傰八成者四方之亂獄王命訝士成之立氣勢結私交作威福君子犯禮小人犯法無守職奉上之義有背公死黨之名故曰邦傰謂之亂獄管子幼官篇所謂散羣傰署也强者為圈弱者為屬圈屬羣徒私相署置故王命訝士以成之者散之焉䣙從邑地名漢功臣表䣙成侯師古曰䣙音陪又普肻反從邑為䣙從人為傰傰古倍字皆從人以朋咅得聲司農破為朋或作堋說文引虞書曰堋淫于家堋與倗通廣雅否弗倗粃皆非佳語亦猶姦宄竊盜云爾淮南中詗邦汋也勝詭隂謀邦賊也吳之宰嚭梁之朱异身內情外國將生害邦諜也薛宣之子創戮近臣犯邦令也𢎞羊之客詐稱御史嬌邦令也陽虎之囚季孫為邦盜也朱博之附傅晏為邦傰也杜業之毁師丹為邦誣也是為士師掌士之八戒士指訝士訝士諭邦國之罪刑成四方之亂獄蓋以此荀子曰蔽公者謂之昧隱良者謂之妒奉妒昧者謂之交譎交譎之人妒昧之臣國之薉孽也此邦誣之謂歟妒昧為誣交譎為汋雖有妒昧之臣苟非交譎則妒昧不行故八成以邦汋始邦誣終書傳曰今之聽民求所以殺之古之聽民者求所以生之不得其所以生之之道乃刑殺君與臣㑹焉聽謂議獄察其辭辨其訟異其要近者聽于朝遠者上於國鄉士一旬遂士二旬縣士三旬方士三月司寇聽之斷其獄弊其訟羣士司刑各麗其法以議而求所以生之之道若求其道而不得則士師受中刑殺仍登中於天府蓋司民登數司冦登中皆於祖廟使神監之若欲免其死則近者王㑹其期逺者王令三公及六卿㑹其期蓋當司冦聽之之日而往議之書傳所謂君與臣㑹焉者也說者曰㑹者就也春秋之例魯往㑹於他處則書曰會某若公在外彼來就公則曰㑹公文十三年衛侯㑹公于㳫是就之義㑹必有期凡我㑹彼彼㑹我各及其期曰㑹若不及其期則曰弗遇譏無信也桓十年秋公㑹衛侯于桃邱弗遇然則㑹必有期明矣故司刑議獄亦曰㑹其期期者一旬二旬三旬之期也君與臣㑹君不為卑臣不為伉春秋叔老㑹鄭伯公孫敖㑹晉侯禮也左氏謂卿不㑹公侯失之矣不明周禮焉得通春秋都家不會何也方士掌都家訝士掌四方之訟獄言四方則兼都家邦國矣有罪刑則明以諭有亂獄則往而成都家亦如之故不言㑹也且四方之聽朝冡宰贊之矣豈都家獨不然乎訝士諭罪刑於邦國凡四方之有治於士者造焉注云士謂士師也讞疑辨事先來詣訝士乃得達於士師如今郡國亦時遣主者吏詣廷尉議者案孝景五年詔曰諸獄疑雖文致於法而於人心不厭者輒讞之注云讞平議也後元年詔曰獄疑者讞有司有司不能決移廷尉有令讞而後不當讞者不為失欲令治獄者務先寬然則四方之有治于士者造焉治猶讞造猶移有疑則讞不決則移愼之至也亦欲使邦國之治獄者務先寬也漢之廷尉周之士師造士師猶移廷尉爾郡國有疑獄皆讞廷尉春秋桓二年春王正月戊申宋督弒其君與夷及其大夫孔父三月公㑹齊侯陳侯鄭伯于稷以成宋亂穀梁曰以者內為志焉爾公為志乎成是亂也此成矣取不成事之辭而加之焉於內之惡而君子無遺焉爾公羊謂內大惡諱而目言之者以逺也左氏亦謂成宋亂者為賂故皆非也賂者取郜大鼎于宋固明書之而不諱矣取賂在後成亂在前左氏一之尤失經義公欲成亂故㑹於稷卒取賂而還自是兩事春秋屬辭以直不以罔宋亂已成取不成事之辭而加之是罔也非直也豈聖人之心哉說者求其義而不得則曰成者平也平宋亂也如其說則曷為書成而不書平書成則非平亦明矣蓋自古訓亡而孔子之雅言亦絶學者遂莫能明春秋一字之辭由是杜預之徒妄為之說蓋成者斷獄之名王制所謂成獄辭也凡聽五刑之訟必察小大之比以成之史以獄成告於正史司冦吏也正於周鄉師之屬今漢有正平丞秦所置正聽之正以獄成告於大司冦大司冦聽之以獄成告於王王命三公參聽之三公以獄成告於王此之謂成獄辭刑者侀也侀者成也一成而不可變故謂之成秋官訝士掌四方之訟獄四方有亂獄則往而成之成之者聽之也不可謂之平平者和解兩家訓成為平妄之甚矣四方亂獄莫大於弒君桓往成之不成而退反取賂焉孔子直書之傷天下之無王也地官調人凡過而殺傷人者以民成之注有兩說一謂和解之一謂立證佐成其罪兩說皆未允以民成之者與民共聽之而已魯公孫敖為襄仲聘而自娶焉仲將攻之公止之惠伯成之使仲舍之公孫敖反之此成之之事也如但和解兩家又何必使舍之且使反之乎舍之反之非所以斷成其事歟邾婁定公之時有弒其父者有司以告公瞿然失席曰是寡人之􅓧也寡人嘗學斷斯獄矣臣弒君凡在官者殺無赦子弒父凡在宮者殺無赦殺其人壞其室汙其宮而瀦焉蓋君踰月而后舉爵所謂四方有亂獄則往而成之者蓋如此春秋所謂成宋亂者亦以此詩曰虞芮質厥成質者劑也兩造之辭為兩劑故曰以兩劑禁民獄虞芮之獄文王成之明宋之亂桓公不能成也合詩禮參觀則春秋之書法見矣竹書帝啓八年帝使孟涂如巴涖訟涖者往而成之也獄訟成士師受中中者獄訟之成辭故都家刑殺士師書成在官曰官成在國曰邦成以待萬民之治謂之中歲終則天府登中故受中之官名為典成之吏士師之八成由此出焉冡宰八法之官成亦曰八成八成者八聽也一曰聽政役二曰聽師田三曰聽閭里四曰聽稱責五曰聽祿位六曰聽取豫七曰聽買賣八曰聽出入晉伐鄭楚子反救鄭鄭伯與許男訟焉子反不能決曰側不足以知二國之成側子反名然則聽訟謂之成也朝士之地傅即司約之地約傅謂傅别約謂約劑皆判書也藏於天府若有訟者則開府視書以聽其訟故曰凡屬責者以其地傅而聽其辭責者訟也論語內自訟包咸注云訟猶責也屬責者地訟也戰國策云邦屬而壤挈者七百里呂氏春秋亦云吳之與越接土鄰境壤交通屬高誘注云屬連也鄭司農謂田地町畔相比屬故爭界而訟如魏清河平原爭界八年更二刺史皆不能決冀州牧孫禮請以明帝初封平原圖決之便可立斷古者邦國土地人民戶口車服禮器皆有圖丹書之以為信謂之丹圖如民約則書于戶口圖地約則書於土地圖器約則書于禮器圖此司約所謂小約劑書于丹圖者歟又封建諸侯亦有圖至漢魏猶然故明帝所封平原王則有平原圖以圖決訟朝士職所謂以其地傅而聽其辭也案圖驗界宜屬平原而曹爽偏聽清河之辭乃云圖不可用當參異同是謂地傅不足慿丹圖不可信故孫禮為之歎息而流涕焉小宰職曰聽閭里以版圖謂訟地者以版圖決之地傅者版圖也朝士職凡盜賊軍鄭司農謂盜賊羣輩若軍非也軍謂持兵者春秋襄二十五年吳子謁伐楚門于巢卒何休曰吳子欲伐楚過巢不假塗卒暴入巢門門者以為欲犯巢而射殺之君子不責其所不知故與巢得殺之使若吳子自死文所以彊守禦也書伐者明持兵入門乃得殺之然則不持兵不得殺之明矣雖羣輩共入鄉邑及人家而格殺之則殺之者不得無罪以其不持兵也苟持兵豈必羣輩而後殺之無罪哉故不徒曰盜賊而又曰軍所以正盜賊之名也無故持兵入人之門雖傷國君猶若無罪然春秋思患豫防之意深矣渤海盜賊起太守龔遂單車之官移書屬縣諸持鉏鉤田器者皆為良民持兵者乃為盜賊然則漢律亦然不持兵者不為盜也左傳凡兩軍相攻曰軍某師則軍訓為攻與春秋書伐同義司刺掌三刺因以名其官三刺者三訊也一訊羣臣再訊羣吏三訊萬民徵訊其人考訊其阜訊問也阜衆也愼之至也是為刺其象棘棘外刺而赤心故樹棘為位象以赤心三刺焉易曰係用徽纆置于叢棘蓋棘者斷獄弊罪之地刺者哀鰥哲獄之情康成謂三刺罪定則殺之若三刺而情可原則宥之且赦之矣司刺掌三刺三宥三赦之法以求民情斷民中豈無宥且赦者而惟戮是聞必不然也則刺非殺也春秋僖公二十有八年公子買戌衛不卒戌刺之成公十有六年刺公子偃公羊謂內諱殺大夫故曰刺穀梁謂先名後刺殺有罪先刺後名殺無罪則直以刺為殺矣愚謂刺之者訊之也春秋殺大夫未聞列其罪獨公子買先列其罪而後刺之則刺之非訊之而何且又安知刺公子偃者先刺之而後殺之歟抑先刺之而後宥之且赦之歟如曰刺之者殺之則春秋書刺與書殺等耳何諱之有乎晉獻公令奄楚刺重耳重耳逃於翟令賈華刺夷吾夷吾逃於梁其實未嘗殺也惟文公刺懷公於高梁則直殺之矣內傳言殺外傳言刺然厲公殺三郤亦云使胥之昧與夷陽午刺郤至苦成叔及郤錡則是春秋殺大夫列國皆曰刺以掩其專殺大夫之名及孔子修春秋始改書殺以著其專殺大夫之罪獨於內仍書刺者諱言殺故書刺則刺非殺益明刺者或殺之或宥之或赦之罪未定之辭也吳王還自伐齊乃訊申胥訊者刺之刺者問之故申胥釋劔而對漢安檀侯劉福坐為常山太守祝上訊未竟病死注云訊考問之古詛字所謂刺公子偃者亦如此方言凡草木刺人自關而西謂之刺江湘之間謂之棘然則刺與棘通大司冦聽之棘木之下者刺之之謂也漢置刺史奉詔察州爾匹訓為殺似失之宋書百官志曰刺之為言猶參覘也寫書亦謂之刺漢制不得刺尚書事司約掌邦國及萬民之約劑一曰治神之約二曰治民之約三曰治地之約四曰治功之約五曰治器之約六曰治摯之約大者書于宗彞小者書于丹圖古者天地異官民神異業故首治神而治民次之治地次之九職任於民六府修於地而功成焉故治功次之有功乃受器故治器次之有五器因有三帛二生一死摯故治摯次之六者皆有約約者結也要也子貢曰言以結之明神以要之神約者非命祀之謂蓋謂凡邦之大盟約北面詔明神大司冦涖之司盟掌之戎右贊之司約書之而登其書于天府其二在司盟者是也天官以八則治都鄙而馭神之則為先秋官以六約治萬民而治神之約為上易之觀也省方觀民神道設教者以此民約者小司徒邦國之比要鄉師州里之役要也凡大司馬之所簡稽旅師之所興積質人之所賣儥泉府之所斂賒有約劑者皆是若夫遷殷而盤庚命衆封衛而陶叔授民非司約之所掌也地約者封人所封之四疆量人所量之涂數形方所正之離遂人所造之形體匠人所畫之溝洫皆是詩曰王命召伯徹申伯土疆正其界也春秋郤至爭鄇田閻嘉爭閻田周之東遷也地約之亂久矣故子駟為洫四族喪田因之作亂宋鄭之間有隙地兩棄之而以六邑為虛惡其爭也然則約劑大亂開視約書不信者殺先王早已防之嚴矣功約者如二虢為卿勳在王室藏於盟府者是也周官凡有功者銘書於王之太常而司常畫其象司勳藏其二焉春秋之義苟有以定國安民必書功于廟故襄公朝晉獻子書勞禮也器約者凡喪祭賓射吉凶禮樂之器皆是春秋列國大夫亦得受天子之器大路先路次路三命再命之服而魯叔孫穆子之聘於周也王賜之路復命於君君復賜之使三官書之司徒書名司馬書服司空書勳衛仲叔于奚有功賜繁纓與曲縣之樂亦書在三官蓋器約之書於丹圖者如此魯衛三卿故書為三莢則天子六官皆書而藏之可知故約劑亂而六官辟藏也周禮在魯相證益明矣摯約者謂六摯大宗伯作之射人相之司士擯之膳夫膳之古者相見必以摯故有士相見禮春秋禮廢已久定公㑹晉師於瓦范獻子執羔趙簡子中行文子皆執鴈魯於是始尚羔是時大國之卿當小國之君皆執皮帛繼子男而遂不復以執羔為尊貴矣至是晉上卿執之魯人始貴而尚之記者慨摯約之失官也宗彞者宗廟之常器所謂銘勳彞器厯世彌光韓非子曰至安之世不著名於圖書不録功於盤盂記年之牒空虛盤盂宗彞之屬圖書即丹圖古者功名著乎盤盂銘篆存乎壺鑑皆在記年之牒號曰春秋而謂盛世無之豈其然乎或曰丹圖者丹繪也夏禹撰元要集寶書書以南和丹繪封以金英之函檢以元都之印其言不雅馴石可破不可奪堅丹可䃺不可奪赤故古之圖書以丹示信焉斐豹𨽻也著於丹書書其罪也漢封功臣申以丹書之信書其功也說文引揚雄說以為漢律祠宗廟丹書告則漢之告廟以丹書不獨封功臣矣抑又聞聖人上知千歲下知千歲非意之也蓋有所自也緑圖幡薄從此生焉古者緑圖記千歲之事丹圖書萬民之約民惟邦本本固邦寧千歲之事在其中矣緑圖幡薄亦奚以為幡薄者􅩴㡗也廣雅云􅩴㡗謂之其文皆從巾故曰幡以其為物也薄故曰薄其色赤故曰丹圖捭蒼云􅩴㡗赤紙所謂赫蹄書孔頴達曰近世魏律緣坐配沒為工樂雜户者皆用赤紙為籍其卷以鉛為軸蓋古之幡薄也丹書之遺法荀子曰誓誥不及五帝盟詛不及三王交質子不及五伯亦見穀梁董子曰戰不如不戰然而有所謂善戰盟不如不盟然而有所謂善盟不義之中有義焉然則會盟非歟秋官曷為有司盟也曰秋官之盟非春秋之盟春秋之盟不行於三王之盛世秋官之盟五帝用之然則二典曷為不言盟曰虞禋六宗周祀方明一也皆不言盟而盟禮具焉矣虞禋六宗而覲四嶽羣牧周祀方明而覲公侯伯子男臨之以上帝涖之以羣神非盟而何是故春秋善胥命而詩人刺屢盟其心一也古者非會同不盟時見曰會殷見曰同非此時而盟謂之屢盟盟禮已亡先儒無說覲禮加方明於壇上則會盟之禮猶存其略焉方明者六宗也其神卑於上帝尊於山川其主方四尺木為之號曰方明設六色上元下黃東青南赤西白北黑設六玊上圭下璧南璋西琥北璜東圭六色以象之六玊以禮之尊而宗之故曰六宗楚辭九章亦云五帝折中六神嚮服山川備御司盟所謂北面詔明神即此六神者六宗之神方明者六宗之位或曰六神五括吉祥之星見韓非飾邪篇司盟盟萬民之犯命者詛其不信者有獄訟者則使之盟詛詩曰出此三物以詛爾斯毛傳云民不相信則盟詛之孔疏謂犯命者盟之不信曰詛之盟大詛小盟詛皆有辭墨子曰昔者齊莊公之時有王里國中里徼二子者訟三年而獄不斷齊君以為殺之恐不罪釋之恐失有罪乃使之人共一羊盟齊之神社二子許諾於是泏洫􅹜羊而漉其血讀王里國之辭既終矣讀中里徼之辭未半也羊起而觸之折其腳祧神之擊也音害殪之盟所著在齊之春秋司盟所謂有獄訟者使之盟詛其禮蓋如此雖事近乎誕而云在齊之春秋則非無據矣墨子雖涉異端敢於侮聖談道者斥之而我獨有取焉者以其去聖人未遠也盟禮既亡而共羊盟社漉血讀辭其禮存焉所謂齊之神社者其說亦見墨子燕有祖齊有社稷宋有桑林楚有雲夢此男女之所屬而觀也春秋莊公二十有三年夏如齊觀社穀梁以為尸女尸女者主為女往爾以觀社為名讀春秋者疑之及觀墨子而其疑渙然釋矣故不讀非聖之書者不善讀書者也毛傳謂三物君以豕臣以犬民以雞而不言羊秋官小子羞羊珥於社稷珥祈神聽事類於盟墨子所謂盟於神社也然則盟詛蓋用羊歟孔疏謂詛用一牲公子鱄之去衛也濟河而盟曰昧雉彼視昧古蔑字蓋盟也而其辭則詛矣戰國策齊衛先君刑馬壓羊盟曰後世有相攻者如此牲古㑹盟之辭也盟有大小詛亦如之三物亦不必豭犬雞楚趙同盟毛遂歃血兼取雞狗馬是盟之大者三物並用矣天子馬牛諸侯犬豭大夫以下雉雞而兼用羊羊者祥也上下同之或曰獬豸神羊古者決獄命觸不直說苑奉使篇曰齊魯之先君相與刳羊而約曰後世子孫敢有相攻者令其􅓧若此刳羊是古之盟約皆用羊矣旅上帝饗諸侯職金共金版康成引爾匹鉼金蓋冶金謂之鍊鍊金謂之鉼鉼金謂之版論語說桀殺龍逢地出金版誕矣太公金版玊匱劉歆以為近世之書信哉金版者國之典策也周書大聚篇周公旦陳營邑建都之制别隂陽之利水土之宜命曰大聚武王乃召昆吾冶而銘之金版藏府而朔之蓋藏之府朔旦省而行焉昆吾者職金之官也四月孟夏王嘗麥於太祖命大正正刑書假於社各牡羊一牡豕二王在東序大正居戶西南向九州伯咸在西向王升自客階作策執策從王若曰豫小子聞古有遺訓豫用皇威不忘祇天之明典爾執以屏助豫一人集天之顯亦爾子孫其常能憂恤乃事勿畏多寵無愛乃嚚亦無或刑于鰥寡非罪惠乃其常大正書乃降大史策刑書九篇以升授大正乃左還自兩柱之間針大正曰欽之哉諸正敬功順爾臨獄無頗保寧爾國世世不殆大史乃降大正乃中降王則退是月大宗序天時祠大暑少宗祠風雨百享大史乃藏之于盟府以為歲典所謂銘之金版藏府而朔之者也刑書九篇是為九刑大正者大司冦凡秋官皆曰正王制正聽之漢有正平丞說者謂泰所置蓋周本有是官而秦改置云爾旅上帝作策告天饗諸侯作策命之西京賦乃為金策用錫此土是古䇿皆以金矣太公金匱曰屈一人之下申萬人之上武王曰請著金版故莊子謂之金版六韜鄧析私造刑書名為竹刑明國鑄刑書以金不以竹也銘之版曰刑書銘之鼎曰刑鼎二者不同杜預一之誤矣國家大訓或書之玊或銘之金皆曰版奉為式故祈招之詩曰式如玊式如金大戴禮保傅篇曰素成胎教之道書之玊版藏之金匱素問曰著之玊版每旦讀之名曰玊機左傳庀刑器孔疏云書之于版故號為器吳越春秋金簡玉字皆瑑其文墨子曰書於竹帛鏤於金石七略曰太公金版職金凡國有大故而用金石則掌其令注謂用金石者作槍雷椎椁之屬賈氏無疏學者瞢焉雷與椎金石也槍與椁竹木也連類及之凡守城有鹿角槍埋於坑拒馬槍塞於路皆木也揚雄傳木雍槍纍師古云以木擁槍蘇林云竹槍廣雅云簇謂之箛一作謂之笡是為箛槍蔡謨與何驃騎書所謂數百步內布竹箛如蝟毛賊不能飛者通俗文曰剡葦謂之槍蓋取竹葦而鋭其端兵略訓所謂剡摲筡即此鼂錯傳具藺石如淳曰城上雷石雷一作礧陳思王征蜀論云下礧成雷榛殘未碎潘嶽汧督誄辭所謂􅙏音的以鐵鎖機關既縱礧而又升焉是也一名炮石閒居賦云炮石雷駭注云炮石今之拋石炮與拋通音匹孝反范蠡兵法飛石重二十斤為機發行三百步說文建大木置石其上發以機以磓敵一名旝魏志謂之霹靂車亦曰拋車霹靂與雷象其聲也後世易石以火號震天雷蓋師雷石之遺意而加酷矣椎者金椎椁一作桴誤墨子雜守篇曰凡禦雲梯之法必廣城以禦之不足則以木椁之左百步右百步然則椁者禦衝之具因雷而及槍因椎而及椁乃竹木非金石也椁讀如公羊恢郭之郭蓋恢而大之之名或讀為揨揨乃鼓桴誤矣一說發石之木名檑故曰槍雷後世易以火號飛火槍蓋其遺術椁讀為鐓蓋千金椎也秦始皇造橋鐵鐓重不可勝刻作力士像以祭之鐓乃可移動是為千金椎書甘誓湯誓皆曰孥戮汝孔安國云辱及汝子言耻纍也又云古之用刑父子兄弟罪不相及今云孥戮權以脅之使勿犯蓋明知古無從坐之法而曲為之辭令出惟行犯者不赦權以脅之非通論也案說文無孥後人所造帑在巾部金幣所藏左傳鳥帑帑為尾鳥之後也故人之妻子亦曰帑左傳秦人歸其帑詩曰樂爾妻帑毛傳訓帑為子俗讀帑為吐蕩反因作孥以别之由是奴帑孥相亂而不可復辨矣鄭司農解周官引書曰奴戮汝則孥當作奴明甚泰誓囚奴正士論語箕子為奴許叔重曰奴婢皆古之罪人也司厲職其奴男子入於罪𨽻女子入於舂藁罰弗及嗣帝之德也罪人以族受之殘也收帑之律始於秦古安得有帑戮之刑哉費誓汝則有無餘刑非殺先儒以為此即帑戮之刑王肅謂同産皆坐無遺免者康成謂奴其妻子不遺種類孔安國謂刑者非一皆非也古之行師儲有餘備不虞乏軍興服上刑無餘非乏罪亦非殺非殺奈何戮之為奴名勒丹圖入于罪隸職在司厲所為奴戮者如此司農引書及論語箕子左傳斐豹為證得之康成謂奴從坐而沒入縣官者乃漢法非周制也孔安國尚書作孥戮史記作帑戮漢書作奴戮說苑晉誅羊舌虎叔向為之奴亦見呂氏春秋蓋春秋亦有從坐者然祈奚卒救而免焉益信古無之矣郤芮食采于冀故曰冀芮與呂甥謀弒文公依秦漢法當族然罪止及身并奪其邑而已其子缺未聞從坐也後卒為卿復與之冀春秋且然而况先王之世乎鶡冠子曰伊尹酒保太公屠牛牛古音隅與師奴協管子作革百里奚官奴海內荒亂立為世師官奴者罪隸之奴也司圜收教罷民凡害人者弗使冠飾而加明刑焉康成謂著墨幪蓋古之象刑尚書大傳曰唐虞象刑上刑赭衣不純純緣也中刑雜屨下刑墨幪以居州里而民耻之謂出圜土居州里民猶耻之司圜職所謂雖出三年不齒者也愼子曰有虞之誅以幪巾當墨以草纓當劓以菲履當刖以艾鞞當宮布衣無領當大辟斬人肢體鑿其肌膚謂之刑畫衣冠異章服謂之戮然則唐虞之象刑即司圜之明刑任之以事而收教之又異其章服以耻之罷民猶罷士亦曰惰游玊藻云垂緌五寸惰游之士𤣥冠縞武不齒之服蓋出圜土之罷民所謂三年不齒者則冠垂長緌當其未出則著墨幪焉而愼子謂以幪巾當墨則又不然罷民役之司空猶漢之城旦黥面曰墨墨而役之者黥為城旦不墨而役之者完為城旦著墨幪者蓋完為城旦者也當黥者墨其額不當黥者蓋墨其巾而已非謂廢墨罪而以幪巾當之也荀子不知其義乃曰象刑起於亂今悖矣國以耻為維人以耻為大有耻而格為良士無耻而免為幸民故德道禮齊象刑乃作惰游之士沈浮民間害於州里所謂無業之人嗜酤酒好謳歌巷游而鄉居者而其罪未麗於五刑康成謂書其罪惡於大方版著其背必不然矣雖害於人無大罪惡不昏作勞有似乎罷於是坐之嘉石入之圜土役之辱事以勞苦其體墨其巾長其緌縞其武服之以不齒之服以發其羞耻之心如是三年而猶不改是靦然人面而為禽則殺之無赦故曰不能改而出圜土者殺一說出者解脫而出漢律諸囚徒私解桎梏鉗赭加罪一等為人解脫與同罪故義縱為定襄太守凡獄中重罪有私入相視者盡以為解脫而殺之則是不能改而出圜土者漢律之所謂解脫也然寧成抵罪髠鉗解脫亡去宴然家居則漢律雖嚴輕罪解脫者不殺號為罔漏吞舟之魚古律罷民罪輕出圜土者殺則象刑較漢律而尤嚴矣先王以九職任萬民欲使天下無一人無業此象刑之所由作也刑不虧體罰不虧財以為如是可以止矣不然罷馬不畏鞭罷民不畏法雖增而纍之其無益乎賈山曰陛下即位赦罪人憐其亡髮賜之巾憐其衣赭書其背父子兄弟相見也而賜之衣然則著背之明刑起於秦漢也亡髮者賜巾是髠者得加冠飾矣蓋漢律之輕於古者如此後漢鄴令甄邵諂事梁冀有同歲生得罪於冀亡奔邵邵陽納而隂告冀冀捕殺之邵當遷為郡守而其母死乃埋尸馬屋先受官而後發喪及冀誅而河南尹李燮遇邵於塗使卒投車溝中笞捶亂下大署帛於其背曰諂貴賣友貪官埋母乃具表其狀遂廢錮終身此康成所謂書其罪惡於背者也然則漢之罪人衣赭者皆書背矣服不氏養猛獸掌畜及閩隸養鳥而皆教擾之夷隸與鳥言貉隸與獸言列子謂今東方介氏之國其國人數數解六畜之語者蓋偏知之所得上古神聖之人備知萬物情態悉解異類音聲會而聚之訓而受之同於人民故先㑹鬼神魑魅次達八方人民末聚禽獸蟲蛾言氣血之類心智不殊遠也神聖知其如此故其所教訓者無所遺逸焉然則服不氏能服不服之獸而教養柔馴其術本於古之神聖而夷隸貉隸能通鳥獸之言則皆偏知之所得也自伯益佐舜調馴鳥獸為百蟲將軍而崇伯鮌比獸之角能以為城舉其尾能以為旌召之不來仿佯於野蓋即黃帝帥熊羆狼豹貙虎為前驅鵰鶚鷹鳶為旗幟以力使禽獸之術得其術而或以為祟或以為神為神者乘龍而上天為祟者化為黃能而入羽淵後世其術絶然往往有能通鳥獸之言王充稱廣漢楊翁仲乘蹇馬之野有放眇馬於田者鳴聲相聞翁仲謂其御曰彼放馬眇其御曰何以知之曰彼罵此蹇此亦罵之眇其御不信往視之目果眇而管輅亦曉禽言則能解六畜之語者不獨東方介氏之國矣大司樂合樂以作動物一變而致羽物再變而致裸物三變而致鱗物四變而致毛物五變而致介物六變而致象物合樂以來之則鱗介皆可致而況毛羽之屬乎傅翼戴角分牙布爪者為物含齒戴髮四肢九竅者為人人與人為伍物與物為羣豈非物以異類而相遠人以同類而相親然而苟有教之誨之者人性固無有不善物性亦無有不馴是以明王在上鳥之惡者飛梟格獸之猛者白虎仁大戴禮曰聖人有國龍至不閉鳳降忘翼爪鳥忘距鷙鳥忘攖蜂蠆不螫嬰兒蚊虻不食天駒此之謂也魯臧文仲適晉宿於重館晉陽處父聘衛舍於寧嬴重館人寧嬴氏皆逆旅之官也賈逵孔朝以寧嬴為逆旅大夫則周未聞有此官劉炫以為逆旅之主庶民而已古之賓客不舍於庶民之家韋昭謂重館人守館之隸不知人與氏皆官名貴非大夫賤不至隸且館者候館也周制疆有寓望謂寄寓之樓可以觀望亦曰候館館有積遺人掌之其官中士下士而賓客羈旅則委人以稍甸之畜聚供之凡軍旅之賓客館焉臧文仲魯卿也卿行旅從非所謂軍旅之賓客歟委人之官與遺人等然則重館人者委人也國有賓客野廬氏令其徒擊柝以宿衛焉凡有節及有爵者至則為之辟而誅昌翔窺伺之姦然則寧嬴氏者野廬氏也周之廬猶漢之亭五里一郵十里一鄉鄉有亭亭有室風俗通曰亭留也蓋行旅宿衛之所古者列樹以表道挈壺以表井夜宿晝息賓至如歸野廬氏所謂宿息井樹者野之道路皆然矣十里一廬三十里一宿五十里一市宿有路室市有候館皆謂之廬故掌達道路之官為野廬氏國有五溝五涂以為阻固司險藩而塞之野廬氏叙而行之則舟車轚互車不必轘轅舟不必砥柱也有節者為之辟無節者不得行道路有節合符為驗以傳輔之田成子去齊之燕鴟夷子皮負傳而從至逆旅逆旅之君待之甚敬然則野廬氏蓋逆旅之君矣西晉十里一官㰚即古野廬之法然官非下士又無胥徒守之以貧民主之以賤吏則何足以禁奸禦暴乎且因之以殖利依客舍收錢名曰㰚稅故當時目為道路之蠧焉㰚門之設晨開昏閉即修閭之閭互所以禁止行人凡操持不物者行作不時者野廬氏禁之晨行者宵行者司寤氏禦之皆有道禁夜禁苟非罪人與奔喪莫不見日而行逮日而舍蓋日入慝作故古無夜行之人也太元曰晝人之禍少夜人之禍多潘嶽謂夜行者貪路皆以昏晨盛夏晝熱又兼星夜遂欲盡去官㰚獨留逆旅異乎吾所聞士師野禁亦曰道禁野廬氏掌之橫行徑踰蓋其一也徑謂之蹊釋名曰蹊係也射疾則用之故還係於正道康成亦云徑踰射邪趨疾禁之所以防姦謂不由正道昌翔觀伺將開冦盜之端故橫行徑踰者禁之有相翔者誅之則冦盜之端絶矣蹊田罪輕奪牛罰重說者以為輕重失倫橫行徑踰其細已甚矣豈無大於此者乎君子絶惡於其細禁姧於其微射邪趨疾未必遂為盜也而昌翔觀伺為盜之端遂萌於此野廬氏掌凡道禁塞其塗弇其迹則形勢不得為非使民無由接於姦邪之地故晏嬰治阿而築蹊徑者以此也孔門子游稱子羽曰行不由徑謂其行方夫由徑犯野廬之禁先王之世人人不由安見其方春秋禁書雖存而官失其職道禁之不行久矣子羽獨奉而行之以為先王之道存焉由此觀之則一步一趨無在而非先王之道也於呼此子羽之所以為方歟太元曰孔道夷如蹊路微如大輿之憂此之謂也衛有亂季羔逃之走郭門門者曰彼有缺季羔曰君子不踰又曰彼有竇季羔曰君子不隧蓋由徑則必踰缺踰缺則必隧竇不踰不隧必自不由徑始故曰徑踰踰謂踰缺注疏不明故補之詩云周道如砥其直如矢不行直道是謂橫行管子謂里域不可以橫通亦以此禮說卷十二
