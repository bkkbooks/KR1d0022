body:
  text: 禮說卷十四翰林院侍講惠士竒撰考工記輪人為輪牙也者以為固抱也司農以牙為輮書亦或為輮世間謂之輞案廣雅䡲􅵂即渠輮䡗輞也䡲􅵂說林作蟬匷曰古之所為不可更則推車至今無蟬匷注匷音矍而云車類誤矣鹽鐵論作蟬攫曰推車之蟬攫負子之教也韓非子曰古者朴陋故有珧銚而推車然則古之珧銚今之䡲􅵂皆車之輞歟釋名曰關西曰輮或曰䡑䡑急就篇作䡻讀若民牙與互通紡車之輪謂之互一名􅵂說文作籆云收絲者即紡車之輪所謂䇘也籆一作籰與匷攫文異音同實一物廣雅作􅵂從車得其正矣方言曰篗榬也兖豫河濟之間謂之榬注云所以絡絲者然則䡲即榬􅵂即篗也輪之輻望之欲其揱爾而纎案揱說文云人臂兒徐鍇曰梢長纎好也音所角切先鄭讀為簫一作簫一作梢音山交反甘泉賦梢夔魖抶獝狂梢與抶義同謂皆梢而去之說文舜樂曰簫韶訓簫為擊云以竿擊人左傳象簫南籥孔疏謂象簫武舞簫與捎通義取擊拂然則簫者干也舜舞干羽於兩階而有苖格簫韶九成而鳯凰儀逸詩曰鳳凰秋秋其翼若干其聲若簫有鳳有凰樂帝之心蓋干畫雜羽之文有似乎翼吹簫象鳳鳴舞干象其翼也則簫為干明甚曰象簫曰韶簫皆謂舞以干戚曰管象曰簫韶皆謂奏以簫管韶簫與簫韶猶象簫與管象也孔安國得之矣干為兵器有征伐之容故漢房中歌曰簫勺羣慝天門歌曰飾玉梢以舞歌梢即簫也執之以舞非干而何左傳建大車之輪以為櫓則車輻可當干記者言輻之形如干之象故曰揱爾廣雅㩋擊也音山育反廣韻採入三簫即古揱字捎藪捎溝皆與簫通輪人為輪望其轂欲其眼也先鄭讀眼為限後鄭云出大貌釋名云眼限也瞳子限限而出也與二鄭之說同然眼說文作輥云轂齊等兒案輥與掍通洞簫賦掍其㑹同兩都賦掍建章掍一作混其訓為同兼取約義集韻云束木也揚雄曰棍申椒與菌桂詩云約軧軧即轂也約謂革纒之而加漆焉非掍之象乎是為陳篆篆漆文也三十輻聚一轂㑹合齊同可謂轂之善矣方言曰掩掍同也江淮南楚之間曰掩宋衛之間曰掍掍誤為眼說文引周禮甚明從之為允菑蚤不齵則輪雖敝不匡養隂齊陽則轂雖敝不藃荀子弛易齵差淮南子唲齵之郤齵者參差有罅郤也玉篇云齒不齊管子輕重甲篇曰弓弩多匡䡔若禮切注云匡䡔戾礙也玉篇亦云軭車戾也賈生道術篇曰合得密周謂之調反調為戾然則不匡者菑蚤合密之調也藃先鄭讀為耗後鄭謂藃藃暴也晏子春秋云輪山之直木也良匠揉之其圓中規雖有槁暴不復羸矣後鄭謂後必撓減幬革暴起蓋槁則撓減羸則暴起兩說相證益明菑猶立也臿也義與剚同瓠子歌揵石菑即菑蚤之菑東方人以物臿地為剚剚一作菑輪人為轂轂小而長大而短則有柞與摯二病欲除其病莫若伸其圍以為長屈其長以為圍則長短大小均齊而二病除矣欲言轂圍先言牙圍六分其輪崇取一為牙圍三分其牙圍留一為牙面而踐地者也踐地之面不漆其餘皆漆椁其漆內之數而中詘之以其半為轂長即以其長為之圍以其圍之阞捎其藪凡測圓者必先得其心從心出線則面面皆等椁者度量之名度兩漆之內而中詘之則輪之心也輪內置轂轂內貫軸如此則軸正當輪心面面皆等然則中詘者測圓之法而轂之圍徑亦從此出焉先鄭謂藪空壺中後鄭謂當輻菑者捎除也阞三分之一也壺中謂轂孔所以容軸者而當輻入處謂之藪賈疏所謂轂大頭寬者指賢小頭狹者指軹寬狹處中者指藪也轂之兩頭為軹參分其轂二在外一在內為藪藪以置輻藪軹之間為賢軹者止也言轂止於此賢者間也言當藪軹之中間藪者聚也言衆輻之所聚狀若蜂藪云爾依注設數以轂圍三尺二寸而三分之取其一以為藪則藪圍一尺九分寸之六轂兩廂共徑七寸有竒足以內貫軸外受輻而無不勝任之患後鄭云輻廣三寸又云輻厚一寸則輻不圜何以知之以車人職知之車人職云輻長一柯有半其博三寸厚三之一此大車也其轂徑尺有五寸其輻橫濶三寸側厚一寸故書博或為搏徒丸反杜子春云當為博後鄭從之以此知輻不圜也如以為圜則大車之轂其圍四尺五寸一輻廣三寸三十輻共廣九尺而聚於四尺五寸之轂有是理哉或從故書博為搏搏言圍厚言徑輻圍三寸徑一寸乃可徑一圍三古之約法非密法也然如此則輻太弱轂太强强弱不相得非車之利也故輪人為輻三寸閷其二寸以為厚橫三側一然則曷為又曰股圍骹圍蓋輻之形如璧之羡規其四角隋他果反而不圜兩頭大小股骹似之故取以譬焉兩强不能相服故曰轂强必以弱輻衆弱足以敵一强故輻不扤而搖一强足以當衆弱故雖有重任轂不折康成謂輻入轂中猶蒲在水中為弱似未盡然所謂輻廣三寸半者亦隋長而非圜徑可知矣五分轂長去二為賢賢圍一尺九寸二分去三為軹軹圍一尺二寸八分賢軹皆有金各以法消去金厚之數則賢圍大于藪軹圍小于藪故賈疏曰寬狹處中鄭注所謂去一當作去二乃與藪相稱者是也據鄭注金厚一寸即用鄭氏算法徑當消去二寸則圍當消去六寸以六寸減賢軹兩圍則賢圍一尺三寸二分軹圍六寸八分案藪說文作橾云車轂中空讀若藪急就篇作䡦疑橾誤為槡從車從木一也噪誤為桑古音若藪漢讀為橾又扤一作仡方言曰僞古訛字謂之仡仡不安也注仡吾㪍反船動搖之貌則車之大扤狀如船矣凡揉牙外不亷注云亷絶也案說文揉作煣屈申木也從火柔聲亷作熑車網絶也從火兼聲長門賦曰心熑移而不省故注引鄭注曰熑絶也則知古本考工亦作熑矣集韻熑移作燫熪云火不絶兒燫省為亷其音同也或非誤當兩存又揉輻必齊注云揉謂以火槁之案槁一作嬌長笛賦曰嬌揉斤械注引鄭注曰揉謂以火嬌之釋文亦有二音一劉音苦老反者作槁一沈音居趙反者作嬌亦當兩存嬌與矯同蒼頡篇曰矯正也輪人為蓋蓋之柄為達常其杠為桯桯含達常者也蓋斗謂之部部者鑿孔以納蓋弓者也部厚一寸鑿廣四分其不鑿者上有二分下有四分合之為一寸下直二枚者鑿孔外內若一曰直內孔之下與外平而上低二分不鑿則上有四分下有四分其鑿者二分而已弓廣四分殺去二分而內于鑿內其端又殺去參分惟一分而已故曰鑿端一枚端謂弓頭也注云六尺之弓倍之加倍廣六寸九丈二尺六寸有宇曲之減謂近部平者二尺而四尺為宇曲低於部二尺撓之故低欲求其減之數則以爪末低於部二尺者為句即於曲處垂線長二尺為句宇曲四尺為弦求其股股十二以句積與弦積相減餘十二為股積除之股面三尺幾半也謂不滿三尺半內少方五寸以股面加尊二尺則弓長五尺幾半故曰可覆軹不及幹轄或作幹本作輨俱音管輪直且無橈則登陀縊其牛下陀緧其後說文馬尾今之般猶則般緧在馬尾故曰緧其後又緧一名馬紂故關東謂紂為緧一作䋺釋名曰䋺道也在後道使不得却縮也潘嶽疾王濟裴楷乃題閣道為謡曰閣道東有大牛王濟鞅裴楷鞦夾頸為鞅後道為鞦言濟在前楷在後也一作鰌荀子曰巨楚縣吾前大燕鰌吾後廣雅云綯紂緧也駟車之轅率尺所一縛詩五楘梁輈注云楘厯録也梁輈上勾衡一輈五束束有厯録也是為率尺所一縛說文云曲轅縛直轅纂縛一作􅵂借官切車衡三束也人直轅車一名暴居玊切又治車軸曰纂所眷切三鋒㦸方言謂之三刃枝單枝曰戈雙枝曰㦸南楚宛郢謂之匽㦸廣雅所謂雄㦸也張楫曰雄㦸胡中有􅟉者􅟉與距同橫捷曰􅟉亦曰內謂胡以內橫捷於㦸者也旁出為枝是為胡著柲直前為援援上為刺胡下為勾胡中為內內謂之􅟉其柄謂之柲其鋒謂之音敖其孑謂之㦺音辱春秋傳楚武王授師孑以伐隨孔疏曰孑者擊刺之兵有上刺之刃又有下鉤之刃晏子曰崔杼劫大夫盟㦸拘其頸劔承其心曲刃鉤之直兵推之急就篇有鑲鈎注云鑲者其刃却偃而外利以推攘而害人所謂直兵推之也鈎者形曲如鈎而內利以拘牽而害人所謂曲刃鈎之也曲刃謂胡如鈎內利禮圖畫㦸兩旁有枝胡中無􅟉三鋒向上而下無鈎此聶氏之臆造也春秋傳襄二十三年欒樂乘槐本而覆車櫟槐而覆或以㦸鈎之斷肘而死郭頒世說云舊制三公領兵入見皆交㦸叉頸而前叉者上刃鈎者下刃舊圖謂㦸支曲下為胡曲下者鈎也則知聶氏臆造失其舊矣說文云戈平頭㦸也㦸有枝兵也呂布營門射㦸正中小支小支胡也㦸旁曲枝故說文謂之枝兵戈亦有枝而平頭者蓋戈無刺也戈㦸皆勾兵皇矣詩所謂鈎援即此毛傳以鈎為鈎梯而不言援失之矣戈㦸有鈎有援直曰援曲曰鈎則鈎援為戈㦸又何疑乎淮南子曰古之兵槽矛無擊修㦸無刺而方言又有無刃之㦸秦晉謂之釨或謂之鏔吳揚謂之戈毛傳云殳長丈二而無刃然則無刃者殳無刺者戈兼而有之者㦸康成謂援之外句者胡也賈疏謂援七寸半亦以三寸為橫以四寸半向上為磬折如其說則援亦曲矣與胡何以别乎且援既曲又安得有著柲直前之刺也以此知賈公彥之說非也鄭司農謂援直刃胡其孑則援之外勾指胡明矣胡中無􅟉則下亦無勾康成謂胡以內接柲者亦謂􅟉也柲者其本接與捷通非􅟉而何孔疏云戈如㦸而橫安刃頭不向上故曰鈎孑又曰平頭馬融云鋝與鍰同俗儒謂鋝六兩為一川不知所出又云賈逵說俗儒以鋝重六兩周官劔重九鋝俗儒近是許叔重說文解字本於賈逵亦云鍰即鋝而謂十一銖二十五分之十三又云北方以二十兩為鋝則與馬融之說異矣康成謂今東萊稱或以大半兩為鈞十鈞為鍰鍰重六兩大半兩鍰鋝似同亦無定說呂刑孔傳云六兩曰鍰王肅亦云然孔疏謂康成之言多於孔王所說惟挍十六銖爾然亦不知所出也案小爾匹曰二十四銖曰兩兩有半曰捷倍捷曰舉倍舉曰鋝鋝謂之鍰二鍰四兩謂之斤賈逵所謂俗儒之說其詳蓋出於此載於孔叢故安國據以為傳然則三鋝重一斤二兩鋝一作選張敞好古文字其言曰甫刑之罰有金選之品應劭曰選音刷金銖兩名也顔師古曰選本作鋝鋝即鍰重六兩然則今文鋝古文選漢武帝造白金名白選選一作撰撰即鋝也音刷蘇林音選擇之選失之矣白選三品大者重八兩次六兩次四兩本無定數故諸儒疑之而不能决也尚書大傳云夏后氏死罪罰二千饌馬融云饌六兩蓋古選撰饌通皆與鍰同鍰史記作率索隱云舊本率亦作選書大傳一鐉六兩函人為甲犀甲七屬壽百年兕甲六屬壽二百年合甲五屬壽三百年鄭司農謂合甲削革裏肉但取其表合以為甲革裏肉者革之敗薉削去之則材良所謂視其裏而易則材更也康成謂屬者上旅下旅札續之數革堅者札長荀子曰魏氏武卒衣三屬之甲如淳謂上身一髀褌一脛繳一蘇林謂兜鍪盤領髀褌為三屬兜鍪胄也以胄為甲固非以脛繳為甲尤非上旅甲下旅裳甲裳三屬其札更長於合甲矣革之最堅者歟左傳組甲三百被練三千賈逵注云組甲以組綴甲被練帛也以帛綴甲而有盈竅半任力盡任力之說其說本於呂氏春秋邾之故法為甲裳以帛注云以帛綴甲公息忌謂邾君曰不若以組凡甲之所以為固者以滿竅也今竅滿矣而任力者半耳組則不然竅滿則盡任力矣邾君以為然然則察革之道先視其竅竅大則難盈故任力半竅小則易滿故任力全合甲者任力全之謂也而組練實為之助焉故曰隨繩而斫因鑽而縫竅者鑽空所謂視其鑽空而惌小孔貌則革堅者以此合甲之堅亦以此邾之綴甲舊以帛用公息忌之言而以組其後有人傷之者曰公息忌之所以欲用組者其家多為組也邾君不悅復用帛而不用組則是古之綴甲組練兼施矣綴以組謂之組甲綴以練謂之被練古之法也杜預排抵先儒撥棄古法乃云組甲漆甲成組文被練練袍如其說則組甲三百有甲無袍被練三千有袍無甲也而可乎燕王思欲報齊身自削甲札妻自組甲絣削甲札者司農所謂削其裏而取其表也組甲絣者太元曰錯絣也廣雅曰縯於近切布耕切絽音呂䌎力若切絣也揚雄傳曰絣之以象類晉灼以絣為雜師古以絣為併併以連之雜以撰之所以針縷縩繺之間攕揳唲齵之郤此非古合甲之法歟詩曰貝胄朱綅傳云以朱綅綴之綅古纖字見間傳注謂以朱線綴甲少儀國家靡敝甲不組縢注云組縢鎧飾以組飾之及襟帶也合觀衆說則賈逵之說益信一說屬者札也養由基蹲甲而射之徹七札焉晉惠公之右路石奮投而擊繆公之甲中之者已六札矣未徹者特一札耳然則甲皆七屬也蓋札多則重重則不便屈信而易敗凡物剛者恆折是以壽短札少則輕輕則利於屈信而耐久凡物柔者常存是以壽長函人三甲首曰七屬師行三十里持重者服之減為六屬又減為五屬出奇制勝趨利者服之而魏氏武卒操十二石之弩負矢五十個日中而趨百里則尤利於輕更減而為三屬秦人捐甲徒裼以趨敵虎賁之士跿跔科頭并去甲胄以為輕便矣此皆氣之趫力之盛進則能神退則能速荀子所謂干賞蹈利之兵歟趙武靈王曰重甲循兵不可以踰險此之謂也後世甲輕故典韋陷陳重衣兩鎧若皆七札焉用兩重乎太元曰比札為甲說苑曰革剛則裂比猶屬也革利於柔合以為甲舉之而豐衣之無齘凡皮皆曰札齊俗訓羊裘解札言裘敝也合為屬散為解一說合甲小匡所謂鞈革也注云鞈革重革當心著之所以禦矢鞈省為合古今文甲一作脅音相近齊國之法重罪入犀脅輕罪入鞈革則合甲輕於犀甲信矣鞈猶堅也荀子曰犀兕鮫革鞈如金石鞄人為革伸之而直如其枉也急者先裂則是以博為帴也帴當作俴管子參患篇甲不堅密與俴者同實又云將徒人與俴者同實是帴當作俴之明證也又荀子非相篇博而能容淺儒效篇以淺持博古人皆用淺對博猶薄對厚則以博為俴又與荀子義同後鄭讀為俴淺之俴得之矣說文帴讀若末殺之殺猶減殺也然以其物為裙帗一曰婦人脅衣則音義皆非集韻帴讀為翦訓為狹說本鄭司農亦無别據而小戎詩俴駟毛傳謂四介馬鄭箋謂以薄金為甲之札韓詩則謂不著甲為俴又與管子義符則帴當作俴益明或云讀若戔宜音殘非也劉昌宗讀為片云狹小之義亦可備一說論語繪事後素鄭注云繪畫文也凡繪事先布衆色然後以素分布其間以成其文考工記畫繪之事後素功注云素白采也後布之為其易漬汙也古者裳繡而衣繪畫繪之事代有師𫝊秦廢之而漢明復古所謂斑間賦白疏密有章康成蓋目覩之必非臆說或云繪事素地加采謂之白受采此不知而妄為之說也鄉射記曰凡畫者丹質則丹地加采矣司常九旗畫日月龍蛇之象亦以絳帛為質也子夏疑素以為絢夫子以後素惟繪事為然故舉以示之子夏遂因素而悟禮蓋五色之黑黃蒼赤必以素為之介猶五德之仁義智信必以禮為之間且禮者五德之一德猶素者五色之一色以禮制心復禮為仁禮失而采禮云禮云太素者質之始也則素為質後素者繪之功也則素為文故曰素以為絢素也者萬物之所成終而所成始也故履初素賁上白初者履之始上者賁之終然則忠信之人可以學禮其說非乎忠而無禮則願也信而無禮則諒也願則愚諒則賊不學禮而忠信喪其美也是故畫繪以素成忠信以禮成素者無色之文禮者無名之朴老子不知以為忠信之薄宮立而五音清甘立而五味平白立而五色明禮立而五德純故曰大文彌朴鋪卜切孚似不足非不足也質有餘也吾以為老子不知禮猶告子不知義而世稱孔子學禮于老聃其不然乎其不然乎玉人天子用全上公用龍侯用瓚伯用將說文云瓚三玉二石也天子用全純玉也上公用駹四玉一石侯用瓚伯用埓玉石半相埓也然則龍當作駹將當作埒矣又云諸侯執圭朝天子天子執玉以冒之似犂冠又云瓛桓圭公所執從玉瓛聲獻讀為桓列女傳晉獻驪姬頌曰驪姬繼母惑亂晉獻謀譖太子毒酒為權是獻協權古音也一說獻讀為軒劉熙孟子注曰獻猶軒軒在物上之稱也故獻桓同音桓轉為和猶獻轉為莎素何反蓋音相近而通歟犁冠疑即犂錧錧冒於犂故名犂冠然珩形似磬而冒非磬形當考又云椎擊也齊謂之終葵終葵為椎猶邾婁為鄒皆齊魯間俗語犂錧似毊犂冠似冒以今曉古也久之而今復成古不可復識矣相玉書言珵大六寸其耀自照見離騷王逸注玉篇亦云珵美玉埋六寸光自輝而康成引相玉書珵作珽說文有珽無珵蓋珵即珽古今文孔穎達曰物皆外光珽獨自照內含明也然則大圭長三尺珽長六寸為椎頭故曰杼上終葵首說者謂杼上者閷其上此椎頭六寸指不閷者而言豈其然乎杼長也方言引燕記曰豐人杼首杼首長首也楚謂之妤音序燕謂之杼諸侯之笏詘前故前短天子之珽杼上故上長珽比他圭最長既曰方正天子搢珽方正於天下也而又閷之誤矣一曰杼削也凡為輪行澤者欲杼杼以行澤則是刀以割塗也是杼訓為削也方則其形如削謂椎頭四角有廉稜西山經曰峚山之玉堅粟精密澤而有光郭景純云玉有粟文所謂穀璧禮記縝密以粟粟或作栗唐代宗即位楚州獻定國寶十有二其三曰穀璧白玉也如粟粒無雕鐫之跡王者得之五穀豐景純之言信矣然曰五穀豐誕哉又泰冒之山多藻玉說文云璪如水藻之文虞書璪火黺米又云琰璧上起美色也然則琬琰蒲穀玉之文理出於天然非關雕琢粟謂之穀藻謂之蒲養人安人其說妄矣瑑圭璋璧琮說文謂起兆瑑康成云瑑文飾也疏云直瑑為文而已古有染玉法南山經曰侖者之山有木如穀其汗如漆名曰白䓘音羔可以血玉注云血謂染玉作光彩然則瑑為文者蓋染之歟一說血玉者天府上春釁寶鎮及寶器是也鎮與器玉之美者司農讀釁為徽蓋取飾意亦謂染玉作光彩也血玉不以牲康成之說似失之春秋文元年天子使毛伯來錫公命杜預云諸侯即位天子賜以命圭此臆說也禮曰諸侯薨使人歸瑞玉於天子諒暗三年之後更爵命嗣子而還之見白虎通故在喪則視元士以君其國除喪則服士服而來朝天子爵命之也其在來朝之時乎春秋禮壞久矣晉惠魯文錫命於即位魯桓衛襄追命於既薨則新天子輯瑞之典不行嗣諸侯還圭之禮亦廢吾不知天王所賜者是何瑞也或曰琬圭諸侯有德王命賜之使者執琬圭以致命焉春秋錫命蓋以此釋器曰圭大尺二寸謂之玠玊人之鎮圭也天子守之詩云錫爾介圭以作爾寶毛傳曰寶瑞也鄭箋以為諸侯之瑞圭自九寸而下介長尺二寸非瑞也故以為寶孫育云特言賜之以作爾寶明非五等之玉如其說則介圭乃天子之守圭矣未聞以賜諸侯也詩云以其介圭入覲于王覲禮侯氏入門右坐奠圭即詩所謂入覲之介圭則介圭非五等之玉歟箋義失之傳義為長天子之圭中必康成謂必讀如鹿車縪之縪鹿車者其形窄小裁容一鹿縪猶綦也結於轐而連於軸方言曰車下鐵陳宋淮楚之間謂之畢大車謂之綦車下鐵者輹也一名車下縛子夏易傳曰輹車下伏兔謂之車屐以繩縛於軸因以名焉輹與轐通俗名鈎心亦謂之橛包以金縛以繩大車謂之綦小車謂之畢畢與縪通喪服傳冠繩外畢畢者繩之末也以繩繫軸猶以組繫圭故舉以況之劉昌宗讀縪若鱉謂北俗語音然方言淮楚則非獨北音也車屐一作車劇蓋音同歟廣雅曰組縪縫也輹束也釋名曰輹伏也伏於軸上也說文伏兔下革謂之古昏字讀若閔聘用瑑圭減命圭一寸而無桓信躬蒲穀之文但有圻鄂瑑起一見典瑞一見玊人命圭繅皆三采三就瑑圭之繅則二采一就而已諸侯朝天子及自相朝則執命圭遣臣聘天子及聘諸侯則執瑑圭聘記所謂朝天子圭與繅皆九寸問諸侯朱緑繅八寸是也鄉黨執圭包氏注云執持君之圭蓋包氏章句本於張禹禹不信周官何晏注論語而取其說朱子仍其誤乃曰圭諸侯命圭學者遂不復知瑑圭璋璧琮為何物矣何晏好老莊言作道德論凡國家典章制度全不留心以故三禮皆撥棄其誤乃至于此楚漢春秋淮隂侯曰臣去項歸漢漢王賜臣玉案之食古者王后勞諸侯以玉案承棗㮚兩兩列之所謂玉案之食也說文檈為圓案士昏禮之盛棗㮚也以笲音煩如筥􅠚籚􅠚羌居反籚音盧漢之寒具筥而加於橋橋所以庪笲故康成以為案案有大小漢舊儀旋案丈二以陳肉食大案也漢書許后奉案上食孟光舉案齊衡小案也二王後二十有四兩兩列之則十有二諸侯十有八兩兩列之則九大夫十兩兩列之則五純猶兩也與淳通左傳淳十五乘或曰列或曰純純謂兩行並列諸侯夫人勞聘賓以二竹簠方元被纁裏有蓋其實棗蒸㮚擇飾案古以玉漢以金銀加文畫焉一為奇二為純二竹簠而方則四也注失之案承食器如庪笲之橋橋之制未聞案者今之槃古之禁有足曰禁無足曰棜皆以承尊禮器大夫用棜士用禁以下為貴也特牲饋食用棜或實獸於其上或覆壺於其中如漢陳食之案不獨承尊矣康成曰棜之制如今大木輿上有四周下無足鄉飲酒謂之斯禁以庪兩壺少牢饋食謂之棜以庪兩甒皆大夫之禮故康成云棜斯禁也無足有似於棜大夫用斯禁士用禁如今方案隋長隋他果反局足髙三寸然則案有足也古器無案起於秦漢考工記蓋秦漢間之書歟漢之􅠚籚一作􅠚寒具筥也方言曰南楚謂之筲趙魏之間謂之􅠚古之竹簠也盧玈音同古今文說文􅠚作凵象形凵盧飯器以柳為之或從竹去聲矢人為矢雖有疾風弗之能憚故書憚或作怛怛言驚憚言畏狀矢之形畏不若驚當作怛言矢輕重停勻風不能驚也其義見莊子大宗師篇子來將死妻子環泣子犂往問之曰叱避無怛化言死猶化勿驚怛之陸德明音義引考工記鄭注為證音都達反廣雅怛憚皆訓為驚鄭注論語云憚難也似非驚廣雅失之怛一作􅜢傷也詩曰中心􅜢兮則怛兼兩義一作靼音義同旊人器中膊康成讀膊為輇謂拊泥轉均尌膊擬度端其器也淮南子曰一膊炭熯掇之則爛指萬石俱熯去之十步而不死蓋膊者垺之式則垺亦可名為膊入火而熯則膊為瓦器之垺矣垺音普回反又芳符反膊讀為埏老子埏埴以為器埏埴者垺也鶡冠子曰膊膊之土注云膊形埒即尌以擬度之器又曰合膊同根謂之宇宙合膊者器中膊之謂也膊一作專服賦曰大專槃物專讀為鈞陶家名模下圓轉者為鈞然則鈞專埏膊文雖異而音義皆同矣梓人職曰大胸耀後耀讀為哨音稍馬融廣成頌曰鷙鳥毅蟲倨牙黔口大丐哨後然則耀一作哨音義宜然康成讀從之本其師之說也耀一作臞細小之貌與哨通臞一作臞音衢爾匹曰臞脙瘠也瘠則細小音殊而義同數目顅脰顅長脰貌莊子其脰肩肩或云羸小貌或云直貌故書顅作牼司農讀牼為鬝頭無髮之鬝廣雅曰鬝苦瞎切口入切音瞎􅝋口本口忽二切秃也明堂位夏后氏以楬豆注云楬無飾也齊人謂無髮為秃楬則鬝與楬音同器無文猶頭無髮其義亦同矣鬝一讀為間說文從髟間聲揚之為間抑之為楬肩肩楬楬長而直也楬一作毼士喪禮毼豆兩丹壺記碧盧秃楬說文顅頭鬢少髮與鬝義同廬人為廬器句兵欲無彈刺兵欲無蜎說文曰僤疾也周禮句兵欲無僤僤有兩義一訓疾音但一訓動音善一作灘亦作灗一作蟺亦作蟬皆讀為善訓為動上林賦象輿婉僤言車之動宛灘膠盩言水之動靈光賦騰驤蜿蟺言蛟龍之動然則僤者動也先鄭讀僤為彈掉之彈亦取動意當依說文作僤後鄭云故書彈或作僤俗誤為但書無善本賈疏不詳貽誤後人久矣後鄭云蜎亦掉也讀若井中蟲蜎之蜎案爾匹釋魚蜎蠉注云井中小蛣蟩廣雅曰孑孓蜎也蜎即虷秋水篇虷蟹與科斗司馬彪云虷音寒井中赤蟲一名蜎然則蜎者水中孑孓掉尾之蟲動搖不定故曰置而搖之以眂其蜎蜎乃動搖之狀也徑則不動故曰橫而搖之以眂其徑賈疏謂蜎蜎擾擾然近之矣乃云井中蟲蜎從俗讀也以爾匹為俗可乎又曰蜎蜎然均既曰蜎蜎焉得均說林訓曰孑孓為言蜎化為所謂蜎飛也訓蜎為均誤矣孑孓即蛣蟩文異音同字林云孑無右臂孓無左臂明堂五室象五行祀五帝在國之陽九七為陽明堂之數半之為室倍之為堂三四步四三尺者古算法也三為實四為法而一則每室各得七步為修餘二步以益廣則每室各得九步為廣以四乘三得十二尺為二步即廣修之較五室几室二筵者東西廣九筵南北修七筵廣修相減餘二筵以為較也然則明堂五室三代同制夏度以步南北七步東西九步殷度以尋南北七尋東西九尋周度以筵南北七筵東西九筵此明堂之數半之為室者也有室乃有堂言室而不及堂則得後而遺前顧左而失右矣前太廟後太室是明堂有前後也左個東右個西是明堂有左右也以前後分之則前修七步後修七步合之得十四步則堂修二七也以左右分之則左廣九步右廣九步合之得十八步注差半步則堂廣二九也此明堂之數倍之為堂者也蓋從分其堂則左偏為左個右偏為右個橫分其堂則外為堂有階內為室有戶故分之則青陽明堂太廟總章元堂為堂木火土金水為室合之則前靑陽後木室前明堂後火室前太廟後太室前總章後金室前元堂後水室李謐明堂制度論謂路寢有左右房明堂有左右個個者路寢之房也訓個為房未之前聞個古介字秦誓一個臣古文一介臣故說文無個蓋今文個即古文介馬融曰間介無蹊古者士相見必有介謂之中間然則個猶間也明堂左右介者左右間也謐又謂堂之修廣當以理推而以記者為謬非也記曰堂二室一其言甚明注者謬耳截廣補修堂方十六步廣修之較四步是四分之一也故曰廣四修一門堂亦如之堂三之二室三之一五運行大論曰黃帝坐明堂始正天綱臨觀八極考建五常五常謂五氣行天地之中者也端居正氣以候天和然則明堂五室始於黃帝矣疏五過論曰上經下經揆度隂陽奇恆五中決以明堂蓋言人身之五中猶明堂之五室也由是察五色正五音叙五事立五倫設五官啓五門列五服作五刑皆從此出焉古者明堂之制下之潤溼弗能及上之霧露弗能入四方之風弗能襲遍覽是非周觀得失堯舜以昌桀紂以亡皆著於明堂室中度以几堂上度以筵薛綜曰筵席也長九尺几俎也長七尺殷人重屋注云重屋復笮也賈疏以為重檐愚謂笮讀為格蓋復格也逸周書曰四阿反坫重亢重郎常纍復格孔朝注云復格纍之櫺方言櫺屋梠注云雀梠謂屋檐也亦呼為連綿格即笮廣雅㮞謂之笮說文謂之復屋棟即今之樓棼許叔重曰筵一丈廟門容大扄七個闈門容小扄三個案扄說文作冪云以木貫鼎耳而舉之從鼎坰聲周禮廟門容大鼎七個即易玉鉉大吉也儀禮鼎設扄冪冪以覆扄以舉舉鼎則去冪陳鼎則抽扄判然兩物說文一之誤矣又云鉉舉鼎也易謂之鉉禮謂之冪案禮冪若束若編以茅為之非堅剛之物與鉉迥殊許氏不應錯誤至此說文坰部云坰覆也坰從鼎為冪則冪非覆鼎之物乎以覆為舉則又何說且儀禮非叔重所不見者蓋後人亂之則說文非許氏之舊信矣士冠禮注云今文扄為鉉古文冪為密是以易之鉉當禮之扄所以舉鼎者也而以冪當之可乎禮器犧尊疏布冪注云冪或作幂楚辭招魂作􅨥傳寫之訛顔師古曰鉉為耳扄為關橫關之以舉鼎所以貫鉉非即鉉也易曰黃耳金鉉非扄明矣顔師古謂扄以貫鉉非即鉉也先儒合為一物失之其說近是並存以備考禮說卷十四
