body:
  text: 禮說卷六翰林院侍講惠士竒撰春官一王通曰禮有祀焉有祭焉有享焉古先聖人所以接三手之奧也天統元氣故推神於天接以祀禮地統元形故示之以民古祗字示旁作民接以祭禮人統元識故推鬼於人接以饗禮圜丘尚祀觀神道也方澤貴祭察物類也宗廟用饗懷精氣也愚謂在天成象昊天上帝日月星辰司中司命飌師雨師天之象也天心見於復其德圜而神故祀之日以冬至而位於圜丘在地成形社稷五祀五行也故屬地五嶽山林川澤四方百物地之形也萬物見乎離其德方以知故祭之日以夏至而位於方澤象者神氣也故祀之禮燔燎而升煙所謂燔柴於泰壇祭天也則有禋祀實柴槱燎以報陽形者骨肉也故祭之禮殺牲而薦血所謂瘞埋於泰折祭地也則有血祭貍沉疈辜之禮以報隂天秉陽垂日星地秉隂播五行隂陽變化精氣為物謂之神游魂為變謂之鬼故人鬼居上下之際天地之間聖人合莫以嘉魂魄而享之於宗廟焉肆獻裸者享之始也饋食者享之終也祠禴嘗蒸者享之時也謂之享者以人道事之死如生亡如存百物者五地之物神仕職所謂以夏至日致地示物魅物魅者羽物裸物鱗物毛物介物之魅是為百物之精而以夏至日致之則非蠟祭明矣王有二社王社在門右大社在澤中澤中方丘謂之大社亦曰泰折折與社音相近長言之為社短言之為折又壇圓折方故郊曰泰壇社曰泰折孔疏以門右之社為大社而王社所在書傳無文崔氏謂王社在籍田臆說也祭法云王自為立社曰王社故在中門之右為羣姓立社曰大社故在澤中之丘社必兼稷者稷麗乎土猶日麗乎天圜丘之樂六變而天神皆降則非獨昊天也方丘之樂八變而地示皆出則非獨后土也康成以五祀為四郊疈辜為蠟祭其不然乎又云不言祭地失之失者也崑崙神州誕矣哉坤元不讃大地示不稱皇郊祀天而主日社祭地而主稷司服毳冕祀山川希冕祭社稷此社在山川下者王社也大宗伯血祭祭社稷貍沉祭山川此社在山川上者大社也大社祭地而五祀五嶽山林川澤四方百物皆及焉則皆地示也地統於天故曰郊社地道也妻道也臣道也天有三光日月星地有三形髙下平故祀天之禮三祭地之禮三土爰稼穡中央為宅五行之君與天合德坤位在中黃裳元吉號曰北郊漢儒之惑或曰四方何神也曰郊有四望社有四方一也春秋傳曰不郊無望詩曰以社以方在天曰望在地曰方漢郊祀歌云練時日矦有望焫膋蕭延四方謂選練吉日良辰而有事於四望取蕭合腸間脂而焫之馨香以延四方之神則漢并方望而為一矣上帝為天而五行之神亦各以時為帝大社為地而二十五家之里皆有社名江淮間呼母為社俗儒遂謂大社非地上帝非天未可與言禮也鼓人職云以雷鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼享注云神祀祀天神社祭祭地祗鬼享享宗廟則康成亦以大社為地矣賈公彥以為舉社以表地舍其大而舉其細何居公羊曰天子有方望之事無所不通言惟天子得遍及四望四方也然春秋昭十八年鄭子産大為社祓禳於四方明祭社必兼四方矣然則非天子不四望諸侯亦得及四方焉曲禮曰天子祭天地明諸侯不祭天亦不祭地故大社惟天子得立之詩曰乃立冡土毛傳云冡土大社也美太王之社遂為大社也則國社變為大社矣大社非地而何大宗伯無地猶許氏說文無劉劉乃漢姓許氏漢人安得無之非無劉也留即古文之劉也地乃大祭宗伯掌禮安得無之非無地也社即所祭之地也春秋三傳盡改從劉毛詩王風尚存其舊天神人鬼地示三大禮獨不言祭地有是理哉劉為卯金刀說本䜟緯光武篤信之故經𫝊盡從劉漢儒識字若揚子雲未聞卯金刀之說康成好䜟緯亦無聞焉王風留子毛傳云留大夫氏地理志劉聚周大夫劉子邑公羊曰劉者邑也其稱劉何以邑氏也水經注劉氏聚三靣臨澗在緱氏西南周畿內劉子國即詩所謂丘中鄭箋從毛亦無異說則留即劉信矣或云留子國漢屬彭城子房所封酈注以為宋邑左傳侵宋吕留即其地也安得指為留子國乎大宗伯祀天神禋祀實柴槱燎注云禋之言煙周人尚臭煙氣之臭聞者槱積也三祀皆積柴實牲體焉或有玉帛燔燎而升煙所以報陽也愚謂禋從示煙從火皆以垔得聲精意以享謂之禋燔燎升煙以逹精意當在祭初天神之柴猶人鬼之祼郭景純注爾雅謂既祭而燎是宗廟亦當既祭而祼也可乎天神之樂六變地示之樂八變人鬼之樂九變蓋奏樂以致其神而人鬼禮之以玉而祼鬯地示禮之以玉而薦血天神禮之以玉而燎柴張說謂樂六變天神降降神以樂不以燔宜先祭後燔非通論也唐宋皆有燔玉宋元符初曽旻言先儒以為實柴無玉槱燎無幣今祀衆星不用幣以此考典瑞玉人之職皆曰圭璧以祀日月星辰則實柴非無玉矣槱燎無幣恐或未然然圭璧以祀未聞以燔唐太和九年王起議禮神九玉蒼璧黃琮青圭赤璋白琥黑璜四圭兩圭圭璧各有二其一禮神一則燔焉宋治平四年詳定所言禮天以蒼璧燎亦如之議者欲以蒼璧禮天四圭從燎非也請皆用蒼璧元大德九年集議以為鄭注或有玉帛未定之辭崔氏謂天子自奉玉帛牲體于柴上引詩圭璧既卒以為燔玉蓋卒者終也謂禮神既終當藏之也禮無燔玉漢祠太乙胙餘皆燎之無玉晉燔牲幣亦無玉唐宋乃有之顯慶修舊禮乃云郊之有四圭猶廟之有圭瓉並事畢收藏不在燔列宋政和禮制局言古祭祀無不用玉周禮典瑞掌玉器之藏言事已則藏焉有事則出而復用未嘗有燔瘞之文今後大祀禮神之玉時出而用無得燔瘞從之蓋燔者取其煙氣之臭聞玉無煙又無氣祭之日但當奠於神座而已又云祀天之有煙柴猶祭地之瘞血宗廟之祼鬯歷代以來或先燔後祭或先祭後燔皆為未允祭之日樂六變而燔牲首牲首亦陽也祭終以爵酒饌物及牲體燎于壇天子望燎柴用柏愚謂煙柴猶祼鬯廟先裸郊先燔曷為而未允乎韓詩內傳曰天子奉玉升柴加於牲上皇氏云祭日之旦王立丘之東南西嚮燔柴及牲玉以降神則崔氏之說亦非無據玉有瘞有沉故魯語曰不愛牲玉於神議者謂古無瘞玉失之牲玉同燔行於唐宋政和大德去玉留牲未為得禮如謂禮無燔玉亦未聞有燔牲祭時積柴加牲其上馬融說也大戴禮割列禳瘞是為五牲割割牲列副辜禳靣禳瘞瘞埋而燔無聞焉獨羊人釁積康成謂積積柴豈積柴實牲體獨用羊乎必不然矣積古文作眦仲師讀為漬云漬軍器得之路史謂牛人祭祀共享牛求牛享以祀神求以降神一燔一祭其說雖巧未足憑也祭天特牲以少為貴先燔後祭分而用之豈非臆說乎漢儀南郊焚犢北郊埋犢皆在祭終晉太常賀循以為燎在壇南用犢左胖漢禮用頭唐宋因之先燔首後燔體蓋本之此祭終而燎乃牲幣耳後世遂以祭終之燎當祭初之燔非禮也祭初燔柴不燔牲漢郊見通權火蓋燔柴之遺法甘泉賦欽柴宗祈燎薰皇天招繇泰一舉洪頥旗名樹靈旗樵蒸焜上配藜四施東爥滄海西耀流沙北熿幽都南煬丹崖所謂通權火者如此古燔柴之禮未嘗亡也張晏曰招繇神名一作臯搖如淳曰臯挈臯積柴於挈臯頭置牲玉於其上舉而燒之其說近鑿顔師古不知漢之權火即古之燔柴乃謂衆祠一時薦饗宜知早晚故以火為之節度其說益陋矣說文社肉盛以蜃故謂之祳春秋傳曰石尚來歸祳漢志作脤顔注云脤讀為􅜹公穀兩傳皆曰脤者爼實生曰脤生一作腥熟曰膰左傳受脤於社祀有執燔戎有受脤則脤為社肉矣而昭十六年傳為嗣大夫喪祭有職受脤歸脤似非指社杜預謂大夫祭社歸肉于公孔疏乃云大夫奉君命攝祭於社皆臆說也大宗伯以脤燔之禮親兄弟之國大行人歸脤以交諸侯之福左傳王使宰孔賜齊侯胙古者異姓聨兄弟雖甥舅之國亦以親兄弟之禮親之故孔疏以胙肉為脤膰而掌蜃祭祀共蜃器亦非獨盛社肉則脤膰兼廟社互舉通稱審矣何休曰禮諸侯朝天子助祭於宗廟然後受俎實豈其然穀梁子曰石尚欲書春秋諫曰久矣周之不行禮于魯也請行脤貴復正也九儀之命五命賜則鄭司農云則者出為子男康成謂未成國皆本王莽諸公一同侯伯一國子男一則之說愚謂則者則土也茅土謂之則土見周書作雒篇子男出封賜則土也漢書叙坤作墬藝髙下九則故曰則土天問亦云地方九則則或作列不知者以意改之耳御覽引周書作列土一說則者制度也禮有九錫二十則車馬衣服樂為一等皆與之物朱户納陛虎賁為二等皆與之則鈇鉞弓矢秬鬯為三等皆與之物惟盛德始封得賜三等子男始封賜一等得有樂是為四命受器器者樂器也後有功稍賜至二等是為五命賜則六命賜官朱户納陛為則虎賁為官而皆謂之則者蓋以二等有制度而無物也進爵為伯是為七命賜國復有功稍賜至三等弓矢以征斧鉞以殺進爵為八命之牧秬鬯二卣禋於文武成王以賜周公秬鬯一卣告於文人宣王以釐召虎進爵為九命之伯毛傳云九命賜秬鬯是也昭十五年𫝊鏚鉞秬鬯文公受之崔氏謂晉未賜鉞不得專殺誤矣古者節以專殺後世持節督軍而以黃鉞非人臣之器故不輕假然揚干亂行魏絳用鉞大夫猶然况盟主乎魯且賜郊豈徒秬鬯齊亦賜履非但斧鉞而皆謂之侯然則周爵不過侯歟一說公羊九錫之樂樂器一作樂則五命賜則者樂則也典命大夫四命出封加一等故得具聲樂納陛者堂階之磩為陛級以登朱户者天子黃闥諸侯朱户所謂宫室異則也大夫出封雖加一等為五命未得賜則三年考績有功乃得賜焉魏晉至隋非受禪不加九錫儒者諱言其禮而白虎通以九錫分為三即易之三錫非一時賜之也如秦之白起稍賜爵為左庶長左更國尉大良造以至封侯為上將軍蓋稍稍賜之與功大小相稱俾建功者勸而慕進者勤勞不倦故曰凡賞無常輕重視功王命諸侯名位不同禮亦異數書𫝊云古者諸侯之於天子也三年一貢士一適謂之好德再適謂之賢賢三適謂之有功有功者天子賜以衣服弓矢再賜以秬鬯三賜以虎賁百人號曰命諸侯各記所聞其說不一然賜必有功而非一時驟加九錫則同也古者天子有虎賁習武訓諸侯有旅賁禦災害大夫有二車備承事士有陪乘告奔走天子虎賁八百人諸侯三百人禮有等差以漸而降至大夫士亦得備承事而告奔走焉故大夫出使虎賁從行禮也至漢而其禮尤重光武以賜東海王彊虎賁旄頭擬於乘輿矣中山王焉就國虎賁官騎稱娖前行詩曰申伯番番既入於謝徒御嘽嘽毛傳謂番番勇武貌諸侯有大功則賜虎賁嘽嘽者稱娖前行之象歟然則六命賜官蓋賜虎賁矣曹莒無大夫則六命或未有官臣也小國二卿皆命於其君晉士起大國上卿稱士則小國無官臣可知玉作六瑞四方象鎮雙植象桓玉之體也直身象信古伸字曲身象躬玉之形也粟文象穀藻文象蒲玉之彩也其瑑飾則無聞焉瑑者眺聘之圭璧卿大夫執之以眺聘天子及聘問諸侯故加瑑飾以别之六瑞則不瑑也故曰大圭不瑑美其質也康成依漢禮而言遂謂六瑞皆瑑如其說則與眺聘之圭璧何以異乎說者又謂眺聘之圭璧有圻鄂瑑起無桓信躬穀蒲之文也不知桓信躬穀蒲乃玉之形體與其彩非瑑飾之文故曰和氏之璧不飾以五采隨侯之珠不飾以銀黃其質至美物不足以飾之夫物之待飾而後行者非至美者也六瑞無瑑飾者以此山海經圭璧十五五彩惠之惠猶飾也祀山川造賔客皆曰素功素功者設色之工畫繢之事是為瑑書之八體大篆小篆亦以此取名焉說者謂素功無飾其不然乎孔疏云一圭之上環為二柱象道旁二木及宫室兩楹故曰雙植象桓桓亭郵表也謂於亭郵之所立木即今之橋旁表柱諸侯葬用桓楹謂每一碑樹兩楹如淳曰縣所治夾兩邊各一桓名曰桓表陳宋之俗言桓聲如和今猶謂之和表即華表也愚謂古桓獻同音桓轉為和猶獻轉為莎說文桓作瓛從玉獻聲讀為桓以此禹貢和夷底績鄭注云和讀為桓酈道元云桓水以南為和夷桓一作洹天者神也地者形也天燥而水生焉水隂德也天産作隂其色黑位於北至隂肅肅出乎天禮之法屬隂法不平則神傷神傷則濕濕則天不生水故以中禮防之地溼而火生焉火陽德也地産作陽其色赤位乎南至陽赫赫發乎地樂之聲屬陽聲不和則形㬥形㬥則燥燥則地不生火故以和樂防之水火不生則隂陽無以成氣度量無以成制五勝無以成執萬物無以成類百業俱絶萬生皆困是故聖人以禮樂合天地之化百物之産蓋天地之化合於坎離百物之産根於水火節之以禮和之以樂則形神調而生理修由是神不病溼形不病燥而水火成既濟之功焉水流濕者天産而其形行乎地火就燥者地産而其神上乎天也氣由神生道由神成神備於心道備於形五禮六樂皆出乎身明有禮樂幽有鬼神故其德上及泰清下及泰寧中及萬靈鳯凰者陽之精也騏麟者隂之精也萬民百物者隂陽之精也德能致之其精畢至膏露降白丹發醴泉出朱草生衆祥具鬼神以此事萬民以此諧百物以此致矣蓋天地成於元氣萬物乘於天地神聖秉於道德以究其理故流分而神生動登而明生明見而形成形成而功存聖人者出之於天收之於地在天地若隂陽者杜燥濕以法義與時遷焉流分者隂德天作之動登者陽德地作之法義者中和之禮樂聖人以杜之者防之也此鶡冠子度萬泰録二篇之說實與春官大宗伯互相發明因竊取而合之云爾水生於燥故天有漢津神之在天者也火生于濕故地有火井形之在地者也則天作隂地作陽其理不益顯乎天産本乎地故水地為比地産本乎天故天火為同人深於易者知之齊景公伐魯得東門無澤而問魯之年穀何如對曰隂水厥陽氷厚五寸景公不知以問晏子晏子曰寒溫節也節則刑政平平則上下和和則年穀熟故曰形神調而生理修月令仲冬行春令而水泉竭傷於溼也仲夏火王欲靜無躁易及樂春秋說夏至人主與羣臣從八能之士作樂五日蓋以和樂防之古之法歟抑又聞之天不發其隂則萬物不生地不發其陽則萬物不成天以陽生隂長地以陽殺隂藏物生有體立之在禮物成而充其樂雍雍故曰立於禮成於樂荀爽曰陽動之坤而成坎坤者純隂故曰溼隂動之乾而成離乾者純陽故曰燥其說似本鶡冠子天作隂者陽動之坤地作陽者隂動之乾也月令仲夏用盛樂所謂以和樂防之又云止聲色則聲色乃美色淫聲止者放而逺之爾文耀鉤云水土合則成爐冶爐冶成則火興火生於溼亦以此莊子曰水中有火大雨雷電而火生焉非所謂水中有火歟周書曰天道尚右武禮右還順天以利兵地道尚左吉禮左還順地以利本詩曰左之左之君子宜之右之右之君子有之毛傳云左陽道朝祀之事右隂道喪戎之事然則小宗伯建神位右社稷隂道也故秋殺於右左宗廟陽道也故春生於左何休云質家右宗廟尚親親文家右社稷尚尊尊此緯書之說豈其然乎詩云似續妣祖箋云似讀如已午之已謂已成其宫廟疏云古者似已文同故於穆不已師徒異讀子思論詩於穆不已孟仲子曰於穆不似廟在雉門外之左社在其右門當午則廟當已社當未矣乾位在亥坤位在未故社位於未取似續之義故廟在於已歟韓非子曰四海既藏道隂見陽左右既立開門而當此之謂也兆五帝於四郊兆說文作垗畔也為四界祭其中是為域外祀之垗典祀掌之守各有域周謂之垗秦謂之畤釋名曰祀已也新氣生故氣已也何休曰祀者無已長久之辭此詩似續之義古祀與已同又與似通易已事遄往虞翻本己作祀注云祀舊作已也古祀己同信矣以與己本同似與已亦同古音也劉協不知古音乃曰子思弟子於穆不祀者音訛之異也古文祀作已猶域作或倦作劵何訛之有宋元豐詳定局言漢儀縣邑常以丙戌日祠風伯於戍地己丑日祀雨師於丑地從其類也熙寧祀儀兆日東郊兆月西郊是以氣類為之位至於兆風師於國城東北兆雨師於國城西北司中司命於國城西北亥地則是各從其星位而不以氣類也請稽舊禮兆風師於西郊祠以立春後丑日兆雨師於北郊祠以立夏後申日兆司中司命司祿於南郊祠以立冬後亥日如是則壇兆從其氣類祭辰從其星位仍以雷師從雨師之位以司民從司中司命司祿之位愚謂司民非星也劉睿星𫝊軒轅角有大民少民康成遂據以為司民案軒轅后宫所居月犯之女主憂春秋元命苞曰熒惑守軒轅貴妾爭晉志云少民后宗也大民太后宗也謂之司民可乎司民謂先民猶先嗇也神農為先嗇天地開闢有神民為先民先民謂之司民猶先嗇謂之司嗇康成分為二失之息田夫而祭司嗇獻民數而祭司民大宗伯槱燎不及焉則司民非星審矣潛夫論曰天地開闢有神民蓋本楚語路史乃謂古帝皇有神民氏都於神民之丘一曰神皇氏然則司民蓋神民氏歟梁天監六年明山賔議曰舜典望于山川春秋傳江漢沮漳楚之望也今北郊設嶽鎮海瀆又立四望竊謂煩黷徐勉議曰嶽瀆是山川之宗而望祀不止嶽瀆也至十二年詔更詳議朱异議曰望是不即之名凡遙祭者皆名為望豈容局於星漢拘於海瀆請命司天有關水旱之義凡四海名山大川能興雲致雨一皆備祭為允愚謂山川既包於四望而四望之外更有山川此明山賔所謂煩黷者也四望天神從祀於郊山川地祗附祭於社蓋山澤通氣實能降興上下之神與水火雷風為乾坤六子故祀天祭地皆兼及焉後世以四望為地祗失之矣先鄭謂山川道氣出入言氣出入於山川之竅其本在地而精神上屬乎天故六宗四望皆天神也日朝月夕風磔雨收謂之四類洪範庶徴日月風雨日月成嵗風雨惟星既合於丘復分於兆四類之為用也大矣哉大司樂奏姑洗歌南吕舞大㲈以祀四望則四類亦用此樂可知天神言祀則四望非地祗益信康成以為即五嶽四鎮四竇豈其然乎或曰司民非星而天府職曰祭天之司民何也府曰天府祿曰天祿民曰天民神之也敬之也書云王司敬民賈誼曰受計之禮王所親拜者二聞生民之數則拜之聞登穀則拜之或曰軒轅主后土之養氣而庇祐下民也故左角謂之少民見魏書志公羊隱三年武氏子來求賻武氏子者天子之大夫其稱子者父卒子未命也穀梁亦云未畢喪孤未爵謂天子諒暗不爵命公羊桓五年天王使仍叔之子來聘稱仍叔之子者父老子代從政也穀梁亦云録父以使子也父在子代仕之辭愚謂武氏子仍叔之子皆門子也門子未爵命故周禮無官然代父從政聘問列國儼然大夫矣故鄭伯盟於戲六卿及門子皆從子孔為載書大夫與門子弗順入參謀議出列㑹盟位亞六卿勢傾執政豈非族大寵多使然歟周書皇門篇曰其有大門宗子茂揚肅德以助厥辟勤王國王家則先王之所以育門子與門子所以效忠於王室濟濟一時之盛可想見矣及其後而世卿専政尹氏亂周非詒謀之不善也燕義有諸子官康成謂門子將代父當門庶子猶諸子副代父者諸子職云國子存遊倅遊者貴遊倅者副倅然則門子為正國子副之蓋卿之側室大夫之二宗歟學之師氏掌之太子㑹同賔客作而從焉修德學道春合諸學秋合諸射先王教國子如此則知所以育門子亦如此昭穆之辨適孽之分職在少宗掌其政令而魯之司冦兼掌春官臧孫氏世居其職文仲後閔先僖而昭穆無辨武仲廢彌立紇而適孽不分則春秋門子不皆正室可知矣詩裳裳者華刺幽王弃賢者之類絶功臣之世以為其先人有禮於朝有功於國故先王使其子孫嗣之是時周召為勳賢之裔尹姞為禮法之家雖舊族衰門豈無不肖而賢人君子亦多出於其中則先王教化使之然也晉悼公即位善政畢舉而以育門子為先且曰膏粱之性難正也故使惇惠者教之文敏者道之果敢者諗之鎮靜者修之則先王之育門子者其遺風不可復追乎古大明堂之禮曰日中出南門見九侯門子則門子學於虎門矣管子曰國子之義入與父俱出與師俱上與君俱說者謂國子即門子在家曰門在朝曰國雜記曰大夫之適子服大夫之服尊其適象賢也詩曰凡周之士不顯亦世言其臣有光明之德者亦得世世在位故曰商祖伊尹世世享商孟子所謂故國有世臣以此小宗伯卜葬兆甫竁注云鄭大夫讀竁為穿杜子春讀竁為毳皆謂葬穿壙也今南陽名穿地為竁聲如腐脆之脺脆七嵗反舊作脺誤劉音清劣倉沒二反字書無脺有膬今本或有作膬者則與劉音協矣沈云字林有脺音卒脺者牛羊脂膬者耎易破案小爾雅壙謂之竁填竁謂之封與鄭義合於文從穴毳聲讀依杜可也然鄭大夫讀為穿亦非無據漢書王莽掘平共王母丁姬故冡時有羣燕數千銜土投穿中師古曰穿謂壙即小爾雅所謂壙謂之竁水經注引漢書穿中作竁中則竁讀為穿信矣許叔重曰穿通也竁穿地也文異義同仍讀依先鄭為允漢書多古文往往亂於後人酈注所引蓋其舊也易不封不樹虞翻注云封古窆字然則竁古穿字歟宋郊祀歌月竁來賔則又讀為窟矣竁與膬窟與􅙡音義同鄭注腐脆之膬膬誤為脺當作膬雜記釁廟用羊及雞刲于屋中衈于屋下康成謂衈刲割牲以釁先滅耳旁毛薦之耳主聽告神欲其聽之此刉衈之正義也小雅執其鸞刀以啓其毛祭義鸞刀以刲毛牛尚耳此所謂耳旁毛取以告神與血並薦是為衈康成見雜記用雞遂云羽牲曰衈非也穀梁叩其鼻以衈社豈羽牲乎東山經曰祠毛用一犬祈䎶注云䎶音餌以血涂祭為䎶也公羊𫝊蓋叩其鼻以䎶社今本公羊作血社穀梁作衈社然則刉一作祈衈一作䎶玉篇以牲告神欲神聽之曰䎶蓋兼取膟膋故耳從血用祈神聽故䎶從申中山經曰刉一牝羊獻血注云以血祭刉猶刲又曰祠毛用一雄雞一牝豚刉注云刉亦割刺之名然則雞豚皆曰刉康成謂毛牲曰刉亦非也案刉犬人職作幾康成謂肆師職故書祈為幾杜子春讀為祈案幾說文作􅤀云以血有所刉涂祭也涂猶釁􅤀省為幾廣雅作禨云祭名楚人鬼而越人禨禨一作􅷛從示從鬼一也然則􅤀幾禨三字通皆祭名也刉非祭名破幾為刉又何說乎割牲曰刉薦毛曰衈祭血曰􅤀三者相因其名易亂故正之衈周禮皆作珥古文簡假借多釋名珥耳也言似人耳之在靣旁也從申從血後人所加故說文不載先鄭云珥以牲頭祭也存之以備一說凡四時大甸獵祭表貉貉一作貊肆師為位貉一作伯伯為兵禱其禮亡詩曰吉日惟戊音牡既伯既禱職救切毛傳曰伯馬祖也將用其力故禱其祖說文引詩伯作禡應劭曰禡者馬也馬者兵之首故祭其先神也案校人職春祭馬祖夏祭先牧秋祭馬社冬祭馬步明指四時之田因田而祭矣先牧始養馬者馬社始乘馬者馬步害馬之神馬祖天駟房星或弭其災或祈其福或報其功合而言之曰四時之表貉肆師舉其凡校人詳其目也康成讀貉為十百之百祭造軍法者禱氣勢之增倍孔頴逹謂貊之言百祭祀此神求獲百倍則似貉非祭馬祖矣武王東觀兵上祭於畢蘇竟曰畢為天網主網羅無道之君故武王伐紂上祭於畢求助天也說者謂畢星主兵故師出而祭畢然則表貉蓋祭畢歟唐禮禡祀軒轅氏或曰祭蚩尤世本曰蚩尤作兵大戴禮曰蚩尤庶人之貪者也何兵之能作案蚩尤冡在東郡夀張闞鄉常十月祀之有氣出如絳號蚩尤旗而山陽巨野有肩髀冡云蚩尤死而别葬焉其說甚誕漢禮於武庫祭蚩尤非表貉也軍前大旗曰牙師出必祭謂之禡蓋立牙為表所謂表貉是歟大司馬春搜冬閲有師表貉於陳前即漢之貙劉斬牲之禮貙與貉皆獸也田曰于貉祭曰表貉似謂取禽既斬牲即立馬不用命者視此斬牲爭禽而不審者罰以假馬獲籌曰馬祭表曰禡漢亦有乘之之名似言尚武然貙劉一作膒膢膒膢者食新也蘇林曰膢祭名貙虎屬常以立秋日祭獸王者亦於是日出獵還祭宗廟故曰貙膢而禡轉為伯伯轉為貉字滋益多莫知其說小雅吉日美宣王田則禱禮存焉毛公大儒鄭箋從之田祭馬祖又何所疑軒轅與畢皆兵禱歟近有講音學者見吉日戊協禱遂謂戊古音耄不知文焉知音禱一作禱皆從示以周夀得聲平呼若周去呼若呪正與戊協詁訓兼音義祭以剛日戊之日剛其義也戊之言牡馬必乘牡其音也毛傳所謂維戊順類乘牡者以此且耄與牡古音通何必强為之辨乎說文云禱禱牲馬祭也從示周聲詩曰既禡既禱獻之屬莫重于祼祼之言觀也易之觀卦於此取名凡祼事鬱人沃盥故祼一作盥易曰觀盥而不薦有孚顒若詩曰顒顒卭卭如圭如璋圭璋祼玉顒顒溫貌卭卭盛貌祼之儀也君有君之儀臣有臣之儀君祼以圭瓉臣助之亞祼以璋瓉詩曰濟濟辟王左右奉璋奉璋峩峩髦士攸宜濟濟者辟王之容君之儀也峩峩者奉璋之貌臣之儀也鬱人詔祼將之儀者以此宋人之享也置折爼仲尼使舉之以為多文辭魯人之祼也禘周公仲尼欲觀之以為多威儀歟既祼而往不欲觀者始則恭恪後稍慢怠也大享有祼賔之禮易觀之六四曰觀國之光利用賔于王上公王禮再祼侯伯子男王禮一祼洛誥祼於太室而曰王賔則賔于王者惟祼禮為盛君子於此觀威儀省禍福焉祼之節則亡矣其略有三實鬱鬯於六彛為祼之初節播芬芳於二瓉為祼之中節逹臭隂於淵泉為祼之終節是為三節名曰肆獻祼肆者肆師築而煮鬱人實而陳祼者小宗奉而授小宰贊而行獻者獻於尸奠於神小祝沃尸盥小臣沃王盥大祝令鍾鼓肆師誅怠慢其賔客則大宗攝酌獻王親拜送云詩曰朋友攸攝攝以威儀言助祭之臣相攝佐以威儀之事然則鬱人詔儀節者攝以威儀也威儀攝而馨聞威儀喪而腥聞殷以此滅周以此興於呼奈何弗欽鬱人大祭祀與量人受舉斝之卒爵而飲之量人凡宰祭與鬱人受斝厯而皆飲之宰祭者冡宰佐王祭亦容攝祭非也量人掌爼實制脯燔故曰宰祭郊特牲舉斝角詔妥尸說者謂特牲饋食祝酌奠奠於鉶南是時也天子奠斝諸侯奠角及尸入主人拜妥尸尸執奠祝饗是為舉斝角主人拜如初大夫士之祭則方饋食之始天子諸侯之祭則在坐尸於堂之後迎尸入室之初鬱人受舉斝之卒爵而飲之正當其節非也尸執奠而不飲雖舉斝而實未嘗卒爵也及加爵行尸爵止而後上嗣舉而卒爵焉且是時皇尸未食朝獻未行而先獻鬱人量人其不然也必矣故康成破斝為嘏謂王飲尸尸嘏王鬱人受王之卒爵亦王出房時也特牲主人受嘏出寫嗇於房還而獻祝故曰出房時謂當獻祝時其說近之祭或無尸未聞無祝故天子有太祝而佐食無聞尸神象也祝相尸佐食助之三者事相成尸之嘏王也必先佐食摶黍授祝祝授尸尸乃執以嘏王三者亦相成則有祝不可無佐食也故先獻尸次獻祝次獻佐食者以此且佐食一名利利者養也祭告利成養之成也佐食之功君子報之其人雖微先卿而獻然則鬱人量人蓋天子之佐食歟抑制從獻之脯㸋詔祼將之儀節其事與佐食有聨遂次佐食而獻之歟詩卷阿箋云王之祭祀擇賢者為尸豫撰几擇佐食尸之入也祝贊道之尸至設几佐食入助之賔筵箋云室人有室中之事者謂佐食也是天子必有佐食矣賈公彥乃云天子有獻鬱人量人之禮無祝及佐食之事此何所見而云然乎愚謂尸飲九以散爵獻士及羣有司鬱人量人宜在羣有司之列特牲謂之私臣少牢謂之私人舉斝者舉觶也所謂賔一人舉觶於尸卒爵者所謂升受下飲卒爵升酌厯而皆飲之者所謂交錯其酬皆遂及私人爵無算也位門東北靣其獻有薦脀禮曰奠觶或作􅒀注云古文􅒀皆為觶詩曰奠斝皆爵也奠斝猶奠觶則舉斝猶舉觶矣有司徹注云古文觶皆為爵延熹中詔校書定作觶則古觶爵通名周曰爵殷曰斝斝先王之爵天子用以獻酬諸侯以下用觶也古熏字多作釁鬯人釁鬯大祝隋釁女巫釁浴皆當讀為熏案齊語三釁三浴韋注云釁或為熏吕氏春秋湯始得伊尹袚之於廟釁以犧猳風俗通引之作熏以萑葦劉昭亦以此注後漢志矣漢書豫讓釁面吞炭顔注云釁熏也以毒藥熏之是古熏多作釁之明文也王度記曰天子以鬯諸侯以熏鬯為香草香草曰熏熏之言釁也女巫釁浴注云釁浴以香熏藥草沐浴則康成亦讀釁為熏矣說文釁從分得聲故虋讀為門釁讀為熏王制諸侯賜圭瓉然後為鬯未賜圭瓉則資鬯於天子資猶齎也少牢資黍注云資今文作齎外府幣齎先鄭云齎或為資今禮家定作資後鄭云齎資同耳其字從貝以齊次為聲掌皮財齎注云豫人以物曰齎今詔書或曰齎計吏然則資鬯者謂齎以遺之蘇秦之至趙也燕文侯齎以車馬金帛蜀守文翁以刀布齎計吏而遺博士淮南王上書亦云資衣糧入越地古齎資通信矣為鬯者有器與官使其官築鬱臼以椈杵以梧柏香桐潔搗而煮之為鬯魯有鬯圭則諸侯亦有鬯人也資鬯者無器故無官天子齎遺之而不自為焉故曰諸侯以熏熏即鬯明甚說者謂未賜圭瓉故不以鬯而以薰吾不知薰為何物也喪禮有浴無釁浴謂之渳渳以鬯斂以玉摩莎鬱草以出其香沙除睂瑑以流其汁故曰大渳渳在斂初先渳後斂蓋兼用玉鬯矣設斗沃尸不以酒小宗伯因鬯連言秬耳鬱人渳共肆器大祝以肆鬯渳尸典瑞祼圭以肆則所謂肆器者非玉器而何康成以肆器為大盤非鬱人之所當共也古無釁尸之禮故先鄭破釁為徽徽言美熏言香兩讀皆通從熏為允未築未煮曰鬱已築已煮曰鬯漢斂以玉匣古之制也珠襦金縷失之侈矣季孫以璵璠斂孔子厯級而救之救其僭也以大夫而僭用天子之禮是可忍孰不可忍說者譬之㬥骸中原不亦陋乎仲梁懷曰改玉改步猶晉文請隧而王弗許曰大物其未可改也霸主尚不敢改玉改行而况若季氏之么䯢者哉案說文莙從草君聲讀若威是威有君聲也故漢律婦告威姑威姑者君姑也又案吕氏春秋殷皆作郼是郼有殷聲也故曰湯立為天子夏民大恱親郼如夏親郼者親殷也威讀為君郼讀為殷故徽亦讀為熏先鄭破釁為徽以此髙誘曰郼讀如衣今兖州人謂殷氏曰衣中庸一戎衣注云衣讀如殷齊人言殷聲如衣今有衣姓者殷之胄歟愚謂古文殪作一方言殷作衣一戎衣者殪戎殷也說者謂一著戎衣誤矣古威與震通見詩長發鄭箋易革卦上六象辭君協蔚其音若威采芑卒章威協狁其音若君是威與君古音同也說文齊人謂靁為霣讀若云詩曰嘽嘽焞焞如霆如靁靁音云顯允方叔征伐玁狁蠻荆來威威音君說苑正諌篇曰好道者多資好樂者多迷好道者多糧好樂者多亡資讀為齎與迷協此古音也秋嘗冬蒸饋獻用壺尊饋獻者饋食之獻當薦熟時於是后薦豆籩而獻以壺焉揚子太元曰家無壺婦承之姑或洗之塗注云壺禮也婦承姑事猶洗濯而以塗愚謂婦承之姑者婦饋食於姑猶后薦豆籩於廟而獻以壺尊故其測曰家無壺無以相承也其義本易睽之上九曰先張之􅋃後說之壺古說與設通虞翻云猶置也離上與兌三隂陽相應而家道睽乖故先疑後釋張􅋃者拒之如外寇三至五象坎坎為盜設壺者禮之若內賔壺誤為􅋃失其義矣壺者家之禮法故家無壺婦無以承姑妻無以事夫上九六三㛰媾之象始以為寇也故先張之􅋃非寇乃㛰媾也故後設之壺古易皆作壺壺尊也昏禮設尊於室為內尊又尊于房户東為外尊此之謂設壺大射儀兩壺獻酒獻讀為莎是壺尊亦盛鬱矣後世以三酒實壺尊失之諸臣之所酢皆有罍小罍謂之坎故坎之六四有二用缶之象缶即罍也禮器門外缶門內壺說者謂壺缶皆飲諸臣貴者以壺賤者以缶燕禮皆用壺卿大夫方而士圜焉古者貴賤不嫌同名饋獻之壺其最貴者乎腹方口圓曰壺反之曰方壺有爵飾三禮圖曰壺受一斛口徑一尺頭髙五寸大中身兌下赤漆中上加青雲氣司尊彛四時之間祀鄭司農謂禘祫在四時之間故曰間祀非也禘以夏四月祫以冬十月三年一祫五年一禘名曰殷祭而以間祭當之可乎後漢孝明遺詔無起寢廟藏主於光烈皇后更衣别室有司奏言更衣在中門之外處所殊别其四時禘祫於光武之室如孝文祫祭於髙廟故事間祀悉還更衣續漢書曰禘之為諦祫之為合諦審昭穆合食於祖謂之殷祭四時正祭外有五月嘗麥三伏立秋嘗粢盛酬十月嘗稻等謂之間祀即各於更衣之殿更衣者光武廟之别室也東京廟制異室同堂合祭於堂是為正殿間祀於室是為便殿便殿為更衣則間祀非正祭矣月令仲春獻羔開冰季春薦鮪孟夏嘗麥仲夏嘗黍羞含桃孟秋嘗榖仲秋嘗麻季秋嘗稻季冬嘗魚禮運十二月蠟賔皆間祀也非正曰間嵗榖之外有間榖正色之外有間色正祭之外有間祀一也康成以追享為請禱朝享為月祭故遂以二者為間祀間祀也追享也朝享也判然為三安可合為二哉西京舊制日祭於寢月祭於廟時祭於便殿寢日四上食廟嵗二十五祠便殿嵗四祠則便殿乃時祭也與東京不同而間祀皆於陵寢諸儒以為非禮而罷之陵寢雖非古間祀之禮本於春官其不可罷也審矣鬱齊獻酌郊特牲汁獻涗於盞酒注云泲秬鬯以盞酒獻讀為莎齊語聲之誤也秬鬯中有鬱和以盎齊摩莎泲之出其香汁因謂之汁獻愚案獻酌獻尊皆讀為莎素何反似非聲誤獻一作犧毛傳云犧尊有沙飾也沙莎通謂刻鳯凰之象於尊其形婆娑然鄭仲師亦云飾以翡翠而雞彝鳥彝皆刻畫為雞鳯之形是尊彞同飾矣然鬱齊獻酌盛之以尊是為獻尊似非以飾得名康成謂獻尊酌醴而不和鬱豈其然乎鬱人詔祼將之儀故仲師讀獻為儀亦非無據後之學者信其所不可信疑其所不必疑犧讀莎獻讀儀音俄觀之書其文通大誥民獻有十夫大𫝊民儀有十夫古獻儀通王莽作大誥合而用之曰民獻儀九萬夫考之詩其音協小雅儀協莪魯頌犧協多稽之禮其義愜學者猶疑之而魏太和中掘地得尊如牛象遂目為古犧尊實未敢信以為然也醴齊縮酌縮酌用茅注云醴齊和以事酒泲之以茅縮去其滓詩曰伐木所所釃酒有藇毛傳云所所柿貌以筐曰釃以藪曰湑湑莤也莤古縮字是為縮酌古文所與許通漢疏廣𫝊數問金餘尚有幾所注云幾所猶幾許故所所一作許許說者謂許許邪許聲案邪許一作邪軤一作噓􅤍一作輿謣邪許見淮南子邪軤見文子噓􅤍見劉子輿謣見吕氏春秋一也挽車者唱邪軤牽石拖舟者歌噓􅤍舉大木者呼輿謣皆勸力之歌前呼而後應乃舉木非伐木也所者削柿猶斯者析薪故斯所皆從斤晉王濬治船於蜀吾彥取流柿以呈孫皓是為削柿說文依毛傳而云所所伐木聲逺聞其聲近見其貌傳言貌者以伐木之柿興縮酒之茅若作邪許何所取義且以伐為舉是改詩辭先儒訓詁斷不可易信矣凡酒修酌康成讀修為滌滌與􅎵通以水和而泲之今齊人命浩酒曰滌愚謂廟用修故曰修酌猶朝踐用獻尊故曰獻酌不必破為滌也陸佃云修爵名荀子曰修爵無數孔疏云修爵無算爵蓋所謂凡酒歟大宗伯以肆獻祼享先王典瑞祼圭有瓉以肆先王以祼賔客則祼一事有三名肆者實而陳之祼者將而行之獻者奉而進之實以彞祼之陳將以瓉祼之行獻以爵祼之成祼禮始於肆成於獻故曰肆獻祼祼當朝踐用兩獻尊名曰獻酌則獻尊酌鬱齊又何疑瓉如盤其柄圭尺有二寸黃金勺青金外朱中央龍頭鼻口有流前注蓋用以行酒尊以酌之瓉以行之爵以獻之六彞陳而不行二瓉行而不獻一說修猶溲士虞記明齊溲酒言以明水溲之貴新之義修當作滫內則注秦人溲曰􅎵􅎵與滌古音通說文皆從水以修條得聲條狼氏條讀為滌滌本音條故不言誤帝牛在滌滌謂之搜通作者匿養牢中故注云搜除是滌讀為搜矣漢周亞夫封條侯功臣表作修師古曰修讀為條是修條通而􅎵滌亦通也秦人曰􅎵齊人曰滌儀禮曰溲三者音義同酌以尊獻以爵司尊彞及鬯人不言爵但言尊集韻卣或作偹康成讀修為卣者以此禮器賤者獻以散特牲利洗散獻於尸則散似爵名康成以為漆尊亦必有本矣圭瓉以行酒王制注云鬯爵或未之前聞周有獻尊又有獻豆摩莎疏刻兩義相兼犧獻同聲齊人之語不其然乎祭義言朝事覸蕭光以報氣饋食加鬱鬯以報魄則知鬱齊不獨用之於祼也且云覸以俠甒加以鬱鬯俠甒謂兩甒即朝踐之兩大尊明大尊亦和鬱矣大射禮尊于大侯之乏東北兩壺獻酒獻酒者鬱齊也祭侯以鬱神之然則神尊皆酌鬱歟鄭司農云鬱十葉為貫百二十貫為築許叔重亦云十葉為貫百草貫築以煮之為鬱其文從鬯彡其飾也明鬯皆和鬱而為飲器中有鬯酒又以持之則鬯非圭瓉明矣周語鬱人薦鬯犧人薦醴蓋陳之為犧尊和之為犧酌薦之為犧人王即齊宫祼鬯饗醴以自香潔然則犧人即鬯人不和鬱者皆凡酒也應劭曰鬱芳草也百草之華煮以合釀黑黍或說今鬱金香漢郊祀歌一章曰尊桂酒賔八鄉晉灼曰尊大尊也元帝時太宰丞李元記曰以水漬桂為大尊酒其十二章曰百末㫖酒布蘭生師古曰百末百華之末也以之雜酒故香且美說苑曰天子以鬯為贄鬯者香草之本也上暢於天下暢於地無所不暢然則鬯者合釀百草之華以祀天祭地非獨用之宗廟也禮說卷六
