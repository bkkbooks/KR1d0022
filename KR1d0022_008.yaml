body:
  text: 禮説卷八翰林院侍講惠士竒撰春官三小史奠繫世辨昭穆瞽矇世奠繫鼓琴瑟故書奠或為帝杜子春讀為定其字為奠書亦或為奠杜子春謂奠猶定也小史主次序先王之世昭穆之繫康成謂世之而定其繫書於世本然則繫者姓也六世親屬竭矣繫之以姓故曰繫世古有正姓有庶姓庶姓六世而别正姓百世弗殊周語司商協名姓説者謂司商掌賜族受姓之官非也司商樂官也人始生吹律合之定其姓名易京君明識音律君明本姓李推律自定為京氏故繫世必鼓琴瑟以定焉司商者大司樂瞽矇其屬也協名姓者同姓合族異姓主名故昏禮問名協猶合也詩曰文王初載天作之合聨兄弟也定世繫者蓋以協名姓聨兄弟歟太師掌同律以合隂陽隂為柔陽為剛隂陽合剛柔分鼓瑟鼓琴以播其音易林曰剛柔相呼二姓為家此之謂也殷之德陽以子為姓周之德隂以姬為姓故殷王以男書子周王以女書姬姓有隂陽出於律吕不鼓琴瑟焉能定之天問啓棘賓商賓商樂章名棘猶革也古棘革通改定樂章古樂皆名商賓商誤為賓失猶詩商誤為誅賞字之誤也荀子曰審詩商商者五帝之遺聲大招有楚勞商楚之樂也故大司樂一名司商瞽矇世奠繫而弦歌諷誦者以此墨子曰誦詩三百弦詩三百歌詩三百舞詩三百周語􅕓賦矇誦康成謂諷誦詩蓋當作匶諡時其作之也太師帥瞽而廞廞陳也興也陳王之行迹而興起之于是瞽矇諷誦其治功之詩以為諡且定繫世而昭明德焉故有德者世興無德者世廢楚語所謂教之世以休懼其動者也荀子曰葬埋敬藏其形祭祀敬祀其神銘誄繫世敬傳其名銘謂銘旌為銘各以其物王則太常誄之言纍纍其行而諡成繫世古之世本今之譜牒傳其名者繫世亂則名不正故子為衛政必先正名不曰正而曰奠奠者定而安之衛輒有祖無父繫世之亂甚矣國之傾危何時定乎魯昭二十有二年景王崩王子朝與子猛爭立春秋書曰王室亂穀梁子曰亂之為言事未有所成成者定也言繫世之未定也二十有三年書曰天王居于狄泉書天王則其名正名正而後繫世定胡廣曰宗正嵗一治諸侯世譜差敘秩第亦奠之之義後周有宗師掌皇族定世系辨昭穆魯語所謂工史書世宗祝書昭穆也小宗伯掌之書曰七世之廟可以觀德父子異世曰繼兄弟同世曰及祖孫隔世曰詒非是則不世也不世則不廟春秋子般卒公羊子曰未踰年之君也有子則廟無子不廟蓋無子則不世也故不廟小宗入繼大宗則世其大宗不世其小宗喪服疏衰期不杖章為人後者為其父母報古無伯姪叔姪之名疏廣疏受蔡質蔡雍今之所謂叔姪也兩漢書皆曰父子至晉書始有叔姪之名敗壞禮法者晉也謂我父者我謂之子謂我姑者我謂之姪名安可以不正乎報者何也至尊不報旁尊皆報降其父母至尊而為世父母叔父母之旁尊故曰世其大宗不世其小宗自天子至於大夫士皆然故曰凡周之世不顯亦世此之謂世奠繫若夫姞為姬耦子孫蕃阜媯育于薑後世其昌嬴能敗姬秦竟滅周古音周讀若朱以此定世百世可知其術已亡徒存其説而已堪輿經有五姓之説隂陽因以五姓協五音亦未見其合也世無神瞽誰知其説乎詩曰肆于時夏夏大也肆陳也陳其功夏而歌之樂歌之大者稱夏夏有三王夏之三以享宗廟肆夏之三以享元侯分為三合為九九德之歌九㲈之舞九夏之奏一也杜子春曰王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賓來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏客醉而出奏祴夏公出入奏驁夏愚謂行以肆夏爾匹堂上謂之行王出至堂而肆夏作則王出入奏肆夏矣非獨尸出入也朝聘之賓入大門而奏肆夏則四方賓來亦奏之矣肆夏猶納夏歟燕禮賓及庭奏肆夏鄉飲酒賓出奏陔則是入奏肆夏出奏祴夏陔與祴通所以示戒也故其文從示從戒而鄭司農謂人君行步以肆夏為節若今行禮於太學罷出以鼓陔為節則肆夏又與祴夏同禮器大饗之賓其出也肆夏而送之則賓出入又皆奏肆夏如司農説不必破肆為陔也然大夫得奏陔夏不得奏肆夏康成曰奏陔夏以鐘鼓天子諸侯備用之大夫士鼓而已肆夏之類有采薺薺一作齊蓋齊夏也趨以采齊爾匹門外謂之趨王出路門而采齊作則是門內奏肆夏門外奏齊夏升車亦如之和鸞中采齊俗讀齊為齋齋不聽樂金奏何居失其義矣杜子春謂夫人祭奏齋夏王齋未聞有樂夫人安得獨奏哉大射儀公入驁公出而言入者射宫在郊以將還為入燕不驁者於路寢無出入也或曰驁大也燕不驁而大射驁大之也或曰驁敖也射儀母幠母敖或曰登車之樂驁駿馬也死日壬申乘馬忌之吉日庚午差馬以之奏以出入亦猶誦訓詔辟忌歟昭夏一作韶夏韶者昭也牲出入奏之大饗不入牲則弗奏也博碩肥腯本於民力之普存君子見郊牛之口傷而知魯之民力盡矣五官奉牲封人歌舞昭夏之奏也以昭德也豈徒贊牲而已乎納夏奏而九賓設章夏奏而九功敘族夏奏而九族睦皆德音也敬以和寬而栗所以表王度之如玉如金故凡進退周旋皆視以為節而不敢越焉周之盛也鍾師奏九夏及其衰也祭公作祈招招者九招也招與㲈同春秋時九招存其三曰祈徵角祈招徵招角招九夏存其三曰繁遏渠孔疏云王夏者天子所用其餘八夏諸侯皆得用之其祴夏卿大夫亦得用之故鄉飲酒客醉而出奏陔夏笙師舂牘應雅以教祴樂先鄭謂舂牘以竹其端兩空髤畫以兩手築地大五六寸長七尺短者一二尺應中有椎長六尺五寸雅狀如漆筒而弇口鞔以羊韋有兩紐疏畫大二圍長五尺六寸後鄭謂牘應雅三器在庭皆舂以築地賓出奏祴為之行節明不失禮案舊唐書舂牘虛中如筒無底舉以頓地如舂杵亦謂之頓相相助也以節樂也或云梁孝王築睢陽城擊鼓為下杵之節名睢陽操用此後世代以拍板長濶如手厚寸餘以韋連之擊以代杵愚謂舂牘如杵信矣然云起於睢陽則非樂記治亂以相注云相即拊相者以韋為表裝之以粳今齊人或謂粳為相故一名相而舂牘亦有頓相之名似牘與相為一物白虎通所謂拊革著以粳者或非頓相也且拊以會守相以治亂樂記已分為兩物矣又拊名撫拍以手拍之牘名頓相以手築之拊中實相中虛康成合為一可乎賓出奏祴築之於地以明醉而不失禮所謂治亂以相也則相為舂牘亦明矣古曰舂相曲禮鄰有喪舂不相漢曰雅舂楚元王傳雅舂於市相與雅皆送杵聲作樂象焉牘應雅三器皆曰舂以此鎛師掌金奏之鼓許叔重曰鑮淳于之屬所以應鐘磬也愚謂鎛即金錞錞錞于也錞之言敦鎛之言薄以薄為敦古人好作反語猶以徂為存以亂為治以甘為苦甘草一名大苦以故為今也鼓人職以晉鼓鼓金奏又云以金錞和鼓謂擊晉鼓時以金錞和之鎛師掌金奏之鼓者晉鼓也然則鎛即和鼓之錞明矣不然鎛師何不明言擊鎛而云掌金奏之鼓乎金奏謂金錞金奏之鼓謂金錞所和之晉鼓鎛師主擊之也許氏云堵以二金樂則擊鑮應之謂奏金而鑮應則鑮非即和鼓之錞歟周語細鈞有鐘無鎛昭其大也晉語鄭納歌鐘二肆及寶鎛則鎛非大鐘戚施不能仰而使直鎛則鎛不髙縣金錞圓如筒甚薄故一名鑮以芒筒捋之其聲極震隋開皇定樂有金錞二四人輿二人作宋宣和樂府就擊於地然則鎛不髙縣也鎛當作鑮省作鎛爾匹大鍾謂之鏞注云鏞亦名鑮失之康成謂鑮如鐘而大亦非或曰鎛亦縣但不髙耳舊唐志曰錞于圓如碓頭大上小下縣以籠牀芒􅝍捋之以和鼓鼓人凡軍旅夜鼓鼜鎛師凡軍之夜三鼜皆鼓之守鼜亦如之司馬法曰昏鼓四通為大鼜杜子春云守鼜一夜三擊春秋傳所謂賓將趣者聲相似愚謂趣一作掫皆從聚省得義亦得聲説文掫者夜戒守故行夜為干掫掫一作諏服虔曰干扞也諏謀也從言為聚謀從手為聚守皆取聚義俗誤為趨得其聲失其義矣沈約宋志云長丈二尺者曰鼜鼓凡守備及役事則鼓之今世謂之下鼜古音戚今音切豉反然則讀若刺也語有輕重故讀有異同鼜以蚤為聲故又讀為造次之造七報反亦與趣音相近左傳扞掫齊世家作爭趣趣或讀為促又與戚音相近矣田竇列傳局趣若轅下駒應劭曰局趣蹙小之貌也史傳皆作趣或作趨假借字昔者長琴處搖山始作樂風樂之有風尚矣然孔子正樂雅頌得所關雎之亂而不言風季札觀樂使工為之歌周南召南歌弼鄘衛歌王歌鄭歌齊歌豳歌秦歌魏歌唐歌陳亦不言風晉語薑氏引鄭詩將仲子之卒章楚成王引曹詩蜉蝣之三章皆曰詩不曰風猶籥章中春逆暑吹豳詩不曰豳風然則豳詩與鄭詩曹詩等耳康成謂此風也而言詩詩總名也豈其然乎説者謂南與豳非風故不言風誤矣十三國皆然豈獨南豳也南為周公左豳為周公東舊豳次齊孔子刪詩移之於末則十三國實以周公為始終焉齊曰泱泱魏曰渢渢風之美者歟唐有陶唐氏之遺民則亦有陶唐氏之遺風矣吉甫作頌穆如清風則雅頌亦可謂之風也風雅頌猶賦比興分為六合為一故一詩而賦比興兼焉風雅頌備焉或曰豳非國也地理志栒邑有豳鄉詩豳國公劉所都是豳亦國矣如謂周無豳國亦未聞有弼鄘也説文弼舊商邑豳即美陽民俗以夜市有豳山先鄭謂豳籥豳國之地竹後鄭謂豳人吹籥之聲章匡衡亦云太王躬仁邠國貴恕曷為而非國乎爾匹四極西至汃國説文汃西極之水也南都賦砏汃輣軋波相擊之聲埤蒼曰汃大聲也讀為八説文亦云從水八聲徐鉉音府巾切失之汃誤為邠形聲兩失其地不同皆名為國謂豳非國鑿矣古邦國皆仍舊名夏后相十五年商侯相土遷于商邱少康十一年使商侯冥治河帝杼十三年商侯冥死於河帝芒三十三年商侯遷于殷孔甲九年殷侯復歸商邱至商侯履遷於亳而有天下為殷商凡二十九王而周武王滅之封其後於宋及春秋而吳夫差伐齊闕溝深水出於商魯之間此宋也而仍曰商則商為宋之舊也左傳孝惠娶於商陸德明曰定公名宋是哀公之父故釁夏為諱而稱商非也如其然則夫差曷為而亦為之諱乎殷祖乙十五年命邠侯髙圉盤庚十九年命邠侯亞圉祖甲十三年命邠侯組紺武乙元年邠遷於岐周三年命周公亶父文丁四年一作太丁命周公季厯為牧師至西伯發伐殷而有天下為周及周公旦居東陳詩而仍繫之豳則豳為周之舊也商豳皆夏殷之舊邦宋有商頌周亦有豳雅豳頌者以此春秋昭七年衛侯惡卒王追命之曰余敢忘髙圉亞圉言不敢忘豳也二圉居豳國為豳侯祖澤存焉耳古者謀事必就祖發政占古語故稱祖以命諸侯周自公劉發迹於豳至二圉而殷䇿命為侯伯此王命衛侯所以獨稱之也二圉蓋其字非其名孫稱祖字禮也稱名可乎世本髙圉侯侔亞圉雲都二圉之名也或云雲都亞圉字或云亞圉弟皆非季札以弼鄘為衛風明弼鄘亦衛之舊矣分為三失之漢書詩國十五抪遍九州師古謂十五者周南召南衛王鄭齊魏唐秦陳鄶曹豳魯商得之周書曰昔南氏有二臣力鈞勢敵競進爭權君弗禁南氏以分然則二南古之國也韓嬰敘詩云其地在南郡南陽之間吕氏春秋亦云禹自塗山巡省南土作為南音周公召公取風焉孰謂南豳非國哉説苑成王翦桐葉為圭而封唐叔虞於晉晉語唐叔射兕于徒林殪為大甲以封於晉昜林曰唐邑之廬晉人是居晉曰唐宋曰商皆仍其舊也書終費秦詩終魯商商之為宋也又何疑左傳昭八年大搜于紅自根牟至於商衛注云商宋地魯西竟接宋衛是春秋皆名宋為商也太卜三兆一曰玉兆者龜號玉靈龜䇿傳所謂玉靈夫子是也祝曰假爾玉靈照見物情袚之以卵灼之以荆問焉如響克紹天明乾為玉故曰玉兆天龜靈故玉亦稱靈然則玉兆者天龜也二曰瓦兆者旊人為簋合土為之其形象龜簋一名敦敦首亦象龜古器質故用瓦簋者龜也瓦象其體火氣初交厥隂璺啓其德為坤黃中通理坤為土故曰瓦兆地龜仰敦首向南仰之象也然則瓦兆者地龜也三曰原兆者易有原筮禮有原兆一也揲蓍必原筮而後吉卜龜必原兆而後從朕志先定鬼神其依帝之原兆也我有大事休朕卜并吉王之原兆也阪泉之兆晉文以霸大橫之兆漢文以興此之謂原兆言鬼謀必先人謀也故原兆者以人而參天地焉少牢之敦即禮器之簋皆象龜南首孔疏云簋與龜聲相近也祭器有宗彝有瓦簋先王以宗彝之象繪為章以瓦簋之象開為兆或曰兆者寶龜之名衛有昭兆龜䇿傳三瓦而陳以應之天陳謂陳龜瓦謂瓦兆其兆有三與天相應古之法也舊注失之又云卜之不中以土卵指之者三蓋以土為卵三度袚除則三瓦之為兆也審矣司常龜蛇為旐釋名云龜知氣兆之吉凶也周天統玉兆周殷地統瓦兆殷夏人統原兆夏先周次殷次夏由今王而上及前王故觀樂者先觀周樂占兆者先占周兆三手兼三兆全龜經有夀房兆棲鶴兆房者下房象后宫也鶴者介鳥象髙人也一説夀房象坤卜兆得夀房筮得坤之比即古之瓦兆而王莽起明堂卜波水北金水南惟玉食謂龜為玉兆之文而墨食也豈其然乎易林萃之繇曰隂弗能完瓦碎不全蓋兊為毁折故瓦兆不成也萃為兊之二世卦卜師四兆一曰方二曰功三曰義四曰弓方者其德也弓者其體也其德方其體正則義由之立功由之成未有德不方體不正而能立義成功者也故四兆以方兆始以弓兆終焉蓍之德圓言其用也卦之德方言其體也用陽而體隂龜隂也其德方故其兆亦方灼龜以荆謂之楚焞所以必用荆者凡木心皆圜而荆心獨方故用以為灼龜之契此方兆之所由名也卜人定龜史定墨君定體定在占先體在兆先先定而後占體正則兆正而體之正者莫如弓析幹不迤析角無邪寒而奠體唐太宗嘗以良弓示弓工工曰非良弓也問其故曰角幹不正脈理皆邪弓雖剛徑而遣箭不直非良弓也太宗以為然此弓兆之所由名也不曰正而曰弓者取其形曲而體正也凡問卜筮曰義歟志歟義則可問志則否王何卜攻讐臧會卜僭皆非義也而皆獲吉者問正為貞問者不正鬼神亦不能見其情焉兆如山陵征者喪雄禦冦之利兆遇沈陽伐齊則可不利子商此戰功也邾文公卜遷梁元帝亦卜遷此國功也民功也一不利一不吉當時以為不吉者此兆為鬼賊所留卒之元帝喪邦而文公保國苟利於民其功大矣如以為不利於君而不遷安知文公不為元帝乎其國不保焉能保身然則功兆義兆相因也義則有功不義則無功文公不利而遷所謂義兆也而有利民之功元帝以為不吉而不遷失其義矣喪其功也宜哉吾故曰其德方其體正則義立而功成龜人掌六龜龜俯者靈故天龜靈謂行頭低甲亦前低仰者謝故地龜繹繹猶謝也謂行頭仰甲亦前仰前弇果故東龜果謂甲前長後弇獵故南龜獵謂甲後長爾匹曰諸果諸獵龜人曰果屬獵屬諸猶屬也言其類衆多也左倪類故西龜靁類猶靁也謂左食者行頭左庳甲亦左長右倪若故北龜若倪猶庳也謂右食者行頭右庳甲亦右長郭景純曰甲形皆爾以卜則審其説得之然則靈而俯者象天氣下降繹而仰者象地氣上騰前後弇而長者東南象陽為經左右庳而長者西北象隂為緯卜師所謂辨龜之上下左右隂陽者以此賈公彥以睨為睥睨失之龜人所辨者甲之體耳安問龜之左右顧哉墨子曰昔者夏后開鑄鼎於昆吾而卜於白若之龜其兆之由曰逢逢白雲東西南北九鼎既成遷於三國所謂白若者即右倪若也北龜墨而白若屬非一色千嵗者青純豈盡東龜也其方之色惟龜人能辨之其書亡學者莫能言矣辨其體者龜無定體恆隨四時春在後左夏在前左秋在前右冬在後右龜人各以其時辨之太史及占人亦以其時眂而作之而占之故曰動乎四體象膽亦然隨四時在四足皆神物也龜無定體亦無定色故靈龜其五色者以此説苑曰靈龜五色似玉似金背隂向陽上隆象天下平法地槃衍象山四趾轉運象四時文著象二十八宿蛇頭龍翅左精象日右精象月管子曰龜龍伏暗能存能亡龜生於水發之於火於是為萬物先為禍福正正之言貞也故國大遷大師則貞龜貞猶問也問者先正志故曰今日良日行一良貞龜人各以其物入於龜室室在廟中王者發軍行將必鑽龜廟堂之上以決吉凶漢髙廟中有龜室古在襧廟郊特牲作龜於襧宫上春釁龜日用甲乙龜䇿傳曰擇日齋戒甲乙最良乃刑白雉及與驪羊以血灌龜於壇中央大祝八命占人八頌皆兆也兆有體有色有墨有坼兆象曰體兆氣曰色兆廣曰墨兆釁曰坼占人之四占即洪範之卜五宋世家載古文尚書曰雨曰濟曰涕曰霧曰克是為卜五孔安國今文尚書濟作霽涕作驛霧作蒙齊詩魯道有蕩齊子豈弟爾匹釋言曰愷悌發也舍人李巡孫炎皆曰闓明發行鄭箋亦曰豈弟猶發夕也又引古文尚書以弟為圛而訓圛為明蓋本爾匹而為之説孔頴逹誤以鄭注尚書為古文且云古文尚書無以弟為圛之字是不考宋世家故爾古文假借悌一作涕索隱偶忘鄭箋専據孔傳乃云驛者駱驛連續涕者涕泣相連令人嗢噱而孔疏謂古文作悌今文作圛賈逵以今文校之定為圛然則孔安國尚書乃今文非古文也康成之説非徒本爾匹又見相如封禪書其書曰暗昧昭晣之世及昆蟲闓懌闓懌猶愷悌愷悌猶開明蟄蟲以發出為曉故康成以昆蟲為明蟲陸佃不知其説乃引説文以駁之誤矣爾匹釋詁愷懌樂也言開發則樂服虔曰哀生於晦樂生於明此其義也龜兆有明有昧霧暗圛昭謂之占坼動乎四體見乎墨色八命曰象乃占人之體卜五曰克乃八命之征八命曰瘳乃卜五之濟古濟霽同釋天云濟謂之霽鄘載馳傳曰濟止也病瘳雨止其理本通占人占之以眂吉凶一説圛雲也逸書曰圛圛升雲半有半無雨雲霧皆兆之氣象也説文圛讀若驛故遂誤為驛得其聲失其義矣發動為明故圛兼明義即古悌字則悌有圛聲故愷悌通為闓懌可補説文之闕班固謂司馬遷從安國問故遷書載堯典禹貢洪範微子金縢諸篇多古文説信矣今安國尚書往往與遷書所載不同學者疑焉鄭注洪範曰雨曰濟曰圛曰蟊曰剋蓋今文也蟊與霧古音同或讀為蒙故一作蒙爾匹覭髳猶冥霧也天氣下地不應曰雺地氣發天不應曰霧霧謂之晦故曰覭髳髳雺蟊音義同釋文霧音亡弄反故一讀為蒙爾匹疏引洪範曰雺鄭注云雺聲近蒙釋文雺或作霧音亡公亡侯二反是霧有蟊蒙二音故今文尚書一作蟊一作蒙筮人九筮一曰筮更更者造事之端其象為蠱更者行事之權其象為巽蠱彖先甲後甲巽五先庚後庚甲木為仁庚金為義門內之治恩掩義故蠱象父子門外之治義斷恩故巽利武人太元所謂庚斷甲者以此更之言庚也甲為始庚為續先甲後甲者開其始先庚後庚者續其終此筮更之義歟二曰筮咸咸感也蓋嫁娶之占咸男下女漸女待男則吉姤柔遇剛則凶蒙九二納婦泰六五歸妹屯六二女貞而常小畜上九婦貞而厲蒙三見金夫睽四遇元夫豐初遇配主畜三夫不正漸三婦不育恆五婦吉夫凶家人女正男正皆同氣相感而吉凶生焉咸之義也歸妹互象坎離坎月離日隂陽之義配日月故其卦為嫁娶之吉占是為筮咸三曰筮式式之言法也八卦建五氣立五常法象天地順於隂陽古者占卜皆用式太史抱天時注云抱式以處吉凶此占用式也宋蔡興宗為郢州參軍彭城顔敬以式卜曰亥年當作公此卜用式也筮亦如之是為筮式四曰筮目目之言數也天數五地數五五位相得而各有合甲乾乙坤相得合木天地定位也丙艮丁兊相得合火山澤通氣也戊坎已離相得合土水火相逮也庚震辛巽相得合金雷風相薄也天壬地癸相得合水隂陽相薄而戰乎乾此合之之數天一地二水甲火乙天三地四木丙金丁天五地六土戊水已天七地八火庚木辛天九地十金壬土癸此分之之數一分一合體立用行二篇之䇿大衍之數皆出於此是為筮目五曰筮易運機布度其氣轉易則天而行與時消息若不變易不能通氣五行迭終四時更廢孔子曰易有四易一世二世為地易三世四世為人易五世六世為天易遊魂歸魂為鬼易八卦鬼為繫爻財為制爻天地為義爻父母福德為寶爻子孫同氣為専爻兄弟水配金位為福德木入金鄉居寶貝土臨內象為父母火來四上嫌相敵金入金鄉木漸微六親九族五星四氣福德形殺王相休廢君子吉小人否是為筮易六曰筮比比輔也下順從也一陽居尊羣隂從之其卦辭曰原筮元永貞無咎故卜有原兆筮有原筮謀之鬼又謀之人故卜筮皆以比名先王巡守必先卜征卜必兼筮嵗習其祥祥習則行不習則增修德而改卜焉改卜則亦改筮是為筮比七曰筮祠隨王享西山升王享岐山豫王薦上帝觀有盥賓困有赤紱鼎有雉膏坎有樽簋皆祠也渙有立廟晉二受福損初祀事益二用享萃二用禴震主七鬯巽用史巫既濟殺牛不如禴祭禴之言薄也春祭曰祠祠者詞也品物少文詞多也是為筮祠八曰筮參參猶三也三代異法三法並筮法立一人故筮有三人筮則參而占則旅也無中曰兩有中曰參兩則爭參則和故三占從二是為筮參九曰筮環環之言還也蓋筮征人之歸期詩曰卜筮偕止會言近止征夫邇止此筮環之辭霍光素與李陵善遣陵故人任立政等至胸奴招陵單于置酒陵亦侍坐立政等未得私語乃目視陵而數數自循其刀環言可還歸漢此環之義也一説環者八卦歸魂也更為變環為還乾變於巽還於離坤變於震還於坎故九筮以更始以環終庚從貝為賡古文續字占夢掌其嵗時觀天地之會辨隂陽之氣以日月星辰占六夢之吉凶康成謂天地之會者建厭所處之日辰今八會其遺象也賈公彥謂陽建左還隂建右還隂建謂之厭厭在辰前一次假令陽建寅辰在亥隂建辰前一次在戌然則建者斗建也建有隂陽者天文訓所謂北斗之辰有雌雄者是也雄左行雌右行始建於子月從一辰五月合午謀刑十一月合子謀德五月斗建午日在未厭日前一次故合於午十一月斗建子日在丑厭日前一次故合於子太隂所居辰為厭日厭日不可以舉百事數從甲子始十日十二辰周六十日子母相求凡八合康成所謂八會其遺象者即此合於嵗前則死亡合於嵗後則無殃堪輿大會八小會亦八越絶書曰太嵗八會壬子數九此大會歟十日為母十二辰為子是為子母相求五月合而一隂伏故謀刑十一月合而一陽萌故謀德陽為德隂為刑隂陽刑德有七舍七舍者室堂庭門巷術野冬至隂氣極德左室夏至陽氣極德在野三十日而徙德在室則刑在野德在堂則刑在術德在庭則刑在巷隂陽合德則刑德會門八月二月隂陽氣均日夜平分故二月會而萬物生八月會而萬寶成此占夢所謂觀天地之會辨隂陽之氣歟日明於晝晝動為陽月與星辰明於夜夜靜為隂動有為靜有夢夢必有所遇故太元遇之初取象於夢曰幽遇神言不以形遇而以神遇陽神日魂隂神月魄故其象見於日月星辰占夢之官以經運之别九十占六夢之吉凶經運者在人為精神心術之運在天為日月星辰之氣也後世失官而其書亡矣其詳未有聞焉列子曰覺有八徵夢有六候八徵者曰故曰為曰得曰喪曰哀曰樂曰生曰死此八者形所接六候者曰正夢曰蘁夢曰思夢曰寤夢曰喜夢曰懼夢此六者神所交形接為事神交為夢一體之盈虛消息皆通於天地應於物類能識感變之所起與其所由然則無所怛是以占夢者推明十運九變之術與夫八徵六候之端雖譎怪無窮而其理昭然不惑故其時之民皆得甘暝於太宵之宅而其神不驚舍萌四方獻吉贈惡亦猶方相氏時儺驅疫之意云爾吾聞醜夢不勝正行妖祥不勝善政詩曰召彼故老訊之占夢言不尚道德而信徵祥也左氏之説吾無取焉漢儀大儺侲子辭有伯竒食夢伯竒者神名食夢者食於夢猶食於火食於土也蓋古舍萌之禮歟舍萌者釋菜於神贈之在堂送之四方男巫之職也招魂帝告巫陽巫陽對曰掌夢蓋以此噩夢列子作蘁夢莊子曰使人乃以心服而不敢蘁立定天下之定釋文蘁音悟又五各反逆也逆猶迎説文關東曰逆關西曰迎兩相遇也相遇而驚謂之遻則蘁讀為遻矣杜子春讀為驚愕之愕釋其義非改其文法言周書噩噩義非驚也古文假借音同者通脈要精微論曰隂盛則夢涉大水恐懼陽盛則夢大火燔灼隂陽俱盛則夢相殺毁傷上盛則夢飛下盛則夢墮甚飽則夢豫甚飢則夢取云云亦見列子此古占夢書逸周書言太姒得吉夢以告文王文王不敢占召太子發命祝以幣告於宗廟羣神然後占之于明堂遂作程寤言文王在程而得吉夢蓋六夢之寤夢也然則堂贈者贈之於明堂歟精誠發於宵寐曶昕寤而仰思是為寤夢楚辭九章言天不純命百姓震愆離散相失仲春東遷説者謂仲春二月刑德合會嫁娶之時遷徙東行室家離散則在上者失其道也占夢觀天地之會媒氏以仲春令會男女則淮南刑德會門之説信矣藝文志有黃帝長栁占夢十一卷甘德長栁占夢二十卷其占出於天文本於厯象易曰占事知來象占非一而夢為大故占夢之官曰大人言惟大人可以占之小人妄言禍福雖言而偶中奚足信哉朱穆曰丁亥之嵗刑德合於乾位注云太嵗在丁壬嵗德在北宫太嵗在亥卯未嵗刑亦在北宫故曰合於乾位堪輿天老所謂四月癸亥十月丁己為隂陽交會者也眂祲十運一曰祲二曰象三曰鐫四曰監五曰暗六曰瞢七曰彌八曰敘九曰隮十曰想鄭司農云鐫謂日旁氣四面反鄉如輝狀然則鐫者鐍也説文玊部瓊璚瓗通故鐍或從矞或從巂長言為敻短言為矞形聲皆同鐍省作矞一曰錐有所穿一曰滿有所出象日旁雲氣揚雄太元所謂紫霓矞雲朋圍日也雲氣刺日形如缺環謂之鐍與鐫通讀為觼軜之觼觼一作鐍亦見説文康成讀為佩觿之觿失之淮南子曰君臣乖心則背譎見於天注云日旁五色氣在兩邊外出為背外向為譎則矞非瑞也説者以為內黃外赤謂之矞雲瑞應氤氲之氣誤矣矞或作穴音相近也漢延平元年六月丁未日暈中外有僪背兩耳譎鐍僪矞實一字後魏皇始二年十月壬辰日暈有佩璚佩即背璚即僪則佩璚為鐫信矣康成曰監冠珥也凡氣在日上為冠為戴在旁直對為珥雜占書曰日冠者如半暈也法當在日上有冠又有兩珥尤吉荆州占曰月珥且戴不出百日主有大喜然則冠珥為吉祥兼占月矣隮虹也隮之言齊與日齊升也升氣為虹虹之言攻其攻也不在日側而當日衝詩曰蝃蝀在東言日在西而見於東啜飲東方之水氣也朝隮於西見於西方曰隮日東出而虹西見也春秋元命包曰隂陽之氣聚為雲氣立為虹霓離為倍僪一作鐫分為抱珥一名監刺日曰僪其象鐫向日曰抱其象監星占曰虹霓主內淫土精填星之變司農謂彌者白虹彌天康成謂貫日也郎顗云凡日傍色氣白而純者名為虹貫日中者侵太陽也邪氣乘陽則虹霓在日而蘇伯况云天有白虹自子至午廣可十丈長可萬丈正臨倚彌倚彌即黎丘秦豐之都也是時秦豐都黎丘正值其都豐當其咎此所謂彌天也然則貫日與彌天異矣犯日者謂之貫竟天者謂之彌永建六年正月丁卯日暈兩珥白虹貫珥中永和六年正月已卯日暈兩耳中赤外青白虹貫暈中此所謂貫日也兩説相兼乃備淮南子曰欃槍衡杓之氣莫不彌靡而不能為害如其説則十暈之彌蓋彗孛之屬歟司農以暗為日月食非也京房占曰國有佞讒朝有殘臣則日不光暗冥不明孟康曰日月無光曰薄京房傳曰日月雖非同宿隂道盛猶上薄日光元帝永初元年四月日色青白無影正中時有影無光是夏寒至九月日乃有光靈帝時日出東方赤如血無光髙二丈餘乃有景是為瞢中平四年三月丙申黑氣大如瓜在日中五年正月日色赤黃中有黑氣如飛鵲是為暗易曰豐其沛日中見昧此之謂也説者以為昧者日月之災且云折其右肱無咎言遇此災當退去右肱之臣乃免咎後漢用其説遂以水旱日食䇿罷三公失之矣通俗文曰缺環曰鐍説文鐍環之有舌者與觼通日旁之氣為十運其色為五雲保章觀色眂祲觀氣是為祲象象之言想也楊賜曰善不妄來災不空發王者心有所惟意有所想雖未形顔色而五星以之推移隂陽為其變度故十運以祲始以想終其經十其别九十盛哉日乎丙明離章五色淳光夜則測隂晝則測陽晝夜之測或否或臧積善至於明五福以類升積不善至於幽六極以類降蓋天人之際精祲相蕩善惡相推升降之氣各以類應眂祲於是敘其降而告之王救其失安其宅故曰安宅敘降寶典四位一曰定定得安宅定乃靜靜乃正厥惟敬哉敬所以宅天命也成開五示四曰安宅示帑言安宅自妻子始蓋由妻子以及兄弟由兄弟以及家邦云爾康成讀運為輝淮南子畫隨灰而月運闕髙誘讀運為圍方言日運為躔月運為逡説文運移徙也然則運為行而非氣故運讀為輝輝讀為圍輝一作煒春日青煒夏日赤煒秋日白煒冬日元煒從火韋聲髙誘讀為圍以此蓋自漢始運一作暈吕氏春秋曰日有暈珥髙誘注曰暈讀為君氣圍繞日周匝有似軍營相圍守故曰暈釋名曰暈捲也氣在外轉結之也日月俱然爾匹弇日為蔽雲注云即暈氣五彩覆日也愚謂暉讀為員音云古員運音同故周官暉作運墨子非命篇運鈞一作員鈞京相璠曰琅琊姑幕南員亭故魯鄆邑鄆公羊作運是古員運音同矣詩曰夜如何其夜鄉晨庭燎有輝是輝讀為云也或音熏失之春秋説題辭曰雲之言運也含陽而起以精運也輝為雲氣明輝即雲釋名曰雲猶云云衆盛意也又言運也運行也吕覽圜道篇曰雲氣西行云云然故其文運其音云覽冥訓曰光暉熏萬物釋名讀為捲渠云切薛綜讀為渾見西京賦史記功臣表渾渠鄉名渾作輝漢表亦然莊子雜篇曰不暉於數度暉一作渾薛讀本此春秋魯地下歡俗名夏暉是暉聲近歡故釋名讀為捲大祝衍祭男巫望衍康成皆讀衍為延得之而云聲之誤也似失之延衍羡三字音同古文通漢書西域贊有漫衍之戲即西京賦所謂巨獸百尋是為曼延此衍與延通也東京賦乃羡公卿登自東除注云羡延也謂延之上殿是羡與延通也玉人璧羡注云羡猶延東京賦本此古文假借音同者通何誤之有秦始皇本紀葬以下閉中羡下外羡門羡皆讀為延胸奴呼衍王貴種也其後遂為呼延氏以其號為其姓衍亦轉為延大祝辨九􅉔以享右祭祀康成謂右為侑引特牲祝侑主人拜然則右與祐通義與侑同易大有上九自天祐之子曰祐者助也虞翻云大有兊為口口助稱祐口助者祝之職也禮器周立尸詔侑無方所謂詔侑者非口助而何則祐與侑其義同矣古文儀禮侑皆作宥古有宥坐之器亦謂置器於坐以詔侑人也詩云既右烈考亦右文母箋謂右助於光明之考與文德之母此祝傳嘏辭故曰綏豫孝子又曰綏我睂夀介以繁祉蓋當綏祭而祝嘏主人之辭則仲翔口助之説信矣爾匹右導也助也亮也介也尚也注云介紹勸尚皆相佑助或訓右為尊則我未之前聞家語宥坐説苑作右坐則宥與右通文子曰三皇五帝有勸戒之器名侑巵侑與宥古今文易天命不祐祐一作佑又作右馬注云天不右行則祐佑右皆通繫辭可與祐神苟本祐作侑古祐與侑通益信祭之有侑猶賓之冇擯孝經説曰以身擯侑有司徹右几注云古文右作侑祭統啓右獻公注云右助也説文右助也手口相助也徐鍇曰言不足復以手助之仲翔之説本此古者巫彭初作醫故有祝由之術移精變氣以治病春官大祝小祝男巫女巫皆傳其術焉大祝言甸讀禱代受眚災小祝將事候禳求逺罪疾男巫祀衍旁招弭寧疾病女巫嵗時釁浴袚除不祥故曰病者寢席醫之用針石巫之用糈藉所救鈞也豈非以巫祝能治病歟祝祈福祥則曰求永貞貞正也巫有大災則曰造巫恆恆常也言正而有常精爽不二敬恭明神然後神降之嘉生祈福則福來却病則病去故孔子思見有恆者無恆之病巫醫弗為信矣黃帝問於岐伯曰古之治病可祝由而已今世治病毒藥治內針石治外或愈或否何也岐伯曰往古人居禽獸之間動作避寒隂居避暑內無眷慕之纍外無伸屈之形此恬憺之世邪不能深入也故可移精祝由而已今之世不然憂患緣其內苦形傷其外虛邪賊風入空竅肌膚逹五藏骨髓小病必甚大病必死故祝由不能已也祝由即祝説者以為南方神失之古聖人傳精神服天氣有疾勿藥自已亦無待於祝由後世德薄史巫紛若齊景公欲誅祝史者蓋以此岐伯曰拘於鬼神者不可與言至德然則惟修德可以禳之豈祝由之所能已乎管子曰上恃龜筮好用巫醫則鬼神驟祟是故事神之道惟貞與恆大戴禮曰昭天之福迎之以祥作地之福制之以昌興民之德守之以長此之謂也王會篇為諸侯之有疾病者阼階之南祝淮氏榮氏次之皆西南彌宗旁之諸侯有疾病者之醫藥所居注云淮榮二祝之氏世居是官實掌醫藥蓋古之祝由歟史記篇昔者元都賢鬼道廢人事天謀臣不用龜䇿是從神巫用國哲士在外元都以亡然則神巫亦足以亡國歟此巫祝之所以利於貞恆也昜曰貞疾恆不死後世舍貞恆而别求不死之藥妄矣九􅉔五曰吉􅉔六曰凶􅉔皆喪拜也喪有吉凶􅉔亦如之有兩説一小功以下為吉大功以上為凶其拜也以吉凶分左右吉尚左凶尚右逸奔喪禮曰凡拜吉喪皆尚左手注云尚左手吉􅉔也吉喪故吉􅉔孔子有姊之喪拱而尚右則大功以上皆凶􅉔矣奔喪禮云聞逺兄弟之喪既除喪而後聞喪免袒成踊拜賓則尚左手注云小功緦麻不稅者雖不服猶免袒則小功以下皆吉􅉔也一齊衰不杖以下為吉杖齊衰以上為凶其拜也皆稽顙以吉凶分先後吉先拜凶後拜雜記曰三年之喪以其喪拜非三年之喪以吉拜注云稽顙而後拜曰喪拜拜而後稽顙曰吉拜拜為賓顙為已先拜者先賓後已後拜者先已後賓孔子曰拜而後稽顙頽乎其順也稽顙而後拜頑乎其至也順者先拜賓順乎事至者先觸地哀之至禮惟主喪者拜賓秦穆公弔公子重耳重耳不主喪故稽顙而不拜示不為後也言為後乃主喪耳晉語反之云再拜不稽顙誤矣杖齊衰父在為母夫為妻雜記為妻父母在不杖不稽顙母在不稽顙稽顙者其贈也拜謂母在為妻稽顙者他人以物來贈已也輕己哀情而重人贈物可謂禮乎愚謂贈者君之贈也士喪禮公使宰夫贈元纁束主人去杖不哭由左聽命賓由右致命主人哭拜稽顙此將葬而柩至邦門贈拜之禮如是夫主妻喪敬君之贈故雖母在得稽顙舅主適婦之喪喪無二主則父在贈拜不稽顙矣天子諸侯絶期而后夫人之喪亦曰三年者蓋父在為母期父必逹子之志三年然後娶故杖齊衰之喪亦謂之三年也賵賻唅襚總謂之贈士喪禮既祖還車公賵元纁束馬兩賵有馬贈無馬賵則奠幣於車箱贈則實幣於棺蓋主人皆拜稽顙其禮不同同名為贈則君贈皆稽顙矣大祝九􅉔一曰稽首二曰頓首三曰空首説文稽與頓皆云下首而不言至地荀子大略篇平衡曰拜下衡曰稽首至地曰稽顙蓋平衡謂頭與腰平下衡謂頭下於腰説文所謂下首則稽首頓首皆頭至手而不至地也稽顙觸地無容然後頭直至地耳公羊傳齊侯唁昭公公再拜顙及至糗於從者公再拜稽首何休曰顙者猶今叩頭矣齊桓使使者式璧而聘稱貸之家皆齊首而稽顙蓋叩頭也則稽首非叩頭明矣凡拜皆以手為容也賈誼容經曰跪以微磬之容揄右而下進左而起手有抑揚各尊其紀拜以磬折之容吉事尚左凶事上右隨前以舉項衡以下寧速無遲背項之狀如屋之霤所謂項衡以下者蓋稽首也商書拜手稽首孔傳云拜手首至手然則手先據地首乃至手是手與首俱至地其實手在地首在手故拜手與稽首連言是一事非兩事孔傳合為一得之矣孔疏分為兩云初拜頭至手乃復申頭以至地至手為拜手至地為稽首豈其然乎康成謂空首者頭至手是為拜手孔賈疏皆謂臣於君則稽首平敵則頓首君於臣則空首臆説也穆天子傳天子賜七萃之士髙奔戎佩玉一隻奔戎再拜稽首賜許男駿馬十六許男降再拜空首然則空首猶稽首降拜謂之空未升成拜也豈君於臣之禮哉左傳秦哀公賦無衣申包胥九頓首而坐則頓首亦非獨行之平敵也三者將母同玉藻君賜稽首據掌致諸地此言稽首之禮甚明據掌謂兩手據地非拜首而何故拜手與稽首連言者以此注云據掌以左手覆按右手疏謂郤右手而覆左手於其上此何禮也愚所未逹通禮義纂曰自後魏以來臣受君恩皆手舞足蹈以鳴喜歡蓋本古者拜手稽首之禮愚謂拜有容惟凶拜無容振動者舞蹈之容也振動或作振董鄭大夫謂振董者兩手相擊兩手相擊曰抃吕氏春秋曰古者帝嚳乃令人抃或鼓鼙擊鐘吹箎展管因令鳯鳥天翟舞之帝嚳大喜乃以康帝德是為抃舞後世舞蹈實出於此今俀人拜猶然古之禮也鄭司農曰肅拜但俯下手今時撎是也釋文云撎即今之揖容經曰端服整足曰經立微磬曰共立磬折曰肅立垂佩曰卑立平衡曰經坐微俯曰共坐俯首曰肅坐廢首低肘曰卑坐觀肅立肅坐則肅拜可知肅者磬折之象下於拱上於卑但俯首不廢首左傳曰敢肅使者公羊傳曰揖師而行揖猶肅也何休曰揖於師中介胄不拜為其拜如蹲曲禮為其拜而菱古而如通菱猶蹲也杜預曰肅手至地誤矣士昏禮婦拜扱地扱地者手地也婦人扱地猶男子稽首禮之重者尋常肅拜焉得手至地乎鄉飲酒賓厭介介厭衆賓注云推手曰揖引手曰厭今文皆作揖蓋舉手向外為拱引手向身為厭古之撎也則肅不至地益明少儀婦人有肅拜手拜注云肅拜拜低頭手拜手至地疏云手拜之法手先至地頭來至手猶男子之稽首矣然則扱地者古之手拜也裦讀為報樂記禮有報而樂有反注云報讀為裦裦拜者答拜也天子賜諸侯衣曰裦衣天子答諸侯拜曰裦拜禮説卷八
