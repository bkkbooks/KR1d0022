body:
  text: 禮説卷五翰林院侍講惠士竒撰地官三邦節有八守節二分其半於都國都鄙而掌節藏其半達節六掌節守之小行人達之達之邦國三曰山國曰土國曰澤國達之都鄙三曰門關曰貨賄曰道路節與瑞不同瑞全而節半君命召則合之故當其常則二節以走一節以趨値其變則效節而出握節而死官守其節故曰守官一名符一名契隋樊子蓋守東都衛元守關中别造玉麟符代銅虎以給之蓋取則周官玉節所以重鎭守也齊陳乞遣陽生與之玉節而走之秦安國君刻玉符約立子楚為適嗣蓋析玉而分其半為後當迎之合以為信唐則天時崔神慶上疏曰古者召太子皆用玉契今則惟有文符非慎重防萌之意然則玉契自古有之矣陽城君毁璜為符以守國司馬牛致邑與珪而適齊皆玉節也角節未聞當考英蕩有兩説干寶謂英刻書簜竹箭刻而書其所使之事以助三節之信是英蕩者傳也凡達節皆有傳傳所以輔節節以金傳以竹康成謂傳若漢之移過所文書古名關移過所者韓非所謂關於州部也魯昭公使公衍獻龍輔於齊侯孔疏云鑄金為龍節以玉為函盛之名為龍輔是英蕩者玉也輔者函也玉采浮筠故曰英蕩兩説皆通前説為允然漢之符與傳則又不同郡國頒符門闗用傳傳以繒帛與古用竹者殊小行人旌符管三節皆用竹漢之竹使符本此使者所持節則上加旄注旄首曰旌即古之旌節古者刻符摹印皆曰璽書吕氏春秋吳起謂商文曰置質為臣其主安重釋璽辭官其主安輕淮南子亦云龜紐之璽以為佩是印為璽也戰國策楚攻韓泠向求救于秦公孫昧曰其言收璽實猶有約注云璽軍符收之者言欲止楚之攻韓是符為璽也然則璽節以管為之鐫刻璽書或曰貨賄或曰都鄙者謂都鄙之貨賄璽管一節兩名地秋二官互見貨賄者商賈也商賈阜通貨賄出入於市為璽節出入於闗為貨節而輔以傳焉孟甞君更封傳變名姓以出關則傳書名姓也門關古用棨漢外人入宫門長史為封棨傳至晉猶然羊祐甞欲夜出軍司執棨當門此其類歟一玉一角守節鎭焉三金三竹達節通焉邦國之守以玉而逹以金其地逺防矯誣也都鄙之守以角而達以竹其地近從簡易也舉邦國都鄙則鄉遂在其中故布治布教布政布刑不曰郷遂而皆曰邦國都鄙守之達之職在掌節古之道路有節乃達楚不與齊通遂絶齊約齊既與秦合乃折楚符約猶符也是故勇士罵齊而借宋之符樂毅適燕而假魏之節田鳩之楚楚與之節以如秦葢非是則不達也周入於韓秦聞之而焚周之節不通其使漢使陸賈於南越剖符通使焉此皆達節也六國擯秦請焚天下之秦符而傳焚符之約則當時列國徃來無節者有幾則不達可知矣或曰節亦名瑞謂之法瑞管子曰君發其明府之法瑞以稽之立三階之上南面而受要即此漢官儀曰秦以前皆以金玉銀銅犀象為方寸璽各從所好奉璽書使者乘馳傳騎驛騎也然則角節葢犀象歟王制金璋璋一作章王氏謂金為印章孔疏謂章定本從玉以金飾之圭璧之類周時稱印曰璽未聞稱章愚謂金章者金節也周曰璽秦漢曰章秦法凡官吏及民有問法令者主法令之吏各以所問者明告之為尺六寸之符明書年月日時及問者名以左劵予之謹藏其右劵封以法令之長印凡法令皆藏禁室封以禁印有擅發者及剟一字以上辠皆死此秦之符猶周之節主法令者猶漢之符節令藏於符節臺者也符長尺六而節無聞徐璆曰昔蘇武困於匈奴不墜七尺之節則漢之使節長七尺矣秦代周以為水德數以六為紀故符六寸然則尺六之符本於孝公而始皇更定其制也符節皆有副吾故曰瑞全而節半瑞之半者六器惟璋璜璋半珪璜半璧瑞以行禮故屬春官節以徵信故屬地官許叔重曰漢制以六寸之符分而相合是漢因秦制也應劭曰竹使符長五寸漢官儀曰節柄長八尺以旄牛尾為毦三重馮衍與田邑書所謂八尺之竹犛牛之尾是也或云七尺両存備攷大司徒有不易之地一易之地再易之地遂人有上地中地下地易謂休不耕是為萊六遂之萊即六郷之易而郷遂一夫百畆皆不易之地毎歲種百畮休百畮為一田一萊謂之一易每歲種百畮休二百畮為一田二萊謂之再易是為中地下地而六遂上地又加萊五十畮焉所謂上地食者參之一蓋以其地三分之而休其一則天下無不易之田也康成謂一易者休一歲再易者休二歲何休謂上田一歲一墾中田二歲一墾下田三歲一墾則田有三易矣凡耕之大方力者欲柔柔者欲力强土為力息者欲勞勞者欲息棘者欲肥肥者欲棘急者欲緩緩者欲急濕者欲燥燥者欲濕易之之謂也何休謂肥饒不得獨樂墝埆不得獨苦三年一换主易居張晏謂周制三年一易以同美惡孟康亦謂古制三年爰土易居班固則謂下田三歲更耕之自爰其處此乃秦晉之爰田爰換也猶移換獄辭謂之爰書而以當周官之易田誤矣人勞多癃土勞多瘠故必休之而土乃肥其所謂休者非弃之也春萌而斫其新夏夷而芟其陳秋繩而敗其實冬耜而剗其根則有薙氏殺草之法以治其地農土沃土滔土并土中土肥土成土隱土申土土各異物物各異宜則有草人土化之法以物其地畜水止水蕩水均水舍水瀉水水歸其澤澤草所生則有稻人揚芟之法以作其地如是而休一歲二歲然後復種則土加肥美其収數倍於嵗墾之田故曰易者不易也變易也孟子所謂深耕易耨易其田疇者以此一説易謂已耕之土而休之萊謂未耕之土而墾之六遂加萊者先王於授田之時寓墾荒之術也周之易田漢變為代田歲代處故曰代田疑即秦晉之爰田孟子所謂辟草萊任土地者蓋代處而不休則地力盡矣故孟子惡之然其法則猶得易田之遺意焉低為甽高為隴一畮三甽三隴廣深各尺苗葉方生隤隴附根及苖壯盛隴盡甽平能風與旱是為深耕後世耕淺有風災旱則立稿矣甽一名區區猶丘也隴也汎勝之書分為三等上農區廣深各六寸間相去七寸中農區廣七寸間相去二尺下農區廣九寸間相去三尺深皆六寸上農區多收亦多下農區少収亦少故曰上田弃畮下田弃甽言上田甽多下田甽少也畮欲廣以平甽欲小以深上得陽而下得隂畮無不甽田無不易然惟六鄉地狹故有不易之田則天下田之不易者亦寡矣汜勝之奏曰昔湯有旱災伊尹為區田教民糞種収至畮百石勝之試為之畮収四十石大喪及窆遂師抱磨案磨當作秝郎擊切説文秝稀疏適也從二禾讀若厯適者適均呂覽辨土篇曰稼疏而不適謂分布不均故二禾相比稀疏乃適也然則執紼者千人分布於六綍如禾稼有行勿使疏勿使密衡行必得縱行必術正其行齊其力廵行挍録遂師之職執書數之名曰抱秝秝借為厯得其聲失其義矣厯過也磨石聲也厤治也皆以秝得聲聲同而義殊漢書議郎耿育疏曰太伯見厯知適逡循固讓王充謂太王亶父以王季當立故易名為厯厯者適也太伯覺悟去而避之戰國䇿周有五庶子皆愛之而無適立也然則適立謂之適厯與適均謂之適秝不同康成謂磨者適厯執綍者名或作厯或作厯雖古文假借音同者通然得子失母終非正義黄霸傳馬不適士馬少士多謂之不適稀疏適者多少均也孟康曰闗西人謂補滿為適千人引而六綍滿豈非適秝乎韓昭釐侯出弋上車靷偏緩其右攝而適之髙誘注云適猶等也合觀衆説則適秝之義明矣廣雅訓秝為濶逺濶逺非適也失之續漢書曰天子葬太僕駕四輪輈為賓車大練為屋幙中黄門虎賁各二十人執紼車著臼絲三糾紼長三十丈圍七寸六行行五十人執紼有行適厯之義也案魏書蔣濟傳帝幸廣陵戰船數千皆滯不得行帝還盡畱船付濟船本厯適數百里中濟更鑿地蹴船令聚廣雅訓秝為濶逺以此遂大夫之職凡為邑者以四達戒其功事馬融廣成頌曰司徒勒卒司馬平行車攻馬同教達戒通通者掌固之通守政達者遂大夫之四達也四達戒功以通守政達猶通也守在四通故曰四達衞宮中者授八次之職四角四中守境内者戒四達之功晝三廵夜三鼜則戒之事也在國曰守在民曰功教而戒之職在有司而掌固贊其不足焉一説四達謂飾器也兵甲之屬財用也稍食也材器也塹築藩落國之守政可通者四逺近相移有無相補勞逸相調緩急相救推而至於師田行役則有作帥之同徒稼穡耕耨則有歲時之合耦皆守政之所通而遂師遂大夫移用其民以救其時事者也此之謂四達左傳親其人民明其五候賈逵云五候五方之候王肅云五候山候林候澤候川候平地候董遇云五候候四方及國中之姧謀愚謂五候猶四達也夏官候人各掌其方之道地官遂人各屬其地之功五方故曰五候四竟故曰四達書云申畫郊圻慎固封守以康四海此之謂也程典曰固其四援明其伍候依其山川利其守務此非掌固之所謂通守政歟制地君曰官府之藏强兵强國城郭之險外應四極遂人之戒戒以此里宰合耦于耡康成謂耡者里宰治處若今街彈之室於此合耦使相佐助因放而為名愚案周書曰五户為伍以首為長十夫為什以年為長合閭立教以威為長古文君讀為威閭胥里宰亦稱君威猶君也合旅同親以敬為長飲食相約興彈相庸耦耕而耘此里宰合耦之法也興彈相庸者民功曰庸佐助曰相興起而撿彈之以佐助其功也漢於街立室名曰街彈蓋取之此後漢酸棗令劉熊碑曰以卒為更愍念烝民勞苦不均為作正彈造設門更則是正彈者所以平其繇役使勞逸得均焉水經注平氏縣城内有南陽都鄉正街彈勸碑街誤為衞彈勸者既彈之又勸之也洪氏𨽻釋載其文亦云縣令愍繇役之苦而其頌有勸導有功及耕千耦梵梵黍稷之語則知彈勸不獨平繇且合耦矣水經注魯陽故城内又有南陽都縣正街彈碑縣正鄉正即古之里正何休曰一里八十户八家共一巷中里為校室年耆有德者名曰父老辯䕶伉健者為里正田作之時父老里正旦開門坐塾上晏出後時者不得出莫不持樵者不得入蓋彈勸之略如此􅷲祭有郵表畷者謂田畯於井畔造田舍而止其中郵猶街也蓋街之郵亭督約百姓之處里之有街非起於漢自古有之莊子所謂渠公之街也注云渠公為街正南陽孔嵩為新野縣阿里街卒正身厲行街中子弟皆服其訓化然則街在里里宰掌之有正有卒漢官典職曰洛陽有二十四街街一亭古者二耜為耦而輓犂以耕管子丈夫二犂童五尺一犂是為以興耡利甿以彊予任甿彊者童五尺興耡者犂也説者謂輓犂起於趙過誤矣過用耦犂二牛三人此非古今合耦之遺法歟抑又聞之詩曰攸介攸止烝我髦士箋云介舍也禮使民耡作耘耔閒暇則於廬舍及所止息之處以道藝相講肄以進其為俊士之行然則合耦於耡非徒勸農功亦所以烝髦士也屋三為井以井計曰耡粟井以耡名九夫之粟也夫三為屋以夫計曰屋粟夫以屋名三夫之粟也夫一為廛以廛計曰間粟廛以間名一夫之粟也廛民居區域猶間架也一而三三而九所謂出民貢者三三相保小司徒攷夫屋以此攷之司稼出斂法以此出之師旅平興積亦以此斂而聚之聚而頒之者也康成謂屋粟不耕者所罰之粟間粟間民所罰之粟誤矣夫布屋粟出於夫屋非因罰得名間民既出布矣復出粟可乎間猶廛也詩曰禾三百廛又曰十畆之間一夫之居曰廛十畆之間桑且閑閑泄泄非廛居之地歟康成謂六遂之民奇受一廛疏云餘夫竒别更受廛備後離居之法然則間粟者餘夫奇受一廛之粟也魯語籍田以力而底其逺近賦里以入而量其有無任力以夫而議其老幼籍謂耡夫謂屋里謂廛賦入以里謂税入以廛廛謂之户趙簡子使尹鐸為晉陽尹鐸損其户數蓋損其户則民優而税少是古者稅以廛也一説地有上壤間壤下壌管子相壤定籍其法本周官上壤者上地不易之田百畆是為正夫故曰耡粟下壤者下地再易之田三百畆是為三夫故曰屋粟間壤者中地一易之田二百畝在上下之間故壤曰間壤粟曰間粟鄉遂分上中下授田故旅師亦分上中下斂粟管子以此法行之齊故能振貧補不足下樂上而民不移旅師以地之媺惡為之等者蓋如此土均平政亦以地媺惡為輕重之灋而行焉蓋土有三壤税有三粟力有三科間壌亦名間田管子曰高田十石間田五石庸田三石其餘皆屬諸荒田一説内經有歲穀有間穀間穀者旅師之間粟也辰戌之紀其穀元黅卯酉之紀其穀白丹寅申之紀其穀丹蒼丑未之紀其穀黅元子午之紀其穀丹白己亥之紀其穀蒼丹是為歲穀歲穀者言其時之正色之純爾或宜高或宜下或宜晚或宜早視其嵗之有餘不及無常地亦無常時土之利氣之化也是為間穀穀之大者保精辟邪其類衆多不純一色故曰間大司徒辨十有二壤之種司稼周知其名與其所宜地而縣其種於邑閭以示民及斂而入之倉倉人與舍人辨其物物有異種種有異色色有異名而别為書旅師之間粟即此然則耡粟者其地屋粟者其夫間粟者其種也稍人掌丘乘韓詩維禹敶之毛詩敶作甸蓋古敶乘甸通其音同後世失其音由是俗書陳乘甸判然分為二矣説者謂甸出車一乘故曰乘據司馬法而曲為之説亦見管子乘馬篇方六里似八誤為六為一乘之地也一乘者四馬也一馬其甲七其蔽五一乘俗本一誤為四其甲二十有八其蔽二十白徒三十人奉車兩一乘為兩器制也一甸四馬謂之甸馬亦曰乘馬管子因以名篇似出於稍人之丘乘然縣師之法同徒輂輦未聞乘馬丘牛春秋魯作丘甲實本於齊一丘一馬七甲四丘為乘故一乘之甲二十有八司馬穰苴變通其法一丘益以三牛故一乘之牛十有二頭盛行於戰國而稍人丘乘之法亡矣輂輦鄉師治之縣師作之稍人帥之巾車所謂良車散車不在等者若漢輜車後户之屬軍中輜車車後開户毁折則入齎于職幣而更造焉逸周書所謂三輪四輿歸御者以此大匡篇曰同甲十萬猶同徒也衆欲其齊心欲其一荀子曰百將一心三軍同力詩云與子同仇言一心也問篇曰鄉師車輜造脩之具其繕何若然則鄉師治輂輦春秋亦如之而謂兵車出於丘甸不亦妄乎侈靡篇曰乘馬甸之衆齊法也非周制也古乘馬未聞有鞍而齊唁昭公以鞍為几秦送重耳疇騎二千則鞍騎起於春秋矣山國軓篇曰被鞍之馬千乘齊之戰車之具無求於民則軍中輜輦亦非民間之物可知也揆度篇曰百乘田萬頃户萬户開口十萬人當分者萬人輕車百乘馬四百匹千乘田十萬頃户十萬户開口百萬人當分者十萬人輕車千乘馬四千匹萬乘田百萬頃户百萬户開口千萬人當分者百萬人輕車萬乘馬四萬匹蓋當分者為卒無過户一人謂之輕車者輜重不存焉此齊法合於周官者其略如此春秋宋昭公田于孟諸公之祖母襄夫人使帥甸攻而殺之帥甸者稍人正義謂公邑大夫失之稍人帥甸以聽於司馬帥役以聽于司徒帥甸猶帥乘也作同徒帥乘和遂人以土均平政故六遂有土均之職六鄉為均人皆掌土地之政令而異其官者一兼均力役故曰均人一專均土地故曰土均其在春秋則謂之地均管子乘馬篇所謂地均以實數者也地均之均地則有蔓山汎山涸澤流水林藪凡鎌纒斤斧網罟得入者皆得均之或百當一或十當一或九當一或五當一十仞至十五仞見水比之於山五尺至二尺見水比之於澤則有七尺之施以手實焉其至泉也則五施之土音中角四施之土音中商三施之土音中宫再施之土音中羽一施之土音中徵五土中五音自六施至二十施凡十五土皆可得泉惟庚泥青商駢石灰壤四土不可得泉而縣泉復吕泉英三土則在山上其地不乾鑿之二尺三尺五尺至於泉而九州之土則粟土沃土位土為三土羣土之長也蘟土壤土浮土為上土怸土纑土壏土剽土沙土塥土為中土猶土𢎞土殖土觳土鳧土桀土為下土皆在三土之下而又分其等為三則楚蒍掩所書九度八鳩七辨六表五數四規三町二牧一井之土亦不外是矣土均之均地守均地事者其略如此而匠人之井土草人之化土稻人之稼土柞人之木土薙氏之草土山虞澤虞林衡川衡之山林林麓川澤之土卝人之金玉錫石之土塲人之塲圃之土土方氏之相宅任地之土形方氏之所正離之土凡在大司徒土地之圖者十有二土之名十有二壤之物皆以土均之法均之則皆與土均聯事而分掌之者也若夫以五物九等制天下之地征以作民職以令地貢職在載師閭師農貢九穀圃貢草木工貢器物商貢貨賄牧貢鳥獸嬪貢布帛衡虞各貢其物貢之之目雖在均之之法巳亡而齊國之貢也則以黃金為率無金則用絹無絹則用布季絹三十三制㬥布百兩皆當黄金一鎰田里之租一鎰食百乘之一宿關市之貨百鎰為一箧十箧為一穀三歲脩封五歲脩界十歲更制此齊之地均均地貢則然而天官冡宰九貢秋官大行人六服之貢皆邦國也而都鄙不及焉然則僅存其目而巳其詳不可得聞矣貢之言供也書曰庶邦維正之供邦國之貢也萬民惟正之供都鄙之貢也言文王無滛逸遊田之費故邦國都鄙之貢各得其正司書合九貢九賦而立九正之名葢取諸此正猶貞也禹貢厥賦貞和其政令調其媺惡適其輕重之平是為貞亦曰均均則庶土交正故曰九正書有九共篇九共者九貢也其書曰予辯下土使民平平平平者均之謂也漢建武中天下墾田多不以實或優饒豪右侵刻羸弱百姓怨嗟蓋土均之職廢而土地不得其平矣草人九土曰騂剛曰赤緹曰墳壤曰渴澤曰鹹潟曰勃壤曰埴壚曰疆㯺曰輕爂墳壤者隱起若墳地多蚡鼠名曰槖土蟲易全處乾而不斥湛而不澤土之最上者五沃也其種大苗細苗樹宜五麻菜宜五臭勃壤者無塊曰壤膏肥膴膴若澤若屯名曰息土不純一色或黃或白土之次上者五壤也赬莖黄秀種無不宜一説壤者塲也䵓鼠之塲曰坻螾塲曰坦䵓鼠者蚡鼠謂之䵓者言起地若犂坻坥猶墳勃也鹹潟者是為淳鹵甚鹹以苦地不生物狀如爐火土之最下名曰五桀其種所宜白稻長狹有土化之法則惡者亦美矣土黏曰埴其色多赤甚臞而塉土之下者五埴也其種鴈膳黄實朱跗剛土曰壚不黏而疏既强且麄土之中者五纑也壚與纑通其種大細邯鄲而粟大埴壚二土合為一蓋中下錯歟疆㯺者磥礰磊塊㙤闞之區若糠以肥色黄而虚土之中者五壏也㯺與壏通其種大茘小茘青莖黄秀月令美土疆其丈切左傳數疆潦説者謂疆㯺墝埆之地不堪種植豈其然乎輕爂者火飛為爂華然若芬色如蜃炭有類屑塵土之次中者五剽也爂與剽通其種大秬細秬黒莖青秀渴澤者二尺見水比之於澤水去土柔不離不坼捍然如米色黝以黑種宜芒種嘉蔬是殖蓋五浮之土歟騂當作赤剛土也釋名曰土赤為鼠肝其色似之地員篇曰五𢎞之狀如鼠肝土之下者其種青梁黑莖黑秀然則剛赤緹一土分為二蓋五𢎞之土歟土有强有弱有輕有溼皆非中和剛赤緹疆㯺埴壚鹹潟虞翻曰剛鹵非柔强土也墳壤勃壤弱土也輕爂輕土也渴澤溼土也强者弱之弱者强之甚輕者牛羊踐之甚溼者芟艾燒之使强弱相得輕重相衡燥溼相調則有草人物地之宜土化之灋焉取骨煑汁漉去其滓麋鹿貆狐牛羊犬豕溲而曝之汁乾乃止欲稼耐旱漬以附子欲稼不蟲和以蠶矢古法用蕡蓋取之此煑水以雪名為雪澤冬埋地中穀之精液相宜糞種畆収百石我言不信聞之先嗇糞種皆以獸獨疆㯺用蕡北山經曰單狐之山多机木注云机木似榆可燒以糞稻田出蜀蓋亦蕡之類也緹赤黄色執金吾緹騎二百人緹赤色繒則剛赤緹皆赤土信矣禹貢廣斥史記廣潟潟與斥古今文冉駹土地剛鹵不生穀粟麻菽唯以麥為資然則鹹潟宜麥歟稻人凡稼澤夏以水殄草而芟夷之鄭仲師説今時謂禾下麥為荑下麥管子所謂九月斂禾麥之始也是為穱麥謂稻下種麥案澤地為稼其説見吕覽任地篇以窐為突挹之以隂保濕而處雚夷毋淫使子之野畫為泠風古音風協淫五耕五耨盡其深殖隂土必得大草不生又無螟蜮兖州人謂蜮為音相近也今兹美禾來兹美麥所謂禾下麥者以此愚謂稼下地者一易再易之地也今歲稼而明歲萊故曰稼下地以水殄草揚芟作田作者易也變也否則既曰田矣又何待于作乎康成亦謂澤地為稼者必於夏六月之時大雨時行以水病絶草之後生者至秋水涸芟之明年乃稼詩曰以茠蒤蓼蒢陸草蓼澤草茠而去之職在薙氏稻人所芟則澤草也芟草所以成穀故曰草土之道各有穀造漢律因之疁田茠艸春秋隱公二年天王崩三年武氏子來求賻桓公十有五年天王使家父來求車文公八年天王崩九年毛伯來求金公羊以為王者無求求賻求車求金皆非禮也繼文王之體守文王之法度文王之法無求而求故譏之穀梁以為求之為言得不得未可知之辭求之者非正也求車猶可求金甚矣左氏亦謂諸侯不貢車服天子不私求財然則王者無求之之道歟非也地官上訓原其生以詔地求則王者有求之之道也無其道則不書於經衛孫林父寗殖出其君名在諸侯之䇿孔子削而更之曰衛侯出奔齊蓋以臣出君猶以臣召君不可以訓故不書書求者明有求之之道而失焉者也楚貢不入齊桓徴之敢不共給且列國相弔賻以乘黄周有大喪魯不歸賻其辠大矣鄭輸晉幣壞垣納車盟主猶然何況王者魯不輸幣故周使來求其譏亦在魯荆揚之貢惟金三品未聞徐州貢金金非魯地之産非其地之産而求之是土訓失其官也穀梁謂求車猶可者以此晉弔周喪王求彛器叔向譏之韓宣聘鄭私自求環子美拒之皆失求之之道矣上求於下其象為益益之上九曰莫益之或擊之孔子曰定其交而後求无交而求則民弗與也莫之與則傷之者至矣由是知君之於民亦有求之之道焉漢之匈奴稱臣朝貢列為北藩而王根貪其材木所生之地遣使求之求而不得因之怨恨釁由是生豈非所謂莫之與則傷之者至乎魏文帝遣使於吳求雀頭香大貝明珠象牙犀角瑇瑁孔雀翡翠鬬鴨長鳴雞吳之羣臣奏曰荆揚二州貢有常典魏所求珍玩之物非禮也吳主孫權以為彼在諒闇之中而所求若此寧可與言禮哉然則周之求賻未為失禮也適足以見王室之卑自文公以後王使來求絶不復見者天王之命不能復行於諸侯矣地之所生詳於禹貢制其貢各以其所有周有職方居山者不以魚鱉為禮居澤者不以鹿豕為禮此之謂地求家語魯君求假於季孫孔子曰君取於臣謂之取臣取於君謂之假此非孔子之言也君可曰求臣不可曰假君曰求下交也臣曰假上僭也君下交為泰臣上僭為凶楚公子圍之汰也亦曰假之寡君王莽盜漢先假後篡書大傳太子年十八曰孟侯於四方諸侯來朝迎於郊問其土地所生美珍怪異人民之好惡山川之所有無此土訓之職也又焉用問且使太子問之諸侯其説益誕矣宋眞宗祀汾隂趙湘為考制度副使請如周官置土訓所過州縣山川與俗好惡目録奏御從之管子曰君有三欲於民一曰求求必欲得求多者其得寡未有能多求而多得者也益之上九莫益之者以此其心無厭雖天地亦不能贍其求而況於人乎土訓道地圖誦訓道方志古之稗官也稗官乃小説家者流小説九百本自虞初虞初洛陽人漢武帝時以方士侍郎號黄車使者蓋即古之土訓誦訓王廵守則夾王車挾此祕書儲以自隨待上所求問皆常具焉王者欲知九州山川形勢之所宜四方所識久逺之事及民間風俗輶軒之所未盡採太史之所未及陳凡地慝方慝惡物醜類乃立稗官使稱説之故曰訓解詁為訓偶語為稗其義一也説者謂街談巷語道聽塗説者所造豈其然乎應劭曰其説以周書為本賢者識大不賢者識小而文武之道存仲尼之所學也君子有九能一曰山川能説説有兩義一曰説説者説其形勢一曰述述者述其故事然則訓兼兩義或説之或述之淮南要略曰操舍開塞各有龍忌注云中國以鬼神之亡日忌胡越謂之請龍此豈誦訓之所詔乎非也誦訓道方慝土訓道地慝慝者惡也陸子曰惡政生於惡氣惡氣生於災異蝮蟲之類隨氣而生虹蜺之屬因政而見治道失於下則天文亂於上惡政流於民則蟲災生於地聖人察物無遺六鷁飛五石隕鸜鵒來冬多麋凡所謂慝備載春秋矣開塞之龍忌則未有聞焉楚申公子培從王獵王獲隨兕子培刼而奪之未幾子培死其弟曰臣之兄嘗讀故記曰殺隨兕者不出三月是以臣之兄驚懼而爭之伏其辠而死王令人發平府而視故記果有太元曰蒙柴求兕其德不美測曰蒙柴求兕得不慶也兕者隨兕一名科雉隨讀為科兕與雉音相近獲之者不祥此土訓所道之地慝也發府視記而後知之則土訓失其職矣順氣成象而吉祥止逆氣成象而凶慝生於是有方慝先王設為辟忌之法以弭之辟忌者易之所謂辟咎春秋之所謂省災論語之所謂修慝也是故毎當天患行地妖生逢不若見惡人輙大自攻治曰予一人亦有慝焉此之謂修慝修慝所以省災省災所以辟咎蓋天地人物凶慝之氣無方不有聖人恐懼修省之意無地不然誦訓所詔詔以此漢丞相魏相敕掾史案事郡國及休告從家還至府輙白四方異聞或有逆賊風雨災變相輙奏言而宋李沆為相亦日取四方水旱盜賊奏之或以為細事不足煩上聽非也古者四方異聞盡在地圖方志人君朝夕之所常聞盜賊水旱風雨災變皆方慝也誦訓又時時道之以為警戒則人君之侈心奚由而作乎若夫隂陽禁忌聖人不言非誦訓之所詔也王制太史典禮執簡記奉諱惡蓋四方所諱所惡謂之方慝而保傅傳謂日月之時節先王之諱大國之忌風雨雷電之眚皆太史之任則諱惡非災眚歟康成以為四方言語所惡不避之則其方以為苟於言語失之淺矣荀子曰竒物怪變所未嘗聞也所未嘗見也卒然起一方則舉統類而應之無所儗㤰如其説則四方怪變博物者能名之而巳則又失誦訓詔之之義也誦者為王誦之韓非子曰時稱詩書道法徃古則見以為誦楚辭有惜誦發憤抒情因以風諫至於身罹愍病而終不能忘深得古誦訓詔之之義焉楚語曰倚几有誦訓之諫乘必以几倚几亦謂王在車漢法駕出侍中多識者一人參乘散騎為侍從騎並乘輿車謂夾王車也周芮良夫之詩曰聽言則對誦言如醉箋云見道聽之言則應答之見誦詩書之言則㝠卧如醉於是誦訓訓之官雖存而實廢矣小雅節南山家父作誦以究王訩訩猶慝也究王訩者詔王慝也山虞澤虞掌山澤之政令而為之厲禁厲古列字玉藻所謂山澤列而不賦也列者司農謂遮列守之不賦者謂取材於地而不賦於民山虞令萬民時斬材有期日澤虞頒其餘於萬民則與民共之矣平其守者使之勿爭舍其守者令之勿犯入禁者有時斬材者有法竊木者有刑服耜之季材豆籩之川奠玉府之財物喪紀之葦蒲皆取之於山澤焉古厲列同音列山氏一作厲山氏詩垂帶如厲古而如通左傳鞶厲游纓康成皆訓厲為裂内則男鞶革女鞶絲蓋裂帛以飾帶帶謂之鞶即左傳之鞶厲厲乃鞶之飾故毛傳云厲帶之垂者謂裂帛垂之以為飾也春秋紀裂繻公穀二傳作履緰蓋履厲音相近古裂讀為厲文異音同漢郊祀歌迣萬里晉灼曰迣古迾字讀為厲學者不知音以為康成好破字則是先王設官守山澤以厲民也可乎鄭大旱使屠擊祝欵𥪡柎有事於桑山斬其木不雨子産曰有事於山藝山林也而斬其木其辠大矣奪之官邑而漢元時御史大夫貢禹亦云斬伐林木亡有時禁水旱之災未必不繇此然則虞衡之官養䕶繁殖即子産之所謂蓺山林而毋竭川澤毋漉陂池取之以時合於天道則地臧不泄山川得以含氣出雲而國不憂水旱亦聖人財成輔相之一端也王制名山大澤不以封注云不以封者與民同財不得障管穆王里圃田之路有東虞西虞南虞北虞凡十虞作居范宫以觀桑者乃命桑虞用禁㬥人東至雀梁休於深雚休謂舍其中案視守者而申戒之命虞人掠林除藪以為百姓材所謂與民同之者其略如此及周之衰諸侯各擅有山林藪澤之利春秋書築以譏之築者障塞而管領之也則天子虞衡之政令不行於列國矣魯頌曰錫之山川土田附庸言錫之者明非所當得也附庸不得專臣山川亦不得專有為王守其地之財物仍以時入於王之玉府而頒其餘於國之民故季氏伐顓臾成公築鹿囿皆非禮也且山為苑澤為沈雍氏禁之矣乃公然築為鹿地之苑非犯先王之令哉戰國山澤皆有賦魏之梁囿溫囿皆苑也溫囿之利歲入八十金而燕有氊裘狗馬之地齊有海隅魚鹽之地楚有橘柚雲夢之地此皆山澤川林之有賦者也冡宰以九賦斂財賄山澤之賦閭師任而徴之貢其物而巳惟漆林倍其征左傳謂澤之目篽萑蒲説文作目篽藪之薪蒸海之鹽蜃齊皆有官守之則倍其征者豈獨漆林乎齊語澤立三虞山立三衡三虞者大山大林麓中山中林麓小山小林麓三衡者大川大澤藪中川中澤藪小川小澤藪侯國亦如王國也秦大饑應侯請發五苑之草著蔬菜橡果棗栗以活民昭襄王不許以為無功而民受賞是亂國之法魏惠成王發逢忌之藪以賜民紀年書之以為美談則知當日之障塞而管領之者其法之嚴征之㬥更甚於春秋矣韓嬰曰聖人通四方之物使澤人足乎木山人足乎魚餘衍之財有所流故民無凍餓此冡宰之九職虞衡作山澤之材而又使商賈阜通之者也有蕃曰園有牆曰囿列者不蕃不牆故曰隤牆塡壍使山澤之民得至焉古山澤不築築者隱以金椎故曰亭臯千里靡不被築春秋書築以此冡宰以九兩繫邦國曰藪以富得民富謂山澤川林之財物霸者以富國王者以富民管子曰山澤雖廣草木毋禁壤地雖肥桑麻毋數薦草雖多六畜有征閉貨之門也時貨不遂金玉雖多謂之貧國信哉古者山澤作于虞衡鳥獸養于藪牧是謂山澤之農不生九榖者而管子謂山澤之作廢民于生穀故先王禁之誤矣甲子木行御而大斬伐則傷庚子金行御而攻山擊石則死喪敗亡故春秋之斬木不入禁非其時也壬子水行御位在北山北曰隂故冬不斬隂丙子火行御位在南山南曰陽故夏不斬陽非是則弗禁也凡材必先掄之然後斬之斬有時掄無時故斬材禁而掄材不禁自管子創為官山海之説海正鹽筴山立鐵官鹽鐵之利由此興虞衡之職亦由此廢卝人掌金玉錫石之地蓋山虞之别也山虞掌林卝人掌金斬山木鼓山鐵毋藉於民而用足後世言利者得托焉地數篇曰出銅之山四百六十七山出鐵之山三千六百九十山戈矛之所發刀幣之所起能者有餘拙者不足亦見中山經昔者葛廬之山雍狐之山發而出水金從之蚩尤受而制之以為劍鎧矛㦸芮戈故世本曰蚩尤作兵漢之精兵藏於武庫而於武庫祭蚩尤以此路史乃謂繇其威械故貊焉非也表貊貊一作貉四時田不祭蚩尤也玉起於禺氏禺一作牛古牛禺音同金起於汝漢珠起於赤野距周七千八百里其塗逺其至難故先王度用其重而因之珠玉為上幣黄金為中幣刀布為下幣權其高下疾徐輕重於是玉幣有七筴隂山之礝䃉燕之紫山白金發朝鮮之文皮汝漢水之右衢黄金江陽之珠秦明山之曾青牛氏邉山之玉是為七筴以狹為廣以寡為多天下之數盡於輕重矣齊城隂里門九襲牆三重因於其中刻石而為璧尺者萬泉八寸者八千七寸者七千珪中四千瑗中五百璧之數巳具遂西見天子請率諸侯而朝先王之廟因令天下諸侯不以石璧不得入朝于是石璧流而之天下天下財物流而之齊故國八歲而無籍隂里之謀也其説似誕然漢造銀錫為白金而以白鹿皮為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧實祖隂里之謀而利析秋毫矣上有丹矸矸一作沙者下有黄金上有慈石者下有銅金上有陵石者下有赤銅青金一作金錫赤銅似誤上有代赭下有鑒鐵上有蔥下有銀沙一曰上有鉛者下有鉒銀上有丹沙者下有鉒金此山之見榮者也榮者山之精神徴為形色占其氣知其味謂之物地物地者物生於地而原其生著為圖説為訓故其官有土訓其説有地圖凡物先原而後求故求無不得康成所謂占形色而知鹹淡者知鹹淡即知金玉金鹹而玉淡故洗金以鹽金在山而童玉在山而潤銅英青金英黄玉英白或曰嘗而知之豈其然而管子謂山之見榮者謹封而祭之距封十里而為一壇使乘者下行行者趨若犯令者辠死不赦噫甚矣又云有犯令者左足入左足斷右足入右足斷其説益又甚焉卝人之職以時取之物其地圖而授之蓋山師辨其物土訓授之圖辨其珍異與其利害頒之邦國都鄙遮迣以守之而廵其禁令未聞封為壇也古者名山不封好事者因卝人有禁令遂創為犯令辠死之説而制斷足之刑不亦誕且妄乎又云發徒𨽻而作之則逃亡而不守發民則下疾怨上邉竟有兵則懐宿怨而不戰未見山鐵之利而内敗矣不如與民量其重計其贏民得其十君得其三之為善也然則金玉錫石亦頒其餘於萬民歟大麓大川徒皆百有二十人大山大澤徒皆八十人卝人之徒四十人皆有常職以食於上則又何説而逃亡也齒角羽翮之政絺綌草貢之材染草炭灰互蜃疏材之物固斂之山澤之農以當邦賦矣若夫採取金玉錫石發民羣聚於山亦未聞於古掌炭掌灰物炭物以共邦用掌荼掌聚荼及疏材之物以待邦事掌蜃掌斂互物蜃物以共闉壙之蜃蓋皆畜聚之物一時不可猝辦故平時聚而斂之以待邦用邦事兼以共喪所謂下里物也死者歸蒿里葬地下故曰下里人皆以為不祥故不為之備而五禮遂有吉無凶漢昭帝時茂陵富人焦氏賈氏以數千萬隂積貯炭葦諸下里物及昭帝大行方上事㬥起用度未辦大司農田延年奏言商賈或豫収方上不祥器物冀其疾用欲㠯求利非民臣所當為請没入縣官奏可然則炭荼蜃物之官其廢乆矣上失其官下儲其物舉而罰之是時霍光當國遂可其奏亦不學無術之一端也宋熈寧初判太常寺章衡建言自唐開元纂修禮書以國恤一章為豫凶事刪而去之故不幸遇事則捃摭墜殘茫無所据今宜集禮以貽萬世從之此凶禮之大者固當講明而切究之矣其小者炭荼互蜃至纖至㣲皆物有其官官有其備安得謂豫凶事乎大祭祀廪人共接盛康成讀接為一扱再祭之扱凡禮成於三故以柶祭醴三始扱一祭又扱再祭士昏禮記文賈疏謂讀如特牲少牢誤矣説文皀穀之馨香也象嘉穀在裏中之形七所以扱之鬯以秬釀鬱艸芬芳攸服以降神從凵為器中象米七所以扱之然則扱盛者穀之馨香秬之芬芳而扱之者七也皀與鬯皆從匕以此匕一名柶用比取飯古者飯以手後世飯以匙一名畱犂應劭曰畱犂飯七也蓋起於秦漢歟説文謂七以扱米扱収也一作接孟子接淅而行謂洮米未炊収之而去然接淅説文作滰淅淅者汰米滰者浚乾之非廪人之事也故云扱以授舂人扱接同音故讀從之曾子問接祭注云不迎尸謂朝踐坐尸於堂饋食迎尸入室朝踐之後饋食之初既酌奠復焫蕭尚未迎尸自此以前謂之接祭接之言㨗也跛倚以臨不敬大矣故禮敬則㨗也荀子曰先事慮事謂之接接則事優成注云接讀為㨗内則接以太牢注亦讀為㨗尒疋接㨗也古接㨗通信矣扱一作㨗士冠禮㨗柶注云扱柶於醴中蓋㨗柶於醴猶扱七於盛是為扱盛㨗又作鍤音義亦同穀梁子曰甸粟而内之三宫三宫米而藏之御廩御廪者粢盛之所蔵也諸侯三宫天子六宫古者后宮藏種生而獻之故帝耕於籍后獻其種及帝籍之収藏於神倉則有王后親舂之禮禮蓋如天子三推而舂人終其事焉公羊子曰周公盛魯公燾羣公廪盛者新廪者陳燾者下陳上新是故非天子不接盛春秋宋萬弑其君㨗鄭伯㨗卒公羊㨗皆作接古㨗接通非誤也三傳經文多類此學者觀之可察方言并識古音矣舂人職凡饗食共其食米康成謂饗兼燕食賈疏謂燕禮無食米食禮無飲酒然伐木燕朋友之詩而有八簋以盛黍稷則燕禮有食米矣箋云陳其黍稷謂為食禮蓋言或燕或食互文相通則不然饗主恭燕主醉食主飽是為三大禮陳饋八簋即祭之饋食邊豆有踐即祭之朝踐燕諸父諸舅而行祭禮禮之盛也君子敬則用祭器三大禮之謂歟行一禮而三者兼焉或云燕有樂食無樂非也天子食三老五更於太學冕而總干天子親在舞位則其樂聲容之盛非徒坎坎蹲蹲而巳周人養老三者兼行故盛也公食大夫非禮之盛者故無樂然飲酒實于觶加於豐則食禮亦非無酒或曰食有酒者優賓也蓋奠而不舉燕雖主醉天子賜爵則貌變食雖主飽擯者相幣則降辭皆肅敬承命又未嘗不主于恭也故三者異而同饗在朝燕至夜質明行事日中禮成故鄭饗趙孟禮終乃燕周饗隨㑹燕以好合彤弓饗諸侯也而有賓客之勸酬常棣燕兄弟也而有王公之立飲大射儀曰以我安安者燕也則未安之前皆行饗禮既安徹爼而薦庶饈然後燕禮行焉則知饗禮不亡盡在燕禮矣舂人並舉饗食而不及燕大行人饗禮九獻七獻五獻食禮九舉七舉五舉而燕亦無文古者燕饗通設爼為饗徹爼為燕或曰饗食在廟燕則于寢寢者廟之寢湛露天子燕諸侯也曰厭厭夜飲在宗載考則燕亦在廟矣毛傳云夜飲必於宗室宗室者大宗之廟也稾人職内外朝康成謂外朝斷獄弊訟之朝今司徒府中有百官朝㑹之殿云天子與丞相舊決大事焉是外朝之存者歟蔡質漢儀曰司徒府與蒼龍闕對厭於尊者不敢號府應劭曰不然丞相舊在長安時有四出門隨時聽事東京本欲依之迫於太尉司空但為東西門耳東京司空即西京御史大夫毎國有大議天子車駕親幸其殿然則東漢三公府皆對蒼龍闕也周之外朝左右皆棘而中槐則槐當在闕下左九卿之廬右諸侯之舍中三公之朝面三槐對兩觀與漢丞相殿對蒼龍闕者正同司徒殿面西三公朝面北則外朝在雉門外矣舊説在庫門外非也覲禮諸侯受舍于朝注云在廟門外廟在中門之左雉門為中出廟門至雉門門外之右九棘之下蓋諸侯之舍歟聘禮宗人授次次以帷少退於君之次次者舍也聘賓之次當在羣吏之舍其次在諸侯之後而少退焉朝士職所謂右九棘公侯伯子男之位羣吏在其後是也康成謂雉門設兩觀與今宫門同閽人幾出入者窮民不得入則又不然兩觀之間左嘉石而罷民平右肺石而窮民達中象魏而萬民觀奚為而不得入乎且路鼔建於路門外以達窮則窮民得至路門矣先鄭謂外朝在路門外内朝在路門内亦非無説也匠人職外有九室九卿朝焉朝士職左九棘孤卿大夫位焉三孤六卿為九卿則九卿即孤卿樹棘以表位則九棘即九室康成亦謂在路寢之外如今朝堂諸曹治事處則外朝又在路門外歟愚謂王有三朝曰聽朝曰治朝曰燕朝聽朝者鄉士遂士縣士等所謂職聽於朝訝士所謂四方之獄訟故曰眂四方之聽朝冡宰贊之王親徃而㑹其期三訊三詢皆在焉小司宼與朝士所掌者是也王與羣臣治事之朝曰治朝冡宰贊之宰夫掌其法司士正儀辨等而儐之者是也王與宗人圖嘉事之朝曰燕朝每日眂治朝畢退而聽政於此太僕掌之是為内朝亦曰路寢庭朝治朝聼朝皆外朝一在路門一在雉門稾人主冗食者司農讀稾為犒蓋本書序稾飫篇注云稾勞也飫賜也服䖍云以師枯槁故饋之飲食展禽使乙喜以膏沐犒師膏沐者潤澤之義也潤澤謂之槁猶存謂之徂治謂之亂故謂之今古語皆然也將賞為之加膳加膳則飫賜春饗孤子秋食耆老冬饗士庶子是為飫賜稾飫之官名稾人以此小行人國有師役則令槁襘之注云故書槁為稾大戴禮朝事儀亦作槁古文也兩傳皆作犒似後人所改而古無之故説文不載牛人職云軍事共其犒牛洪氏𨽻續載漢斥彰長田君斷碑有勞之語與犒同何休曰牛酒曰犒加飯羮曰饗故犒一從牛一從酉何休之説信矣則其文蓋起於漢歟淮南子泰族訓曰湯之初作囿也以奉宗廟鮮犞之具注云生肉為鮮乾肉為犞犞與槁通未聞訓為勞廣雅謂犒與罷倦煩􅵍同義西京賦曰割鮮野饗犒勤賞功稾人之事也稾從牛從酉皆非古文字雖奇亦非無説故并及之禮說卷五
