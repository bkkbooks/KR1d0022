body:
  text: 禮説卷二翰林院侍講惠士竒撰天官二五齊一曰泛二曰醴三曰盎四曰緹五曰沈釋名云汎齊浮蟻在上汎汎然也鄭云成而滓浮如今宜城醪矣釋名亦云宜城醪蒼梧清言一清一濁也泛一名説文云泛齊也醪汁滓酒也釋名云醴禮也釀之一宿而成有酒味而巳醴一名酤詩無酒酤我毛傳云酤一宿酒也鄭云如今恬酒矣髙誘云醴以蘖不以麯濁而甜中山經曰其祠蘖釀注云以蘖作醴顔師古謂醴少多米非也醴不以麯髙説得之釋名盎者滃滃然濁色也盎説文作醠亦云濁酒鄭云蔥白色如今酇白矣鄼讀為醝廣雅云醝酒也宋孝武四時詩所謂白醝解冬寒也釋名云緹者色赤如緹也鄭云成而紅赤如今下酒矣詩釃酒有衍説文云釃下酒也謂􅜷酒以筐賈疏云若今糟牀矣釋名云沉者濁滓沈下汁清在上也鄭云成而滓沈如今造酒矣沉一作澄則清可知也南都賦十旬兼清疑即此三酒一曰事二曰昔三曰清釋名云事酒有事而釀之酒也鄭云事酒今之醳酒皆新成也釋名醳酒云久釀酉澤似非新成一名舊醳鄭云舊醳謂昔酒葢醳酒有舊有新舊為昔酒則新為事酒矣醳之言澤也故醳一作澤昔酒今之酋久白酒清酒今中山冬釀接夏而成内則酒清白注云白事酒昔酒也酒色清明謂之明酌五齊之醴為濁三酒之事為新皆卒造之酒故泲醴以事其味尤相得也醆酒涚於清注云盎齊差清故和之以清酒則泛醴為尤濁矣其用之祭祀則酒正凡祭祀以法共五齊三酒以實八尊酒人掌為五齊三酒祭祀則共奉之然則造之者酒人辨之者酒正有式有法凡祭祀皆然也學者見禮運有醴醆醍澄而無泛遂謂禘用四齊惟大祫備五齊三酒時祭用二齊醴盎諸侯禘用二齊時惟一齊盎而已時小於祫誠然祫大於禘豈其然盎一作醠説林訓曰清醠之美葢未涚濁既涚清宋元豐禮以為酒正八尊設而弗酌司尊彜六彜六尊設而酌之今太廟明堂請以泰尊實泛齊山尊實醴齊著尊實盎齊犧尊實緹齊象尊實沉齊壺尊實三酒皆為弗酌之尊又以犧尊實醴齊象尊實盎齊犧西象東壺尊實清酒皆為酌尊尊三其貳以偹乏匱愚謂尊皆不空五齊神所享故不貳三酒人所飲故益之是以尊常滿貳者有數不貳者有量惟無算爵則無數無量爾宋禮有酌尊有弗酌之尊則先儒之所未言也存以備攷禮記外傳曰五齊尊而三酒卑謂之齊者酒人和合之分劑之名三酒者列於堂下臣下相酌酬酢之用三酒有酌數五齊有器量其獻也必有從謂之從獻從獻之脯燔亦如齊酒之有數量焉齊酒之數量酒正掌之脯燔之數量量人制之祭祀之從獻有肝燔饗賔之從獻有脯醢天子諸侯之祭禮亡以特牲饋食言之主人獻尸以肝從獻祝亦以肝從主婦亞獻尸以燔從亞獻祝亦以燔從賔三獻燔從如初主婦致爵于主人肝從燔從如初主人致爵于主婦從獻皆如初尸酢賔長賔長獻祝及致爵于主人主婦燔從亦如初而無肝從則禮殺於初矣獻賔及衆賔獻長兄弟衆兄弟及内兄弟雖無肝燔兩從而有薦爼薦爼亦謂之從無從者加爵加爵非獻也故無從則凡獻皆有從也獨獻佐食有脀無薦既下尸又下祝從獻之爼設於階間豈非以其賤歟葢從獻肝為貴燔次之嗣舉奠尸授肝佐食設豆鹽肝宜鹽也少牢酳尸牢肝用爼㨎於爼鹽言用爼明亦有用豆者故同一肝鹽或在豆或在爼腊人祭祀共豆脯則脯亦有在豆者矣康成謂脯非豆實豈其然乎上大夫賔尸惟羞羊燔與豕燔而已無肝也賔尸禮殺於正祭故無肝從則從獻尤以肝為貴也饗賔從獻則天子之饗禮亡今存者諸矦之燕禮饗終乃燕燕之初立而行禮則饗存焉饗禮獻有從旅無從然當其獻卿也設席乃薦之及其獻大夫也則既獻乃布席薦之至徹爼升燕而後大夫祭薦所以别尊卑既燕而獻士畢乃薦士則士尤卑矣亦各就其位薦之故皆曰從獻賔醉而出必取薦脯重君賜也以所執脯賜鍾人於門内霤廣君惠也邾莊公與夷射姑飲酒出而閽人乞肉者以此射姑出不執脯奪杖敲閽無禮甚矣邾之亡也宜哉内則有腵脯有析脯腵為脩析為羮則脯有濡有乾濡者炙以飴蜜豉汁淹之脯脯然宜於豆乾者腵而捶焉乃施薑桂挺挺然宜於籩古者尚之冠醴子子取以見母昏醴賔賔取以反命贊醴婦婦取以授人然則脀兼燔而尚肝薦兼醢而尚脯皆曰從主於獻也食醴無獻酬故脯燔不設而大饗尚腵脩脯以籩燔以爼皆肉物也内饔辨焉詩曰如酌孔取箋云孔取謂度其多少凡器之孔其量大小不同所謂酌有數量也詩曰有斯首炮之燔之君子有酒酌言獻之箋云炮燔以為飲酒之羞凡飲酒之禮既獻賔乃薦羞所謂從獻之脯燔也酌有淺深大小薦有長短多少肉從酒故薦從酌鄉射記所謂脯五膱膱長尺二寸似非定數必有等差漢祀岱宗脯長五寸則漢之脯短於古矣曲禮脯曰尹祭士虞記折爼二尹縮祭半尹是脯不徒為豆實兼折以為爼實也鄉射記祭半膱横于上半膱猶半尹縮猶從爼横設故横於上者於人為從謂之縮祭杜氏通典曰從獻上炙主人以肝主婦以肉謂之燔隨酒行禮風俗通曰祀岱宗作脯廣一尺長五寸祀訖取泰山君夫人坐前脯三十朐太守拜章傳送洛陽秋官司厲掌奴其奴男子入於辠𨽻女子入于舂稾秋官辠𨽻百有二十人役辱事積任器助牽車漢律所謂𨽻臣地官女舂抌女稾皆有奚奄人掌之是為舂稾而天官女酒女漿女邊女醢女醯女鹽女幂春官女祧皆有奚奄人掌之名曰女奴亦曰宦女宦女者官婢也不獨給事舂人稾人總謂之舂稾若漢律之白粲鬼薪而酒人之奚多至三百則古之酒皆女子為之蓋酒隂類祭先灌求之隂詩曰天立厥配配讀為妃傳訓為嫓説文云配酒色也從酉妃聲妃作媐省為妃酒之溺人猶女之惑人先王亦所以示戒歟或曰女奴入舂稾則酒人之奚非女奴也愚以為不然鍾子期夜聞擊磬者而悲使人召而問之答曰臣之父不幸而殺人臣之母得生而為公家為酒臣之身得生而為公家擊磬臣不覩臣之母三年矣量所以贖之則無有是故悲也然則古之為酒者皆女奴信矣其父殺人而死妻子從坐為奴則非古法也康成謂從坐男女没入縣官蓋起於戰國歟月令染人曰婦官蓋典婦功之屬官淮南子云庶女尚葈葈與枲通尚猶典也而天官典枲受盬典絲受良皆非女子獨内司服縫人有女御女工及奚而已而婦功絲枲有府史工賈故男子主之且以其有黼畫組文之美布緦縷紵之功以共祭祀以給喪紀以待時頒故婦人不與焉古配讀為妃易遇其配主鄭註曰嘉耦曰妃虞注亦曰妃嬪蓋配古妃字非改配為妃也大戴禮哀公問配以及配禮記配作妃古今字戰國策梁王觴諸矦於苑臺酒酣魯君舉觴一作􅒀言曰昔者帝女令儀狄一作帝女儀狄作酒而美進之禹禹飲而甘之是酒之作也始於帝女女酒之名蓋取諸此墨子曰丈夫以為僕園胥靡婦人以為舂酋酒孰曰酋故酒人為大酋然則舂酋者酒人之奚也如淳曰酋音酒孰與久切酒正四飲漿人六飲皆有醫醫者古之湯液今之酒漿也故漿人掌之酒正辨焉説文醫治病工殹者惡姿也得酒而使一曰殹病聲酒所以治病周禮有醫酒郊祀志順風作液湯如淳曰藝文志有液湯經其義未詳愚按内經黄帝問曰上古聖人作湯液醪醴為而不用何也岐伯曰古聖人之作湯液醪醴者以為備耳故為而弗服也中古之世道德稍衰邪氣時至服之萬全當今之世必齊毒藥攻其中鑱石鍼艾治其外形弊血盡而功不立然則古之治病未有毒藥鍼石先有湯液酒醴故謂之醫殹者噫也病者善噫故人身有譩譆穴在背下俠脊傍三寸所厭之令病者呼譩譆譩譆應手言以手應之病者作聲則止譩一作醷莊子曰生者喑醷物也亦作意漢書意烏注云恚怒聲古以酒治病遂以名其酒故醫醷皆從酉以殹意得聲康成以醷為梅漿失之矣一天二地三人四時五音六律七星八風九野身形亦應之人出入氣應風順風作液湯者時則訓所謂服八風水也故王莽起八風臺作樂其上説者謂八方之風朝㑹太乙豈其然六飲之凉即内則之濫康成謂濫以諸和水紀莒之間名諸為濫愚案管子曰冬日不濫非愛水也夏日不煬非愛火也為不適於身便於體也然則濫一名涼葢宜於夏矣楚辭挫糟凍飲酎清涼注謂盛夏之時覆蹙乾釀提去其糟但取清醇居之冰上而飲之則酒寒凉也其説近之水涼二物酒正不辨者非以其無糟歟涼廣雅作䣼本説文雜味也釋名謂之桃濫水漬而藏之其味酢而濫濫者古者以飲澆飯謂之飱禮食未飱必先啜飲以利㗋不令澀噎故未嘗羞先飯飲卒食又三飯三飲三飲者三潄漿也古有客舍賣漿家列子曰吾食於十漿而五漿先饋葢四飲兼清糟為八加以水涼謂之十漿宰夫職云府掌官契以治藏歲終則令羣吏正歲㑹月終則令正月要旬終則令正日成而以考其治歲㑹日成月要皆官契也酒正職云凡有秩酒者以書契授之酒正之出日入其成月入其要則成要即書契矣稱責以傅别取與以書契賣買以質劑出入以要㑹傅别質劑要㑹皆書契之名府實掌而藏之故曰府酒正府二人酒人漿人無府故酒人共五齊三酒漿人共六飲皆曰入于酒府謂入于酒正之府日入其成月入其要也治之者府贊之者史故曰史掌官書以贊治聽之者小宰也聽謂之成故小宰八聽為八成籩人掌四籩之實朝事饋食加籩羞籩先鄭謂朝事者清朝未食先進寒具口實之籩則饋食加羞皆非祭禮乃王之饋食燕食可知矣朝薦腥饋薦孰加籩后獻尸所薦羞籩房中之羞後鄭説也朝事之籩膴鮑魚鱐史記鯫千石鮑一斤鯫一作鮿鮿即鱐析乾為鱐破開為鮿一説鱐即鮺藏魚也鮺俗作鯗古音若詐今音若想鮑亦煏乾之但不析耳或云䱒魚誤矣凡籩實皆乾賈誼曰昔文王使太公望傅太子𤼵嗜鮑魚而太公弗與曰禮鮑魚不登于俎豈有非禮而可以養太子哉愚謂脡加於俎鮑實於籩禮也曷為不可以養太子也豈王者備物太子則否歟而膳夫養王及后世子似與王同世子之膳歲終不㑹所以優尊不聞與王異則又何説而獨去鮑魚也或曰去鮑魚惡其臭猶去邪蒿惡其名加籩之實蓤芡㮚脯楚語屈到嗜芰芰蓤也有疾屬曰祭我必以芰及祥將薦芰其子建命去之曰不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用左史倚相亦以為違而道愚謂蓤芡㮚脯分實八籩天子之祭禮也特牲兩籩棗烝㮚擇有司徹則䵄蕡白黒棗糗而巳不聞有蓤芡惟王者大饗得備四海九州之美味故珍異庶侈皆羞而陳焉大夫而薦芰是僭用天子之禮也故屈建曰干國之典倚相亦云薦芰以干之説者謂芰非祭物誤矣饋食之籩果屬有五桃其一也先於䕩榛次於棗㮚家語乃云果屬有六而桃為下祭祀不用不登郊廟托諸孔子不亦妄乎爾疋𤓰曰華之桃曰膽之棗李曰疐之樝梨曰鑚之内則棗曰新之栗曰撰之又有𤓰桃李梅之屬安見桃為下也釋草蓤蕨攗郭注云水中芰説文䔖楚曰芰秦曰薢茩茩廣雅作苟方言芡雞頭北燕謂之一作䓈廣雅䓈芡雞頭也音悅橤切江湘之間或謂之鴈頭或謂之烏頭弋菙切莊子謂之雞㢕司馬彪云雞頭也與藕子合為散服之延年説山訓曰雞頭已瘻籩人籩實有麷今之麥芽釋名云漬麥覆之使生芽荀子曰午其軍取其將若撥麷言其柔脆也先鄭云熬麥曰麷説文亦曰煮麥讀若馮後鄭云今河間以北煮穜麥賣之名曰逢其音若馮與説文之讀符矣崔實四民月令曰臘月祀炙逢樹𤓰田四角去䗣瓜蟲謂之䗣集韻曰􅢑􅞻寒具引干寳司徒儀祭用􅢑􅞻逢之類也葢今之麥飥􅢑一作賈誼連語宋昭公衣苴布食餕即此晏子春秋曰晏子侍于景公朝寒公曰請進暖食暖食者漢之寒具也醢人豆實有􅛄音桺從艸丣聲詩曰思樂泮水言采其􅛄魯侯戾止在泮飲酒則􅛄讀為桺又何疑毛傳曰􅛄鳧葵也􅛄俗作茆古無茆字説文有茅無茆卯古卿字音去京切茅訛為茆失其聲矣故鄭大夫讀茆為茅茅菹茅初生或曰􅛄水草杜子春讀茆為丣康成從之故曰􅛄鳧葵葢以茅非水草又不可為菹也俗夲􅛄皆作茆故音義云茆音卯北人音桺􅛄讀為桺六書正音豈獨北人乎齊魯諸儒讀茅為貿春秋茅戎公穀二傳作貿戎則􅛄亦可讀為茅也故天文訓以卯為荗丣為飽讀亦如之然飽古文作從卯不從丣若破􅛄為茆則古文所無不可不辨玉篇廣雅皆從俗失之者多矣饋食之豆有脾析豚拍司農以牛百葉為脾而謂之析者析猶散也莊子曰臘者之有膍胲可散而不可散也膍與脾通司馬彪亦以為牛百葉或云胲備也大祭備物殽有膍胲愚謂胲聚也聚為胲散為析故脾析一名膍胲廣雅百葉謂之膍胵胃謂之胘説文以胘與膍皆百葉一曰鳥膍胵胵者鳥也又曰五藏總名愚謂脾連於為五藏之宗故脾析又名胘謂之膍胵者以此胘音弦胵處脂切既夕禮大遣奠四豆亦有脾析注云脾讀為雞脾肶之脾葢雞胃也脾肶即膍胵文異音同實一物豚拍一讀為髆豚肩也見説文一讀為胉豚脅也見廣雅士䘮禮兩肩亞兩胉亞即此醢人共醢醯人共醯釋名曰醢多汁者為醯醯瀋也宋魯人皆謂汁為瀋愚謂醬屬醯人名曰醯醬則醯即醤也不應分為二士昏禮醯醤二豆二豆者壻與婦醬為對醬則醯醤非二物矣五齊七菹皆醯物也謂皆以醯調之醯物猶醬物一物二名膳夫職所謂醬用百有二十罋内饔職所謂百羞醬物者即此古有鹽梅而無豉醋醋讀為昨説文云客酌主人也漢始有豉説文所謂配鹽幽尗五味調和須之而成食乃甘於是始有酢漿為醶急就篇所謂鹽豉醯酢漿尚書孔注亦云鹽鹹梅醋蓋今之醋古之梅也則古無醋明甚左傳醯醢鹽梅以烹魚肉聘禮歸饔餼醯醢百罋皆不言醬則醯非即醬歟公食大夫禮公設醯醬大羮湆設於醬西粱設於湆西皆公親設也賔取粱及稻祭于醬湆間三飯以湆醬卒食㑹飯三飲不以醬湆取粱與醬以降而不言醯以此知醯醬為一物也荀子曰醯酸蚋聚敗則酸廣雅謂之醋豈其然醢人有七醢三臡釋名曰臡骨肉相摶昵也醢有骨而無汁者曰臡然則無骨而有汁者醢汁多者醯芥醬卵醬醢醤醯醤皆醤名醯醬者醬之多汁者也弟子職醯醤誤為醤醋學者不可不知醢人羞豆酏食糝食司農云酏食以酒酏為餅糝食菜餗蒸賈䟽云酒酏若今起膠餅餗者易覆公餗鄭注云糝謂之餗震為竹竹萌曰筍筍者餗之菜也案餗説文作鬻鼎實惟葦及蒲陳畱謂䭈為鬻䭈即􅊡一作鬻或作飦古之糜今之粥也内則之酏即此康成云狼臅膏者臆中膏似今膏􅖸矣􅖸一作鑽説文云以米澆飯也釋名云肺􅍧􅍧饡也以米糝之如膏鑽也是以漢之膏鑽當古之糝食康成破酏為􅊡而以膏鑽當之亦無不可案􅍧説文作䐣讀若遜盧諶祭法曰四時祠皆用肺䐣楚辭招䰟肥牛之腱臑若芳王逸注云取肥牛之腱爛熟之則􅍧美也雜之以米即内則之糝與酏同類其異者酏小切狼臅膏而糝取牛羊豕之肉燕禮羞庶羞注云謂􅍧肝膋狗胾醢也䐣􅍧音義同玉篇分為二失之廣雅臇膹䐣􅌜也愚案四者皆肉羮所謂庶羞臇一作㷷㷷與􅍧通康成以餌餈酏糝為内羞與庶羞别庶羞者膷臐膮皆有胾醢庶羞惟肉内羞兼穀説者以肉為陽穀為隂故有司徹曰内羞在右庶羞在左鹽人共飴鹽康成謂鹽之恬者今戎鹽有焉涼州記曰青鹽池出鹽正方其形如石甚甜美涼州異物志曰鹽山二岳三色為質赤者如丹黑者如漆作獸辟惡佩之為吉名曰戎鹽可以療疾則戎鹽不徒供膳羞兼可療疾病又土人鏤為虎形大小如意明鹽人形鹽亦用戎鹽也交河之間平磧中掘深數尺有末鹽如紅如紫色鮮味甘食之止痛更深一尺下有碧珀黑逾純􅃮大如車輪末而食之攻癥瘕諸疾然則石鹽末之亦曰末鹽或青或赤或紫或碧或紅或黑不純一色是為飴鹽以調鼎實鏤為虎形兼供賔客者歟宋史志鹽之類有二引池而成者曰顆鹽鹽人所謂苦鹽也䰞海䰞井䰞鹻而成者曰末鹽鹽人所謂散鹽也引池為鹽暴以烈日鼓以南風須臾而成若不俟風日厚灌以水積水而成味苦不適口是為苦鹽煉以海水所得最多刮鹻淋鹵十得六七鐵竹為盤或用鐵或用竹鹽色青白是為散鹽異物志云剛鹵千里蒺䔧之形其下有鹽累棋而生葢天産者石鹽而苦鹽散鹽皆成以人功者也隋志後周有掌鹽之官掌四鹽之政令一曰散鹽二曰盬鹽三曰形鹽四曰飴鹽而飴鹽取之戎形鹽則物地以出之郊特牲煎鹽之尚貴天産也若煎煉而成則非天産熊氏云郊天所用疑即石鹽鹽人凡齊事䰞鹽康成云湅治之葢所謂煎鹽歟内則有卵鹽康成云大鹽孔疏云形如鳥卵亦石鹽也本草經曰戎鹽累卵水經注甘水之鹽如水精龍城之盬若巨桃朔方青鹽入藥分皆戎鹽矣解池之水亦出石鹽自然印成朝取夕復然則天産不獨戎鹽也土自成鹽是謂鹽鹺而味苦號曰鹽田山海經謂之鹽販之澤一名女鹽巴獠有鹽井食之令人癭其散鹽之不善者乎巴川傘子鹽形如張傘異於常也湯溪之口煮石為鹽亦成以人功矣管子海王一篇為千古興利之祖而爾疋九府岱岳有魚鹽禹貢鹽絺貢自海岱則其利似非起於春秋也然名山大澤不以封海王之利諸矦莫敢專之專之者自齊桓始集韻戎鹽也宮人掌六寢之脩為其井匽案井匽一名偃見莊子一名屏匽見戰國策一名厠牏見漢書注莊子庚桑篇云觀室者周於寢廟又適其偃焉郭注偃謂屏厠寢廟以饗燕屏厠以偃溲此井匽乃屏厠之明證而後鄭謂漏井匽豬者非也戰國策宋王鑄諸矦之象使侍屏匽展其臂彈其鼻注云屏當作井匽路厠葢厠如井者漢書石奮身自洗厠牏蘓林云牏音投孟康曰牏中受糞函東南人以鑿木空中如曹謂之牏又云厠行清賈逵解周官以牏為行清然則匽即厠也鑿木空中如井形故名井匽葢虎子之屬也虎子盛溺器井匽受糞函一名楲窬説文云楲窬褻器故宮人掌之猶漢侍中執虎子也宋王鑄諸矦像使侍䙝器以辱之歟説文牏築牆短版讀若俞葢與窬同然則厠牏即楲窬也一作侯頭頭與牏音同假借字釋名云齊人謂如衫而小袖曰侯頭晉灼所謂小袖衫者即此然侯與厠不同音則厠牏非侯頭明矣劉熈謂侯頭者直通之言晉灼以為厠近豈其然乎或曰側音轉為侯井匽即渠堰見荀子葢制水之具司農所謂受居澑水涑槖者也康成謂霤下之池受畜水而流之者然以井為漏井則井匽分為二當攷㑹同之舍有三宫曰車宫曰壇壝宫曰帷宫環車於外築壇於中張帷於上三者相因也有四門曰轅門曰㦸門古孑棘㦸通曰旌門曰人門仰車為門門旁列㦸門上建旌門下立人四者亦相因也用有其時各舉其一久則全設暫則偏共而人門獨曰無宫者言雖無宫亦然尤以人為重也野外無宫以藩為營土方樹之廣二丈衛以扶胥夾以劔刃是為木螳螂一名行馬古曰梐枑謂之閑又謂之列列有内外故梐枑再重師氏虎賁氏使其屬守之虎士立為門四翟各持兵故曰人門古者遇禮相見以人為菑菑者周垣所以分内外衛威儀則人門若人垣矣漢衛青擊匈奴以武剛車自環為營葢師古車宫之遺意而知先王㑹同之舍寓行師之道焉委壝土起堳埒兼以備不虞非徒壯威儀也行馬施於門外即古重門擊􅢎卒暴之防隋唐三品以上階銀青者門皆立㦸則禁衛之設逹於羣臣矣旌門一名渠門用之軍旅齊語有渠門赤旂為旜置旜於門若今牙門眞人水鏡經曰軍始出立牙竿必令完堅折則不利軍之精也一名和門用之田獵門中通車旁容一握驅而入轚則退懲不敏也穀梁謂流旁握者流與旒通謂和門之旒旁去車之兩轊各四寸爾掌舍設門司常置旌二官聯事同物異名惟天子㑹同之舍封土為壇諸侯則否子産相鄭伯如楚舍不為壇禮也春秋時大國適小國作壇以昭功其僭久矣楚公子圍尋盟於虢而設蒲宫葢緝蒲成帷張為殿屋竊取帷宫之遺制而僭為之平丘之㑹子産以幄幕九張行及㑹命外僕速張于除則除地張帷亦諸侯㑹同之禮案聘禮未入竟壹肄為壝壇畫階帷其北無宫葢張帷四合象宫室帷一靣而闕其三雖有壝壇畫階不成宫也入竟布幕而不言除墠則草舍可知矣詩云召伯所茇毛傳云茇草舍召伯分陜為上公作二伯猶止草舍焉然則非天子不為壇也齊韓魏共攻燕楚使景陽救之魏軍其西齊軍其東景陽開西和門通使於魏以誤齊軍此軍中左右兩和門也楚考烈王卒李園入宮伏死士於棘門之内則知古者宮門皆立㦸矣春秋㑹盟皆有壇土基三尺土階三等升降揖讓以相接焉於是王者遣使臨諸矦盟飾以法度非是而為壇則僭也玉府王齊共食玉大䘮共含玉學者疑之食玉者神仙道家之法其説見山海經峚山多白玉是有玉膏其源沸沸湯湯黄帝是食是饗乃採玉榮以為玉種而河圖玉版亦曰少室山上有白玉膏一服即仙矣如其説則食者乃玉膏非玉屑也離騷所謂登崑崙而食玉英者大率皆寓言神仙怪迂之事聖人所不語而食玉載於周官則又何説蓋玉以禮天地饗鬼神王者尊之為寳除不祥辟惡氣君子不去於身而裸用圭璋其名曰瑒清明之玉氣能與神通故齊則共之是為食玉食猶服也謂潔清其氣祓除其心神明其德而巳非口食之也且君子之食莫備於食毉而不聞食玉食玉掌於玉府而不掌於膳夫則玉非可食之物矣一説王齊鬱人薦鬯食玉謂鬯圭也杜預注左傳云珠玉曰含何休注公羊引禮緯天子以珠諸侯以玉大夫以碧士以貝為春秋之制左傳成十七年聲伯夢或與已瓊瑰食之説者以為食珠玉者含象又引吕靖韻集玫瑰火齊珠而莊子有發冡無傷口中珠之語遂謂春秋時珠玉襍用以為含季平子卒陽虎將以璵璠斂杜氏謂昭公之出平子攝行君事佩璵璠蓋生嘗以之佩死欲以之斂愚謂天子以珠出於讖緯漢儒信緯不信經故據以為説莊子所謂詩禮發冡不獨誚群儒兼以戒厚斂且云口中珠者玉之圜好如珠即玉府之珠玉也秦風毛傳瓊瑰石而次玉説文云石之美者顔師古注急就篇亦云琅玕火齊珠孔安國曰石而似珠者漢揚王孫臝葬以矯世乃云口含玉石欲化不得則含不以珠明甚古者𦵏用明器含以次玉季平子卒將以璠璵斂孔子厯級而救焉曰送而以寶玉是猶曝尸於中原也聖人明戒如此典瑞贈玉不以大圭鎮圭生所服者死不以之贈則玉府含玉亦不以服玉佩玉珠玉生所佩者死不以之含曰明器神明之也故死者不用生者之器食玉者含象聲伯夢而惡之則玉非可食之物益明荀子曰玉貝曰含又曰飯以生稻含以槁骨反生術也則何休杜預之説皆非也槁骨貝也士䘮禮含以貝列子云不含珠玉不服文錦不設明器亦謂玉圜似珠東晉冕飾以珠侍中顧和奏曰舊禮冕旒用白玉珠今美石難得不能備可用白玉璇珠從之愚謂飾冕古用采玉天子五采諸矦三采皆美石似珠謂之珠玉玉府掌之魏明好婦人之飾改用珊瑚珠晉易以白玉北齊五采隋唐白珠諸臣青珠皆玉也而名珠然則含以珠者美石之圜者歟雜記天子飯九貝諸侯七大夫五士三康成云夏禮也周禮天子飯含用玉孔疏引禮戴説天子飯以珠含以玉諸侯飯以珠含以璧大夫士飯以珠含以貝又與何休之説不同典瑞大䘮共飯玉含玉不聞以珠而諸儒人人異説康成盡以為夏殷之禮榖梁子曰貝玉曰含含當作琀説文曰送死口中玉也説苑天子含實以珠諸侯以玉大夫以璣士以貝庻人以榖實釋名曰琅玕石似珠也隋志云白璇蜂珠是也葛洪謂玉芝生於有玉之山玉膏流出萬年以上凝而成芝形如鳥獸色若山元水蒼屑以為末與無心草汁和之須臾成水此葢古之食玉歟則愚未之敢信玉經曰服金者壽如金服玉者壽如玉服元真者其命不極元眞玉之名服玉之法以烏米酒以地榆酒化之為水或以葱醬消之為􅏁亦可餌為丸燒為粉赤松子以元虫血漬玉為水而服之故能乘烟上下焉然食之令人發熱不得其方非徒無益且有害也康成謂陽精之純信矣金樓子曰五茄一名金鹽地榆一名玉豉惟此二物可以煑石故服玉之法化以地榆屋粟邦布見管子輕重篇屋粟者地税夫一為廛夫三為屋荀子所謂田野之税孟子所謂粟米之征管子謂籍於室屋妄矣蓋計畆以步計井以屋故小司徒得據而攷焉而斂之旅師者是也邦布者口泉衆寡有數長短有度荀子所謂刀布之斂孟子所謂布縷之征管子謂籍于萬民六畜妄矣葢家辨其物歲入其書故鄉遂大夫得稽而征焉而入之外府者是也凡田不耕者出屋粟有田而不耕使出三夫之地税凡民無職者出夫布無田乃無職使出一夫之口泉出之民曰夫布入之國曰邦布其實一也貢禹曰古民無賦算口錢起於武帝民産子三歲則出口錢故民重困生子輙殺甚可悲痛宜令七歲去齒乃出口錢二十乃算零陵先賢傳曰漢末多事國用不足産子一嵗輙出口錢民多不舉白土嗇夫鄭産乃言之郡郡為表上口錢得除因名白土為更生鄉葢漢之口錢病民若此然謂起於武帝則不然漢儀注民年七歲至十四出口賦錢人二十以食天子至武帝加三錢以補車騎馬為二十三則口錢明非起於武帝矣古者民二十受田一家之主伯也亞旅無田則出夫布故以漢口泉當之十歲㠯下十一㠯上上所長上所強上所長者謂之國粥粥者養而長之上所強者謂之閒民民無常業轉移執事葢年二十乃出口泉歟凡起徒役無過家一人惟田與追胥則一家畢作故脩閭氏掌國粥而比其追胥加賞罰焉然則國粥即閒民也追謂追寇春秋公追戎于濟西胥與狙通謂伺捕盗賊伏而候之如狙之伺物焉故曰狙候顔師古讀狙為覷失之矣蜡氏注云蜡讀如狙伺之狙葢蜡者蟲所集狙者人所聚故讀從之也又讀如宿偦之偦賈疏云夜宿逐賊謂之偦愚謂諝從言為象胥偦從人為追胥淮南夲經訓設詐諝廣雅諝智也而玉篇不收其所遺者多矣職幣掌式灋以斂幣凡用邦財者之餘邦財者官府都鄙與祭祀賔客䘮紀㑹同軍旅財用之幣齎皆是也漢屬少府厯代因之有左右藏唐左藏署令掌錢帛襍綵右藏署令掌銅鐵毛角金玉珠寶香畫綵色諸方貢獻雜物周之内外二府似唐之左右二藏職幣所掌者乃二府之餘故倉有餘粟府有餘幣皆謂之餘灋用絲麻菅蒯各不棄捐制之以灋咸得其用逸周書所謂十二來一弓二矢歸射三輪四輿歸御五鮑六魚歸蓄七陶八冶歸竈九柯十匠歸林注云林當作材匠以為用十一竹十二葦歸時取之以時言無棄物也物謂之幣幣謂之財財謂之賦司書入之職歲叙之巾車之毁折入其齎泉府之賖貸納其餘是為掌事者之餘財亦曰幣餘之賦各為書以楬之辨其物而良分奠其錄而貴賤定抍其不足而檢其羡焉故曰振謂廢者起之亂者治之委者作之滯者流之則天下無棄物而財恒足矣上之賜予取之此則物不乆藏也不畱謂之斥不盡謂之餘康成以漢之斥幣當周之幣餘豈其然乎餘灋用者廩人倉人計九穀之數足國用而以其餘供灋用灋用者恤囏阨養老孤及待賔客覉旅凶荒是也凶年則鄉里門關郊里野鄙縣都皆不入委積葢凶荒札䘮則國無征故止餘灋用而以豐年之所藏頒之以供灋用焉職内掌邦之移用有餘則轉而之他不足則止其灋亦如此職幣則豐不益而凶不止故常見其餘桓譚新論曰漢之百姓賦斂一歲為四十餘萬萬吏俸用其半餘二十萬萬藏於都内為禁財少府所領園地作務之八十三萬萬以供賞賜即周官職幣之餘也然漢未聞有灋用豈非漢無灋而周有灋歟九賦九式皆灋用也奚獨幣餘斂之節之在冡宰而大府國之淵故藏以待之職幣獨言振者明幣有金銅也凶年多作布亦所以振荒周景王將鑄大錢單穆公曰不可古者天灾降戾於是乎量資幣權輕重以振救民小大利之今王廢輕而作重民失其資能無匱乎大宰有幣餘之賦民患輕作重患重作輕子母相權以振救焉此財之所以常不匱也周官備灾後多怠棄景王作重幣以絶民資而幣餘之法壊矣漢書孝元皇帝時都内錢四十萬萬水衡錢二十五萬萬少府錢十八萬萬天下之經費在司農而少府以供天子私費近乎周之職幣以詔上之小用賜予者也漢之司農猶周之大府矣少府之屬有中藏府掌幣帛金錢貨物令一人六百石上之賜予實主之司徒韋彪以病乞身詣中藏府受賜錢二十萬是也六百石上士周之職幣猶漢之中藏府歟月令仲冬命閹尹審門閭謹房室説者謂閹尹主領奄豎之官於周禮為内宰掌治王之内政宫令及出入開閉之屬如其説則内宰亦宦者為之歟非也周之内宰猶漢之内卿内卿光祿也漢初為郎中令後轉為光祿勲其府在宫中故曰内卿胡廣曰勲之言閽也閽者古主門官光祿主宫門故曰勲然則古勲閽通矣易艮卦九三厲熏心虞翻云古閽字作熏艮為閽坎盗動門故厲閽心書曰斀黥見説文詩云昏椓椓與斀通去隂之刑也故箋云昬官名椓奄人韓詩曰若此無辠勲胥以痡勲猶昬也言夭昬札瘥相瀸汗而病漢書贊云烏呼史遷熏胥以刑葢謂腐形即詩所謂昬椓也爾雅昬為强力勲為功勞故勲昬通周之閽人屬内宰司昏守夜給使省闥亦不全用宦者而漢光祿勲掌期門羽林郎内宰之人民也期門掌執兵送從羽林次之又取死事之孤養之羽林名曰孤兒如周之死政之孤司門以其財養之者養孤而兼及其老則周之忠厚踰於漢矣而衛尉八屯警夜廵晝即周之宫伯所授八次八舍之職事蓋於四方四角立八屯屯有次舍謂之區廬胡廣云若今伏宿屋内宰分其人民以居之人民有貴賤其貴者為爪牙羽翼出從行入宿衛期門羽林是也其賤者為奔走傳呼戴青幘直區廬是為區士亦曰廬兒周之士庶子亦然其上者衛宫中學道藝次者守城郭樹溝涂下者𨽻屬於都職視胥徒葢貴賤别與而虎威章溝嚴更之署晝漏盡夜漏起宫城門擊刁斗周廬擊木柝即宫正所謂夕擊柝而比之使不得有懈惰擅離部署者然則宫正宫伯如衛尉内宰如光祿勲王宫后宫皆曰王内版圖政令宫正宫伯分治之而内宰則兼治之者也然漢之光祿衛尉掌宫殿門戸及門衛屯兵而已周之内宰九嬪九御無不統竒衺功緒無不紏服位禮儀無不贊而詔所以立羸豕之閑節貫魚之寵使婦人不得用奄變而后妃雖貴不廢女功其法至詳且宻由是有窈窕德象女師之篇而琴瑟鍾鼓房中之樂興焉漢之大長秋或用士人或用中人皇后卿也成帝省減掖廷用度許后上疏以為大長秋繩以詔書摇手不得官吏忮佷一切操人則内宫之財用皆大長秋掌之有似乎周之内宰而正椒房玉堂之位俾后妾無陵節之郵此豈閹尹所能勝其任者哉匠人營國靣朝后市王立朝而后立市者襄楷曰天官宦者星不在紫宫而在天市明當給使主市里也山陽公載記曰市垣二十二星帝座居中宦者四星供市買之事然則面有朝百官理政事焉後有市宦者供市買焉東漢之衰也以市買之人處政事之位違天意矣天地之位有前有後聖人法之以建經紀夏長於前故靣朝冬藏於後故背市漢法皇后蠶于東郊魏遵周禮蠶于北郊吳韋昭著西蠶頌則孫氏在西郊矣晉亦如之宋大明四年於城西白石里為西蠶其禮始備隋於宫北三里為壇季春上已皇后躬桑于壇南東靣禮王耕南郊后蠶北郊諸侯耕於東郊少陽之位而夫人蠶於北郊康成謂夫人不蠶于西郊婦人禮少變也愚案古有天子東耕儀因是有皇后西蠶禮唐太宗以為平秩東作合在東方宋因之禮院言周蠶于北郊以純隂也漢蠶于東郊以春桑生也請築壇東郊從桑生之義然則耕蠶並在東矣可乎王太陽諸侯少陽后太隂夫人少隂東耕西蠶皆非禮也何休曰禮天子親耕東田千畆諸侯百畆后夫人親西郊采桑以供粢盛祭服白虎通曰東方少陽農事始起耕於東郊西方少隂女功所成桑于西郊故曾子問曰天子耕東田而三反之漢儒之説皆不合周官内宰佐后立市而出其度量淳制質人則同其度量壹其淳制廵而攷之杜子春讀淳為純純為幅廣制為匹長康成引天子廵守禮制幣文八尺純四􅡥為證而以四􅡥為太廣􅡥八寸故因趙商問而破四為三以合幅廣二尺四寸之度愚案淳本作綧一作敦其義則準也丈尺綧制見管子君臣篇斗斛敦槩見荀子君道篇準為法故曰綧制謂布帛廣狹長短之數準為平故曰敦槩謂量鼓淺深大小之容葢水者萬物之準準者五量之宗故丈尺斗斛皆取則焉經作淳者古字淳純通用杜讀為純義夲淮南案淮南子墬形訓門間四里里間九純純丈五尺注云純量名而云丈五尺其義未聞也子春以純為幅廣不知何據康成既增成其説而於質人註又讀淳為淳尸盥之淳蓋亦疑而無定論歟射禮及投壺二算為純一算為竒是耦謂之純左傳襄十一年鄭人賂晉侯以廣車軘車淳十五乘杜注云淳耦也是淳與純通也戰國策錦繡千純左傳幣錦百兩葢一匹分兩端相對相合故曰兩亦曰純地官媒氏職所謂純帛無過五兩者即此五兩則一束十端是為純帛八尺曰尋每兩五尋故每端二丈純猶全也故取其全此非所謂淳制歟康成破純為緇失之賈疏謂昏禮取誠實每端二丈制幣丈八尺取儉易供愚謂古者錢幣兼行故有制錢有制幣制錢不足陌制幣無全純非古也六朝東錢八十為百西錢七十為百京師九十為百梁大同初詔用足陌而民不從其後遂以三十五為百而制錢之法壊矣北朝舊制民間絹布皆幅廣二尺二寸長四十尺為匹六十尺為端其後幣有單絲之縑踈縷之布狹幅促度不中常式而制幣之法壊矣天文訓曰黄鍾九寸物以三生以三乘九故幅廣二尺七寸音以八相生長八尺故八尺而為尋有形則有聲而音之數五以五乘八為四十故四丈而為匹一匹而為制則制幣與純帛同也小尒疋倍丈謂之端倍端謂之兩得之又云倍兩謂之匹匹有謂之束失之穆天子傳錦組百純純猶兩也郭璞亦曰匹端名髙誘註國䇿訓純為束以此詩曰白茅純束純束者禮納徴以儷皮儷皮者鹿皮也兩皮為儷其束之也如純帛而結以白茅葢取雙雙之象歟既夕禮贈用制幣𤣥纁束注云丈八尺曰制二制合之十制五合或曰凡禮神之幣皆然一丈象陽八尺象隂十制六𤣥四纁五合三𤣥二纁鬼神之道隂陽不測故用隂陽之數求之然則丈八為端名曰制幣葢用之鬼神者也漢官布幅廣二尺二寸繒幅狹者亦然䘮禮用之康成云凡為神之衣物必沽而小故制幣曲禮曰量幣古之幣帛有純有制全曰純量曰制制廣三􅡥魯人之贈也廣尺郭璞曰今名短度絹為葉輸今古皆然矣吉凶禮用制賔嘉禮用純説苑賵以束帛天子五匹𤣥三纁二各五十尺諸侯亦如之各三十尺大夫𤣥一纁二各三十尺元士𤣥一纁一各二丈降及下士庶人綵縵布帛各一匹而已葢視尊卑上下為差等既不以丈八為端又不以十端為束諸儒異説如此閽人掌門禁怪民不入宫康成謂怪民狂易葢指孝成綏和二年男子王褒入北司馬殿東門上殿入室曰天帝命我居此取縳考問病狂易不自知入宫狀靈帝光和元年有白衣入德陽殿門稱梁伯夏教我上殿為天子須臾還走求索不得不知姓名蔡邕謂凡民為怪皆皇極道失下或謀上此災異也誰能禁之愚謂怪民執左道者漢之方士周之怪民也戰國時燕人為方仙道形解銷化依托鬼神名為方士汾隂出寶鼎闕下獻玉杯漢文賢明猶為之惑後覺其詐卒被誅夷然則新垣平非所謂怪歟及武帝時李少君少翁欒大之屬其怪益甚矣東晉元帝時暨陽人任谷有羽衣人與之交而有娠産一蛇遂成宦者詣闕上書自云有道術帝畱之宫中郭璞上疏乞遣谷出以為周禮怪民不入宫谷之妖乃怪民之尤者隂陽陶烝變化萬端狐狸魍魎憑陵作慝其後元帝崩谷亡云此皆所謂怪也子不語怪者葢以此若夫幻人吐火水人弄蛇易貌分形竒幻儵忽漢朝元㑹作之於庭近乎怪矣然黄金四目敺疫有狂夫何怪之有一説巫蠱為怪民愚謂巫屬春官非怪也後世失官方士竊之以神其術漢武好方士故其術大行於是埋蠱東宫戾園遂敗喋血京師然則怪民入宫其為禍也烈矣不徒曰怪民而兼曰竒服蓋怪民未有不服竒服者江充之召見犬臺宫也衣紗縠禪衣冠歩摇冠曵燕尾之裾垂飛翮之纓此所謂竒服説者以為服妖巫蠱之禍胎於此故曰竒服怪民不入宫武帝望見充而異之目為竒士而信用焉然則奇士與怪民相類也何以别之曰服先王之法服道先王之法言為竒士不服先王之法服不道先王之法言為怪民春官世婦其職視宫卿二人其次視上大夫四人其次視中士八人而天官世婦則闕焉康成謂屬春官者如漢大長秋屬天官者乃二十七世婦不言數者君子不苟於色有婦德者充之無則闕非也世婦屬天官内宰而職掌禮事故兼屬春官其職夲同文有詳略春官世婦云掌女宫之宿戒及祭祀比其具天官世婦亦云祭之日涖陳女宮之具春官世婦云帥六宫之人共齍盛天官世婦亦云帥女宫而濯摡為齍盛同一祭祀之具也一曰比一曰涖陳謂女宫陳之世婦則涖臨而比校之也同一齍盛也一曰共一曰為謂差擇而共奉之也春官世婦則曰大賔客云云大䘮云云天官世婦則一言以蔽之曰掌祭祀賔客䘮紀之事彼列其目此舉其綱也獨内外宗女不屬天官故載於彼而闕於此然内宗云凡卿大夫之䘮掌其弔臨春官世婦則曰相内外宗之禮事天官世婦亦云掌弔臨于卿大夫之䘮則又未嘗不同也但此略而彼詳耳世婦視宫卿猶漢倢伃視上卿其次視下大夫其次視中士猶漢娙娥以下至七子尊者視中二千石卑者視八百石其職視卿則謂之宫卿古未有婦人居丈夫之官而閹人亦不得稱世婦且宦官金璫右貂兼領卿署之職自後漢始而謂成康之盛亦然失之甚矣宫卿女祝女史皆后宫官也女祝視大祝小祝女史視大史小史後世遂有女尚書女博士之名葢濫觴於此女祝招梗鄭大夫讀梗為亢謂招善而亢惡去之杜子春讀梗為更康成謂梗禦未至也愚案管子四時篇修除神位謹禱弊梗弊當作幣左傳襄九年祈以幣更更猶梗也禱神之名猶禬與禳也招者旁招招以茅謂福祥引之來梗者更始更用幣謂凶咎遷之去康成謂造類禬禜皆有牲攻説以辭責之用幣而已然則梗者六祈之攻説歟簭人有簭更更即幣更謂將禱神先簭吉日也鄭大夫讀梗為亢未詳杜子春讀梗為更得之案漢制桃印以輔卯金即古之桃梗立於門户以御凶鬼後漢志云周人木德以桃為梗言氣相更也風俗通亦云梗者更也歲終更始受介祉也則梗即更明甚魏黄初詔曰叔世衰亂崇信巫史至乃宫殿之内戸牖之間無不沃酹愚謂宫中有女祝掌内祀招梗禬禳非衰世之事也古者重鬼墨子有明鬼篇恐後世不能敬莙以取災故聖王書之竹帛以鬼神為務然其言非孔子所謂敬而逺之之義周官内有禱祠以除疾殃至漢而巫蠱之禍烈焉可不戒哉王后六服縁衣雜記䘮大記皆作税衣康成破税為褖士䘮禮作褖衣内司服作縁衣皆不言其色士䘮禮註云黑衣裳赤縁之為褖所以表袍然皮弁服白布衣素裳士䘮禮褖衣與皮弁同陳則是褖衣白也爵弁服純衣皮弁服褖衣士冠禮陳服爵弁服純衣皮弁服素積𤣥端𤣥裳分為三等兩兩相配則冠禮素積正對䘮禮褖衣説者謂士䘮禮陳襲亦分三等以褖衣當𤣥端𤣥端黑則褖衣亦黑其不然乎愚謂夏小正八月𤣥校大戴傳云𤣥也者黑也校也者若縁色然婦人未嫁者衣之則縁衣黑矣男子𤣥衣婦人褖衣士䘮禮以禒為散衣與繭衣為一稱而以配𤣥冠夫之且襲不言冠未可引為證也麴塵告桑薦之鞠衣春縐絺當暑蒙之展衣夏𤣥校初涼御之縁衣秋皆婦服也子羔之襲以税衣故士䘮禮因之歟說文無褖巾車夏篆故書作夏縁葢篆縁皆以彖得聲當讀若彖士䘮禮注云古文禒為縁則知古無褖字審矣月令季春薦鞠衣于先帝髙誘曰王后之六服有菊表黄衣如菊花故謂之菊衣春尚青而薦之所未逹也愚案漢髙帝所述書天子所服第八以為春夏秋冬天子所服當法天地之數中得人和身無禍殃年壽永究中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬四人各職一時是以帝與后皆有五時衣春青夏朱秋白冬黑季夏黄有司掌之而各以時服焉周之六服葢配天地四時故五色益以𤣥王之冕服有六后服亦如之其義深逺矣色有對方有比方比者相生對者相克衣有時服有祭服時服不以祭祭服不以時月令周官之所以異而同也管子曰春盡夏始服黄靜處三月五陽生土數五故季春薦鞠衣赤與白謂之章故夏服赤而展衣白白與黑謂之黼故秋服白而縁衣黑大裘𤣥褘衣亦𤣥六服之最尊者乎尚書大傳山龍純青華蟲純黄宗彝純黑藻純白火純赤是為五采后服揄狄青闕狄赤鞠黄展白縁黑如王之服即漢所謂五時衣然大傳之説康成不取以為五采相錯非一色也婦人一德無所兼則后服與王殊矣陸農師謂毛傳展衣以丹縠為之則展衣赤展一作旜通帛為旜旜絳色也與襢同義其説有據又夏服赤為得時然以為褖衣白則臆説也褖衣有纁衻則纁𤣥相配安見褖衣之非黑乎展衣既赤則五色無白五時無秋漢制一歲五郊天子與執事者所服各如方色魏秘書監秦靜曰有五時服又有四時服以給百官三年一易名為五時止給四時而闕秋服然則秋不服白也漢魏皆然則周可知矣六服之裏皆素沙則五時皆以白為地也白為地者使之張顯以白裏白何顯之有且純白非吉既有素沙又何闕焉方言云蔽厀齊魯之郊謂之衻襦王肅以纁衻為婦人蔽厀本此漢律曰賜衣者縵表白裏則知漢之袿袍襈重繪者亦如是矣案漢書注交輸謂之衣圭割正幅使一頭狹若燕尾垂之兩旁見於後是禮深衣續祍鉤邉袿袍之制也蘇林曰如今新婦袍上挂全幅繒角割是為襈重繒釋名曰婦人上服曰袿其下垂者上廣下狹如刀圭也襈撰也青絳為之縁也顔師古則云今之襈如古之積葢襞積為之所謂皮弁素積豈其然廣雅云袿長𥜗也襈者衣裗裗一作流爾雅衣裗謂之䘽䘽者袿衣之飾陸氏釋文亦云飾以重繒揄古摇字骨空論云揄臂齊肘注云揄音摇一作褕以其服故從衣一説王之服五采相錯后服亦然服之五色猶樂之五聲樂則各以其聲為均而文之以四聲衣則各以其色為地而飾之以四色葢一聲不成樂故一色不成衣古皆衣綵惟有故乃素服也春宫角非角一聲春衣青非青一色推之五時皆然摯虞亦云秦漢以來服色轉變今惟朝廷五服用綵然則漢之五時衣亦五采相錯歟五采備謂之繡左傳稱與夫人繡衣則后服亦如王服也周書髙麗傳婦人服裙𥜗裾袖皆為襈則襈非積矣襞積在腰不在袖釋名訓為縁得之縫人翣桺故書作接檟先鄭云接讀為歰檟讀為桺檀弓曰周人牆置翣春秋傳曰四歰不蹕後鄭云桺之言聚諸飾之所聚書云度西曰桺穀愚謂度居也史記作居與宅同故度一作宅穀與谷通漢書穀風迅疾從東北來穀風即谷風也古桺戼同戼古酉字􅣧古卯字朝時開門為􅣧􅣧在東方為暘夕時閉門為丣丣在西方為昧故東曰暘谷西曰桺谷亦曰昧谷日將没五色聚焉故桺訓為聚爾雅日所入為大蒙蒙猶昧也虞翻譏康成以卯為昧裴松之謂劉畱聊柳同用與日辰卯字字同音異皆以􅣧為丣不辨東西失之甚矣桺一作僂釋名其形僂也莊子曰生有軒冕之尊死得於腞楯之上聚僂之中楯即輴腞即篆謂殯以輴車篆為轂約巾車所謂夏篆説文所謂夏䡅桺之言聚故曰聚僂棺之飾也舊注皆誤太元曰日没其光賁于東方言日入之色如初出也賁色不純孔子卜得賁曰不吉以此吕氏春秋曰世俗之行䘮載之以大輴僂翣以督之古桺皆作僂淮南齊俗訓曰舟車楯肆古輴亦作楯僂翣一作縷翣見荀子禮論篇后之首飾有三曰副編次覆首為副編之為編次之為次皆髮也而有差等儒者莫能言故以漢法况之副若歩蘨編若假紒次若髲髢歩蘨者蘨與摇通上有垂珠歩則摇也黄金山題貫以白珠繆以桂枝八爵九華鏤為六獸以象六珈珈之言加也加於副上非副也蓋副上之飾耳釋名謂副猶副貳兼用衆物成其飾得之矣假紒者假髪為髻肅宗賜東平琅邪兩王書而送光烈皇后假紒帛巾各一則是假紒皇后服之與副同矣晉太元中公主婦女必緩鬢傾髻以為盛飾用髲既多不可恒戴乃先於木及籠上装之名曰假髻則其制異於漢當時以為服妖而漢之假紒亦名為副故廣雅云假紒謂之古副字以髪為之長髮猋猋然故從髟然則副與編一物也飾之盛者為副其次為編歟髲髢者髲被也髮少者得以被助焉髢剔也剔刑人之髪也衛莊公見已氏之妻髮美使髠之以為吕姜髢吕姜莊公夫人則夫人服髲髢如后矣而吳薛綜則云漢廢珠厓起於長吏覩其好髮髠取為髲莊子亦云秃而施髢則似髮少者皆得服之其飾之尊卑則未聞也少牢被錫大夫之妻被與髲錫與鬄音同古文通故康成讀被錫為髲鬄鬄與髢同而以當追師之次焉首飾有三以配六服莫知其詳夫人副禕褘衣者服副昏禮女次純衣則純衣者服次矣和熹鄧皇后加賜馮貴人頭上步摇加賜者雜記謂之裦諸侯有裦衣夫人亦如之故得服副褘後漢書注云副婦人首服三輔謂之假紒且云説本康成而康成以假紒為編歩摇為副案漢皇后謁廟首服假紒上有歩摇俗名珠松乃后之盛飾故康成以副當之其實歩摇非副而在副上則副為假紒又何疑皇太后翦氂簂夫人紺繒簂上得兼下下不得兼上故服簂者不得兼歩摇然則編猶簂歟簂以覆髮廣雅謂之釋名曰齊人曰飾形貌也魯人曰頍頍傾也著之傾近前也士冠禮注云滕薛名簂為頍複下曰舄襌下曰屨賈疏云下謂底重底為舄禪底為屨愚案方言中有木者謂之複舄其庳者自關以東謂之下禪者謂之鞮郭注云今韋鞮也然則襌以皮而複加木矣隋志云近代或以重皮而不加木隋制復古以木重底舄冕服著之屨則通用惟褶服以靴靴胡履也施於戎服毛傳云舄逹屨也屨之尊者為逹則舄屨通名字苑云苴履底即莊子跋蹻為服釋文云屐與跋同屩與蹻同麻曰屩木曰屐鞋類也以藉鞋下若古之複舄矣禮説卷二
