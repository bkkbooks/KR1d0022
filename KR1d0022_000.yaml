body:
  text: 禮說禮類一周禮之屬提要臣等謹案禮說十四卷國朝惠士竒撰士竒號半農長洲人康熙己丑進士官至翰林院侍講是編不載周禮經文惟標舉其有所考證辨駁者各為之說依經文次序編之凡天官二卷計六十一條地官三卷計六十三條春官四卷計九十五條夏官二卷計六十一條秋官二卷亦六十一條考工記一卷計四十條古聖王經世之道莫切於禮然必悉其名物而後可求其制度得其制度而後可語其精微猶之治春秋者不核當日之事實即不能明聖人之褒貶故說禮則必以鄭氏為宗亦猶說春秋者必以左氏為本鄭氏之時去周已逺所注周禮多比擬漢制以明之今去漢末復閲千六百年鄭氏所謂猶今某物某事某官者又多不解為何語而當日經師訓詁輾轉流傳亦往往形聲並異不可以今音今字推求士竒此書於古音古字皆為之分别疏通使無疑似復援引諸史百家之文或以證明周制或參考鄭氏所引之漢制以遞求周制因各闡其制作之深意在近時說禮之家其持論最有根柢其中如因巫降之禮遂謂漢師丹之使巫下神為非惑左道因貍首之射遂謂周萇𢎞之射諸侯為非依物怪因庶氏攻說翦氏攻禜遂謂段成式所記西域木天壇法禳蟲為周之遺術皆不免拘泥古義曲為之詞又如因含玉而引及餐玉之法則失之蔓衍因左傳稱仍叔之子為弱遂據以斷犁牛之子為犢亦失之附㑹至於引墨子以證司盟之詛併以證春秋之觀社不過取其去古未逺可資旁證乃謂不讀非聖之書者非善讀書則詞不達意欲矯空談之弊不知其激而涉於偏矣然統觀全書徵引博而皆有本原辨論繁而悉有條理百瑜一瑕終不能廢其所長也乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
