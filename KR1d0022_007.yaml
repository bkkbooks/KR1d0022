body:
  text: 禮說卷七翰林院侍講惠士竒撰春官二白虎通曰天子圭尺二寸博三寸剡上寸半厚半寸半圭為璋方中圓外曰璧半璧曰璜圓中牙身𤣥外曰琮璜以徵召璧以聘問璋以發兵圭以質信琮以起土功之事圭上兊下方位在東璧方中圓外位在中璜半璧位在北璋半圭位在南琮內圓而湊外直而牙位在西尚書大𫝊曰天子執瑁以朝諸侯諸侯無過者復得其圭有過者留其圭能正行者復還之三年圭不復絀以爵還圭留璧璧所以留者以財幣盡輒更造也禮曰圭造尺八寸有造圭明得造璧矣案白琥禮西方不聞以琮元璜禮北方不聞以徵召徵召自有珍圭也疏琮以斂而有渠聘琮以享而有瑑駔琮以權而有鼻大琮以鎮而有牙宗后以為鎮后理隂教故以起土功又黃琮禮地則土功其類也可補典瑞之闕焉春秋繁露曰主天法商玉厚九分白藻五絲主地法夏玉厚八分白藻四絲主天法質玉厚七分白藻三絲主地法文玉厚六分白藻二絲然則藻之絲玉之厚取則天地隂陽又藻地白而加采典瑞玉人之所弗及也存以備考絲謂采五絲五采也周官射無四正藻無四采逸詩四正具舉是射有四正也繁露白藻四絲是藻有四采也蓋二王之後歟射人職王五正諸侯三正卿大夫士二正典瑞職王藻五采公侯伯藻三采子男藻二采鄭注四正謂正爵非也藻藉以韋衣木板而畫之繫以元纁焉聘記謂之組繁露謂之絲蓋染絲織之以為組也或屈之或垂之屈之為質垂之為文組之大者如綬小者如絛絛以結纓綬以結璲皆染絲為之繫玉之組亦然不畫也畫者其板耳綬即古之佩絛即古之紃康成曰繅繅藻通雜文之名也合五采絲為繩繁露謂之絲者以此公羊曰寶者何璋判白注云判半也半圭曰璋白藏天子青藏諸侯魯得郊天故錫以白璋所以郊禮圭以朝璧以聘琮以發兵璜以發衆璋以徵召詩斯干毛傳曰裳下之飾璋臣之職故顧命王受瑁臣秉璋棫朴言賢人衆多奉璋者皆髦士也王肅謂羣臣從王行禮之所奉杜預亦謂臣為君使執璋康成以璋瓉當之則惟用之於祼矣禮天用蒼璧不以璋赤璋禮南方不以白何休謂璋以郊其色白者蓋羣臣奉以行禮不徒用之於祼也段氏雜俎曰安平用璧興事用圭成功用璋邊戎用珩戰鬭用璩城圍用環災亂用雋大旱用龍大喪用琮愚謂發兵用琥禱旱用龍祠廟用瑒瑒即鬯圭所謂祼圭尺二寸有瓉節行用珩引陛用瑗上下除陛從官扶輦瑗大孔璧奉以引之防傾覆也聘人用圭召人用環絶人用玦穀圭聘女親迎加琮親迎諸侯以屨二兩加琮曰某國寡小君使寡人奉不珍之琮不珍之屨大夫士庶人以屨二兩加束修曰某之父某之師友使某執不珍之屨不珍之束修或曰古之璋猶今之笏故天子搢珽羣臣奉璋春秋桓九年冬曹伯使其世子射姑來朝十年春曹伯終生卒蓋世子冬朝而曹伯春卒故知曹伯有疾使其世子來朝春秋志之以為合於禮公羊謂譏父老子代而依違其說未知在曹在齊在齊者世子光代父出㑹在曹者世子射姑代父來朝穀梁謂曹使世子伉諸侯之禮則失在曹魯以待人父之道待人之子則失在魯獨左氏以為曹太子來朝賔之以上卿禮也典命職凡諸侯之適子誓于天子攝其君則下其君之禮一等未誓則以皮帛繼子男而周制大國之卿當小國之君曹世子未誓故待以上卿皮帛繼子男之禮何休膏肓謂左氏以人子安處父位尤非衰世救失之宜於義為短康成針云必如所言父有老耄罷病孰當理其政預王事也蘇寬亦云誓于天子下君一等未誓繼子男皆降下其君非安居父位然則攝者攝行其事不居其位也吉凶皆然父有廢疾不勝喪則適孫承重為攝主不得以父在為辭吉禮可攝則凶禮獨不可攝乎鄭志趙商問謂父有廢疾不立而立適孫父在而為其祖服非世子乃諸侯也故康成答以天子諸侯之喪皆斬衰無期宋孝宗崩光宗病不能執喪寧宗嗣服已大祥議者欲持􅎭兩月監察御史胡紘議曰孫為祖服已過期矣議者欲更持􅎭兩月是何禮也若謂嫡孫承重則太上聖躬康復自于宫中服三年喪而陛下又行之是喪有二孤不可是時朱子獨以為非而未有以折之及檢喪服𫝊得疏所引鄭志大喜以為有疑父在不當承重者時無明白證驗今得鄭志方見父在而承國於祖之服乃始無疑向使無鄭康成則此事終無斷決而知學之不講其害如此愚謂議者不行三年而持􅎭兩月固非禮矣天子絶期而為其祖期吾不知是何代之禮也且古未有父在而子受國者故曰攝寧宗既受國矣居其位不行其禮可乎哉春秋晉景公有疾立太子州蒲以為君而㑹諸侯伐鄭父在而子居父位經書晉侯以惡之故攝者不居其位也魯隱公元年不書即位攝乎非乎曰非也吾聞貴妾攝妻禮有攝女君適子攝父未聞臣攝君周公非攝乎曰非也君薨百官總已以聽冡宰武王崩周公位冡宰正百工何攝之有坐明堂朝諸侯是賊莽假之以盜漢也楚昭王出奔子西攝王保於脾泄以靖國人由于責之凛凛若秋霜焉吾故曰臣不攝君攝者攝行其事事之大者喪也祭也曲禮老而𫝊𫝊謂𫝊重喪祭子為主而父不與故七十處於內不居廬八十齊喪之事弗及也寧宗受重而不服重身登大寶而委重於親失之甚矣父在為祖斬非喪有二孤歟曰喪有無後無無主孝宗崩光宗病不能執喪喪無主矣寧宗不為之主而誰主乎無二孤者無二主也胡紘不學焉知禮禮有宗子之父父在而稱宗子則為祖斬何疑春秋僖公二十有八年踐土之㑹衛侯出奔母弟叔武攝位受盟從公侯在喪之例書曰衛子猶葵邱之㑹宋襄在喪而書宋子也其載書曰晉重魯申衛武與晉魯同名儼然人君矣然則弟可攝兄歟曰否宋背殯為不子衛立君為不臣臣不攝君禮有攝主何也曰祭有主主有位王不與祭大宗攝位謂之攝主管子曰祭之時上賢者也故君臣掌君臣掌則上下均其亡茲適上賢者亡役賢者昌掌猶攝也言臣行君事惟祭則然其他不攝也苟非祭而亦攝焉名為上賢適足以亡而已禮賤不攝貴故士不攝大夫而况臣與君乎周厲王流彘周召二相行政號曰共和吕氏春秋乃謂厲王之難天子曠絶共伯和修其行好賢仁而海內皆來竹書紀年遂謂共伯和攝行天子事妄矣自古豈有攝天子哉子代父曰義也臣代君曰篡也管氏之論篤矣乎司服王祀昊天上帝則服大裘而冕祀五帝亦如之司裘掌為大裘以共王祀天之服鄭司農云大裘黑羔裘服以祀天示質鄭志大裘之上又有元衣與裘同色隋志大裘冕無旒以羔正黑者為之取同色繒為領袖其裳以纁而無章飾唐罷而宋復之陸佃以為大裘與衮同冕古者裘上必有衣王服大裘以衮襲之冬至祀天中裘表衮夏至祀地服衮去裘以順時序何洵直以為節服氏有衮冕有裘冕是各異冕無同冕兼服之理記曰大裘不裼故露質見素不為表襮何必假他衣以藩飾之佃又以為覆之曰襲露之曰裼大裘不裼非襲而何愚謂裘之裼也見美也見則美在外服之襲也充美也充則美在中裘質衮文中裘表衮是美在外也謂之襲可乎玉藻惟君有黼裘以誓省大裘非古也王肅增損郊特牲之文托為家語乃云天子大裘以黼之又自注曰大裘為黼文則合大裘與黼裘為一矣又云被裘象天既至泰壇王脫裘服衮以臨燔柴其說不知何據脫裘服衮以衮襲裘兩俱無據孰者為優熊氏云六冕皆有裘君用純狐青大夫士雜以豹褎諸侯朝服緇衣羔裘不用狐青也狐青乃冕服之裘劉氏云凡六冕之裘皆黑羔裘也論語注緇衣羔裘祭於君之服卿大夫以朝服助君祭是祭服用羔裘矣然則五冕不言裘省文黼裘以誓省者聽誓命省牲鑊也誓在祭前十日省在祭前一日之夕黼如斧形刃白而身黑康成謂以羔與狐白雜為黼文蓋大裘之次天子黼裘以聽誓省牲大裘以祀天享帝焉玉藻君衣狐白管子曰狐白應隂陽之變六月而一見蓋物之難得者故君衣狐白臣衣狐青士不衣狐白物以難得者為貴也犬羊之裘不裼非以其賤乎祀天尚誠貴質而服賤者之裘愚所未通以俟逹者荀子曰天子山冕又曰大路之素郊之麻冕一也山冕謂山龍郊乘素車服麻冕則大裘不被衮明矣白虎通曰天子狐白諸侯狐黃大夫蒼士羔裘别尊卑也魏秦靜議曰麻冕者素冕麻不加采色漢祭天乘殷路謂之桑根車周乘玉路非素也荀子不見周官司服五冕衮為龍鷩為雉毳為虎蜼希為粉米元無文裳刺黻鄭說也唐楊炯述其說而為之議曰龍變無方象先王之德享先王服之雉被五采表先公之賢享先公服之毳祀四望嶽瀆之神也虎蜼山林之獸所以象其物希祭社稷土穀之神也粉米由之而成所以象其功小祀百神不可遍擬惟取黼之相背異名而已鄭義也希冕刺而不繢故曰希希當作黹假借作希蓋黻冕也詩曰𤣥衮及黼箋云黼黻謂絺衣秦風謂之黻衣爾匹衮黻也注云衮有黻文故黻衣一名黻冕黻亦作紱顔師古曰畫為亞衣亞古弗字於文亞為嬌弗狀似兩已古之尊彞禮器皆作亞形晉以黻冕命士㑹說者以為蔽䣛失之孔安國謂衮龍黼黻天子諸侯服之粉米藻火大夫服之士藻火而已孔穎逹謂衣則尊者在上故首衮龍裳則尊者在下故先黼黻古有是說馬融亦云蓋衣在上為陽陽統於上故所尊在前裳在下為隂隂統於下故所重在後詩𤣥衮及黼書麻冕黼裳是裳先黼黻矣此說近是然以宗彞繪在尊則毳冕又何物先鄭以毳為罽衣或非無據也宋禮局官宇文粹中議曰有虞氏服韍夏后氏山殷火周龍章韍者乃黼冕非蔽䣛之芾也愚謂黻者黑與青而芾色皆赤以淺深為尊卑天子純朱諸侯黃朱大夫赤而已安得以芾為黻乎明堂位注云韍或作黻四朝之服其詳未聞論語禹美黻冕虞也荀子天子山冕夏也𫝊有火龍黼黻殷也禮有日月龍章周也且黻與韍異物韍從韋以韋為之黻從黹紩衣也則黻非蔽䣛亦明矣今之蔽䣛古之蔽前爾匹蔽前謂之襜釋名曰跪襜跪時襜然張也江淮之間或謂之袚袚即芾字見說文古文從市篆文從叐芾與韍一字兩形韍與韠一物兩名黻與韍異物同聲詩之毳衣即禮之毳冕青如􅣞赤如釋名毳芮也畫藻文於衣如水草之芮豈其然乎說文以毳為罽色如虋故謂之虋禾之赤苖然則罽也者毳衣也或赤或青五色備秦去韍而佩綬故蒼頡篇以韍為綬非古也古者革帶以佩韍廣雅云韍謂之韠而五經異義曰韍者大帶之飾非韠也蓋芾從巾象連帶之形故玉藻曰紳韠晉語曰韠帶異義之說誤矣說苑修文篇曰士服黻大夫黼諸侯火天子山龍諸儒異說存以備考司服王為公卿錫衰為諸侯緦衰為大夫士疑衰首服辨絰案西漢帝師褒成君孔霸薨元帝素服臨弔者再至東漢建武中凡大臣薨素服臨之永平初太常桓榮病顯宗臨幸入街下車及卒變服臨喪送葬東海恭王薨發哀而已制服無聞焉晉咸寧二年詔大臣薨三朝發哀一月不舉樂一朝發哀三日不舉樂亦未聞為之服也東晉賀循議曰雜記君於卿大夫之喪比葬不食肉比卒哭不舉樂古者君臣義重雖以至尊降而無服三月之內猶錫衰以居不接吉事愚謂君為臣服錫衰以居出亦如之素辨加絰同姓以麻異姓以葛漢舊儀丞相有疾皇帝親問從西門入即薨移居第中車駕往弔帝師鄧𢎞卒安帝服絲麻幸其第此君為臣服猶古之錫衰緦衰歟然𢎞太后兄太后服齊衰故子從母服非禮也春秋知悼子卒平公飲酒則君不服臣久矣禮大夫卒闕一時之祭祭猶闕之何况飲酒既不飲酒焉可作樂禮小功至不絶樂則股肱之痛甚於小功旁尊皆報至尊不報故臣為君斬君為臣無服無服者無報服也孰謂君不服臣乎小記君弔必皮辨錫衰未當事也當事乃辨絰主人未喪服則君亦不錫衰主人服君乃服也禮君不撫僕妾而士之喪君若有賜則視斂斂卒君坐撫當心士雖微亦不以僕妾視之矣魯隱公元年公子益師卒小斂公不與春秋非之故不書日君不服臣蓋始於此大記曰君於大夫世婦大斂焉為之賜則小斂焉熊氏曰卿則小斂焉為之賜則未襲而往孔疏曰栁莊非卿衛君未襲而往急弔賢也然則公子益師魯之卿歟禮服正幅為端朝祭之衣端正無殺康成謂士服則然大夫以上侈袂其服遂不復端乎非也袂屬於服袂之侈何害於服之端且端不徒言服兼言冠其冠冕則曰端冕其冠委貌則曰委端亦曰端委穀梁委端搢笏左𫝊辨冕端委周語端委以入其冠章甫則曰端章甫其服端其冠元則曰冠端而襲玉藻天子元端朝日諸侯元端以祭皆元冕也章甫委貌皆元冠也元冕元冠同曰元端則元端所包者廣矣服䖍以為端委者衣尚裦長其長委地故曰委杜預因之亦云端委禮衣而不言冠蓋以齊桓委端晉文端委皆大國之侯疑非委貌故異其語晉語委竿章昭曰委委貌一說委冠卷秦人曰委則端委非委貌也然端委即元端委貌即元冠天子亦服之况諸侯乎康成云四命以上齊祭異冠孔疏謂齊祭異冠自祭其廟若助祭於人則鄭志答趙商所謂大夫冕士辨而祭於公齊時服之祭清服之則又齊祭同冠矣然士助祭爵辨其齊元端安在其為同也且所謂異冠者絺冕祭元冕齊元冕祭元冠齊爵辨祭亦元冠齊以爵辨非齊服故與元冕祭者同服元冠惟殊其組纓之色耳推而至於天子雖裘冕祭衮冕祭亦元冕齊故曰元冕齊戒鬼神隂陽也又曰齊之元也以隂幽思也鬼神隂幽故衣冠隂色所以交接鬼神表其如見所祭者之心祀大神祭大祗享大鬼皆然故齊則君臣同服司服職云其齊服有元端素端自天子逹於士一也素冠素衣為素端其制如元端而素毛傳謂練冠鄭箋謂既祥之冠愚謂練祥之齊冠說者謂練冠以布素乃白練則素非練冠失之矣周人辨而葬殷人冔而葬與神交之道也有敬心焉接神之道不可以純凶變服而葬故亦變服而齊則練祥二祭齊服素端又何疑乎天子練祥之事大祝掌之元端則爵韠素端則素韠熊氏皇氏謂諸侯已下皆元端齊而以爵韋為韠同士禮天子亦如之練祥之齊服素端素韠或曰練無韠祥有韠葬則素冠而加葛絰練則首絰除矣素衣而要葛絰練筮日筮尸皆在三日齊之前也少牢旬有一日筮日特牲前期三日筮尸削幅為素服正幅為素端守祧職既祭藏其隋案隋說文作隓一作墮戰國䇿曰墮飯趙孝成王方饋不墮飯是也飯以手謂放飲於器曰墮春秋傳曰墮幣楚有宗祧之事將墮幣焉是也祭用幣謂奠幣於神曰墮士虞禮曰墮祭墮之為言下也猶放飯於器也墮之為言輸也猶奠幣於神也其音近綏曽子問士虞記少牢饋食皆作綏因綏為挼因墮為隋轉相假借失其本義當定作隓康成謂守祧之隓即士虞禮之苴非也祭於苴者謂之饗士虞記所謂饗祭子苴特牲少牢不言者省文蓋祭必有饗饗必有苴士虞記備載饗辭而特牲饗在迎尸之後說者遂以饗神為饗尸誤矣尸與主人主婦之祭祝命之佐食助之者謂之隓隓者神饗之後尸祭神餘尸飽之後主人主婦又祭尸餘皆祭于豆間及地不於苴也而主人隓祭則當受嘏之時孔疏云將受福先隓祭佐食既受隓祭遂摶黍授祝祝授尸尸執以親嘏主人主人受而詩懷之出而寫嗇于房祝以籩受少牢則尸命祝嘏主人尸不親天子受嘏之禮見于詩詩曰公尸嘉告嘉告者告以善言謂嘏辭也然則藏其隓蓋嘏辭歟隓為嘏設不嘏亦不隓故言隓則嘏可知也及周衰而嘏辭藏於巫史之家則其禮亦廢矣一說大祝隓釁在逆牲前牲猶未殺非薦血也灌鬯求神謂之釁鬯既灌然後迎牲然則隓者灌也灌于茅象神歆之是為莤茅先鄭云隓神前沃灌器名近之矣一說隓當作綏周頌載見諸侯助祭之詩曰綏以多福俾緝熙于純嘏箋云純大也天子受福曰大嘏則所謂綏者非綏祭而何綏與受嘏其事相連頌言綏者不一而隓無聞焉竊意隓者皇尸祭神之目而綏者孝孫受嘏之名白虎通曰坐尸而食之毁損其饌欣然若親之飽故尸祭謂之隓隓者毁也凡幣以禮神灌以降神皆曰隓綏者安也曽子問攝主不嘏故不綏士虞記喪主不嘏故亦不綏蓋攝非正喪非吉皆不受福不受福故皆不綏然則受福謂之綏也詩曰以綏後祿又曰綏我睂夀言綏者不一皆受福之辭少牢主婦綏祭如主人之禮不嘏注云不嘏者夫婦一體主人受福主婦亦與焉且祭禮尸無不墮主有不綏則墮為尸祭綏為主人受福之祭明矣士虞禮尸祭為墮少牢主祭為綏有司徹主祭亦為綏曰其綏祭其嘏如前說則藏其墮者謂嘏辭古文假借墮與綏通蓋既祭則藏於祧守祧掌之禮運所謂祝嘏辭說藏於宗祝巫史非禮也如後說則藏其墮者謂莤茅蓋既祭則藏於館司巫共之守祧藏之以依神也黍稷肺脊不可久藏鄭說失之祝以孝告謂祝通孝孫語於先祖嘏以慈告謂嘏𫝊先祖語於孝孫則祝輕而嘏重藏其墮舉重者而言其實祝嘏辭說皆藏之也周公祝冊納於金縢之匱鄭注云凡藏祕書藏之以匱必以金緘其表則嘏辭可知蓋藏之無故不啓漢儀注祭天地五畤皇帝不自行祠還致福謂之受釐釐說文作禧言受神之福也受福之釐猶受嘏之綏歟文帝詔曰吾聞祠官祝釐皆歸福於朕躬不為百姓漢之祝釐即周之祝嘏也司巫蒩館館或作飽飽古文包字天文訓曰酉者飽也任包大也說文包象褱妊故曰任包然則蒩飽者謂以茅包墮祭而藏之也兩說皆通前說為允有司徹司宫掃祭注云掃豆間之祭萑說埋之西階東明黍稷肺脊既祭掃而埋之不藏也墮與服同藏非豆間之祭鄭注曲禮綏讀為妥音湯果反說文墮音徒果切綏與墮以音近而通當從綏為正鶡冠子曰增規不圓益矩不方墠以全犧正以齊明𫝊之子孫可持可將以為神享禮靈之符藏之宗廟以璽正諸所謂藏其墮者蓋如此其嘏辭之意詩曰卜爾百福如幾如式既齊既稷既匡既勑永錫爾極時萬時億幾猶期也式猶法也言髙曽規矩不增不益可持可將也齊猶齊也稷猶疾也所謂墠以全犧正以齊明也匡猶正也言正之以璽也勑猶符也所謂神享禮靈之符也長賜女以中和之福而藏之宗廟億萬年享天之休此非天子嘏辭之存者歟司服卿大夫之服元冕士之服皮辨春秋崔杼齊卿也莊公以其冠賜人劉炫云崔子之冠元冕也孔頴逹曰非也禮運冕辨兵革不藏私家則冕在公府非助君祭不得服之愚謂冕辨藏於私家猶祝嘏辭說藏於宗祝巫史皆非禮也故祝嘏之辭與冕辨之服皆藏於廟將祭則出之既祭則藏之守祧所謂藏其墮與其服也墮者墮祭之嘏辭則服者祭服之冕辨矣祖宗之遺衣為重子孫之祭服為輕先其重者首列遺衣後其輕者末言祭服兩之也非一之也或云其服即遺衣誤矣祭服視其尸先王之尸衮冕先公之尸鷩冕故祭服亦如之孫為祖屈不敢以衮冕祭先公尸衣其衣子孫亦服其服而助祭羣臣則各服其上服焉司服掌之凡大祭祀共其衣而奉之穀梁子曰衣服不修不可以祭大夫士助祭之服受之於君月令收繭稅以共造云祭法逺廟為祧有二祧康成曰天子遷廟之主藏於二祧聘禮不腆先君之祧謂始祖也案禮冠於廟春秋襄九年𫝊曰君冠以先君之祧處之如康成說則魯之周公衛之康叔乃得稱先君之祧是時公㑹晉侯反及衛曷為不冠於康叔之廟而冠於成公之廟乎服䖍以成公為衛之曽祖曽祖即云祧則祧非始祖廟矣昭元年𫝊楚公子圍聘於鄭且聘於公孫段氏公孫段者穆公之孫子豐之子其家惟有禰廟而𫝊云豐氏之祧則禰廟亦稱祧也春官守祧先王先公之廟皆曰祧然則逺廟為祧之說非乎三昭三穆與太祖廟而七則文武列於昭穆也及逺而親盡當遷獨文武以功德不毁故後世謂之二祧因是有逺廟為祧之說魯之世室魯公武公象周之文武而武公之廟立於成公六年則知文武二祧之名必起於東遷之後矣享人鬼曰先妣先祖立廟祧曰先王先公而先妣不聞有廟則姜嫄無廟也無廟而為壇祭之蓋髙禖也殷祠娀簡周享姜嫄曰髙禖神之也曰先妣尊之也以為我祖之母周之所自出故魯頌因后稷而推本姜嫄說者遂以閟宫為姜嫄之廟妄矣周無先妣之廟魯安得有姜嫄之廟哉孟仲子曰禖宫亦非也髙禖有壇不聞有廟守祧奄八人者每廟一人又一人為長女祧每廟二人者廟各以其妃配魏景初元年有司請於太祖廟左為文帝昭祧右擬明帝穆祧帝方在位預立二祧君子是以知魏之將亡也將冡人掌公墓之地正墓位蹕墓域凡諸侯及諸臣葬於墓者為之蹕則蹕通上下之名齊崔氏側莊公于北郭葬諸士孫之里四翣不蹕案禮大夫四翣葬以大夫冡人當為之蹕四翣而不蹕則非大夫之葬禮也側者不殯之名死於兵者不入兆域謂投之域外里名士孫乃墓中之室墓大夫之所居萬民之葬地則是葬諸邦墓而非公墓不但投之域外矣蹕者止行人又曰辟辟者辟行人王燕出入士師辟邦有賔客訝士辟三公有邦事鄉士辟六卿有邦事遂士辟大夫有邦事縣士辟辟者身為前驅宫中有事𨽻僕蹕邦有大事遂士蹕諸侯為賓士師蹕喪祭賓軍鄉士蹕賓客居館訝士蹕蹕者帥其屬夾道鄭司農謂若今衛士填街蹕也填街一作填衛應邵漢官儀曰鹵簿五營校尉在前名曰填衛然內豎為王后之喪蹕又為內人蹕內人六宫之人則蹕之名通上下矣至秦天子出入稱警蹕諸侯出入稱課促惟至尊乃蹕也古者王門蹕郊兆蹕山林蹕古文蹕為避杜子春云避當為辟謂辟除姦人則蹕與辟名異而實同朝士之辟也帥其屬以鞭呼且趨條狼氏亦如之公墓春秋謂之公氏魯葬昭公季孫使役如闞公氏將溝焉闞者公墓之地氏猶家言死者以墓為家溝者兆域也溝而絶之為域外溝而合之為域內冡人掌公墓以爵等為樹數許叔重云天子樹松諸侯樹柏大夫欒士楊欒木似欄欄桂類春秋緯所謂藥草也王制庶人不封不樹墓大夫掌國民之墓亦無封樹之文而春秋緯則云庶人無墳樹以楊栁蓋起於近世古者生無爵死無墳故不封者亦不樹也媒氏禁遷葬遷葬者改葬也改葬非禮也故禁之改葬非禮則冡人墓大夫之事也曷為媒氏禁之媒氏聽隂訟幽宅屬隂且媒氏地官也故為之禁然則冡人墓大夫曷為弗禁也冡人固有墓禁矣墓大夫之禁令改葬在其中焉何以知之以族葬知之大司徒族墳墓以安民圖其兆正其位巡其厲守之百年遷之一旦豈安民之意哉冡人墓大夫又安得漠然坐視而弗禁乎然而古之改葬者多矣何以知其非禮而禁之春秋桓公十五年天王崩桓王也莊公三年五月葬桓王自崩至葬距七年左氏以為緩穀梁子疑之因有郤尸以求諸侯之說似非人情公羊子以為改葬蓋得其實改葬不書改而春秋二百四十二年之內亦無改葬之文以此知改葬非禮也故禁之也左傳隱公元年改葬惠公左氏謂公弗臨故不書子葬父何故弗臨如曰隱為桓攝攝主不臨喪是何禮也蓋改葬非禮故不書然則喪服曷為而有改葬緦改葬緦者康成謂墳墓崩壞將亡失尸柩昔王季厯葬於渦山之尾灓水齧其墓見棺之前和文王於是出而為之更葬雖其說近誕然仁人孝子或不幸而遭之此禮之變也非是而改葬者則春秋鄭改葬幽公齊改葬莊公皆君弒賊不討葬不以禮及鄭人斫子家之棺齊人尸崔杼於市賊既討而改葬其君此皆得禮之變者然非禮之正故不書於經則改葬非禮益明矣古之葬也筮宅其辭曰度茲幽宅兆基無有後艱是葬為死者非為生者後世有圖墓之術以冡中枯骨求子孫富貴於是遷葬者益多則尤惑之甚者也不可以不禁媒氏遷葬與嫁殤本兩事康成一之謂生非夫婦死既葬遷之使相從如成人耶則我未之前聞如未成人耶則曹孟德愛子冲死為聘甄氏亡女與合葬是合葬非遷葬也康成失之周曰嫁殤漢曰娶㑹唐曰冥㛰喪三日而殯凡附於身者必誠必信勿之有悔焉爾矣言既棺不可復開也三月而葬凡附於棺者必誠必信勿之有悔焉爾矣言既葬不可復改也既葬而復改猶既棺而復開仁人孝子所不忍見不忍言者也後世無故而行之遂成風俗亦何異於狐埋之而狐搰之者哉夀張侯樊宏遺勑薄葬又以為棺柩一藏不宜復見如有腐敗傷孝子之心使與夫人同墳異藏光武善而從之合于古矣圜丘之樂圜鍾為宫黃鍾為角太簇為徵姑洗為羽方丘之樂函鍾為宫太簇為角姑洗為徵南吕為羽宗廟之樂黃鍾為宫大吕為角太簇為徵應鍾為羽注以圜鍾為夾鍾函鍾為林鍾而十二律配十二辰夾鍾生於房心之氣天帝之明堂為天宫林鍾生於未之氣未坤之位而天社地神在東井輿鬼之外為地宫黃鍾生於虛危之氣虛危宗廟也為人宫又以律吕相生之次卑者不用尊者避之後生先用先生後用則上下損益相生之古法亂矣又謂祭尚柔商堅剛也故樂無商五味調謂之和五采備謂之繡五聲和謂之樂五聲無商猶五味無辛五采無白也無辛則五味不調未可謂之和無白則五采不備未可謂之繡無商則五聲不和未可謂之樂也說者謂鬼神惡商如其說則天神地示皆惡商矣而天有四時地有五行是將使四時無秋五行無金而後可也有是理哉唐趙慎言謂三大祭無商商音金也周木德金尅木故去之唐土王請加商調去角調又云聲無定性音無常主剛柔之體實由其人人和則音和人怒則聲怒以破商聲堅剛之說是則然矣而木德去商土德去角豈其然也水德去宫可乎宋紹興中有司議以為天宫取律之相次圜鍾隂聲第五隂將極而陽生故取陽聲之首黃鍾為角陽聲第二太簇為徵陽聲第三姑洗為羽天道有自然之秩序故取其相次者以為聲地宫取律之相生函鍾上生太簇為角太簇下生南吕為羽南吕上生姑洗為徵宫生徵徵生商商生羽羽生角此古法也宫生角角生羽羽生徴或未之前聞地道資生而不窮故取其相生者以為聲人宫取律之相合黃鍾子為宫大吕丑為角子合丑也太簇寅為徵應鍾亥為羽寅合亥也人道以合而相親故取其相合者以為聲其說似近理然顛倒四音尤拂於經五聲六律還相為宫三大祭之樂古還宫法也天宫黃鍾為角者夷則之宫黃鍾為角夷則之上宫聲清為上以清角為宫故曰上宫周語武王伐殷二月癸亥夜陳未畢而雨以夷則之上宫畢之故長夷則之上宫名之曰羽羽生角夷則之宫仲吕為羽仲吕生黃鍾故推本其所生而名之羽者雨也易林曰羽動角甘雨續草木茂年嵗熟蓋取諸此太簇為徵者林鍾為宫太簇為徵姑洗為羽林鍾之下宫聲濁為下以下徵為宫故曰下宫周語所謂以太簇之下宫布令於商者也太簇之宫南吕為徵以下徵為宫故曰太簇之下宫姑洗為羽者林鍾之羽是圜丘六變三宫四均圜鍾宫夷則宫林鍾宫是為三宫圜鍾以其宫為均夷則以其角為均林鍾以其徵其羽為均是為四均方丘八變宗廟九變四宫四均函鍾宫以其宫為均無射宫以其角為均無射之宫太簇為角南吕宫以其徵為均南吕之宫姑洗為徴黃鍾宫以其羽為均黃鍾之宫南吕為羽黃鍾宫以其宫為均大吕宫以其角為均南吕之宫大吕為角林鍾宫以其徵為均林鍾之宫太簇為徵太簇宫以其羽為均太簇之宫應鍾為羽是為四宫四均宫君商臣以商為均君臣易位革命之象故商不為均非無商也商不為均也均一名調古者一宫四調沿及魏晉三調猶存曰正宫調曰清角調曰下徵調而羽調亡矣函鍾一名大林其聲函胡濁而下周語所謂黃鍾之下宫也六微㫖大論曰君位臣則順臣位君則逆逆則其害速順則其害微故宫可居商位而商不可居宫位旋宫獨無商者以此鶡冠子曰東方者萬物立止焉故調以徵角木調以徵火南方者萬方華羽焉故調以羽徵火調以羽水西方者萬物成章焉故調以商北方者萬物録藏焉故調以角羽水調以角木中央者太一之位百神仰制焉故調以宫調猶均也徵居角位羽居徵位角居羽位更迭為均謂之調惟宫商君臣之位不易其方古者商不為均信矣北方羽而調以角猶周語夷則角而名以羽也韋注失之董仲舒曰風者木氣也其音角雨者水氣也其音羽雨以潤風以散角羽調則燥溼平大司樂凡建國禁其淫聲過聲凶聲慢聲詩鼓鍾𫝊曰幽王用樂不與德比㑹諸侯於淮上鼓其淫樂以示諸侯賢者為之憂傷箋云為之憂傷者嘉樂不野合今乃淮水之上作先王之樂失禮尤甚王基云所謂淫樂者鄭衛桑間濮上師延所作新聲之屬王肅云凡作樂而非其所則謂之淫淫過也幽王用樂不與德比又於淮上所謂過也桑間濮上亡國之音非徒過而已孫育云四章之義明皆正聲欽欽人樂進之善同音四縣克諧為雅為南大德廣及四夷以為籥舞和而不僭安得謂之淫愚謂樂則先王之樂也德非先王之德矣淑人君子其德不回回邪也德正則樂正雖邪者亦正德邪則樂邪雖正者亦邪假令操新聲於虞廷則羣后讓庶尹諧自若也鼓雅音於亡國而欲挽政散民流其可得乎孟子謂今樂猶古者以此曰淫曰過曰凶曰慢皆邪也淫者其德侈過者其德僻凶者其德㬥慢者其德偷德貞則聲無淫德中則聲無過德吉則聲無凶德恭則聲無慢大司樂禁之於建國之初所以正其行而糾其德也王肅謂作樂非其所則淫失之苟無回德雖以咸池之樂張於洞庭之野可也若德之回則凡祀大神饗大賓用之郊奏之廟聞者痛心見者蹙額矣是故淮水三洲鼓鍾笙磬皆先王之樂也賢者獨以為淫其誰曰不可樂師詔來瞽臯舞說文云氣皋白之進也從土刀切從白禮祝曰皋登歌曰奏皋古奏字皆從周禮曰詔來鼓皋舞皋告之也先鄭謂詔來瞽來勑也勑爾瞽率爾衆工奏爾悲誦讀為容肅肅雍雍毋怠毋凶古文勑作來勑有來音猶刻有亥音凶者凶聲怠者慢聲大司樂之所禁也肅肅則敬故聲無怠雍雍則和故聲無凶蓋逸詩也又云瞽當為鼓皋當為告則皋讀為告矣後鄭謂皋之言號漢書服䖍注曰告音嗥呼之嗥則皋有號告二音左傳齊人歌曰魯人之皋數年不覺古孝反使我髙蹈言魯俗舒緩皋者緩聲而長引之也喪禮之復望反諸幽求諸鬼神之道故北靣緩聲長引而招之曰皋某復者以此案詩九臯臯當作㚖㚖古澤字讀若浩皋從㚖從大韓詩云九㚖九折之澤俗作臯失之越絶書有馬嗥者吳伐越道逢大風車敗馬失騎士墮死匹馬啼皋事見吳史是皋與號古文通也左傳豺狼所嗥嗥與號通小胥正樂縣之位王宫縣諸侯軒縣鄭司農曰宫縣象宫室四靣有牆一名牆合周書大匡篇曰維周王宅程三年遭天之大荒樂不牆合大荒者大司樂所謂大札大凶大烖大憂不牆合者令弛縣也縣如牆合是為宫縣軒縣三靣其形曲春秋傳謂之曲縣康成謂去南靣以辟王何休曰天子周城諸侯軒城軒城者缺南靣以受過也春秋城不以制魯墮三都墮謂減損之酈道元曰叔孫氏墮郈今其城無南靣蓋闕之以象軒城矣說者遂謂南靣無城則不然說文缺也古者城闕其南方謂之其形曲古文曲作象缺之形然則宫如口說文口回也象回匝之形軒如也古文曲作王肅曰軒縣曲一靣吳姚信有昕天說昕讀為軒言天北髙南下若車之軒詩云如輊如軒毛傳從後視之如輊從前視之如軒通俗文云前重曰輊後重曰軒蓋前重則後輊後重則前軒不平曰軒不周亦曰軒軥車曲輿謂車牀曲前闌與軒同義衣成則缺衽宫成則缺隅謙之義也軒城軒縣蓋所以示謙歟唐志軒縣去南靣設於辰丑申之位天子宫縣四靣將射改縣大射儀不言改者國君與臣行禮不具軒縣東西縣在兩階之外兩階之間有二建鼓東近東階西近西階又無鍾鼓不妨射故不改也天子辟雍諸侯泮宫辟雍者築土雍水外圓如璧其水旋邱以節觀者天子四靣諸侯三靣泮宫闕其北軒縣闕其南小胥職大夫判縣士特縣曲禮大夫無故不徹縣士無故不徹琴瑟熊氏案春秋說題辭樂無大夫士制鄭氏針膏肓從題辭之義小胥判縣特縣者大夫士治心及治人之樂也特牲少牢大夫士祭祀無樂而鄉飲酒有工歌所謂治人之樂而大夫不徹縣士不徹琴瑟所謂治心之樂不可斯須去者惟疾病乃徹而去之聲音動人病者欲靜也康成謂去琴瑟者不命之士以為命士特縣非徒琴瑟而已然鄭詩女曰雞鳴士也而曰琴瑟在御此非侯伯一命之士歟賈誼曰大夫犆縣士有琴瑟諸侯之大夫視天子之士故犆縣魏絳有金石之樂僭矣左氏以為禮失之唐風山有樞刺晉昭公而曰子有鍾鼓明諸侯乃得有鍾鼓也鄉飲酒記曰磬階間縮霤則大夫特縣惟磬而已程繁曰諸侯倦於聽治息於鐘鼓之樂士大夫倦於聽治息於竽琴之樂農夫春耕夏耘秋斂冬藏息於聆缶之樂然則非諸侯無鐘鼓信矣魯詩傳曰天子食日舉樂諸侯不釋縣大夫士日琴瑟大師教六詩曰風曰賦曰比曰興曰雅曰頌賦之言鋪也比之言類也興之言廞也風之言發也長言之若凡短言之若發雅之言秀也頌之言容也分為六合為三曰風雅頌而賦比興在其中矣天有三時三時不害王化之基春三月是為發陳天地俱生萬物以榮故風者如春之發也發乎情性根乎隂陽男女歌詠各言其傷風之所以為不逐者取是以節之也夏三月是為蕃秀天地氣交萬物華茂故雅者如夏之秀也養長之道賢賢親親歌於朝廟上下歡欣小雅之所以為小雅者取是而文之也大雅之所以為大雅者取是而光之也秋三月是為容平天氣以肅地氣以明故頌者如秋之容也百穀登萬寶成禮樂作鬼神歆肅肅雍雍毋怠毋凶頌之所以為至者取是而通之也舜歌南風夏小正正月有俊風俊者大也大風者南風也故風莫盛於南祈年吹豳雅祭蠟吹豳頌則風兼雅頌矣南其風之始豳其風之終乎物之容狀至秋而平故以雅治人風成乎頌而樂興焉武始而北出再成而滅商三成而南四成而南國是彊五成而分周公左召公右于是樂有二南及周東遷南風不競天道在西北而秦有夏聲繼周之舊周之舊者南也故曰以雅以南則雅亦名南不獨風矣雅之變也與風俱變也雅之亡也與風俱亡也一成而不可變者其惟頌乎古文雅作匹鄭箋以匹為萬舞文王世子胥鼓南胥讀為雅即古文匹字與胥通古者舞詩歌之鼓之故曰胥鼓南言肄雅則鼓南風也春誦者誦此夏弦者弦此子之武城聞弦歌之聲弦歌者亦弦歌此南夷之樂曰任古南任音同遂以南為夷樂非也正南曰荆州荆為楚南有江漢江漢楚之望說者謂南風者楚也亦非季札觀樂而知周之興師曠歌風而知周之廢或曰天文周楚同野故同風左傳嵗棄其次以害鳥帑周楚惡之鳥帑者鶉尾也則周楚同野矣鶉首秦鶉火周鶉尾楚皆在南故秦有夏聲夏猶南也皆言大也雷出地奮豫地中有水師先王作樂以象出地之雷造律以法地中之水水者萬物之凖也其色素其味淡凖為五量之宗素為五色之質淡為五味之中故律由此生樂由此作得意愷歌以示喜偃伯靈臺以示休豫之義也豫順以動故利行師師克在和故由豫者大有得將驕必敗故鳴豫者志窮凶天下既平天子大愷故曰志大行也師出以律失律者凶王者制事立法物度軌儀一禀於六律六律為萬事根本焉其於兵械尤所重望敵知吉凶聞聲效勝負武王伐紂吹律聽聲故名其樂曰武宿夜言武王宿商郊士卒皆歡娛夜半持律管至敵壘大呼有聲來應管乃五行之符太師職所謂執同律以聽軍聲而詔吉凶者蓋以此若師有功則大司馬左執律右秉鉞以先愷樂獻於社左為陽陽主生左執律者德成衡也右為隂隂主殺右秉鉞者傷成鉞也一獻於祖用命者賞之一獻於社不用命者戮之愷猶豫也振旅之樂歌說者謂黃帝涿鹿有功命岐伯作愷歌厲士諷敵其曲有靈夔吼鵰鶚爭石墜崖壯士怒之名出於後世而漢有短簫鐃歌名為鼓吹其聲惟用正宫調宋元豐中以為其聲害雅樂欲調治之或以為不可然皆莫知其故蓋本武王十三年正月師渡孟津甲子至於牧野推律自孟春及季冬殺氣相并而聲尚宫故厯代鼓吹惟用宫調是為軍聲可知消息而決勝負其術亡矣或云枹鼓之音為角見火光為徵金鐡矛㦸之音為商嘯呼之音為羽寂寞無聞為宫角聲當以白虎徵聲當以元武商聲當以朱雀羽聲當以勾陳宫聲當以青龍所謂五行之符也禮說卷七
